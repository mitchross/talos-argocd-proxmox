name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/render-diagrams.sh"
      - "scripts/normalize-diagram.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/render-diagrams.sh"
      - "scripts/normalize-diagram.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install diagram font
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends fonts-inter
          fc-cache --force

      - name: Verify generated diagrams
        run: |
          npm ci
          npm run diagrams
          git diff --exit-code -- docs/assets

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          # cache: pip removed — repo has no requirements.txt/pyproject.toml,
          # so setup-python fails before MkDocs runs. Deps are installed
          # inline by the next step (mkdocs-material + pymdown-extensions);
          # a one-job CI run installing two small wheels is cheap enough that
          # we don't need pip caching here.

      - name: Install MkDocs Material
        run: |
          pip install \
            'mkdocs>=1.6' \
            mkdocs-material==9.5.* \
            pymdown-extensions==10.*

      - name: Build site
        # --strict since 2026-07-01: the cross-repo links that used to warn
        # were converted to absolute GitHub URLs, so any new warning is a
        # real regression (broken link/nav/anchor — see mkdocs.yml
        # `validation:`) and should block the deploy.
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
