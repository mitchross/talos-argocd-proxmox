name: Build llama.cpp CUDA Image

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if tag exists'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/llama-cpp-cuda
  # Pin CUDA to 12.8.1 — driver 570.x on Talos v1.12 only supports up to CUDA 12.8.
  # The upstream ghcr.io/ggml-org/llama.cpp:server-cuda image ships CUDA 12.9 which
  # triggers "forward compatibility was attempted on non supported HW" on consumer GPUs
  # (RTX 3090). Forward compat only works on datacenter GPUs (A100, H100, etc.).
  CUDA_VERSION: "12.8.1"
  # Only build for architectures we actually use (RTX 3090 = sm_86)
  CUDA_DOCKER_ARCH: "86"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest llama.cpp release tag
        id: upstream
        run: |
          LATEST=$(curl -sf https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.tag_name')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: ${LATEST}"

      - name: Check if image already exists
        id: check
        run: |
          TOKEN=$(echo '${{ secrets.GITHUB_TOKEN }}' | base64)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/${{ steps.upstream.outputs.tag }}")
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Image ${{ steps.upstream.outputs.tag }} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Building ${{ steps.upstream.outputs.tag }}"
          fi

      - name: Checkout llama.cpp
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ steps.upstream.outputs.tag }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build number
        if: steps.check.outputs.skip == 'false'
        id: buildnum
        run: |
          # Extract numeric build number from tag (e.g. b8660 -> 8660)
          NUM=$(echo "${{ steps.upstream.outputs.tag }}" | sed 's/^b//')
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devops/cuda.Dockerfile
          target: server
          push: true
          build-args: |
            CUDA_VERSION=${{ env.CUDA_VERSION }}
            CUDA_DOCKER_ARCH=${{ env.CUDA_DOCKER_ARCH }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-cuda-${{ steps.upstream.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-cuda
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.buildnum.outputs.num }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
