apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: news-reader
  namespace: news-reader
  labels:
    external-dns: 'true'
  annotations:
    external-dns.alpha.kubernetes.io/target: apps.sno-ai-lab.vanillax.xyz
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: openshift-gateway
    namespace: openshift-ingress
    sectionName: https
  hostnames:
  - news.apps.sno-ai-lab.vanillax.xyz
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - group: ''
      kind: Service
      name: news-reader
      port: 3000
      weight: 1
