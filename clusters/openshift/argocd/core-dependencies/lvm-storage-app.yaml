apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lvm-storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/manifest-generate-paths: manifests/infra/lvm-storage/deploy-targets/openshift
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openshift-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
    targetRevision: main
    path: manifests/infra/lvm-storage/deploy-targets/openshift
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
