# recovery overlay — restore from Barman S3.
#
# Change externalClusters[0].plugin.parameters.serverName (in
# bootstrap-patch.yaml) to point at the Barman lineage on S3 that holds
# the data you want back. Change recoveryTarget.targetTime for PITR (omit
# the field for "latest").
#
# After a successful restore, if you want subsequent DR events to restore
# FROM the just-restored lineage (now the good copy), bump both:
#   - base/cluster.yaml   .spec.plugins[0].parameters.serverName → vN+1
#   - this file's bootstrap-patch.yaml
#                         .externalClusters[0].plugin.parameters.serverName → vN
#                         (the new "known-good" lineage)
#
# Field paths above reflect the 2026-05-07 plugin-shape migration. Pre-
# migration the same fields lived under spec.backup.barmanObjectStore and
# externalClusters[].barmanObjectStore — see git history if recovering
# off an older operator version.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: bootstrap-patch.yaml
    target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: gitea-database
