apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry
  namespace: kube-system
  labels:
    app.kubernetes.io/name: container-registry
    app.kubernetes.io/component: infrastructure
  annotations:
    # Longhorn backup settings - Critical tier for infrastructure
    # Intentionally not managed by the VolSync chart: this PVC lives in
    # kube-system, and system-namespace PVCs must stay out of the restore path.
    longhorn.io/recurring-job-source: enabled
    longhorn.io/recurring-job-group: critical
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Bumped 10Gi -> 50Gi 2026-05-04 after registry filled. Longhorn
      # online-expanded the PV; kustomize manifest now matches live.
      storage: 50Gi
