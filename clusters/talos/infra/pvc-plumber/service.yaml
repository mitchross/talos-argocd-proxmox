# Service for Prometheus scraping of controller-runtime metrics + probes.
#
# Deliberately NOT exposing port 9443 (webhook server) — the audit-mode
# binary does not start the webhook server (see deployment.yaml). Even if
# a future Deployment misconfiguration accidentally started it, omitting
# the port here means nothing on the cluster can route admission traffic
# to this pod.
apiVersion: v1
kind: Service
metadata:
  name: pvc-plumber-metrics
  namespace: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
  ports:
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
    - name: probes
      port: 8082
      targetPort: probes
      protocol: TCP
    # rc3+: route in-cluster /audit consumers to the audit HTTP server
    # bound to cfg.Port inside the pod. NOT scraped by Prometheus —
    # the ServiceMonitor still targets the `metrics` port for
    # /metrics. Reachable as
    # `pvc-plumber-metrics.pvc-plumber.svc.cluster.local:8080/audit`.
    - name: audit-http
      port: 8080
      targetPort: audit-http
      protocol: TCP
