---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: volsync-kopia-repository
spec:
  externalSecretName: volsync-kopia-repository
  refreshTime: 1m
  namespaceSelector:
    matchLabels:
      volsync.backube/privileged-movers: "true"
  externalSecretSpec:
    refreshInterval: 1m
    secretStoreRef:
      kind: ClusterSecretStore
      name: 1password
    target:
      name: volsync-kopia-repository
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          KOPIA_PASSWORD: "{{ .password }}"
          AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
          AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
          KOPIA_REPOSITORY: "s3://volsync-kopia/cluster"
          KOPIA_S3_ENDPOINT: "192.168.10.133:30292"
          KOPIA_S3_BUCKET: "volsync-kopia"
          KOPIA_S3_DISABLE_TLS: "true"
    data:
      - secretKey: password
        remoteRef:
          key: rustfs
          property: kopia_password
      - secretKey: accessKey
        remoteRef:
          key: rustfs
          property: rustfs-workload-access-key
      - secretKey: secretKey
        remoteRef:
          key: rustfs
          property: rustfs-workload-secret-key
