# Placeholder API key for k8sgpt's localai/openai backend.
#
# llama-cpp does NOT enforce API keys, but the k8sgpt CLI requires a non-empty
# password to register the AI provider in its config (otherwise "serve" exits
# with: "AI provider openai not specified in configuration. Please run k8sgpt auth").
#
# The k8sgpt-operator reads this secret and injects the value as K8SGPT_PASSWORD
# env on the spawned k8sgpt Deployment, which is enough for the CLI to consider
# the provider "configured" even though the value never reaches llama-cpp.
#
# This is intentionally an inline Secret (not an ExternalSecret) — the value is
# not sensitive because nothing on the receiving end (llama-cpp) checks it.
apiVersion: v1
kind: Secret
metadata:
  name: k8sgpt-llama-cpp-key
  namespace: k8sgpt
type: Opaque
stringData:
  # Any non-empty string works; llama-cpp ignores the Authorization header.
  api-key: "sk-llama-cpp-placeholder-not-validated"
