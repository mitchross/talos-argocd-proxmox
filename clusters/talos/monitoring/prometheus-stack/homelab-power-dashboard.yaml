apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-power-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  homelab-power.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "At a glance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 400 },
                  { "color": "orange", "value": 700 },
                  { "color": "red", "value": 1000 }
                ]
              },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Homelab — Total Power Now",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=\"sensor.homelab_total_power\"}",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 3 }
                ]
              },
              "unit": "kwatth",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Energy Today",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_energy_kwh{entity=\"sensor.homelab_total_energy_today\"}",
              "legendFormat": "kWh",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.50 },
                  { "color": "orange", "value": 1.00 },
                  { "color": "red", "value": 2.00 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Cost Today ($0.21/kWh)",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_today\"}",
              "legendFormat": "USD",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 5,
          "title": "Per-plug power",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "watt",
              "decimals": 1,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 6,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Live Draw — Per Plug",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_smart_plug_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 25,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "normal" }
              }
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "id": 7,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["mean", "max", "lastNotNull"]
            }
          },
          "title": "Stacked Power — Homelab",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_smart_plug_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 26 },
          "id": 8,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["mean", "max", "lastNotNull"]
            }
          },
          "title": "Per-Plug Power Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_smart_plug_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 36 },
          "id": 9,
          "title": "Cost",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "currencyUSD",
              "decimals": 2,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 37 },
          "id": 10,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Cost Today — Per Plug",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_cost_today\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 37 },
          "id": 11,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["lastNotNull"]
            }
          },
          "title": "Cost Today Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_today\"}",
              "legendFormat": "Homelab Total",
              "refId": "A"
            },
            {
              "expr": "homeassistant_sensor_unit_usd{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_cost_today\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 45 },
          "id": 12,
          "title": "Electrical",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "volt",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 46 },
          "id": 13,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Voltage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_voltage_v{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_smart_plug_voltage\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "amp",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 46 },
          "id": 14,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Current",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_current_a{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_smart_plug_current\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["homelab", "power", "cost", "tapo", "home-assistant"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Homelab Power & Cost",
      "uid": "homelab-power-cost",
      "version": 1
    }
