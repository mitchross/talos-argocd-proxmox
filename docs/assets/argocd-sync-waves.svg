<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">How Argo CD bootstraps and waits through sync waves</title>
  <desc id="desc">Diagram showing the manually seeded root Application, self-managed Argo CD entrypoints, wave zero through six ordering, and the health gate that prevents the next wave from starting until the current wave becomes healthy.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#087e8b"/></marker>
    <style>.t{font:700 39px Inter,ui-sans-serif,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,ui-sans-serif,system-ui,sans-serif;fill:#586775}.h{font:700 21px Inter,ui-sans-serif,system-ui,sans-serif;fill:#17212b}.b{font:500 15px Inter,ui-sans-serif,system-ui,sans-serif;fill:#455563}.n{font:700 21px Inter,ui-sans-serif,system-ui,sans-serif;fill:#fff}.sm{font:600 14px Inter,ui-sans-serif,system-ui,sans-serif;fill:#586775}.flow{stroke-dasharray:14 10;animation:reveal .45s ease-out both var(--delay,0s),flow 1.1s linear infinite}@keyframes reveal{from{opacity:0}to{opacity:1}}@keyframes flow{to{stroke-dashoffset:-48}}@media (prefers-reduced-motion:reduce){.flow{animation:none;stroke-dasharray:none}}</style>
  </defs>
  <rect width="1600" height="940" fill="#fff"/>
  <text x="70" y="62" class="t">How Argo CD bootstraps and waits</text>
  <text x="70" y="96" class="st">One manual seed creates a self-managing tree; health gates turn wave numbers into real dependency ordering.</text>

  <rect x="70" y="135" width="1460" height="170" rx="8" fill="#f3f6f8" stroke="#d4dce2"/>
  <rect x="100" y="173" width="300" height="94" rx="7" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/>
  <text x="250" y="207" text-anchor="middle" class="h">1. Manual seed</text><text x="250" y="235" text-anchor="middle" class="b">apply root.yaml once</text>
  <path class="flow" style="--delay:.2s" d="M402 220 H480" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="500" y="173" width="300" height="94" rx="7" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/>
  <text x="650" y="207" text-anchor="middle" class="h">2. Root Application</text><text x="650" y="235" text-anchor="middle" class="b">Argo now manages its own tree</text>
  <path class="flow" style="--delay:.55s" d="M802 220 H880" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="900" y="157" width="590" height="126" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/>
  <text x="1195" y="192" text-anchor="middle" class="h">3. Entrypoint layers</text>
  <rect x="930" y="213" width="160" height="42" rx="5" fill="#fff"/><text x="1010" y="240" text-anchor="middle" class="b">core dependencies</text>
  <rect x="1105" y="213" width="175" height="42" rx="5" fill="#fff"/><text x="1193" y="240" text-anchor="middle" class="b">custom entrypoints</text>
  <rect x="1295" y="213" width="165" height="42" rx="5" fill="#fff"/><text x="1378" y="240" text-anchor="middle" class="b">ApplicationSets</text>

  <text x="70" y="354" class="h">Sync waves: apply one row, wait for Healthy, then continue</text>
  <line class="flow" style="--delay:.9s" x1="130" y1="403" x2="130" y2="817" stroke="#087e8b" stroke-width="8"/>

  <circle cx="130" cy="410" r="30" fill="#344250"/><text x="130" y="418" text-anchor="middle" class="n">0</text>
  <rect x="185" y="374" width="1240" height="72" rx="7" fill="#fff" stroke="#d4dce2" filter="url(#s)"/>
  <text x="215" y="404" class="h">Foundation</text><text x="470" y="404" class="b">Argo CD, projects, Cilium, 1Password Connect, External Secrets</text><text x="215" y="429" class="sm">Network and secret controllers must exist first.</text>
  <circle cx="1470" cy="410" r="18" fill="#3fa36c"/><text x="1470" y="416" text-anchor="middle" style="font:700 14px Inter,sans-serif;fill:#fff">OK</text>

  <circle cx="130" cy="478" r="30" fill="#344250"/><text x="130" y="486" text-anchor="middle" class="n">1</text>
  <rect x="185" y="454" width="1240" height="58" rx="7" fill="#fff" stroke="#d4dce2"/><text x="215" y="489" class="h">Core controllers</text><text x="470" y="489" class="b">cert-manager, Longhorn, snapshot-controller</text>

  <circle cx="130" cy="546" r="30" fill="#087e8b"/><text x="130" y="554" text-anchor="middle" class="n">2</text>
  <rect x="185" y="522" width="1240" height="58" rx="7" fill="#dff4f6" stroke="#9fd3da"/><text x="215" y="557" class="h">Backup engine</text><text x="470" y="557" class="b">Kopiur CRDs, controller, webhook, volume populator</text>

  <circle cx="130" cy="614" r="30" fill="#087e8b"/><text x="130" y="622" text-anchor="middle" class="n">3</text>
  <rect x="185" y="590" width="1240" height="58" rx="7" fill="#dff4f6" stroke="#9fd3da"/><text x="215" y="625" class="h">Backup configuration</text><text x="470" y="625" class="b">Kopiur repository, credential fanout, snapshot class; CNPG Barman plugin</text>

  <circle cx="130" cy="682" r="30" fill="#344250"/><text x="130" y="690" text-anchor="middle" class="n">4</text>
  <rect x="185" y="658" width="1240" height="58" rx="7" fill="#fff" stroke="#d4dce2"/><text x="215" y="693" class="h">Platform</text><text x="470" y="693" class="b">KEDA core, Temporal worker, infrastructure and database ApplicationSets</text>

  <circle cx="130" cy="750" r="30" fill="#344250"/><text x="130" y="758" text-anchor="middle" class="n">5</text>
  <rect x="185" y="726" width="1240" height="58" rx="7" fill="#fff" stroke="#d4dce2"/><text x="215" y="761" class="h">Observability core</text><text x="470" y="761" class="b">OpenTelemetry core and monitoring ApplicationSet</text>

  <circle cx="130" cy="818" r="30" fill="#dc5f5f"/><text x="130" y="826" text-anchor="middle" class="n">6</text>
  <rect x="185" y="784" width="1240" height="72" rx="7" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/>
  <text x="215" y="814" class="h">User workloads</text><text x="470" y="814" class="b">Workload ApplicationSet plus KEDA/OpenTelemetry observability overlays</text>
  <text x="215" y="839" class="sm">A restoring PVC stays Pending, so its Application stays Progressing and the sync waits.</text>

  <rect x="70" y="878" width="1460" height="44" rx="6" fill="#17212b"/>
  <text x="800" y="906" text-anchor="middle" style="font:600 16px Inter,ui-sans-serif,system-ui,sans-serif;fill:#fff">The gate is health, not time: Argo CD does not advance merely because the previous apply command finished.</text>
</svg>
