<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Full-cluster disaster recovery sequence</title>
  <desc id="desc">The Talos cluster is destroyed while Git, Omni configuration, 1Password, and RustFS survive, followed by Talos provisioning, bootstrap, Argo CD sync waves, Kopiur and Barman restoration, and application acceptance checks.</desc>
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity=".12"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#087e8b"/></marker><style>.t{font:700 39px Inter,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,system-ui,sans-serif;fill:#586775}.h{font:700 20px Inter,system-ui,sans-serif;fill:#17212b}.b{font:500 15px Inter,system-ui,sans-serif;fill:#455563}.sm{font:500 14px Inter,system-ui,sans-serif;fill:#586775}.n{font:700 17px Inter,system-ui,sans-serif;fill:#fff}.l{font:700 14px Inter,system-ui,sans-serif}.flow{stroke-dasharray:14 10;animation:reveal .45s ease-out both var(--delay,0s),flow 1.1s linear infinite}@keyframes reveal{from{opacity:0}to{opacity:1}}@keyframes flow{to{stroke-dashoffset:-48}}@media (prefers-reduced-motion:reduce){.flow{animation:none;stroke-dasharray:none}}</style></defs>
  <rect width="1600" height="900" fill="#fff"/><text x="70" y="62" class="t">Destroy the cluster, keep the recovery contract</text><text x="70" y="96" class="st">The cluster is disposable only because identity, desired state, credentials, and protected data survive outside it.</text>
  <rect x="70" y="135" width="1460" height="155" rx="8" fill="#f3f6f8" stroke="#d4dce2"/><text x="100" y="174" class="l" fill="#276d49">SURVIVES OUTSIDE THE CLUSTER</text>
  <rect x="100" y="198" width="250" height="65" rx="6" fill="#e1f3e8"/><text x="225" y="224" text-anchor="middle" class="h">Git</text><text x="225" y="248" text-anchor="middle" class="sm">desired state</text>
  <rect x="380" y="198" width="250" height="65" rx="6" fill="#dff4f6"/><text x="505" y="224" text-anchor="middle" class="h">Omni / Talos config</text><text x="505" y="248" text-anchor="middle" class="sm">machine identity</text>
  <rect x="660" y="198" width="250" height="65" rx="6" fill="#fde8e8"/><text x="785" y="224" text-anchor="middle" class="h">1Password</text><text x="785" y="248" text-anchor="middle" class="sm">credentials</text>
  <rect x="940" y="198" width="250" height="65" rx="6" fill="#fff3df"/><text x="1065" y="224" text-anchor="middle" class="h">Kopia on RustFS</text><text x="1065" y="248" text-anchor="middle" class="sm">application PVC data</text>
  <rect x="1220" y="198" width="280" height="65" rx="6" fill="#fff3df"/><text x="1360" y="224" text-anchor="middle" class="h">Barman on RustFS</text><text x="1360" y="248" text-anchor="middle" class="sm">remaining CNPG data + WAL</text>
  <rect x="70" y="320" width="250" height="440" rx="8" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/><circle cx="110" cy="364" r="22" fill="#dc5f5f"/><text x="110" y="370" text-anchor="middle" class="n">0</text><text x="145" y="371" class="h">Failure event</text><text x="100" y="420" class="b">Talos VMs gone</text><text x="100" y="451" class="b">Kubernetes API gone</text><text x="100" y="482" class="b">Longhorn volumes gone</text><text x="100" y="513" class="b">all live objects gone</text><rect x="100" y="565" width="190" height="92" rx="6" fill="#fff"/><text x="195" y="600" text-anchor="middle" class="h">Stop condition</text><text x="195" y="626" text-anchor="middle" class="sm">do not nuke until</text><text x="195" y="648" text-anchor="middle" class="sm">fresh backups are proven</text>
  <path class="flow" style="--delay:.2s" d="M322 540 H375" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="395" y="320" width="250" height="440" rx="8" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><circle cx="435" cy="364" r="22" fill="#087e8b"/><text x="435" y="370" text-anchor="middle" class="n">1</text><text x="470" y="371" class="h">Rebuild Talos</text><text x="425" y="420" class="b">Omni provisions VMs</text><text x="425" y="451" class="b">Talos forms Kubernetes</text><text x="425" y="482" class="b">Gateway API CRDs seeded</text><text x="425" y="513" class="b">Cilium installed</text><text x="425" y="544" class="b">1Password bootstrap seeded</text><rect x="425" y="596" width="190" height="61" rx="6" fill="#fff"/><text x="520" y="622" text-anchor="middle" class="h">Gate</text><text x="520" y="646" text-anchor="middle" class="sm">nodes Ready + API reachable</text>
  <path class="flow" style="--delay:.65s" d="M647 540 H700" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="720" y="320" width="250" height="440" rx="8" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/><circle cx="760" cy="364" r="22" fill="#3fa36c"/><text x="760" y="370" text-anchor="middle" class="n">2</text><text x="795" y="371" class="h">Bootstrap Argo</text><text x="750" y="420" class="b">bootstrap-argocd.sh</text><text x="750" y="451" class="b">root Application lands</text><text x="750" y="482" class="b">waves 0-1: foundations</text><text x="750" y="513" class="b">wave 2: Kopiur operator</text><text x="750" y="544" class="b">wave 3: repository + creds</text><rect x="750" y="596" width="190" height="61" rx="6" fill="#fff"/><text x="845" y="622" text-anchor="middle" class="h">Gate</text><text x="845" y="646" text-anchor="middle" class="sm">each wave Healthy</text>
  <path class="flow" style="--delay:1.1s" d="M972 540 H1025" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1045" y="320" width="250" height="440" rx="8" fill="#fff3df" stroke="#e7b95e" filter="url(#s)"/><circle cx="1085" cy="364" r="22" fill="#c58a25"/><text x="1085" y="370" text-anchor="middle" class="n">3</text><text x="1120" y="371" class="h">Restore data</text><text x="1075" y="420" class="b">waves 4-6 create apps</text><text x="1075" y="451" class="b">PVCs remain Pending</text><text x="1075" y="482" class="b">Kopiur hydrates volumes</text><text x="1075" y="513" class="b">Barman restores CNPG</text><text x="1075" y="544" class="b">pods start after data binds</text><rect x="1075" y="596" width="190" height="61" rx="6" fill="#fff"/><text x="1170" y="622" text-anchor="middle" class="h">Safe wait</text><text x="1170" y="646" text-anchor="middle" class="sm">Pending prevents empty start</text>
  <path class="flow" style="--delay:1.55s" d="M1297 540 H1350" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1370" y="320" width="160" height="440" rx="8" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/><circle cx="1410" cy="364" r="22" fill="#3fa36c"/><text x="1410" y="370" text-anchor="middle" class="n">4</text><text x="1445" y="371" class="h">Prove</text><text x="1400" y="420" class="b">PVCs Bound</text><text x="1400" y="451" class="b">apps Healthy</text><text x="1400" y="482" class="b">data verified</text><text x="1400" y="513" class="b">backups resume</text><text x="1400" y="544" class="b">canary passes</text><rect x="1395" y="596" width="110" height="61" rx="6" fill="#fff"/><text x="1450" y="622" text-anchor="middle" class="h">Done</text><text x="1450" y="646" text-anchor="middle" class="sm">not just Synced</text>
  <rect x="70" y="795" width="1460" height="72" rx="6" fill="#17212b"/><text x="800" y="826" text-anchor="middle" style="font:700 17px Inter,sans-serif;fill:#fff">Recovery is convergence, not a script finishing</text><text x="800" y="851" text-anchor="middle" style="font:500 16px Inter,sans-serif;fill:#fff">Complete means applications are healthy, restored data is verified, and new backups are succeeding.</text>
</svg>
