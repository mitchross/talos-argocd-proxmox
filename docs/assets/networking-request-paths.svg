<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" role="img" aria-labelledby="title desc">
  <title id="title">Private and public request paths through Technitium, Cloudflare, and Cilium Gateway API</title>
  <desc id="desc">Two-lane diagram. Private LAN requests resolve through Firewalla and Technitium to the internal Cilium gateway. Public requests resolve through Cloudflare and enter through cloudflared to the external Cilium gateway. Both routes use HTTPRoute and Service resources to reach application pods.</desc>
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity=".12"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#087e8b"/></marker><style>.t{font:700 39px Inter,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,system-ui,sans-serif;fill:#586775}.h{font:700 20px Inter,system-ui,sans-serif;fill:#17212b}.b{font:500 15px Inter,system-ui,sans-serif;fill:#455563}.l{font:700 15px Inter,system-ui,sans-serif}.sm{font:500 14px Inter,system-ui,sans-serif;fill:#586775}.flow{stroke-dasharray:14 10;animation:reveal .45s ease-out both var(--delay,0s),flow 1.1s linear infinite}@keyframes reveal{from{opacity:0}to{opacity:1}}@keyframes flow{to{stroke-dashoffset:-48}}@media (prefers-reduced-motion:reduce){.flow{animation:none;stroke-dasharray:none}}</style></defs>
  <rect width="1600" height="850" fill="#fff"/><text x="70" y="62" class="t">One hostname, two intentional request paths</text><text x="70" y="96" class="st">Split DNS keeps private services on the LAN while public services enter through Cloudflare Tunnel.</text>
  <rect x="70" y="135" width="1460" height="275" rx="9" fill="#f3f6f8" stroke="#d4dce2"/><rect x="94" y="158" width="170" height="36" rx="5" fill="#3fa36c"/><text x="179" y="182" text-anchor="middle" style="font:700 14px Inter,sans-serif;fill:#fff">PRIVATE / LAN</text>
  <rect x="105" y="238" width="190" height="84" rx="7" fill="#fff" stroke="#87c7a3" filter="url(#s)"/><text x="200" y="272" text-anchor="middle" class="h">LAN client</text><text x="200" y="298" text-anchor="middle" class="sm">asks Firewalla DNS</text>
  <path class="flow" style="--delay:.15s" d="M297 280 H350" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="370" y="238" width="220" height="84" rx="7" fill="#fff" stroke="#9fd3da" filter="url(#s)"/><text x="480" y="272" text-anchor="middle" class="h">Technitium</text><text x="480" y="298" text-anchor="middle" class="sm">private override or DoH fallback</text>
  <path class="flow" style="--delay:.4s" d="M592 280 H645" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="665" y="226" width="270" height="108" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><text x="800" y="263" text-anchor="middle" class="h">Internal Cilium Gateway</text><text x="800" y="289" text-anchor="middle" class="b">gateway-internal-technitium</text><text x="800" y="313" text-anchor="middle" class="sm">private LoadBalancer address</text>
  <path class="flow" style="--delay:.65s" d="M937 280 H990" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1010" y="238" width="190" height="84" rx="7" fill="#fff" stroke="#9fd3da"/><text x="1105" y="272" text-anchor="middle" class="h">HTTPRoute</text><text x="1105" y="298" text-anchor="middle" class="sm">hostname + backend</text>
  <path class="flow" style="--delay:.9s" d="M1202 280 H1255" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1275" y="238" width="220" height="84" rx="7" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/><text x="1385" y="272" text-anchor="middle" class="h">Service -> Pod</text><text x="1385" y="298" text-anchor="middle" class="sm">traffic stays on the LAN</text>

  <rect x="70" y="440" width="1460" height="275" rx="9" fill="#f3f6f8" stroke="#d4dce2"/><rect x="94" y="463" width="170" height="36" rx="5" fill="#dc5f5f"/><text x="179" y="487" text-anchor="middle" style="font:700 14px Inter,sans-serif;fill:#fff">PUBLIC / INTERNET</text>
  <rect x="105" y="543" width="190" height="84" rx="7" fill="#fff" stroke="#e4a6a6" filter="url(#s)"/><text x="200" y="577" text-anchor="middle" class="h">Internet client</text><text x="200" y="603" text-anchor="middle" class="sm">public DNS lookup</text>
  <path class="flow" style="--delay:1.15s" d="M297 585 H350" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="370" y="543" width="220" height="84" rx="7" fill="#fff3df" stroke="#e7b95e" filter="url(#s)"/><text x="480" y="577" text-anchor="middle" class="h">Cloudflare</text><text x="480" y="603" text-anchor="middle" class="sm">DNS + Tunnel edge</text>
  <path class="flow" style="--delay:1.4s" d="M592 585 H645" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="665" y="543" width="270" height="84" rx="7" fill="#fff3df" stroke="#e7b95e" filter="url(#s)"/><text x="800" y="577" text-anchor="middle" class="h">cloudflared</text><text x="800" y="603" text-anchor="middle" class="sm">outbound tunnel in cluster</text>
  <path class="flow" style="--delay:1.65s" d="M937 585 H990" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1010" y="531" width="230" height="108" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><text x="1125" y="568" text-anchor="middle" class="h">External Gateway</text><text x="1125" y="594" text-anchor="middle" class="b">gateway-external</text><text x="1125" y="618" text-anchor="middle" class="sm">hostname allowlist</text>
  <path class="flow" style="--delay:1.9s" d="M1242 585 H1280" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="1300" y="543" width="195" height="84" rx="7" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/><text x="1398" y="577" text-anchor="middle" class="h">Route -> Pod</text><text x="1398" y="603" text-anchor="middle" class="sm">public opt-in only</text>
  <rect x="70" y="745" width="1460" height="72" rx="6" fill="#17212b"/><text x="800" y="776" text-anchor="middle" style="font:700 17px Inter,sans-serif;fill:#fff">The route declares exposure</text><text x="800" y="801" text-anchor="middle" style="font:500 16px Inter,sans-serif;fill:#fff">Private and public records, gateways, and HTTPRoutes remain separate even when they share the vanillax.me zone.</text>
</svg>
