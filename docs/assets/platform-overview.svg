<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">How the Talos GitOps homelab fits together</title>
  <desc id="desc">Logical platform map showing Proxmox and Omni provisioning Talos, Git feeding Argo CD, 1Password feeding External Secrets, Cilium routing traffic, Longhorn storing application data, and Kopiur and Barman backing data up to RustFS on TrueNAS.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity="0.12"/></filter>
    <marker id="at" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#087e8b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#dc5f5f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#344250" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ay" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#c58a25" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .t{font:700 39px Inter,ui-sans-serif,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,ui-sans-serif,system-ui,sans-serif;fill:#586775}
      .h{font:700 22px Inter,ui-sans-serif,system-ui,sans-serif;fill:#17212b}.b{font:500 16px Inter,ui-sans-serif,system-ui,sans-serif;fill:#455563}
      .l{font:700 14px Inter,ui-sans-serif,system-ui,sans-serif}.sm{font:500 14px Inter,ui-sans-serif,system-ui,sans-serif;fill:#586775}
      .n{font:700 16px Inter,ui-sans-serif,system-ui,sans-serif;fill:#fff}
      .connector{fill:none;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}
      .packet{stroke:#fff;stroke-width:2}
      @media (prefers-reduced-motion:reduce){.packet{display:none}}
    </style>
  </defs>
  <rect width="1600" height="960" fill="#fff"/>
  <text x="70" y="62" class="t">How the homelab platform fits together</text>
  <text x="70" y="96" class="st">Management, reconciliation, traffic, secrets, live storage, and off-cluster recovery.</text>

  <text x="70" y="145" class="l" fill="#586775">OUTSIDE THE TALOS CLUSTER</text>
  <rect x="70" y="165" width="250" height="96" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/>
  <text x="195" y="201" text-anchor="middle" class="h">Omni</text><text x="195" y="229" text-anchor="middle" class="b">Talos machine lifecycle</text>
  <rect x="350" y="165" width="250" height="96" rx="7" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/>
  <text x="475" y="201" text-anchor="middle" class="h">Git repository</text><text x="475" y="229" text-anchor="middle" class="b">desired state + history</text>
  <rect x="630" y="165" width="250" height="96" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/>
  <text x="755" y="201" text-anchor="middle" class="h">DNS + clients</text><text x="755" y="229" text-anchor="middle" class="b">Technitium / Cloudflare</text>
  <rect x="910" y="165" width="250" height="96" rx="7" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/>
  <text x="1035" y="201" text-anchor="middle" class="h">1Password</text><text x="1035" y="229" text-anchor="middle" class="b">secret values off Git</text>
  <rect x="1190" y="153" width="340" height="120" rx="7" fill="#fff3df" stroke="#e7b95e" filter="url(#s)"/>
  <text x="1360" y="192" text-anchor="middle" class="h">TrueNAS / RustFS</text>
  <text x="1360" y="220" text-anchor="middle" class="b">off-cluster S3 durability</text>
  <text x="1360" y="245" text-anchor="middle" class="sm">kopiur + postgres-backups buckets</text>

  <rect x="70" y="315" width="1460" height="535" rx="10" fill="#f3f6f8" stroke="#cbd6dd" stroke-width="2"/>
  <rect x="94" y="338" width="228" height="38" rx="5" fill="#344250"/>
  <text x="208" y="363" text-anchor="middle" class="n">TALOS ON PROXMOX</text>

  <rect x="105" y="410" width="260" height="372" rx="8" fill="#fff" stroke="#9fd3da" filter="url(#s)"/>
  <text x="235" y="452" text-anchor="middle" class="h">Talos nodes</text>
  <text x="235" y="479" text-anchor="middle" class="b">immutable Kubernetes OS</text>
  <rect x="135" y="520" width="200" height="66" rx="6" fill="#dff4f6"/><text x="235" y="560" text-anchor="middle" class="h">Kubernetes API</text>
  <rect x="135" y="610" width="200" height="66" rx="6" fill="#e9edf0"/><text x="235" y="650" text-anchor="middle" class="h">Workload nodes</text>
  <rect x="135" y="700" width="200" height="52" rx="6" fill="#e9edf0"/><text x="235" y="733" text-anchor="middle" class="b">CPU / GPU capacity</text>

  <rect x="410" y="410" width="310" height="372" rx="8" fill="#fff" stroke="#87c7a3" filter="url(#s)"/>
  <text x="565" y="452" text-anchor="middle" class="h">GitOps control plane</text>
  <rect x="445" y="493" width="240" height="72" rx="6" fill="#e1f3e8"/><text x="565" y="524" text-anchor="middle" class="h">Argo CD</text><text x="565" y="548" text-anchor="middle" class="sm">Kustomize + sync waves</text>
  <rect x="445" y="591" width="240" height="62" rx="6" fill="#e1f3e8"/><text x="565" y="629" text-anchor="middle" class="b">ApplicationSets discover dirs</text>
  <rect x="445" y="679" width="240" height="62" rx="6" fill="#e1f3e8"/><text x="565" y="717" text-anchor="middle" class="b">health gates reconciliation</text>

  <rect x="765" y="410" width="330" height="372" rx="8" fill="#fff" stroke="#9fd3da" filter="url(#s)"/>
  <text x="930" y="452" text-anchor="middle" class="h">Platform controllers</text>
  <rect x="800" y="493" width="120" height="62" rx="6" fill="#dff4f6"/><text x="860" y="531" text-anchor="middle" class="b">Cilium</text>
  <rect x="940" y="493" width="120" height="62" rx="6" fill="#fde8e8"/><text x="1000" y="531" text-anchor="middle" class="b">ESO</text>
  <rect x="800" y="580" width="120" height="62" rx="6" fill="#dff4f6"/><text x="860" y="618" text-anchor="middle" class="b">Longhorn</text>
  <rect x="940" y="580" width="120" height="62" rx="6" fill="#dff4f6"/><text x="1000" y="618" text-anchor="middle" class="b">Kopiur</text>
  <rect x="800" y="667" width="260" height="72" rx="6" fill="#dff4f6"/><text x="930" y="698" text-anchor="middle" class="b">cert-manager, CNPG, monitoring</text><text x="930" y="722" text-anchor="middle" class="sm">operators reconcile desired state</text>

  <rect x="1140" y="410" width="345" height="372" rx="8" fill="#fff" stroke="#e4a6a6" filter="url(#s)"/>
  <text x="1313" y="452" text-anchor="middle" class="h">Applications + data</text>
  <rect x="1175" y="493" width="275" height="68" rx="6" fill="#fde8e8"/><text x="1313" y="523" text-anchor="middle" class="h">Application pods</text><text x="1313" y="547" text-anchor="middle" class="sm">HTTPRoutes + Services</text>
  <rect x="1175" y="584" width="275" height="68" rx="6" fill="#dff4f6"/><text x="1313" y="614" text-anchor="middle" class="h">Longhorn PVCs</text><text x="1313" y="638" text-anchor="middle" class="sm">live application state</text>
  <rect x="1175" y="675" width="130" height="66" rx="6" fill="#e1f3e8"/><text x="1240" y="704" text-anchor="middle" class="b">Plain PG</text><text x="1240" y="727" text-anchor="middle" class="sm">+ Kopiur</text>
  <rect x="1320" y="675" width="130" height="66" rx="6" fill="#fff3df"/><text x="1385" y="704" text-anchor="middle" class="b">CNPG</text><text x="1385" y="727" text-anchor="middle" class="sm">+ Barman</text>

  <path id="omni-talos" class="connector" d="M195 261 V300 H340 V388 H235 V398" stroke="#70bcc4" marker-end="url(#at)"/>
  <circle class="packet" r="6" fill="#087e8b" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="2.4s" repeatCount="indefinite" begin="-.2s"><mpath href="#omni-talos"/></animateMotion></circle>
  <path id="git-argo" class="connector" d="M475 261 V286 H565 V398" stroke="#70bcc4" marker-end="url(#at)"/>
  <circle class="packet" r="6" fill="#087e8b" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="2.4s" repeatCount="indefinite" begin="-.6s"><mpath href="#git-argo"/></animateMotion></circle>
  <path id="dns-cilium" class="connector" d="M755 261 V524 H788" stroke="#70bcc4" marker-end="url(#at)"/>
  <circle class="packet" r="6" fill="#087e8b" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="2.4s" repeatCount="indefinite" begin="-1s"><mpath href="#dns-cilium"/></animateMotion></circle>
  <path id="onepassword-eso" class="connector" d="M1035 261 V300 H1105 V524 H1072" stroke="#dc8c8c" marker-end="url(#ar)"/>
  <circle class="packet" r="6" fill="#dc5f5f" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="2.4s" repeatCount="indefinite" begin="-1.4s"><mpath href="#onepassword-eso"/></animateMotion></circle>

  <path id="talos-argo" class="connector" d="M365 596 H398" stroke="#7b8995" marker-end="url(#ad)"/>
  <circle class="packet" r="5" fill="#344250" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.4s" repeatCount="indefinite" begin="-.3s"><mpath href="#talos-argo"/></animateMotion></circle>
  <path id="argo-controllers" class="connector" d="M720 596 H753" stroke="#7b8995" marker-end="url(#ad)"/>
  <circle class="packet" r="5" fill="#344250" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.4s" repeatCount="indefinite" begin="-.8s"><mpath href="#argo-controllers"/></animateMotion></circle>
  <path id="controllers-apps" class="connector" d="M1095 596 H1128" stroke="#7b8995" marker-end="url(#ad)"/>
  <circle class="packet" r="5" fill="#344250" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.4s" repeatCount="indefinite" begin="-1.3s"><mpath href="#controllers-apps"/></animateMotion></circle>

  <path id="kopiur-rustfs" class="connector" d="M1060 611 H1115 V345 H1360 V285" stroke="#d8ad55" marker-end="url(#ay)"/>
  <circle class="packet" r="6" fill="#c58a25" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="3.2s" repeatCount="indefinite" begin="-.5s"><mpath href="#kopiur-rustfs"/></animateMotion></circle>
  <path id="barman-rustfs" class="connector" d="M1450 708 H1508 V305 H1390 V285" stroke="#d8ad55" marker-end="url(#ay)"/>
  <circle class="packet" r="6" fill="#c58a25" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="3.2s" repeatCount="indefinite" begin="-1.2s"><mpath href="#barman-rustfs"/></animateMotion></circle>
  <text x="1235" y="371" text-anchor="middle" class="sm">off-cluster backup paths</text>

  <rect x="70" y="875" width="1460" height="52" rx="6" fill="#17212b"/>
  <text x="800" y="908" text-anchor="middle" style="font:600 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#fff">Git rebuilds desired state. 1Password restores credentials. RustFS restores protected data.</text>
</svg>
