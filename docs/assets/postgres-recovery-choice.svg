<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Choosing between CNPG with Barman and plain PostgreSQL with Kopiur</title>
  <desc id="desc">Decision diagram comparing CloudNativePG with Barman for point-in-time recovery and operator capabilities against a single plain PostgreSQL Deployment with Kopiur for simpler restore-before-bind GitOps recovery.</desc>
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity=".12"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#344250"/></marker><style>.t{font:700 39px Inter,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,system-ui,sans-serif;fill:#586775}.h{font:700 21px Inter,system-ui,sans-serif;fill:#17212b}.b{font:500 15px Inter,system-ui,sans-serif;fill:#455563}.sm{font:500 14px Inter,system-ui,sans-serif;fill:#586775}.l{font:700 14px Inter,system-ui,sans-serif}.flow{stroke-dasharray:14 10;animation:reveal .45s ease-out both var(--delay,0s),flow 1.1s linear infinite}@keyframes reveal{from{opacity:0}to{opacity:1}}@keyframes flow{to{stroke-dashoffset:-48}}@media (prefers-reduced-motion:reduce){.flow{animation:none;stroke-dasharray:none}}</style></defs>
  <rect width="1600" height="900" fill="#fff"/><text x="70" y="62" class="t">Choose the recovery contract before choosing the PostgreSQL controller</text><text x="70" y="96" class="st">The simpler path accepts a coarser RPO. The operator path buys PITR and automation with more recovery state.</text>
  <rect x="420" y="135" width="760" height="92" rx="8" fill="#17212b"/><text x="800" y="171" text-anchor="middle" style="font:700 20px Inter,sans-serif;fill:#fff">Do you require PITR, replicas, automated failover, or near-zero RPO?</text><text x="800" y="201" text-anchor="middle" style="font:500 15px Inter,sans-serif;fill:#c7d1d9">Do not force filesystem snapshots to imitate database-aware recovery.</text>
  <path class="flow" style="--delay:.2s" d="M665 229 V274 H400" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><text x="570" y="260" class="l" fill="#c58a25">YES</text><path class="flow" style="--delay:.45s" d="M935 229 V274 H1200" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><text x="1020" y="260" class="l" fill="#3fa36c">NO</text>
  <rect x="70" y="295" width="700" height="475" rx="9" fill="#fff3df" stroke="#e7b95e" stroke-width="2" filter="url(#s)"/><text x="105" y="339" class="l" fill="#9a6712">CAPABILITY FIRST</text><text x="105" y="376" class="h">CloudNativePG + Barman</text>
  <rect x="105" y="410" width="170" height="70" rx="6" fill="#fff"/><text x="190" y="438" text-anchor="middle" class="h">Cluster CR</text><text x="190" y="462" text-anchor="middle" class="sm">operator-owned pods</text><path class="flow" style="--delay:.7s" d="M277 445 H330" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><rect x="350" y="410" width="170" height="70" rx="6" fill="#fff"/><text x="435" y="438" text-anchor="middle" class="h">Barman</text><text x="435" y="462" text-anchor="middle" class="sm">base backup + WAL</text><path class="flow" style="--delay:.95s" d="M522 445 H575" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><rect x="595" y="410" width="140" height="70" rx="6" fill="#fff"/><text x="665" y="438" text-anchor="middle" class="h">RustFS</text><text x="665" y="462" text-anchor="middle" class="sm">lineage vN</text>
  <text x="105" y="530" class="h">You gain</text><text x="105" y="560" class="b">Point-in-time recovery and continuous WAL archive</text><text x="105" y="588" class="b">Operator lifecycle, replicas, and failover capability</text><text x="105" y="626" class="h">You operate</text><text x="105" y="656" class="b">initdb/recovery overlays and creation-time bootstrap mode</text><text x="105" y="684" class="b">clean serverName lineages and a multi-step DR procedure</text><text x="105" y="726" class="sm">Correct when the recovery requirement justifies the ceremony.</text>
  <rect x="830" y="295" width="700" height="475" rx="9" fill="#e1f3e8" stroke="#87c7a3" stroke-width="2" filter="url(#s)"/><text x="865" y="339" class="l" fill="#276d49">SIMPLICITY FIRST</text><text x="865" y="376" class="h">Plain PostgreSQL + Kopiur</text>
  <rect x="865" y="410" width="170" height="70" rx="6" fill="#fff"/><text x="950" y="438" text-anchor="middle" class="h">Deployment</text><text x="950" y="462" text-anchor="middle" class="sm">single pod, Recreate</text><path class="flow" style="--delay:1.2s" d="M1037 445 H1090" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><rect x="1110" y="410" width="170" height="70" rx="6" fill="#fff"/><text x="1195" y="438" text-anchor="middle" class="h">One PVC</text><text x="1195" y="462" text-anchor="middle" class="sm">PGDATA + WAL</text><path class="flow" style="--delay:1.45s" d="M1282 445 H1335" fill="none" stroke="#344250" stroke-width="4" marker-end="url(#a)"/><rect x="1355" y="410" width="140" height="70" rx="6" fill="#fff"/><text x="1425" y="438" text-anchor="middle" class="h">Kopiur</text><text x="1425" y="462" text-anchor="middle" class="sm">RustFS snapshot</text>
  <text x="865" y="530" class="h">You gain</text><text x="865" y="560" class="b">Zero-commit restore-before-bind after cluster loss</text><text x="865" y="588" class="b">The same GitOps recovery path as ordinary application PVCs</text><text x="865" y="626" class="h">You accept</text><text x="865" y="656" class="b">Hourly snapshots mean up to one-hour RPO; no PITR/failover</text><text x="865" y="684" class="b">Major upgrades require a planned logical dump and restore</text><text x="865" y="726" class="sm">PostgreSQL WAL crash-recovers after the consistent snapshot.</text>
  <rect x="70" y="805" width="1460" height="64" rx="6" fill="#17212b"/><text x="800" y="832" text-anchor="middle" style="font:700 17px Inter,sans-serif;fill:#fff">Current rollout: Gitea migrated first; Temporal, Paperless, and Immich remain on CNPG until restore proof is repeatable.</text><text x="800" y="855" text-anchor="middle" style="font:500 15px Inter,sans-serif;fill:#c7d1d9">Retire the operator only after the final database passes its migration and recovery gates.</text>
</svg>
