<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="790" viewBox="0 0 1600 790" role="img" aria-labelledby="title desc">
  <title id="title">How 1Password values become namespace-scoped Kubernetes Secrets</title>
  <desc id="desc">Diagram showing Git storing only ExternalSecret references, 1Password storing secret values, External Secrets Operator reading through ClusterSecretStore, ClusterExternalSecret selecting labeled namespaces, and namespace Secrets being consumed by Kopiur mover jobs.</desc>
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity=".12"/></filter><marker id="at" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#087e8b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#dc5f5f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker><style>.t{font:700 39px Inter,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,system-ui,sans-serif;fill:#586775}.h{font:700 20px Inter,system-ui,sans-serif;fill:#17212b}.b{font:500 15px Inter,system-ui,sans-serif;fill:#455563}.sm{font:500 14px Inter,system-ui,sans-serif;fill:#586775}.l{font:700 14px Inter,system-ui,sans-serif}.connector{fill:none;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}.packet{stroke:#fff;stroke-width:2}@media (prefers-reduced-motion:reduce){.packet{display:none}}</style></defs>
  <rect width="1600" height="790" fill="#fff"/><text x="70" y="62" class="t">Git stores secret references, not secret values</text><text x="70" y="96" class="st">External Secrets reads 1Password and materializes short-lived Kubernetes copies only where workloads need them.</text>
  <rect x="70" y="140" width="360" height="205" rx="8" fill="#e1f3e8" stroke="#87c7a3" filter="url(#s)"/><text x="100" y="180" class="l" fill="#276d49">GIT: DESIRED STATE</text><text x="100" y="218" class="h">ClusterExternalSecret</text><text x="100" y="248" class="b">remote item: rustfs</text><text x="100" y="276" class="b">target Secret: kopiur-rustfs</text><text x="100" y="304" class="b">namespace selector: repo=cluster-kopia</text>
  <rect x="70" y="390" width="360" height="205" rx="8" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/><text x="100" y="430" class="l" fill="#a33737">1PASSWORD: SECRET VALUES</text><text x="100" y="468" class="h">rustfs item</text><text x="100" y="498" class="b">KOPIA_PASSWORD</text><text x="100" y="526" class="b">AWS_ACCESS_KEY_ID</text><text x="100" y="554" class="b">AWS_SECRET_ACCESS_KEY</text>
  <path id="git-eso" class="connector" d="M432 242 H533" stroke="#70bcc4" marker-end="url(#at)"/><circle class="packet" r="5" fill="#087e8b" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.8s" repeatCount="indefinite" begin="-.2s"><mpath href="#git-eso"/></animateMotion></circle><path id="vault-eso" class="connector" d="M432 492 H533" stroke="#dc8c8c" marker-end="url(#ar)"/><circle class="packet" r="5" fill="#dc5f5f" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.8s" repeatCount="indefinite" begin="-.8s"><mpath href="#vault-eso"/></animateMotion></circle>
  <rect x="555" y="245" width="330" height="245" rx="8" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><text x="720" y="288" text-anchor="middle" class="h">External Secrets Operator</text><text x="720" y="320" text-anchor="middle" class="b">ClusterSecretStore: 1password</text><rect x="600" y="353" width="240" height="58" rx="6" fill="#fff"/><text x="720" y="389" text-anchor="middle" class="b">reads referenced fields</text><text x="720" y="451" text-anchor="middle" class="sm">reconciles copies continuously</text>
  <path id="eso-namespaces" class="connector" d="M887 368 H983" stroke="#70bcc4" marker-end="url(#at)"/><circle class="packet" r="5" fill="#087e8b" opacity="0"><set attributeName="opacity" to="1" begin=".01s" fill="freeze"/><animateMotion dur="1.8s" repeatCount="indefinite" begin="-1.2s"><mpath href="#eso-namespaces"/></animateMotion></circle>
  <rect x="1005" y="140" width="525" height="455" rx="8" fill="#f3f6f8" stroke="#d4dce2"/>
  <text x="1035" y="180" class="l" fill="#586775">ONLY LABELED NAMESPACES</text>
  <rect x="1040" y="215" width="455" height="120" rx="7" fill="#fff" stroke="#87c7a3" filter="url(#s)"/><text x="1070" y="251" class="h">namespace A</text><text x="1070" y="278" class="sm">label: repo=cluster-kopia</text><rect x="1300" y="238" width="165" height="60" rx="6" fill="#fde8e8"/><text x="1383" y="265" text-anchor="middle" class="b">Secret</text><text x="1383" y="287" text-anchor="middle" class="sm">kopiur-rustfs</text>
  <rect x="1040" y="365" width="455" height="120" rx="7" fill="#fff" stroke="#87c7a3" filter="url(#s)"/><text x="1070" y="401" class="h">namespace B</text><text x="1070" y="428" class="sm">label: repo=cluster-kopia</text><rect x="1300" y="388" width="165" height="60" rx="6" fill="#fde8e8"/><text x="1383" y="415" text-anchor="middle" class="b">Secret</text><text x="1383" y="437" text-anchor="middle" class="sm">kopiur-rustfs</text>
  <text x="1268" y="542" text-anchor="middle" class="b">Kopiur mover Jobs read the local Secret</text><text x="1268" y="568" text-anchor="middle" class="sm">applications never contain S3 values</text>
  <rect x="70" y="640" width="1460" height="110" rx="7" fill="#17212b"/><text x="100" y="680" style="font:700 17px Inter,sans-serif;fill:#fff">BOOTSTRAP EXCEPTION</text><text x="100" y="711" style="font:500 16px Inter,sans-serif;fill:#fff">The Connect credentials must be seeded once so ESO can reach 1Password. Every downstream secret is then reconciled from references in Git.</text>
</svg>
