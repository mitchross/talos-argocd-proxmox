<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Storage availability and backup durability are different failure domains</title>
  <desc id="desc">Diagram showing application pods using Longhorn PVCs inside Talos, Kopiur copying CSI snapshots to RustFS on TrueNAS outside the cluster, restore-before-bind returning data to a replacement PVC, and CNPG using a separate Barman backup path.</desc>
  <defs><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#17212b" flood-opacity=".12"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#087e8b"/></marker><marker id="g" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#3fa36c"/></marker><marker id="y" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#c58a25"/></marker><style>.t{font:700 39px Inter,system-ui,sans-serif;fill:#17212b}.st{font:400 19px Inter,system-ui,sans-serif;fill:#586775}.h{font:700 21px Inter,system-ui,sans-serif;fill:#17212b}.b{font:500 16px Inter,system-ui,sans-serif;fill:#455563}.sm{font:500 14px Inter,system-ui,sans-serif;fill:#586775}.l{font:700 14px Inter,system-ui,sans-serif}</style></defs>
  <rect width="1600" height="860" fill="#fff"/><text x="70" y="62" class="t">Availability inside the cluster is not a backup</text><text x="70" y="96" class="st">Longhorn keeps live storage usable. Kopiur and Barman move recoverable data into a separate failure domain.</text>
  <rect x="70" y="135" width="990" height="590" rx="9" fill="#f3f6f8" stroke="#cbd6dd" stroke-width="2"/><rect x="95" y="158" width="205" height="37" rx="5" fill="#344250"/><text x="198" y="183" text-anchor="middle" style="font:700 15px Inter,sans-serif;fill:#fff">TALOS CLUSTER</text>
  <rect x="110" y="240" width="250" height="108" rx="7" fill="#fde8e8" stroke="#e4a6a6" filter="url(#s)"/><text x="235" y="282" text-anchor="middle" class="h">Application pod</text><text x="235" y="311" text-anchor="middle" class="b">reads and writes live data</text>
  <path d="M362 294 H435" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="455" y="240" width="250" height="108" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><text x="580" y="282" text-anchor="middle" class="h">Longhorn PVC</text><text x="580" y="311" text-anchor="middle" class="b">live block storage</text>
  <path d="M707 294 H780" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="800" y="228" width="220" height="132" rx="7" fill="#dff4f6" stroke="#9fd3da" filter="url(#s)"/><text x="910" y="270" text-anchor="middle" class="h">CSI snapshot</text><text x="910" y="299" text-anchor="middle" class="b">point-in-time source</text><text x="910" y="327" text-anchor="middle" class="sm">still inside the cluster</text>
  <rect x="800" y="374" width="220" height="30" rx="5" fill="#fff3df" stroke="#e7b95e"/><text x="910" y="395" text-anchor="middle" class="sm">CNPG + Barman</text>
  <rect x="110" y="410" width="910" height="258" rx="8" fill="#fff" stroke="#d4dce2"/>
  <text x="140" y="451" class="l" fill="#087e8b">RESTORE-BEFORE-BIND</text>
  <rect x="140" y="490" width="200" height="82" rx="6" fill="#e9edf0"/><text x="240" y="523" text-anchor="middle" class="h">Replacement PVC</text><text x="240" y="549" text-anchor="middle" class="sm">Pending</text>
  <path d="M342 531 H410" fill="none" stroke="#3fa36c" stroke-width="4" marker-end="url(#g)"/>
  <rect x="430" y="490" width="200" height="82" rx="6" fill="#e1f3e8"/><text x="530" y="523" text-anchor="middle" class="h">Restore mover</text><text x="530" y="549" text-anchor="middle" class="sm">hydrates volume</text>
  <path d="M632 531 H700" fill="none" stroke="#3fa36c" stroke-width="4" marker-end="url(#g)"/>
  <rect x="720" y="490" width="260" height="82" rx="6" fill="#e1f3e8" stroke="#87c7a3"/><text x="850" y="523" text-anchor="middle" class="h">PVC Bound with data</text><text x="850" y="549" text-anchor="middle" class="sm">application may start</text>
  <text x="140" y="625" class="b">Backend unreachable?</text><text x="325" y="625" class="sm">The PVC remains Pending instead of silently starting empty.</text>

  <rect x="1110" y="135" width="420" height="590" rx="9" fill="#fff3df" stroke="#e7b95e" stroke-width="2"/><rect x="1135" y="158" width="265" height="37" rx="5" fill="#c58a25"/><text x="1268" y="183" text-anchor="middle" style="font:700 15px Inter,sans-serif;fill:#fff">OUTSIDE KUBERNETES</text>
  <text x="1320" y="248" text-anchor="middle" class="h">TrueNAS / RustFS S3</text><text x="1320" y="277" text-anchor="middle" class="b">survives a Talos or Proxmox rebuild</text>
  <rect x="1160" y="320" width="320" height="92" rx="7" fill="#fff" stroke="#e7b95e" filter="url(#s)"/><text x="1320" y="356" text-anchor="middle" class="h">kopiur bucket</text><text x="1320" y="384" text-anchor="middle" class="sm">encrypted Kopia snapshots</text>
  <rect x="1160" y="448" width="320" height="92" rx="7" fill="#fff" stroke="#e7b95e" filter="url(#s)"/><text x="1320" y="484" text-anchor="middle" class="h">postgres-backups bucket</text><text x="1320" y="512" text-anchor="middle" class="sm">CNPG base backups + WAL</text>
  <rect x="1160" y="576" width="320" height="92" rx="7" fill="#fde8e8" stroke="#e4a6a6"/><text x="1320" y="610" text-anchor="middle" class="h">Honest boundary</text><text x="1320" y="638" text-anchor="middle" class="sm">RustFS is currently the only off-cluster copy</text>
  <path d="M1022 294 H1140 V366 H1150" fill="none" stroke="#087e8b" stroke-width="4" marker-end="url(#a)"/><text x="1080" y="278" class="sm">Kopia mover</text>
  <path d="M1160 394 H1080 V531 H642" fill="none" stroke="#3fa36c" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#g)"/>
  <path d="M1022 389 H1080 V494 H1150" fill="none" stroke="#c58a25" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#y)"/><text x="1088" y="475" class="sm">separate path</text>
  <rect x="70" y="755" width="1460" height="72" rx="6" fill="#17212b"/><text x="800" y="786" text-anchor="middle" style="font:700 17px Inter,sans-serif;fill:#fff">Failure boundary</text><text x="800" y="811" text-anchor="middle" style="font:500 16px Inter,sans-serif;fill:#fff">Pod or node failure: Longhorn. Cluster or VM loss: RustFS restore. TrueNAS loss: another copy is still required.</text>
</svg>
