# volsync-backup chart values — per-app backup wiring.
#
# One chart release == one backed-up PVC. An app with two backed-up PVCs
# inflates the chart twice (two helmCharts entries with different
# releaseName + values).

# --- Identity (REQUIRED, no defaults) ---------------------------------------
# pvc:       name of the PVC being backed up (e.g. "storage")
# namespace: the app namespace (e.g. "open-webui")
pvc: ""
namespace: ""

# --- Schedule ---------------------------------------------------------------
# frequency: "hourly" | "daily"  (matches the legacy `backup:` label values)
# schedule:  optional explicit 5-field cron OVERRIDE. If empty, a deterministic
#            minute is derived from adler32(namespace/pvc) % 60 so backups are
#            spread across the hour (parity with pvc-plumber's sha256%60 — the
#            *spread* is preserved; exact minute differs from the operator, so
#            first post-migration run time shifts. Acceptable; documented in
#            migration-plan.md).
frequency: daily
schedule: ""

retain:
  hourly: 24
  daily: 7
  weekly: 4
  monthly: 2

# --- Tier (mixed risk posture; see compare-and-contrast) --------------------
# strict       : cluster-local data is source-of-truth. Stamps
#                restore-policy=strict so an OPTIONAL residual validating
#                webhook (Path B) can fail-closed select it. Pure-author mode
#                ignores this label — it is forward-compat only.
# best-effort  : disposable / NAS-backed / reproducible. No gate; binds empty
#                if no snapshot (the author's exact model).
tier: strict

# --- Kopia repository (continuity-critical) ---------------------------------
# repositoryName MUST stay `volsync-<pvc>` so the 26 existing Kopia lineages
# created by pvc-plumber remain restorable. Changing this orphans all history.
repositoryPrefix: volsync-

s3:
  # RustFS S3 API port. NOT 30293 — that's the console (which speaks an
  # S3-shaped error response but doesn't share the access-key database
  # with the real API, hence the "Access Key Id does not exist" failure
  # mode seen on live pvc-plumber-managed RSes pointing at 30293).
  # Verified via TrueNAS app port mapping (tcp://192.168.10.133:30292)
  # and the 1Password rustfs item's `endpoint` field, both 2026-05-21.
  endpoint: "192.168.10.133:30292"
  bucket: "volsync-kopia"            # single shared Kopia repo bucket
  disableTLS: true

# 1Password item + property mapping. Property names match the actual fields
# present on the `rustfs` 1Password item (homelab-prod vault), verified
# 2026-05-21. The names retain the "pvc-plumber-" prefix even after the
# operator is decommissioned because the access key in RustFS is still
# named "k8s-pvc-plumber" and the 1P fields hold its credentials —
# renaming both in lockstep would be a separate housekeeping task.
externalSecret:
  storeName: 1password               # ClusterSecretStore
  itemKey: rustfs                    # 1Password item in homelab-prod
  refreshInterval: 1m
  properties:
    password: kopia_password
    accessKey: pvc-plumber-access-key
    secretKey: pvc-plumber-secret-key

kopia:
  compression: zstd-fastest
  parallelism: 2
  cacheCapacity: 2Gi
  copyMethod: Snapshot
  storageClassName: longhorn
  volumeSnapshotClassName: longhorn-snapclass
  moverSecurityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568

# --- Optional: let the chart own the PVC (closest to mirceanton) ------------
# create=true  : chart renders the data PVC WITH a static dataSourceRef ->
#                ReplicationDestination (volume populator restores-or-empty).
#                App removes its own pvc.yaml.
# create=false : app keeps pvc.yaml and adds the static dataSourceRef itself
#                (printed in NOTES.txt). Chart renders only ES/RS/RD.
pvc_create: false
pvc_spec:
  accessModes: ["ReadWriteOnce"]
  storage: 10Gi
  storageClassName: longhorn

# Protect the data PVC from ArgoCD prune (parity with the author's
# `prune: disabled`). Applied only when pvc_create=true.
protectFromPrune: true
