# VolSync DR operations. Port of mirceanton/home-ops .taskfiles/volsync.yaml.
# Wire into the repo's root Taskfile via `includes: { volsync: ./Taskfile.yaml }`
# (eventual real home: scripts/Taskfile.yaml or repo-root Taskfile.yaml).
#
# Conventions:
#   PVC == the per-pvc identifier the chart was inflated with (vb.pvc).
#         Equals ReplicationSource metadata.name (chart's vb.rsName).
#   NS  == app namespace (chart's vb.namespace).
#   TS  == optional RFC3339 timestamp for restoreAsOf point-in-time recovery.
---
version: "3"

vars:
  SCRIPTS_DIR: "{{.TASKFILE_DIR}}/scripts"

tasks:

  snapshots:
    desc: "List Kopia snapshots for an app's volsync repo"
    requires: { vars: [PVC, NS] }
    preconditions:
      - sh: kubectl -n {{.NS}} get secret volsync-{{.PVC}}
        msg: "secret {{.NS}}/volsync-{{.PVC}} missing"
    cmds:
      - bash {{.SCRIPTS_DIR}}/volsync-snapshots.sh {{.PVC}} {{.NS}}

  backup:
    desc: "Trigger a manual VolSync backup and wait for completion"
    requires: { vars: [PVC, NS] }
    vars:
      TRIGGER: "manual-{{now | unixEpoch}}"
    preconditions:
      - sh: kubectl -n {{.NS}} get secret volsync-{{.PVC}}
        msg: "secret {{.NS}}/volsync-{{.PVC}} missing"
      - sh: kubectl -n {{.NS}} get replicationsource {{.PVC}}
        msg: "ReplicationSource {{.NS}}/{{.PVC}} missing (chart not deployed?)"
    cmds:
      - bash {{.SCRIPTS_DIR}}/volsync-backup.sh {{.PVC}} {{.NS}} {{.TRIGGER}}

  restore:
    desc: "Restore an app PVC from snapshot (optionally at TS RFC3339 point in time)"
    requires: { vars: [PVC, NS] }
    vars:
      TRIGGER: "manual-{{now | unixEpoch}}"
    preconditions:
      - sh: kubectl -n {{.NS}} get secret volsync-{{.PVC}}
        msg: "secret {{.NS}}/volsync-{{.PVC}} missing"
      - sh: kubectl -n {{.NS}} get replicationdestination {{.PVC}}-dst
        msg: "ReplicationDestination {{.NS}}/{{.PVC}}-dst missing (chart not deployed?)"
      - sh: command -v argocd
        msg: "argocd CLI required on PATH (logged in)"
    cmds:
      - bash {{.SCRIPTS_DIR}}/volsync-restore.sh {{.PVC}} {{.NS}} {{.TRIGGER}} {{.TS}}
