# Restore handle / volume populator target. The data PVC's dataSourceRef
# points here; VolSync's VolumePopulator restores the latest snapshot before
# the PVC binds, or binds empty if the repo has no eligible snapshot.
#
# This is the load-bearing object for the whole "operator-free" thesis. Its
# behaviour on an UNREACHABLE backend (Pending-forever vs binds-empty) is the
# migration gate — test-plan.md T2. The author (mirceanton) reports the mover
# "keeps failing -> PVC stays Pending" on Restic; UNVERIFIED on this Kopia
# fork. Do not migrate strict-tier PVCs until T2 passes.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: {{ include "vb.resName" . }}
  namespace: {{ include "vb.namespace" . }}
  labels:
    {{- include "vb.commonLabels" . | nindent 4 }}
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: {{ include "vb.repoName" . }}
    copyMethod: {{ .Values.kopia.copyMethod }}
    storageClassName: {{ .Values.kopia.storageClassName }}
    volumeSnapshotClassName: {{ .Values.kopia.volumeSnapshotClassName }}
    cacheCapacity: {{ .Values.kopia.cacheCapacity }}
    accessModes:
      {{- range .Values.pvc_spec.accessModes }}
      - {{ . }}
      {{- end }}
    capacity: {{ .Values.pvc_spec.storage }}
    moverSecurityContext:
      runAsUser: {{ .Values.kopia.moverSecurityContext.runAsUser }}
      runAsGroup: {{ .Values.kopia.moverSecurityContext.runAsGroup }}
      fsGroup: {{ .Values.kopia.moverSecurityContext.fsGroup }}
