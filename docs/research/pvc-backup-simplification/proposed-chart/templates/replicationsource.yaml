# Backup schedule. Spec shape verified against a live pvc-plumber-generated
# ReplicationSource (posthog clickhouse, my-apps/development/posthog/
# data-layer/clickhouse.yaml:171-200).
#
# NOTE vs operator: pvc-plumber delayed RS creation until the PVC was Bound
# >=2h (anti "back up an empty volume" guard). Declaratively the RS exists
# immediately, but the VolumePopulator restores BEFORE the PVC binds, so a
# Bound PVC is already populated. Whether the 2h guard is still needed is
# test-plan.md T4 (deliberate empty-capture test) — do not assume.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: {{ include "vb.resName" . }}
  namespace: {{ include "vb.namespace" . }}
  labels:
    {{- include "vb.commonLabels" . | nindent 4 }}
spec:
  sourcePVC: {{ include "vb.pvc" . }}
  trigger:
    schedule: "{{ include "vb.schedule" . }}"
  kopia:
    repository: {{ include "vb.repoName" . }}
    compression: {{ .Values.kopia.compression }}
    parallelism: {{ .Values.kopia.parallelism }}
    retain:
      hourly: {{ .Values.retain.hourly }}
      daily: {{ .Values.retain.daily }}
      weekly: {{ .Values.retain.weekly }}
      monthly: {{ .Values.retain.monthly }}
    copyMethod: {{ .Values.kopia.copyMethod }}
    storageClassName: {{ .Values.kopia.storageClassName }}
    volumeSnapshotClassName: {{ .Values.kopia.volumeSnapshotClassName }}
    cacheCapacity: {{ .Values.kopia.cacheCapacity }}
    moverSecurityContext:
      runAsUser: {{ .Values.kopia.moverSecurityContext.runAsUser }}
      runAsGroup: {{ .Values.kopia.moverSecurityContext.runAsGroup }}
      fsGroup: {{ .Values.kopia.moverSecurityContext.fsGroup }}
