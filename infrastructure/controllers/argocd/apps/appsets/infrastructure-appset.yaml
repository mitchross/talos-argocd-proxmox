apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
      revision: main
      directories:
      # cert-manager moved to a standalone Wave-1 core-dependency app
      # (core-dependencies/cert-manager-app.yaml) — the Wave-4 appset placement
      # caused a circular deadlock with cnpg-barman-plugin (Wave 3). Do NOT
      # re-add it here or it will be double-managed.
      - path: infrastructure/controllers/external-dns
      - path: infrastructure/controllers/gpu-priority-classes
      - path: infrastructure/controllers/node-feature-discovery
      # nvidia-device-plugin removed on Talos 1.13 — gpu-operator Helm chart
      # (in nvidia-gpu-operator) now owns the device plugin on top of the
      # CDI-based driver/toolkit shipped by Talos system extensions.
      - path: infrastructure/controllers/nvidia-gpu-operator
      - path: infrastructure/controllers/metrics-server
      # NOTE: keda and temporal-worker-controller are NOT listed here.
      # They have dedicated standalone Applications at Wave 4
      # (keda-app.yaml, temporal-worker-controller-app.yaml) because
      # adding them via this AppSet hit a repo-server render-cache loop
      # where Argo kept reverting the new generator paths (see git log
      # around 2026-04-20). Standalone Applications dodge that entirely.
      # NOTE: opentelemetry-operator is NOT listed here
      # It has a dedicated standalone Application at Wave 5 (opentelemetry-operator-app.yaml)
      # to ensure cert-manager (Wave 4) is ready for webhook certificates
      - path: infrastructure/networking/cloudflared
      - path: infrastructure/networking/gateway
      - path: infrastructure/storage/container-registry
      - path: infrastructure/storage/csi-driver-nfs
      - path: infrastructure/storage/csi-driver-smb
      # Official TrueNAS CSI: dynamic RWX NFS only for the initial canary.
      # Longhorn stays default; static/pre-existing NFS stays on nfs.csi.k8s.io.
      - path: infrastructure/storage/truenas-csi
      - path: infrastructure/storage/local-storage
      # NOTE: longhorn and snapshot-controller are NOT listed here.
      # They have dedicated standalone Applications at Wave 1 (longhorn-app.yaml,
      # snapshot-controller-app.yaml) so storage is healthy before the
      # kopiur operator (Wave 2).
      - path: infrastructure/storage/kopia-ui
      - path: infrastructure/storage/rustfs-lifecycle
  template:
    metadata:
      name: '{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{ .path.path }}'
        argocd.argoproj.io/sync-wave: "4"
      labels:
        app.kubernetes.io/part-of: infrastructure
    spec:
      project: infrastructure
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - FailOnSharedResource=true
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/dataSource
        - /spec/dataSourceRef
        - /spec/volumeName
