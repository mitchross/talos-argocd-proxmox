apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # Render each generated Application with Go templates. In an expression such
  # as `{{ .path.basename }}`, the leading `.` means "the current generator
  # result" (the template context). The Git generator supplies its matched
  # directory as the `path` object: `.path.basename` is the final directory
  # name, while `.path.path` is the complete repository-relative path.
  # Example: `monitoring/prometheus-stack` produces
  # `.path.basename = prometheus-stack` and `.path.path = monitoring/prometheus-stack`,
  # so Argo creates `monitoring-prometheus-stack` in namespace `prometheus-stack`.
  # `missingkey=error` stops generation when a field is absent instead of
  # silently creating an Application with an empty name, path, or namespace.
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
      revision: main
      directories:
      - path: monitoring/*
  template:
    metadata:
      name: 'monitoring-{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{ .path.path }}'
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: monitoring
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - FailOnSharedResource=true
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      info:
      - name: 'Description'
        value: 'Monitoring component: {{ .path.basename }}'
