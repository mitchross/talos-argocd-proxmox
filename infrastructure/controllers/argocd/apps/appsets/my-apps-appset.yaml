apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  # Render each generated Application with Go templates. In an expression such
  # as `{{ .path.basename }}`, the leading `.` means "the current generator
  # result" (the template context). The Git generator supplies its matched
  # directory as the `path` object: `.path.basename` is the final directory
  # name, while `.path.path` is the complete repository-relative path.
  # Example: `my-apps/media/karakeep` produces `.path.basename = karakeep` and
  # `.path.path = my-apps/media/karakeep`, so Argo creates Application
  # `my-apps-karakeep` in namespace `karakeep` and renders that exact folder.
  # `missingkey=error` stops generation when a field is absent instead of
  # silently creating an Application with an empty name, path, or namespace.
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # Immutable-dataSourceRef escape hatch: preserve per-Application
  # compare-options annotations while any Bound PVC still carries an older
  # immutable dataSourceRef than Git (live converges only on PVC recreate,
  # e.g. a DR drill). VolSync-era in origin; still needed for kopiur
  # dataSourceRef repoints, which hit the same immutable-field behavior.
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1compare-options
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
      revision: main
      directories:
      # project-nomad is intentionally one bundled app at my-apps/home/project-nomad.
      # Its child folders are resources, not generated apps.
      - path: my-apps/*/*
      # my-apps/common/* holds shared Kustomize Components (kind: Component),
      # consumed via `components:` from app kustomizations — they are not apps.
      # kustomize (5.4+) builds a Component directory as an EMPTY render, so
      # without this exclude the generator creates a phantom zero-resource
      # Application (e.g. my-apps-kopiur-backup, Synced/Healthy, manages
      # nothing). Guarded by validate-argocd-apps.sh Check 8.
      - path: my-apps/common/*
        exclude: true
  template:
    metadata:
      name: 'my-apps-{{ .path.basename }}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{ .path.path }}'
        argocd.argoproj.io/sync-wave: "6"
        # Immutable-dataSourceRef compare mode: disables server-side diff
        # for every my-apps-* Application while any backed-up PVC's live
        # immutable spec.dataSourceRef differs from Git (live converges
        # only on PVC recreate). Argo's uncached compare path runs an SSA
        # dry-run that the API server rejects ("spec is immutable"),
        # producing a ComparisonError. App-level compare-options is
        # evaluated before any per-resource SSA dry-run dispatch, so
        # this fully bypasses the failing path. Client-side diff still
        # runs, and existing ignoreDifferences on PVC dataSourceRef/
        # dataSource/volumeName continue to mask the legitimate
        # immutable-spec drift. pvc-plumber-era in origin; retained
        # because kopiur dataSourceRef repoints hit the same behavior.
        argocd.argoproj.io/compare-options: ServerSideDiff=false
    spec:
      project: my-apps
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - FailOnSharedResource=true
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
      # ExternalSecret and PVC restore diff noise is ignored globally.
      # (The global HTTPRoute ignore was removed 2026-07-18: argo-cd#25284
      # array-element freeze blocked parentRef sectionName syncs. Keep route
      # manifests explicit about group/kind/weight instead — see values.yaml.)
      # App-level PVC ignores are still required because
      # RespectIgnoreDifferences=true only strips app ignore rules during sync;
      # otherwise immutable restore fields keep retrying forever on Bound PVCs.
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/dataSource
        - /spec/dataSourceRef
        - /spec/volumeName
      # imagePullPolicy may differ from Git due to previous Kyverno admission mutation
      - group: apps
        kind: StatefulSet
        jqPathExpressions:
        - .spec.template.spec.containers[].imagePullPolicy
        - .spec.template.spec.initContainers[].imagePullPolicy
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
      # kopiur controller defaults these spec fields after apply → cosmetic
      # OutOfSync on every backed-up app. Ignore only the defaulted fields.
      - group: kopiur.home-operations.com
        kind: SnapshotPolicy
        jsonPointers:
        - /spec/defaultDeletionPolicy
        - /spec/groupBy
        jqPathExpressions:
        - .spec.sources[].sourcePathStrategy

      info:
      - name: 'Description'
        value: 'Application: {{ .path.basename }}'
