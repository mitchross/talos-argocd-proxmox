apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  # TEMPORARY VolSync migration escape hatch:
  # preserve per-Application compare-options annotations while Bound PVCs still
  # carry old immutable dataSourceRef values. Remove after affected PVCs are
  # recreated/restored and the ServerSideDiff=false annotations are removed.
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1compare-options
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
      revision: main
      directories:
      # project-nomad is intentionally one bundled app at my-apps/home/project-nomad.
      # Its child folders are resources, not generated apps.
      - path: my-apps/*/*
  template:
    metadata:
      name: 'my-apps-{{path.basename}}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{path}}'
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: my-apps
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
      # HTTPRoute, ExternalSecret, and PVC restore diff noise is ignored globally.
      # App-level PVC ignores are still required because
      # RespectIgnoreDifferences=true only strips app ignore rules during sync;
      # otherwise immutable restore fields keep retrying forever on Bound PVCs.
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/dataSource
        - /spec/dataSourceRef
        - /spec/volumeName
      # imagePullPolicy may differ from Git due to previous Kyverno admission mutation
      - group: apps
        kind: StatefulSet
        jqPathExpressions:
        - .spec.template.spec.containers[].imagePullPolicy
        - .spec.template.spec.initContainers[].imagePullPolicy
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind

      info:
      - name: 'Description'
        value: 'Application: {{path.basename}}'

  # Per-element conditional overrides. ApplicationSet templatePatch is
  # rendered after the main template; the result is applied to the
  # generated Application as a JSON Merge Patch (RFC 7396). In merge-
  # patch semantics, setting a key to `null` REMOVES that key from the
  # merged result, while every other key in the rendered template is
  # preserved. Empty `{}` is a clean no-op for elements that don't
  # match a conditional branch.
  #
  # Nginx v4 canary (Phase 6 — see docs/pvc-plumber-v4-cutover.md):
  # the canary commit removes inline RS/RD from nginx-example/storage
  # and adds v4 labels so pvc-plumber takes ownership of the backup
  # chain. While the canary is in flight, automated sync MUST be off
  # for my-apps-nginx so the operator controls the timing of every
  # apply and Argo's selfHeal cannot fight pvc-plumber-owned RS/RD
  # that are not present in Git. This patch removes ONLY the
  # syncPolicy.automated block from the generated nginx Application;
  # syncOptions, retry, and every other field of the rendered template
  # are preserved.
  #
  # Every other my-apps Application is generated with the template's
  # `automated: { prune: true, selfHeal: true, allowEmpty: false }`
  # block intact — the `else` branch renders an empty merge patch.
  #
  # Re-enable nginx automation by removing this entire templatePatch
  # block (or by inverting the conditional) in a follow-up PR once
  # the v4 canary is verified.
  templatePatch: |
    {{- if eq .path.basename "nginx" }}
    spec:
      syncPolicy:
        automated: null
    {{- else }}
    {}
    {{- end }}
