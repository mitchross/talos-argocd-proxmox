---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pvc-plumber
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: infrastructure/controllers/pvc-plumber
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
    targetRevision: main
    path: infrastructure/controllers/pvc-plumber
  destination:
    server: https://kubernetes.default.svc
    namespace: volsync-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
      # PreSync hook can wedge the entire app-of-apps behind a stale
      # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
      # kicks a fresh sync against current git on the next reconcile.
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
