# Strimzi is a wave-4 controller dependency. Kafka clusters and topics stay in
# my-apps at wave 6, so a clean rebuild never depends on CRD discovery retries.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/manifest-generate-paths: infrastructure/controllers/strimzi
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: infrastructure
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
    targetRevision: main
    path: infrastructure/controllers/strimzi
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - FailOnSharedResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m
