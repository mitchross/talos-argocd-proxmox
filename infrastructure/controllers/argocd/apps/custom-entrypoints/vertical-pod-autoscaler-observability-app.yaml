# Optional monitoring CRs are separated from the wave-4 VPA controller so a
# missing monitoring stack can never block controller bootstrap.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vertical-pod-autoscaler-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: infrastructure/controllers/vertical-pod-autoscaler-observability
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: infrastructure
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox.git
    targetRevision: main
    path: infrastructure/controllers/vertical-pod-autoscaler-observability
  destination:
    server: https://kubernetes.default.svc
    namespace: vertical-pod-autoscaler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
