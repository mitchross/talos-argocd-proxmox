apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - projects.yaml
  # Bootstrap entrypoints: Argo CD itself plus cluster services required by later waves.
  - bootstrap/argocd.yaml
  - bootstrap/cilium-app.yaml
  - bootstrap/1passwordconnect.yaml
  - bootstrap/external-secrets.yaml

  # Core dependencies: storage and restore services required by later waves.
  - core-dependencies/cert-manager-app.yaml   # Wave 1 — moved out of the Wave-4 infra-appset (cnpg-barman-plugin Wave 3 needs it)
  - core-dependencies/longhorn-app.yaml
  - core-dependencies/snapshot-controller-app.yaml  # kopiur copyMethod=Snapshot needs CSI VolumeSnapshot
  # VolSync + pvc-plumber RETIRED 2026-06-27 — replaced by kopiur (all PVCs
  # migrated; see docs/kopiur-trial.md). Removed: volsync-app,
  # volsync-backup-cluster-app, pvc-plumber-app + their dirs.
  # kopiur TRIAL — parallel to pvc-plumber (Wave 2 operator, Wave 3 config).
  # Evaluating kopiur as a VolSync/pvc-plumber replacement; karakeep is the
  # canary. Remove these two lines to back the trial out. See docs/kopiur-trial.md.
  - core-dependencies/kopiur-operator-app.yaml
  - core-dependencies/kopiur-config-app.yaml

  # Custom entrypoints: standalone apps kept out of AppSets for ordering or render reasons.
  - custom-entrypoints/cnpg-barman-plugin-app.yaml
  - custom-entrypoints/keda-app.yaml
  - custom-entrypoints/vertical-pod-autoscaler-app.yaml
  - custom-entrypoints/keda-observability-app.yaml   # Wave 6 — KEDA ServiceMonitors, after monitoring (split from keda core)
  - custom-entrypoints/vpa-recommendations-app.yaml   # Wave 6 — passive VPA recommendation objects, after VPA CRDs
  - custom-entrypoints/temporal-worker-controller-app.yaml
  - custom-entrypoints/opentelemetry-operator-app.yaml
  - custom-entrypoints/opentelemetry-operator-observability-app.yaml   # Wave 6 — OTel operator ServiceMonitor, after monitoring (split from otel core)

  # ApplicationSet entrypoints: broad discovery after core dependencies are in place.
  - appsets/infrastructure-appset.yaml
  - appsets/database-appset.yaml
  - appsets/monitoring-appset.yaml
  - appsets/my-apps-appset.yaml
