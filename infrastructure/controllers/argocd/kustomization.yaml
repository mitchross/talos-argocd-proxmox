apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ns.yaml
  - http-route.yaml
  # NOTE: root.yaml is NOT listed here. It is applied once by the bootstrap script
  # (scripts/bootstrap-argocd.sh). Including it here would create a circular
  # dependency: root.yaml creates argocd.yaml (via apps/), argocd.yaml manages
  # this directory which would include root.yaml, causing SSA ownership conflicts
  # and potential cascade-delete if root.yaml is ever removed from this file.
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "9.4.15" # It's good practice to pin the chart version
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
    includeCRDs: true
