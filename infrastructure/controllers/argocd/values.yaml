# ConfigMaps and feature flags
configs:
  params:
    server.insecure: "true"
    # Performance: increase parallel status checks (default 20, ~1 per 20 apps)
    controller.status.processors: "50"
    # Performance: increase concurrent sync operations (default 10)
    controller.operation.processors: "25"
    # Performance: limit concurrent manifest generations to prevent OOM
    reposerver.parallelism.limit: "5"
    # Redis manifest-cache TTL (default 24h). 2026-07-19: repo-server cached
    # manifests rendered from a STALE checkout under the NEW revision's cache
    # key — apps reported Synced at HEAD while the cluster ran a prior commit
    # (versatiles configmap never rolled, worldmonitor image bump ignored).
    # Even hard refresh kept logging "manifest cache hit" for the poisoned
    # entry; the hourly timeout.hard.reconciliation (below) could not clear it
    # either. Only restarting argocd-repo-server + argocd-redis recovered.
    # Upstream (argoproj/argo-cd#26530) is open with no fixed release, so
    # bound the poison window to 1h instead of 24h.
    reposerver.repo.cache.expiration: "1h"
    # Performance: increase repo-server timeout for large Helm charts like prometheus-stack
    controller.repo.server.timeout.seconds: "300"
    # Server-Side Diff — controller asks the API server for a dry-run apply
    # result and compares predicted-live vs actual-live. CRD defaults get
    # applied to both sides, eliminating drift on operator-defaulted fields
    # (CNPG enablePDB/failoverDelay/etc., cert-manager, KEDA, …). Required
    # to be in argocd-cmd-params-cm (this block); the argocd-cm key
    # `resource.server-side-diff` is a no-op for the controller.
    # Combine with per-app annotation
    #   argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
    # to also pipe through mutating admission webhooks (CNPG ships one).
    controller.diff.server.side: "true"
  cm:
    url: "https://argocd.vanillax.me"
    # Keep Helm inflation enabled for upstream charts. Kustomize's default
    # load restrictor remains active; no app should reference files outside
    # its own kustomization root.
    kustomize.buildOptions: "--enable-helm"
    # Resource tracking — annotation+label survives operator reconciles.
    # Default 'annotation' alone gets stripped by CNPG/cert-manager/ESO/KEDA,
    # causing perma-OutOfSync flap on managed CRs even when Healthy.
    # 'annotation+label' writes app.kubernetes.io/instance (durable) AND keeps
    # the informational tracking-id annotation. See mink:
    # argocd-cnpg-permanent-outofsync-tracking-method-fix.md
    application.resourceTrackingMethod: "annotation+label"
    # NOTE: The legacy `resource.server-side-diff: "true"` key was a no-op —
    # the controller reads its diff mode from argocd-cmd-params-cm key
    # `controller.diff.server.side` (set in configs.params above), exposed
    # via env var ARGOCD_APPLICATION_CONTROLLER_SERVER_SIDE_DIFF.
    # Default ArgoCD polling interval (180s) with modest jitter
    timeout.reconciliation: "180s"
    timeout.reconciliation.jitter: "60s"
    # Periodic HARD refresh. Unlike timeout.reconciliation (soft refresh, which
    # compares cached manifests + cached cluster live-state), a hard refresh
    # INVALIDATES BOTH the manifest cache AND the controller's cluster live-state
    # cache before re-comparing. This is the scheduled equivalent of the UI
    # "Hard Refresh" button.
    #
    # Why this is non-zero: 2026-05-29 the controller reported my-apps-llama-cpp
    # Synced+Healthy while the live Deployment was still the old image and pointed
    # at a dangling ConfigMap hash. server-side diff (controller.diff.server.side)
    # had compared the new desired spec against a STALE live-state cache, saw "no
    # change", and skipped the Deployment apply — selfHeal can't help because the
    # controller perceives no drift. A manual hard refresh fixed it instantly.
    # "0" (disabled) let that stale state persist indefinitely (cluster cache is
    # watch-based with no resync-duration knob in this version). 1h bounds the
    # worst-case staleness window to one hour. Raise toward 2h-4h if the hourly
    # all-apps manifest regeneration pressures the repo-servers.
    timeout.hard.reconciliation: "1h"
    # Global diff noise cleanup for resources normalized by their controllers.
    # Keep these system-level so AppSets only carry app-specific rules.
    #
    # parentRefs: normalize ONLY the defaulted `group`/`kind` subfields that the
    # API server fills in (gateway.networking.k8s.io / Gateway). Do NOT ignore the
    # whole `/spec/parentRefs` array, and do NOT ignore whole parentRef entries
    # via `select(.group == null or .kind == null)` — both silently swallow
    # Gateway re-parenting (e.g. the gateway-internal -> gateway-internal-technitium
    # split-DNS migration) while ArgoCD still reports Synced. `name`/`namespace`/
    # `sectionName` MUST stay diffable so re-parenting actually syncs to live.
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jqPathExpressions:
      - .spec.parentRefs[].group
      - .spec.parentRefs[].kind
      - .spec.rules[].backendRefs[].group
      - .spec.rules[].backendRefs[].kind
      - .spec.rules[].backendRefs[].weight
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
      - .metadata.generation
      - .metadata.finalizers
      - .spec.data[].remoteRef.conversionStrategy
      - .spec.data[].remoteRef.decodingStrategy
      - .spec.data[].remoteRef.metadataPolicy
      - .spec.data[].remoteRef.nullBytePolicy
      - .spec.target.deletionPolicy
    resource.customizations.ignoreDifferences._PersistentVolumeClaim: |
      jqPathExpressions:
      - .spec.dataSourceRef
      - .spec.dataSource
      - .spec.volumeName
    # CRDs — K8s API server adds conversion and generation fields
    # NOTE: .status ignored globally by ArgoCD 3.0+ (PR #22230)
    resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
      jqPathExpressions:
      - .metadata.generation
      - .spec.conversion
    # OpenTelemetry operator mutates collector after creation
    resource.customizations.ignoreDifferences.opentelemetry.io_OpenTelemetryCollector: |
      jqPathExpressions:
      - .metadata.generation
      - .metadata.annotations
    # Secrets managed by cert-manager/webhooks — caBundle and cert data change
    resource.customizations.ignoreDifferences.all: |
      managedFieldsManagers:
      - kube-controller-manager
      - kube-scheduler
    # Custom health keys use `<API group>_<Kind>`. Argo runs the Lua block with
    # the live Kubernetes object in `obj`; the script returns `hs.status` and
    # `hs.message`. `Progressing` holds the parent Application's next sync wave,
    # `Healthy` releases it, and `Degraded` surfaces a failure. Lua uses `~=` for
    # "not equal", `..` to join strings, and `or` to choose the first non-nil
    # value. The nil checks matter because a new CR often has no `.status` until
    # its controller performs the first reconciliation.
    #
    # Child Application health is not assessed automatically by modern Argo CD.
    # Copy the child's `.status.health` into Argo's health result so the root
    # app-of-apps waits for each child before advancing to its next sync wave.
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
    # kopiur Restore has no built-in Argo health assessment. Keep it Progressing
    # while kopiur resolves and hydrates the volume, report Completed as Healthy,
    # and preserve the controller's failure message when phase=Failed. This
    # gates later waves for operator-owned PVCs such as Kafka: kopiur restores
    # the exact PVC first, and the workload must not mount it until completion.
    resource.customizations.health.kopiur.home-operations.com_Restore: |
      hs = {}
      hs.status = "Progressing"
      hs.message = "Waiting for restore controller"
      if obj.status ~= nil then
        if obj.status.phase == "Completed" then
          hs.status = "Healthy"
          hs.message = "Restore completed"
        elseif obj.status.phase == "Failed" then
          hs.status = "Degraded"
          if obj.status.failure ~= nil and obj.status.failure.message ~= nil then
            hs.message = obj.status.failure.message
          else
            hs.message = "Restore failed"
          end
        elseif obj.status.phase ~= nil then
          hs.message = "Restore phase: " .. obj.status.phase
        end
      end
      return hs
    # Strimzi Kafka has no built-in Argo health assessment. Walk (`ipairs`) its
    # condition list and translate Ready=True to Healthy or NotReady=True to
    # Degraded. Until either condition exists, remain Progressing. Because the
    # Kafka CR is wave 0 and KafkaTopic is wave 1, this prevents topics from
    # landing before the broker is actually ready.
    resource.customizations.health.kafka.strimzi.io_Kafka: |
      hs = {}
      hs.status = "Progressing"
      hs.message = "Waiting for Strimzi reconciliation"
      if obj.status ~= nil and obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Ready" and c.status == "True" then
            hs.status = "Healthy"
            hs.message = c.message or "Kafka is ready"
            return hs
          elseif c.type == "NotReady" and c.status == "True" then
            hs.status = "Degraded"
            hs.message = c.message or c.reason or "Kafka is not ready"
            return hs
          end
        end
      end
      return hs
    # ExternalSecret otherwise reports no useful Argo health. Translate its
    # Ready condition so a successful secret fetch is Healthy, a rejected or
    # failed fetch is Degraded, and a brand-new object remains Progressing until
    # external-secrets has attempted its first synchronization.
    resource.customizations.health.external-secrets.io_ExternalSecret: |
      hs = {}
      if obj.status ~= nil and obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Ready" then
            if c.status == "True" then
              hs.status = "Healthy"
            else
              hs.status = "Degraded"
            end
            hs.message = c.reason or c.message or ""
            return hs
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for first sync"
      return hs
# Argo CD server settings
server:
  # One schedulable worker / one physical failure domain: extra replicas do
  # not add availability. Revisit when workers span multiple hosts.
  replicas: 1
  env:
    - name: ARGOCD_GRPC_MAX_SIZE_MB
      value: "200"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-28)
  # VPA target: cpu 23m, memory 175Mi — server below lowerBound for memory
  # Previous: memory 256Mi → 512Mi (VPA lowerBound exceeded)
  resources:
    requests:
      cpu: 50m
      memory: 512Mi  # Increased from 256Mi (was below VPA lowerBound)
    limits:
      memory: 1Gi
# ApplicationSet controller settings
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-24)
  # VPA target: cpu 49m, memory 100Mi
  # Previous: cpu 250m (5x over-provisioned), memory 256Mi
  # ApplicationSet is lightweight (watches directories, creates apps)
  resources:
    requests:
      cpu: 100m  # 2x VPA target for safety margin
      memory: 128Mi
    limits:
      memory: 512Mi  # Reduced from 1Gi
# Current topology has one schedulable workload worker and one physical
# Proxmox failure domain. Do not enable the redis-ha subchart until at least
# three schedulable nodes span real failure domains; extra replicas on the
# same host add machinery without adding availability.
redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
# Argo CD controller settings
controller:
  env:
    # Performance: increase K8s API client throughput
    - name: ARGOCD_K8S_CLIENT_QPS
      value: "50"
    - name: ARGOCD_K8S_CLIENT_BURST
      value: "100"
    # Performance: split large app trees across Redis keys
    - name: ARGOCD_APPLICATION_TREE_SHARD_SIZE
      value: "100"
    # Go GC ceiling ~90% of the 6Gi memory limit: the GC works harder as the
    # heap approaches this instead of letting the kernel OOM-kill the pod
    # during comparison spikes. Keep in sync with resources.limits.memory.
    - name: GOMEMLIMIT
      value: "5500MiB"
  metrics:
    enabled: true
    applicationLabels:
      enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-28)
  # VPA target: cpu 2048m, memory 3.5Gi — memory below lowerBound
  # Previous: memory 1536Mi → 4Gi (VPA lowerBound exceeded)
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi   # Increased from 1536Mi (was below VPA lowerBound)
    limits:
      memory: 6Gi   # Increased from 4Gi to accommodate memory growth
# Argo CD repo-server settings
repoServer:
  # One schedulable worker today; scale with real worker failure domains.
  replicas: 1
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "3m"
    # Go GC ceiling ~90% of the 4Gi memory limit — big Helm renders
    # (kube-prometheus-stack) spike the heap; GC pressure beats OOM-kill.
    # Keep in sync with resources.limits.memory.
    - name: GOMEMLIMIT
      value: "3600MiB"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-24)
  # VPA target: cpu 2975m, memory 523Mi
  # Previous: cpu 1000m (UNDER-PROVISIONED 3x), memory 1Gi (OVER-PROVISIONED 2x)
  # Repo-server does heavy lifting: Helm template rendering, Kustomize builds
  # CPU-bound (manifest generation) but low memory (template processing)
  resources:
    requests:
      cpu: 1000m   # low steady reservation; bursts to 4000m on big renders
      memory: 768Mi  # Reduced from 1Gi (VPA target only 523Mi)
    limits:
      memory: 4Gi  # Keep at 4Gi (VPA upperBound: 3.95Gi for large Helm charts)
# Dex is disabled. Argo CD is exposed only through the internal Gateway and
# intentionally uses local admin authentication in this single-operator lab.
dex:
  enabled: false
notifications:
  # No triggers, subscriptions, or delivery services are configured. Enable
  # this only when a concrete notification destination is added.
  enabled: false
# Disable the redis-secret-init PreSync hook. The Job creates the redis
# auth secret on first install; once created, it persists in the cluster
# and the chart re-runs the Job on every sync as a hook. On chart
# upgrades the Job's hook-delete-policy can race with Argo's
# operationState tracking and wedge the sync indefinitely. The actual
# `argocd-redis` Secret already exists (Argo Redis HA is Healthy), so
# disabling the bootstrapper is safe and idempotent. Bit us on 2026-05-01
# when Renovate PR #1259 bumped argo-cd to v9.5.9.
redisSecretInit:
  enabled: false
