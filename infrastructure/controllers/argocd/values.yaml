# Global settings for the Argo CD chart
global:
  # Ingress is disabled; external access is managed via HTTPRoute
  ingress:
    enabled: false
# ConfigMaps and feature flags
configs:
  params:
    server.insecure: "true"
    # Performance: increase parallel status checks (default 20, ~1 per 20 apps)
    controller.status.processors: "50"
    # Performance: increase concurrent sync operations (default 10)
    controller.operation.processors: "25"
    # Performance: limit concurrent manifest generations to prevent OOM
    reposerver.parallelism.limit: "5"
    # Performance: increase repo-server timeout for large Helm charts like prometheus-stack
    controller.repo.server.timeout.seconds: "300"
  cm:
    url: "https://argocd.vanillax.me"
    kustomize.buildOptions: "--enable-helm"
    # Use server-side diff to match ServerSideApply - prevents false "in-sync" detection
    # Without this, client-side diff + server-side apply disagree on changes, causing
    # configmaps and other resources to silently not get applied
    resource.server-side-diff: "true"
    # Default ArgoCD polling interval (180s) with modest jitter
    timeout.reconciliation: "180s"
    timeout.reconciliation.jitter: "60s"
    # Force cache invalidation periodically so manual Sync actually re-fetches from git
    # Use "Hard Refresh" button in UI for immediate re-fetch; this is the periodic fallback
    timeout.hard.reconciliation: "0"
    # Global diff noise cleanup for resources normalized by their controllers.
    # Keep these system-level so AppSets only carry app-specific rules.
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jqPathExpressions:
      - '.spec.parentRefs[]? | select(.group == null or .kind == null)'
      - .spec.rules[].backendRefs[].group
      - .spec.rules[].backendRefs[].kind
      - .spec.rules[].backendRefs[].weight
      jsonPointers:
      - /spec/parentRefs
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
      - .metadata.generation
      - .metadata.finalizers
      - .spec.data[].remoteRef.conversionStrategy
      - .spec.data[].remoteRef.decodingStrategy
      - .spec.data[].remoteRef.metadataPolicy
      - .spec.data[].remoteRef.nullBytePolicy
      - .spec.target.deletionPolicy
    resource.customizations.ignoreDifferences._PersistentVolumeClaim: |
      jqPathExpressions:
      - .spec.dataSourceRef
      - .spec.dataSource
      - .spec.volumeName
      - .spec.resources.requests.storage
    # CRDs — K8s API server adds conversion and generation fields
    # NOTE: .status ignored globally by ArgoCD 3.0+ (PR #22230)
    resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
      jqPathExpressions:
      - .metadata.generation
      - .spec.conversion
    # OpenTelemetry operator mutates collector after creation
    resource.customizations.ignoreDifferences.opentelemetry.io_OpenTelemetryCollector: |
      jqPathExpressions:
      - .metadata.generation
      - .metadata.annotations
    # Secrets managed by cert-manager/webhooks — caBundle and cert data change
    resource.customizations.ignoreDifferences.all: |
      managedFieldsManagers:
      - kube-controller-manager
      - kube-scheduler
    # Enable Application health check for app-of-apps sync waves
    # This was removed in ArgoCD 1.8 but is needed for sync waves to work properly
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
    # Custom health checks for VolSync resources
    resource.customizations.health.volsync.backube_ReplicationSource: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.lastSyncTime ~= nil then
          hs.status = "Healthy"
          hs.message = "Last sync: " .. obj.status.lastSyncTime
          return hs
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for first sync"
      return hs
    resource.customizations.health.volsync.backube_ReplicationDestination: |
      hs = {}
      if obj.status ~= nil and obj.status.latestImage ~= nil then
        hs.status = "Healthy"
        hs.message = "Ready for restore"
        return hs
      end
      hs.status = "Progressing"
      hs.message = "Initializing"
      return hs
    # ExternalSecret health gate — generation-aware.
    #
    # Why this exists: ESO does NOT publish .status.observedGeneration on its
    # ExternalSecret CRD; only .status.syncedResourceVersion which has the form
    # "<generation>-<hash>". ArgoCD's upstream default health.lua only checks
    # the Ready condition, which ESO leaves stale (carrying the prior
    # generation's success message) until its next reconcile.
    #
    # Effect of the upstream default: when an ExternalSecret manifest changes
    # shape (adding/removing `data` entries), ArgoCD applies the new spec, then
    # asks "healthy?" and the upstream check returns "yes" because Ready=True
    # is still set from the OLD reconcile. Wave 0 marks complete, wave 1 (the
    # Deployment that consumes the rendered Secret) rolls into a Secret that
    # still has the OLD shape, pod CreateContainerConfigError, race.
    #
    # 2026-05-08 cluster outage: pvc-plumber v3.0.0 cutover hit this exact
    # race. Operator pod looked for AWS_ACCESS_KEY_ID in pvc-plumber-kopia
    # Secret, ESO had not yet re-rendered the Secret with the new keys, pod
    # crashlooped. See docs/pvc-plumber-explained.md for the homelabber-
    # friendly walkthrough and docs/research/argocd-eso-sync-race-2026-05-08.md
    # for the technical post-mortem.
    #
    # The fix: gate Healthy on the ES `syncedResourceVersion` PREFIX matching
    # the current `metadata.generation`. ESO writes that field every reconcile
    # using its observed generation; comparing the prefix is enough because
    # the hash suffix only differs when labels/annotations change, not when
    # the spec changes. So if the ES has been mutated and ESO has not yet
    # observed it, the prefix mismatches and we hold ArgoCD at Progressing
    # until the next ESO reconcile fires (typically <1s for spec writes via
    # the controller-runtime informer; refreshInterval is irrelevant here).
    #
    # Cluster-wide blast radius: every ExternalSecret in the repo benefits
    # — pvc-plumber, CNPG creds, posthog secrets, every volsync-* per-PVC
    # ES generated by pvc-plumber's reconciler, every app-secret. One block,
    # 30+ resources covered.
    #
    # Upstream tracker: argo-cd#22707 (open since 2025-04-17, no PR; the
    # community-converging workaround mirrors what's below). When upstream
    # ships a fix, remove this block — until then it is the authoritative
    # health check for ExternalSecret in this cluster.
    #
    # Lua acceptability under MEMORY.md feedback_argocd_no_lua: this block
    # passes the four-bar test — upstream CRD provably never publishes
    # observedGeneration; upstream ArgoCD has not shipped a fix; absence of
    # the check has already caused a production outage; cited and commented
    # heavily.
    resource.customizations.health.external-secrets.io_ExternalSecret: |
      hs = {}
      hs.status = "Progressing"
      hs.message = "Waiting for ExternalSecret"
      if obj.status == nil then return hs end

      -- ESO publishes status.syncedResourceVersion = "<generation>-<hash>".
      -- We can only reproduce the generation half from this Lua context, but
      -- the prefix mismatch is sufficient to detect "ESO has not observed
      -- the current spec yet" — which is the entire race we are gating on.
      local gen = obj.metadata and obj.metadata.generation or 0
      local srv = obj.status.syncedResourceVersion or ""
      local prefix = tostring(gen) .. "-"
      if srv == "" or string.sub(srv, 1, #prefix) ~= prefix then
        hs.status = "Progressing"
        hs.message = "ESO has not observed generation " .. tostring(gen) ..
                     " (syncedResourceVersion=" .. srv .. ")"
        return hs
      end

      -- ESO has caught up; now defer to the standard Ready check it
      -- maintains. Mirrors the upstream default health.lua's logic.
      if obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Ready" and c.status == "False" then
            hs.status = "Degraded"
            hs.message = c.message
            return hs
          end
          if c.type == "Ready" and c.status == "True" then
            hs.status = "Healthy"
            hs.message = c.message
            return hs
          end
        end
      end
      return hs
# Argo CD server settings
server:
  replicas: 2
  ingress:
    enabled: false
  env:
    - name: ARGOCD_GRPC_MAX_SIZE_MB
      value: "200"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-28)
  # VPA target: cpu 23m, memory 175Mi — server below lowerBound for memory
  # Previous: memory 256Mi → 512Mi (VPA lowerBound exceeded)
  resources:
    requests:
      cpu: 50m
      memory: 512Mi  # Increased from 256Mi (was below VPA lowerBound)
    limits:
      cpu: 500m
      memory: 1Gi
# ApplicationSet controller settings
applicationSet:
  enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-24)
  # VPA target: cpu 49m, memory 100Mi
  # Previous: cpu 250m (5x over-provisioned), memory 256Mi
  # ApplicationSet is lightweight (watches directories, creates apps)
  resources:
    requests:
      cpu: 100m  # 2x VPA target for safety margin
      memory: 128Mi
    limits:
      cpu: 500m  # Reduced from 1000m (VPA upperBound: 755m)
      memory: 512Mi  # Reduced from 1Gi
# High Availability setup
ha:
  enabled: true
  redis:
    # VPA-optimized resources (2026-02-24)
    # VPA target: cpu 23m, memory 100Mi
    # Previous: cpu 100m (4x over-provisioned), memory 128Mi
    # Redis is used for HA state/caching, low utilization in this setup
    resources:
      requests:
        cpu: 50m   # 2x VPA target for safety margin
        memory: 128Mi  # Keep at 128Mi (close to VPA target)
      limits:
        cpu: 500m  # Keep for burst capacity
        memory: 512Mi  # Keep for cache growth
# Argo CD controller settings
controller:
  env:
    # Performance: increase K8s API client throughput
    - name: ARGOCD_K8S_CLIENT_QPS
      value: "50"
    - name: ARGOCD_K8S_CLIENT_BURST
      value: "100"
    # Performance: split large app trees across Redis keys
    - name: ARGOCD_APPLICATION_TREE_SHARD_SIZE
      value: "100"
  metrics:
    enabled: true
    applicationLabels:
      enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-28)
  # VPA target: cpu 2048m, memory 3.5Gi — memory below lowerBound
  # Previous: memory 1536Mi → 4Gi (VPA lowerBound exceeded)
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi   # Increased from 1536Mi (was below VPA lowerBound)
    limits:
      cpu: 4000m
      memory: 6Gi   # Increased from 4Gi to accommodate memory growth
# Argo CD repo-server settings
repoServer:
  replicas: 2
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "3m"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # VPA-optimized resources (2026-02-24)
  # VPA target: cpu 2975m, memory 523Mi
  # Previous: cpu 1000m (UNDER-PROVISIONED 3x), memory 1Gi (OVER-PROVISIONED 2x)
  # Repo-server does heavy lifting: Helm template rendering, Kustomize builds
  # CPU-bound (manifest generation) but low memory (template processing)
  resources:
    requests:
      cpu: 3000m   # Match VPA target (was 1000m, tripled)
      memory: 768Mi  # Reduced from 1Gi (VPA target only 523Mi)
    limits:
      cpu: 4000m   # Keep at 4000m (VPA upperBound: 28+ cores during Prometheus chart)
      memory: 4Gi  # Keep at 4Gi (VPA upperBound: 3.95Gi for large Helm charts)
# Dex is disabled; external authentication (e.g. SSO) is used
dex:
  enabled: false
notifications:
  enabled: true
  secret:
    create: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
# HPA disabled — VPA handles resource optimization for this cluster.
# Running both causes oscillation: VPA changes requests, HPA recalculates
# utilization percentages, leading to unnecessary scale events.
hpa:
  enabled: false
# Disable the redis-secret-init PreSync hook. The Job creates the redis
# auth secret on first install; once created, it persists in the cluster
# and the chart re-runs the Job on every sync as a hook. On chart
# upgrades the Job's hook-delete-policy can race with Argo's
# operationState tracking and wedge the sync indefinitely. The actual
# `argocd-redis` Secret already exists (Argo Redis HA is Healthy), so
# disabling the bootstrapper is safe and idempotent. Bit us on 2026-05-01
# when Renovate PR #1259 bumped argo-cd to v9.5.9.
redisSecretInit:
  enabled: false
