controller:
  enabled: true
  flags:
    on-by-default: "true"
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

dashboard:
  enabled: true
  replicaCount: 1
  flags:
    on-by-default: "true"
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 80
