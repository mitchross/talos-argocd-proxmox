apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: gpu-priority-classes
  labels:
    app.kubernetes.io/name: gpu-priority-classes
    app.kubernetes.io/component: scheduling
resources:
  - priority-classes.yaml
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: gpu-infrastructure
