# KEDA Helm values — event-driven autoscaler.
#
# Why KEDA here: the Temporal blog (temporal.io/blog/tips-for-running-
# temporal-on-kubernetes) explicitly calls out that CPU/memory metrics
# MISLEAD for Temporal workers — the real scaling signals are Task Queue
# backlog and schedule-to-start latency. KEDA ships a first-class Temporal
# scaler that polls a Temporal frontend and emits HPA metrics from queue
# depth, so workers scale up when work arrives and down when it drains.
#
# Defaults are mostly fine — we only override image pinning and adjust
# the operator's own resource requests to leave room on this homelab.

# Use cert-manager for webhook certs instead of the default cert-gen Job.
# Cluster already has cert-manager running, and Helm hook Jobs for webhook
# certs are fragile under ArgoCD (the SA can get deleted before the Job
# runs, deadlocking the webhook forever).
certificates:
  autoGenerated: false
  certManager:
    enabled: true
    generateCA: true

operator:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metricsServer:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

webhooks:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Run the built-in Prometheus ServiceMonitor so we can later dashboard
# "how many times did KEDA scale up temporal-worker and for which queue".
prometheus:
  metricServer:
    enabled: true
    serviceMonitor:
      enabled: true
  operator:
    enabled: true
    serviceMonitor:
      enabled: true
  webhooks:
    enabled: true
    serviceMonitor:
      enabled: true
