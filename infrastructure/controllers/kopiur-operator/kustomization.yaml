apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kopiur-system

# kopiur publishes its chart as an OCI artifact (release.yaml: helm push →
# oci://ghcr.io/home-operations/charts). Render it locally like every other
# chart in this repo so the manifests are served from our own git source — no
# AppProject sourceRepos exception needed (cf. temporal-worker-controller).
helmCharts:
  - name: kopiur
    repo: oci://ghcr.io/home-operations/charts
    # renovate: datasource=docker depName=ghcr.io/home-operations/charts/kopiur
    # CHART version == app version (release.yaml packages with --app-version=VERSION).
    # Pre-1.0/alpha: re-verify CRDs on every bump.
    # 0.5.0 breaking changes assessed 2026-07-04 (upstream #190/#191/#192):
    #   - copyMethod default flipped Direct→Snapshot — no impact, the
    #     kopiur-backup component pins copyMethod: Snapshot explicitly (and must
    #     keep pinning it: SSA re-defaulting hazard on implicit values).
    #   - verification.quick reshaped to { schedule: {...} } — unused here.
    #   - metrics renamed (kopiur_snapshot_* → kopiur_policy_last_backup_*) —
    #     chart ServiceMonitor/PrometheusRule/dashboard all disabled; nothing
    #     in monitoring/ scrapes kopiur metric names.
    # 0.5.2 (2026-07-05): one fix — transient VolumeSnapshot errors no longer
    # terminally fail backups (#201). Directly relevant: Longhorn under load
    # throws exactly those (DR doc "attach conflicts"); pre-0.5.2 they burned
    # the whole run until the next cron.
    version: 0.5.2
    releaseName: kopiur
    namespace: kopiur-system
    includeCRDs: true
    valuesFile: values.yaml
