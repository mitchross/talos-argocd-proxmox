# kopiur operator Helm values (production backup system since 2026-06-27).
# Rendered locally via Kustomize helmCharts from the upstream OCI chart — see
# kustomization.yaml.
#
# Image tags are deliberately NOT set here: empty tag defaults to
# .Chart.AppVersion, and the OCI chart is packaged with appVersion == chart
# version — so all three images (controller/webhook/mover) track the single
# chart pin in kustomization.yaml. Explicit tags here drifted on Renovate
# chart bumps (nothing updated them). Pin image.*.digest before trusting
# this for anything real.
installScope: cluster # ClusterRole + ClusterRepository reconciliation
webhook:
  failurePolicy: Ignore # deliberate (DR-safety): a kopiur outage must never gate CR creation
  tls:
    mode: self # self-signed at runtime — no cert-manager / no hook Job
