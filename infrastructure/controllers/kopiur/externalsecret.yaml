# kopiur cluster kopia credentials — ONE global ClusterExternalSecret that fans
# the `kopiur-rustfs` Secret into every namespace labeled
# `kopiur.home-operations.com/repo: cluster-kopia`: the kopiur-system namespace
# (controller connection + managed Maintenance) AND each consumer namespace
# whose mover Job runs there (e.g. karakeep). Mirrors the VolSync
# `volsync-kopia-repository` ClusterES.
#
# We deliberately do NOT use kopiur credentialProjection — that would require
# granting the operator cluster-wide `secrets` create/patch RBAC
# (features.credentialProjection.enabled). ESO delivers the creds instead
# (least-privilege). The Secret NAME must equal the ClusterRepository's
# auth.secretRef.name / encryption.passwordSecretRef.name (`kopiur-rustfs`) and
# carry the well-known keys — see kopiur docs repositories.md ("Without
# Credential Projection": secret name must match; keys KOPIA_PASSWORD /
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY).
#
# Reuses the SAME 1Password `rustfs` item as VolSync; the kopiur repo is
# isolated by a dedicated bucket, so sharing the kopia password is safe.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: kopiur-rustfs
spec:
  externalSecretName: kopiur-rustfs
  refreshTime: 1m
  namespaceSelector:
    matchLabels:
      kopiur.home-operations.com/repo: cluster-kopia
  externalSecretSpec:
    refreshInterval: 1m
    secretStoreRef:
      kind: ClusterSecretStore
      name: 1password
    target:
      name: kopiur-rustfs
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          KOPIA_PASSWORD: "{{ .password }}"
          AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
          AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
    data:
      - secretKey: password
        remoteRef:
          key: rustfs
          property: kopia_password
      - secretKey: accessKey
        remoteRef:
          key: rustfs
          property: rustfs-workload-access-key
      - secretKey: secretKey
        remoteRef:
          key: rustfs
          property: rustfs-workload-secret-key
