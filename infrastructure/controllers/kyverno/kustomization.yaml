apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
- namespace.yaml
- rbac-patch.yaml
# VolSync PVC backup/restore automation has moved to the pvc-plumber v2
# operator (infrastructure/controllers/pvc-plumber/). The following Kyverno
# policies were removed in this branch:
#   - policies/volsync-pvc-backup-restore.yaml — replaced by the operator's
#     PVC reconciler (ES/RS/RD lifecycle) and admission webhooks (mutate
#     dataSourceRef, fail-closed restore gate, skip-restore reason check).
#   - policies/volsync-nfs-inject.yaml — replaced by the operator's
#     job_mutate webhook.
# The bash orphan-reaper CronJob (infrastructure/storage/volsync/orphan-reaper.yaml)
# was also removed — the operator's PVC reconciler cleanup() reaps orphan
# ES/RS/RD by label on PVC delete or backup label removal.
# See docs/plans/pvc-plumber-operator-design.md and
# docs/plans/pvc-plumber-v3-roadmap.md for the full architecture and
# migration rationale. Only longhorn-pvc-backup-audit.yaml remains here:
# it's a read-only audit policy with no generate, no admission gate, and
# no external HTTP — none of the Kyverno failure modes that drove this
# refactor apply.
- policies/longhorn-pvc-backup-audit.yaml
helmCharts:
- name: kyverno
  repo: https://kyverno.github.io/kyverno
  version: 3.8.0
  releaseName: kyverno
  namespace: kyverno
  valuesFile: values.yaml

patches:
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: clusterpolicies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: policies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
