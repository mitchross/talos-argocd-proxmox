apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
- namespace.yaml
- rbac-patch.yaml
- policies/volsync-pvc-backup-restore.yaml
- policies/volsync-nfs-inject.yaml
# volsync-orphan-cleanup.yaml (ClusterCleanupPolicy) was the original reaper
# but it has been silently broken on Kyverno 1.17.x and 1.18.x — apiCall
# context evaluation inside ClusterCleanupPolicy never reaped any resources
# despite ticking on schedule (drill #4, 2026-04-30 + 2026-05-01). The
# canonical reaper is now the volsync-orphan-reaper bash CronJob in
# infrastructure/storage/volsync/orphan-reaper.yaml. The policy file has
# been removed from the tree to avoid dual-truth confusion; restore from
# git history if upstream Kyverno fixes the apiCall bug.
- policies/longhorn-pvc-backup-audit.yaml
helmCharts:
- name: kyverno
  repo: https://kyverno.github.io/kyverno
  version: 3.8.0
  releaseName: kyverno
  namespace: kyverno
  valuesFile: values.yaml

patches:
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: clusterpolicies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: policies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
