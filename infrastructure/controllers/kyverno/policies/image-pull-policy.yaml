---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-pull-policy
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: Image Pull Policy IfNotPresent
    policies.kyverno.io/description: >-
      Sets imagePullPolicy to IfNotPresent on all containers to avoid
      Docker Hub rate limits. Image digest pinning is handled in Git
      and updated by Renovate.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: set-image-pull-policy
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      mutate:
        foreach:
          - list: "request.object.spec.containers[]"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    imagePullPolicy: IfNotPresent
          - list: "request.object.spec.initContainers[] || `[]`"
            patchStrategicMerge:
              spec:
                initContainers:
                  - name: "{{ element.name }}"
                    imagePullPolicy: IfNotPresent
