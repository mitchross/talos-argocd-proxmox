---
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: volsync-pvc-generate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: VolSync PVC Backup Resource Generation (CEL)
    policies.kyverno.io/description: >-
      Generates ExternalSecret (Kopia credentials), ReplicationSource (backup schedule),
      and ReplicationDestination (restore capability) for PVCs with backup labels.
      Uses Kopia with NFS filesystem backend for fast compressed backups to TrueNAS.
spec:
  evaluation:
    synchronize:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ['']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['persistentvolumeclaims']
  matchConditions:
    - name: has-backup-label
      expression: >-
        has(object.metadata.labels) &&
        has(object.metadata.labels.backup) &&
        object.metadata.labels.backup in ['hourly', 'daily']
    - name: not-system-namespace
      expression: >-
        !(object.metadata.namespace in ['kube-system', 'volsync-system', 'kyverno'])
  variables:
    - name: pvcName
      expression: "string(object.metadata.name)"
    - name: pvcNamespace
      expression: "string(object.metadata.namespace)"
    - name: backupLabel
      expression: "string(object.metadata.labels.backup)"
    - name: schedule
      expression: >-
        variables.backupLabel == 'hourly' ? '0 * * * *' : '0 2 * * *'
    - name: accessMode
      expression: >-
        has(object.spec.accessModes) && size(object.spec.accessModes) > 0 ?
        string(object.spec.accessModes[0]) : 'ReadWriteOnce'
    - name: storageSize
      expression: "string(object.spec.resources.requests['storage'])"
    - name: isBound
      expression: >-
        has(object.status) && has(object.status.phase) && object.status.phase == 'Bound'
    - name: externalSecret
      expression: >-
        dyn([
          dyn({
            "apiVersion": "external-secrets.io/v1",
            "kind": "ExternalSecret",
            "metadata": dyn({
              "name": "volsync-" + variables.pvcName,
              "namespace": variables.pvcNamespace,
              "labels": dyn({
                "app.kubernetes.io/managed-by": "kyverno",
                "volsync.backup/pvc": variables.pvcName
              })
            }),
            "spec": dyn({
              "refreshInterval": "1h",
              "secretStoreRef": dyn({
                "kind": "ClusterSecretStore",
                "name": "1password"
              }),
              "target": dyn({
                "name": "volsync-" + variables.pvcName,
                "creationPolicy": "Owner",
                "template": dyn({
                  "engineVersion": "v2",
                  "mergePolicy": "Merge",
                  "metadata": dyn({
                    "labels": dyn({
                      "app.kubernetes.io/managed-by": "kyverno",
                      "volsync.backup/pvc": variables.pvcName
                    })
                  }),
                  "data": dyn({
                    "KOPIA_REPOSITORY": "filesystem:///repository",
                    "KOPIA_FS_PATH": "/repository"
                  })
                })
              }),
              "data": dyn([
                dyn({
                  "secretKey": "KOPIA_PASSWORD",
                  "remoteRef": dyn({
                    "key": "rustfs",
                    "property": "kopia_password"
                  })
                })
              ])
            })
          })
        ])
    - name: replicationDest
      expression: >-
        dyn([
          dyn({
            "apiVersion": "volsync.backube/v1alpha1",
            "kind": "ReplicationDestination",
            "metadata": dyn({
              "name": variables.pvcName + "-backup",
              "namespace": variables.pvcNamespace,
              "labels": dyn({
                "app.kubernetes.io/managed-by": "kyverno",
                "volsync.backup/pvc": variables.pvcName
              })
            }),
            "spec": dyn({
              "trigger": dyn({"manual": "restore-once"}),
              "kopia": dyn({
                "repository": "volsync-" + variables.pvcName,
                "copyMethod": "Snapshot",
                "storageClassName": "longhorn",
                "volumeSnapshotClassName": "longhorn-snapclass",
                "accessModes": dyn([variables.accessMode]),
                "capacity": variables.storageSize,
                "cacheCapacity": "2Gi",
                "moverSecurityContext": dyn({
                  "runAsUser": 568,
                  "runAsGroup": 568,
                  "fsGroup": 568
                })
              })
            })
          })
        ])
    - name: replicationSource
      expression: >-
        variables.isBound ?
        dyn([
          dyn({
            "apiVersion": "volsync.backube/v1alpha1",
            "kind": "ReplicationSource",
            "metadata": dyn({
              "name": variables.pvcName + "-backup",
              "namespace": variables.pvcNamespace,
              "labels": dyn({
                "app.kubernetes.io/managed-by": "kyverno",
                "volsync.backup/pvc": variables.pvcName
              })
            }),
            "spec": dyn({
              "sourcePVC": variables.pvcName,
              "trigger": dyn({"schedule": variables.schedule}),
              "kopia": dyn({
                "repository": "volsync-" + variables.pvcName,
                "compression": "zstd-fastest",
                "parallelism": 2,
                "retain": dyn({
                  "hourly": 24,
                  "daily": 7,
                  "weekly": 4,
                  "monthly": 2
                }),
                "copyMethod": "Snapshot",
                "storageClassName": "longhorn",
                "volumeSnapshotClassName": "longhorn-snapclass",
                "cacheCapacity": "2Gi",
                "moverSecurityContext": dyn({
                  "runAsUser": 568,
                  "runAsGroup": 568,
                  "fsGroup": 568
                })
              })
            })
          })
        ]) : dyn([])
  generate:
    - expression: >-
        generator.Apply(variables.pvcNamespace, variables.externalSecret)
    - expression: >-
        generator.Apply(variables.pvcNamespace, variables.replicationDest)
    - expression: >-
        size(variables.replicationSource) > 0 ?
        generator.Apply(variables.pvcNamespace, variables.replicationSource) : true
