---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: volsync-pvc-mutate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: VolSync PVC Auto-Restore (dataSourceRef Injection)
    policies.kyverno.io/description: >-
      On PVC creation with backup labels, checks PVC Plumber for existing backups.
      If a backup exists, adds dataSourceRef pointing to the ReplicationDestination
      for automatic restore via VolSync.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ['']
        apiVersions: ['v1']
        operations: ['CREATE']
        resources: ['persistentvolumeclaims']
  matchConditions:
    - name: has-backup-label
      expression: >-
        has(object.metadata.labels) &&
        has(object.metadata.labels.backup) &&
        object.metadata.labels.backup in ['hourly', 'daily']
    - name: not-system-namespace
      expression: >-
        !(object.metadata.namespace in ['kube-system', 'volsync-system', 'kyverno'])
    - name: no-existing-datasource
      expression: >-
        !has(object.spec.dataSourceRef)
  variables:
    - name: pvcName
      expression: "object.metadata.name"
    - name: pvcNamespace
      expression: "object.metadata.namespace"
    - name: backupCheck
      expression: >-
        http.Get("http://pvc-plumber.volsync-system.svc.cluster.local/exists/" + object.metadata.namespace + "/" + object.metadata.name)
    - name: backupExists
      expression: >-
        variables.backupCheck != null &&
        has(variables.backupCheck.exists) &&
        variables.backupCheck.exists == true
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          variables.backupExists ?
          [
            JSONPatch{
              op: "add",
              path: "/spec/dataSourceRef",
              value: {
                "apiGroup": "volsync.backube",
                "kind": "ReplicationDestination",
                "name": variables.pvcName + "-backup"
              }
            }
          ] : []
