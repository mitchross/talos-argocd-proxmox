---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: vpa-auto-generate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: Auto-Generate VPA for All Workloads
    policies.kyverno.io/description: >-
      Automatically creates a VerticalPodAutoscaler for every Deployment,
      StatefulSet, and DaemonSet. Uses InPlaceOrRecreate mode for automatic
      resource tuning with in-place resizing (K8s 1.32+).
spec:
  mutateExistingOnPolicyUpdate: true
  background: true
  rules:
    - name: generate-vpa
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      skipBackgroundRequests: false
      generate:
        synchronize: true
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
            ownerReferences:
              - apiVersion: "{{request.object.apiVersion}}"
                kind: "{{request.object.kind}}"
                name: "{{request.object.metadata.name}}"
                uid: "{{request.object.metadata.uid}}"
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: "{{request.object.kind}}"
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "InPlaceOrRecreate"
