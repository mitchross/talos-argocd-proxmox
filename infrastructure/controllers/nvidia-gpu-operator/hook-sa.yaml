# Workaround: The gpu-operator Helm chart (v25.10.1) renders its upgrade-crd
# Helm hook resources with the ServiceAccount stuck in namespace
# "nvidia-gpu-operator" (chart bug — does not respect Release.Namespace for
# the hook SA even when installed into a different namespace).
#
# The Job itself and the ClusterRoleBinding subject are rendered with
# Release.Namespace=gpu-operator, so the Job looks for the SA in
# "gpu-operator" and fails every pod creation with:
#   error looking up service account gpu-operator/gpu-operator-upgrade-crd-hook-sa:
#     serviceaccount not found
#
# This keeps the upgrade-crd Job stuck Running 0/1 forever, which blocks the
# CRD install, which blocks the operator Deployment, which blocks the whole
# GPU stack.
#
# Fix: ship a persistent SA of the same name in gpu-operator. The Helm hook
# still renders its own copy in nvidia-gpu-operator (ignored), but the Job
# now finds THIS SA and can run. The existing ClusterRoleBinding
# (gpu-operator-upgrade-crd-hook-binding) already has its subject pointing
# at gpu-operator namespace, so no extra RBAC needed.
#
# Remove this file once the upstream chart renders the hook SA in the
# release namespace (track: https://github.com/NVIDIA/gpu-operator).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-operator-upgrade-crd-hook-sa
  namespace: gpu-operator
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: gpu-operator
  annotations:
    # The chart's upgrade-crd Job is a Helm pre-upgrade hook (→ ArgoCD
    # PreSync hook). ArgoCD stalls in PreSync waiting for it to complete
    # and never reaches the Sync phase — so a regular Sync-phase SA would
    # never be applied in time. Declare this SA as a PreSync hook too,
    # with sync-wave -1 so it applies BEFORE the chart's hook Job (wave 0).
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    # No hook-delete-policy → resource persists after each sync (idempotent
    # re-apply is safe for a plain ServiceAccount).
