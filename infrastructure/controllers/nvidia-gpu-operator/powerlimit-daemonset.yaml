# GPU Power-Limit DaemonSet
#
# The NVIDIA GPU Operator does NOT manage per-card power limits.
# Without this DS, the RTX 3090s run at their default limit of 420W each
# (~840W total across both cards on this node).
#
# This DaemonSet runs on every GPU node and reapplies
# `nvidia-smi -pl <watts>` to every GPU every five minutes. The loop restores
# the setting after a driver reload without requiring the pod to restart.
#
# Valid range on RTX 3090: ~100W (min) .. 450W (max). Default is 420W.
# We cap at 290W — the measured air-cooled decode-efficiency knee:
# ~22% less board power for ~7% less decode throughput versus 370W.
#
# Requires:
#   - privileged container (nvidia-smi -pl needs root + driver write)
#   - hostPID (persistence-mode write is per-driver, not per-namespace)
#   - runtimeClassName: nvidia (so CDI injects GPU devices)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-powerlimit
  namespace: gpu-operator
  labels:
    app.kubernetes.io/name: nvidia-powerlimit
    app.kubernetes.io/component: power-management
    app.kubernetes.io/part-of: gpu-infrastructure
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-powerlimit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-powerlimit
        app.kubernetes.io/component: power-management
    spec:
      # CDI-injected nvidia-smi is available when runtimeClassName is "nvidia"
      runtimeClassName: nvidia
      # Only schedule on nodes with at least one NVIDIA GPU.
      # This label is set by the GPU Operator's node-feature-discovery.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      # Match the rest of the GPU stack's tolerations so this DS is
      # allowed onto tainted GPU nodes.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostPID: true
      containers:
        - name: nvidia-powerlimit
          # renovate: ignore
          # CUDA userspace base; the NVIDIA runtime injects nvidia-smi and the
          # host driver libraries. Pin a specific SHA to make this immutable.
          # Source from NVIDIA's own registry (nvcr.io) to dodge Docker Hub
          # rate limits — same byte-identical image as docker.io/nvidia/cuda.
          image: nvcr.io/nvidia/cuda:12.8.1-base-ubuntu22.04
          command:
            - /bin/bash
            - -c
            - |
              set -u

              echo "[powerlimit] waiting for nvidia-smi to become available..."
              until nvidia-smi >/dev/null 2>&1; do sleep 5; done

              echo "[powerlimit] capping all GPUs at ${POWER_LIMIT_WATTS}W; reapplying every ${REAPPLY_SECONDS}s"
              while true; do
                # Best-effort: persistence mode keeps the driver loaded between
                # CUDA processes. The reapply loop covers driver reloads.
                nvidia-smi -pm 1 >/dev/null 2>&1 \
                  || echo "[powerlimit] WARN: could not enable persistence mode"

                if nvidia-smi -pl "${POWER_LIMIT_WATTS}" >/dev/null; then
                  nvidia-smi \
                    --query-gpu=index,name,power.limit,power.default_limit,power.max_limit,power.draw \
                    --format=csv,noheader
                else
                  echo "[powerlimit] WARN: failed to set power limit; retrying in ${REAPPLY_SECONDS}s"
                fi

                sleep "${REAPPLY_SECONDS}"
              done
          securityContext:
            # Required for nvidia-smi -pl; the driver rejects the ioctl
            # from an unprivileged user namespace.
            privileged: true
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            # 290W is the measured decode-efficiency knee for air-cooled 3090s.
            # Use 250W instead when optimizing for prefill-heavy workloads.
            - name: POWER_LIMIT_WATTS
              value: "290"
            - name: REAPPLY_SECONDS
              value: "300"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
