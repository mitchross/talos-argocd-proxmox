---
# Self-signed Issuer for the pvc-plumber webhook serving cert.
# Mirrors the pattern used by cnpg-system, keda, opentelemetry-operator, and
# temporal-worker-controller — namespace-scoped Issuer, not ClusterIssuer.
# The cluster has no shared `selfsigned-issuer` ClusterIssuer; only
# `cloudflare-cluster-issuer` (ACME), which is unsuitable for an internal
# webhook serving cert.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: pvc-plumber-selfsigned-issuer
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: webhook
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selfSigned: {}
---
# TLS cert for the webhook server. cert-manager rotates this automatically.
# Consumed by:
#   - the Deployment, mounted at /tmp/k8s-webhook-server/serving-certs
#   - the Mutating/Validating WebhookConfigurations via
#     `cert-manager.io/inject-ca-from: volsync-system/pvc-plumber-webhook-tls`
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pvc-plumber-webhook-tls
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: webhook
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: pvc-plumber-webhook-tls
  dnsNames:
    - pvc-plumber.volsync-system.svc
    - pvc-plumber.volsync-system.svc.cluster.local
  issuerRef:
    name: pvc-plumber-selfsigned-issuer
    kind: Issuer
