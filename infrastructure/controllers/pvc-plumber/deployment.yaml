---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-checker
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
    spec:
      serviceAccountName: pvc-plumber
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: pvc-plumber
            topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
      # ─────────────────────────────────────────────────────────────────
      # v3.1.0 ES-race fix (2026-05-08).
      #
      # v3.0.0 read KOPIA_PASSWORD / AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY through `valueFrom.secretKeyRef` env vars at
      # pod-start time. When ArgoCD syncs the ExternalSecret manifest in
      # the same wave that this Deployment rolls, kubelet's secretKeyRef
      # resolver can race the ESO render and the pod enters
      # CreateContainerConfigError → CrashLoopBackOff. With
      # `failurePolicy: Fail` on the validating webhook (see webhooks.yaml),
      # that crash-loop denies every backup-labeled PVC creation cluster-
      # wide. The 2026-05-08 cutover incident was this exact race.
      #
      # v3.1.0 mounts the same `pvc-plumber-kopia` Secret as a directory
      # at /var/secret/pvc-plumber-kopia (each Secret key becomes a file).
      # The kopia client reads creds from disk on every subprocess
      # invocation rather than relying on env-var resolution at pod start,
      # so the pod starts cleanly regardless of ESO render state. A Secret
      # update from ESO is observed on the next kopia call without a pod
      # restart. ESO-rendered Secret data and the ExternalSecret CR are
      # unchanged. See pvc-plumber CHANGELOG `[3.1.0]` for the full
      # rationale and the related /readyz semantic change.
      #
      # Per-PVC volsync-<pvc> Secrets the reconciler renders for VolSync
      # mover Jobs are NOT touched — those continue to use secretKeyRef
      # env vars and are not subject to the ArgoCD sync race because they
      # are operator-rendered, not Argo-rendered.
      # ─────────────────────────────────────────────────────────────────
      - name: pvc-plumber
        image: ghcr.io/mitchross/pvc-plumber:3.1.0
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: webhook
          containerPort: 9443
          protocol: TCP
        env:
        - name: BACKEND_TYPE
          value: "kopia-s3"
        - name: KOPIA_S3_ENDPOINT
          # kopia's S3 backend rejects fully-qualified URLs ("Endpoint url
          # cannot have fully qualified paths") — pass bare host:port and
          # let KOPIA_S3_DISABLE_TLS below select HTTP. CNPG Barman uses
          # the http:// scheme on the same endpoint because barman-cloud
          # parses URLs differently; do not unify them.
          value: "192.168.10.133:30293"
        - name: KOPIA_S3_BUCKET
          value: "volsync-kopia"
        - name: KOPIA_S3_DISABLE_TLS
          # In-cluster RustFS over plaintext HTTP (same shape CNPG Barman
          # uses against the same endpoint). Flip to "false" if the cluster
          # ever fronts RustFS with TLS termination.
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        - name: CACHE_TTL
          value: "5m"
        - name: HTTP_TIMEOUT
          value: "7s"
        - name: RE_WARM_INTERVAL
          value: "90s"
        # Kopia repo password + S3 admin keys come from the same
        # `pvc-plumber-kopia` Secret rendered by ExternalSecret (see
        # externalsecret.yaml). v3.1.0 mounts that Secret as a directory
        # under /var/secret/pvc-plumber-kopia (see volumeMounts below)
        # and reads creds from disk on each kopia subprocess invocation,
        # avoiding the pod-startup secretKeyRef race that crashed v3.0.0
        # during ArgoCD sync waves (CHANGELOG [3.1.0]). Mover Jobs still
        # consume the per-PVC volsync-<pvc> Secret via secretKeyRef —
        # those are operator-rendered, not Argo-rendered, and aren't
        # subject to the same race. Operators rolling back to ≤3.0.0 must
        # restore the three secretKeyRef env vars below.
        - name: KOPIA_CONFIG_PATH
          value: "/tmp/kopia/config/repository.config"
        - name: KOPIA_LOG_DIR
          value: "/tmp/kopia/logs"
        - name: KOPIA_CACHE_DIRECTORY
          value: "/tmp/kopia/cache"
        - name: HOME
          value: "/tmp"
        - name: USER
          value: "plumber"
        # Operator-mode configuration. The v3 binary uses these to enable the
        # controller-runtime manager + admission webhooks alongside the
        # existing /exists HTTP server.
        - name: OPERATOR_MODE
          value: "true"
        # Namespaces the operator must NOT touch when reconciling/mutating.
        # Mirrors the webhook namespaceSelector exclusion list (see
        # webhooks.yaml). Kept in sync to make sure reconciler and admission
        # paths agree on what is "infrastructure".
        - name: SYSTEM_NAMESPACES
          value: "kube-system,volsync-system,kyverno,argocd,longhorn-system,snapshot-controller,cert-manager,external-secrets,1passwordconnect"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: kopia-tmp
          mountPath: /tmp/kopia
        # controller-runtime default location for webhook serving cert.
        # Populated by cert-manager via the pvc-plumber-webhook-tls secret
        # (see certificate.yaml).
        - name: webhook-tls
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
        # v3.1.0 lazy-credentials mount. The pvc-plumber-kopia Secret's
        # three keys (KOPIA_PASSWORD, AWS_ACCESS_KEY_ID,
        # AWS_SECRET_ACCESS_KEY) are exposed as files at this path. The
        # operator reads them on each kopia subprocess invocation and
        # retries with backoff if any file is missing/empty (ESO not done
        # rendering yet). See CHANGELOG [3.1.0] for the ES-race rationale.
        - name: kopia-credentials
          mountPath: /var/secret/pvc-plumber-kopia
          readOnly: true
      volumes:
      - name: kopia-tmp
        emptyDir: {}
      - name: webhook-tls
        secret:
          secretName: pvc-plumber-webhook-tls
      - name: kopia-credentials
        secret:
          secretName: pvc-plumber-kopia
          # 0440 = readable by the pvc-plumber container's UID/GID (568)
          # and the runtime's group; nothing else.
          defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pvc-plumber
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: webhook
    port: 9443
    targetPort: webhook
    protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
