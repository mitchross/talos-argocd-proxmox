# pvc-plumber v4 — audit-mode Deployment, rc5 image (Phase 6 of
# docs/pvc-plumber-v4-prd.md, cutover sequence per
# docs/pvc-plumber-v4-cutover.md §9).
#
# Single replica. Leader election forced off by the binary in audit mode.
# Read-only RBAC (rbac.yaml). No webhook server — Patch 6.7-wire gates
# webhook registration on `!runsV4Reconciler(mode)`, and audit + permissive
# both route to v4, so the webhook server is never started under any v4
# mode. Therefore no TLS cert volume, no init container, no
# /tmp/k8s-webhook-server.
#
# Image: pinned to v4.0.0-permissive-rc5 (git tag) → docker tag
# 4.0.0-permissive-rc5 (docker/metadata-action@v5 strips the leading
# `v`). The SHA-pin is the real release digest published by
# .github/workflows/release.yaml on 2026-05-26. Built from
# mitchross/pvc-plumber commit f19595b (build(image): bundle
# pvc-plumber-adopt CLI into container image), rolling up Patches 7.1
# through 7.4 — read-only adoption planner (internal/v4/adopt PlanFor),
# metadata-only PVC adopt writer (Apply/Undo via server-side apply),
# cmd/adopt CLI wiring, and the Dockerfile change that bundles the
# resulting /pvc-plumber-adopt binary next to /pvc-plumber in this
# container. Operator-side behavior is byte-identical to rc4 — no
# commits since rc4 touched cmd/operator, internal/controller, or
# internal/v4/executor; the delta is the bundled CLI only.
#
# rc5 is a TOOLING BUMP — the image now also carries
# /pvc-plumber-adopt, a CLI that lets operators run `plan` (read-only
# adoption inspection), `apply` (write v4 gate labels via SSA), or
# `undo` (release labels via SSA empty payload). The CLI is NOT the
# default ENTRYPOINT; /pvc-plumber remains the entrypoint. Operators
# invoke the CLI explicitly via `kubectl exec` or `kubectl run
# --command --`. The six PVC_PLUMBER_DEFAULT_* env vars below remain
# set as forward-prep for permissive cutover.
#
# Apply and Undo remain RBAC-BLOCKED in this deployment. The operator
# pod's ServiceAccount carries only the `pvc-plumber:audit-reader`
# ClusterRole (rbac.yaml) — get/list/watch on PVCs, no patch/update.
# Any `pvc-plumber-adopt apply` or `pvc-plumber-adopt undo` run from
# inside this pod will fail at the apiserver with HTTP 403. This is
# load-bearing safety: rc5 ships the binary but does not authorize
# its write paths. Granting PVC patch/update to this ServiceAccount
# is a separate later patch, gated by explicit user approval.
#
# The Argo Application at ../argocd/apps/core-dependencies/pvc-plumber-app.yaml
# still has automated sync DISABLED. The image pin alone does not
# trigger a deployment — a manual sync is required. Once Argo syncs,
# the rc5 pod starts and logs the banner appropriate to its
# PVC_PLUMBER_MODE env value (see below).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    pvc-plumber.io/mode: audit
spec:
  replicas: 1
  # No RWO PVC, so Recreate vs RollingUpdate doesn't matter, but pinning
  # to Recreate keeps the rollout pattern consistent with every other
  # operator-style Deployment in the repo.
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
      app.kubernetes.io/component: backup-restore-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
        app.kubernetes.io/component: backup-restore-operator
        pvc-plumber.io/mode: audit
    spec:
      serviceAccountName: pvc-plumber
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          # Pinned to the immutable digest published by the operator
          # repo's release.yaml workflow on 2026-05-26 (Release run
          # 26469473856). The tag value is informational only — the
          # digest is what kubelet pulls. This is the multi-arch
          # manifest list digest (linux/amd64 + linux/arm64).
          image: ghcr.io/mitchross/pvc-plumber:4.0.0-permissive-rc5@sha256:8a90594257e178d90834a3269e4e0bdb15186739a93e9f42ca8a1c5c70046093
          imagePullPolicy: IfNotPresent
          command: ["/pvc-plumber"]
          args:
            # Required to enable the controller-runtime manager (the v3.x
            # rollout gate; legacy HTTP path is still present in the
            # binary). Audit gating lives BELOW this flag — see env vars.
            - --leader-elect=false
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
          env:
            # Phase 6 permissive dry-run: the binary is in permissive
            # mode but the cluster has zero write-eligible PVCs (no PVC
            # currently carries BOTH pvc-plumber.io/enabled="true" AND
            # pvc-plumber.io/manage-volsync="true"). Verdict for every
            # PVC remains skipped-not-opted-in, skipped-exempt, or
            # already-matches; planned_ops stays empty, executor never
            # fires. Karakeep canary is the next gate after this dry
            # run is verified — see docs/pvc-plumber-v4-cutover.md §10.
            # Enforce/strict are still rejected at startup (Phase 8).
            - name: PVC_PLUMBER_MODE
              value: "permissive"
            # Enable the operator code path (manager + reconciler).
            # Without this, the binary stays in legacy HTTP-only mode.
            - name: OPERATOR_MODE
              value: "true"
            # Tighten log level for the audit rollout; v4 emits a lot of
            # "would-write" entries that are useful for observability but
            # noisy at DEBUG.
            - name: LOG_LEVEL
              value: "info"
            # Backend env vars are INERT under any v4-routed mode.
            # Patch 6.7-wire's needsBackend(mode) returns false for
            # audit and permissive, so cmd/operator/main.go skips
            # buildBackend and the legacy HTTP server entirely. These
            # values stay in the manifest only to ease a future rollback
            # to a hypothetical v3 chart-era binary; remove once that
            # rollback path is no longer a real option.
            - name: BACKEND_TYPE
              value: "s3"
            - name: KOPIA_S3_ENDPOINT
              value: "192.168.10.133:30292"
            - name: KOPIA_S3_BUCKET
              value: "volsync-kopia"
            - name: KOPIA_S3_DISABLE_TLS
              value: "true"
            # v4 builder/executor defaults — consumed by the v4
            # reconciler when it renders RS/RD specs (Patch 6.5+
            # builder.Inputs.Default*). Required when
            # PVC_PLUMBER_MODE=permissive (RequireV4WriteDefaults in
            # cmd/operator/main.go errors at startup if any are unset
            # or if UID/GID/FSGroup are zero); optional in audit mode
            # but pre-staged here so flipping to permissive becomes a
            # one-line env change rather than a multi-field shuffle.
            # Values match the talos cluster's 568:568:568 +
            # longhorn-snapclass + longhorn convention used by every
            # current inline RS/RD pattern in my-apps/**.
            - name: PVC_PLUMBER_DEFAULT_SNAPSHOT_CLASS
              value: "longhorn-snapclass"
            - name: PVC_PLUMBER_DEFAULT_CACHE_CAPACITY
              value: "2Gi"
            - name: PVC_PLUMBER_DEFAULT_STORAGE_CLASS
              value: "longhorn"
            - name: PVC_PLUMBER_DEFAULT_UID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_GID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_FSGROUP
              value: "568"
            # Pod metadata for log correlation.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: probes
              containerPort: 8082
              protocol: TCP
            # rc3+: audit HTTP server bound to cfg.Port (defaults to 8080,
            # PORT env intentionally unset). Serves /audit (parity report
            # JSON), plus inline /healthz and /readyz for symmetry with
            # the legacy port. Kubelet probes intentionally still target
            # `probes` (controller-runtime manager) — this port is for
            # clients that consume the parity report.
            - name: audit-http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # /tmp is needed by Go's default temp directory and by
            # readOnlyRootFilesystem deployments generally. Keep it
            # ephemeral; the operator has no persistent state.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      # Schedule on any node — operator is cheap, no GPU/special hardware.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
