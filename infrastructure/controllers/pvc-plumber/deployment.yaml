# pvc-plumber v4 — Deployment, rc6 image (Phase 6 of
# docs/pvc-plumber-v4-prd.md, cutover sequence per
# docs/pvc-plumber-v4-cutover.md §9).
#
# Single replica. Leader election forced off by the binary in audit
# and permissive modes. No webhook server — Patch 6.7-wire gates
# webhook registration on `!runsV4Reconciler(mode)`, and audit +
# permissive both route to v4, so the webhook server is never started
# under any v4 mode. Therefore no TLS cert volume, no init container,
# no /tmp/k8s-webhook-server.
#
# Image: pinned to v4.0.0-permissive-rc6 (git tag) → docker tag
# 4.0.0-permissive-rc6 (docker/metadata-action@v5 strips the leading
# `v`). The SHA-pin is the release digest published by
# .github/workflows/release.yaml on 2026-05-28. Built from
# mitchross/pvc-plumber commit 5611c8da (fix(v4): move backup identity
# from label to annotation), the single-commit fix for the 2026-05-28
# nginx-example/storage canary incident.
#
# rc6 is a TARGETED BUG FIX over rc5. The v4 builder previously emitted
# `pvc-plumber.io/backup-identity=<namespace>/<pvc>` as a LABEL on
# generated RS/RD. K8s rejects label values containing '/', so every
# operator-driven RS/RD Create failed with `metadata.labels: Invalid
# value: "nginx-example/storage"` once Patch 7.7's namespace write RBAC
# unblocked the previous `forbidden` error. rc6 moves the compound
# identity to AnnotationBackupIdentity on the child, keeps the
# per-component labels (source-namespace, source-pvc, tier) that are
# individually valid, and adds K8s label-value validation as a
# regression test invariant. Full incident write-up at
# docs/pvc-plumber-v4-nginx-canary-incident.md.
#
# Operator-side write RBAC for VolSync RS/RD is provided by
# rbac-volsync-writer.yaml (Patch 7.7): ClusterRole
# pvc-plumber:volsync-writer plus per-namespace RoleBindings. The
# operator's `pvc-plumber:audit-reader` ClusterRoleBinding remains
# read-only cluster-wide; writes happen only in namespaces with an
# explicit volsync-writer RoleBinding. The adopt CLI uses a separate
# `pvc-plumber-adopt` ServiceAccount with its own canary-scoped RBAC
# (rbac-adopt.yaml).
#
# The Argo Application at ../argocd/apps/core-dependencies/pvc-plumber-app.yaml
# has automated sync DISABLED. The image pin alone does not trigger
# a deployment — a manual sync is required.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    pvc-plumber.io/mode: audit
spec:
  replicas: 1
  # No RWO PVC, so Recreate vs RollingUpdate doesn't matter, but pinning
  # to Recreate keeps the rollout pattern consistent with every other
  # operator-style Deployment in the repo.
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
      app.kubernetes.io/component: backup-restore-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
        app.kubernetes.io/component: backup-restore-operator
        pvc-plumber.io/mode: audit
    spec:
      serviceAccountName: pvc-plumber
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          # Pinned to the immutable digest published by the operator
          # repo's release.yaml workflow on 2026-05-26 (Release run
          # 26469473856). The tag value is informational only — the
          # digest is what kubelet pulls. This is the multi-arch
          # manifest list digest (linux/amd64 + linux/arm64).
          image: ghcr.io/mitchross/pvc-plumber:4.0.0-permissive-rc6@sha256:49f43df81fd43fd190f7c0308ebae7b3384bc2d501f68f0a4a5e05762147dd38
          imagePullPolicy: IfNotPresent
          command: ["/pvc-plumber"]
          args:
            # Required to enable the controller-runtime manager (the v3.x
            # rollout gate; legacy HTTP path is still present in the
            # binary). Audit gating lives BELOW this flag — see env vars.
            - --leader-elect=false
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
          env:
            # Phase 6 permissive dry-run: the binary is in permissive
            # mode but the cluster has zero write-eligible PVCs (no PVC
            # currently carries BOTH pvc-plumber.io/enabled="true" AND
            # pvc-plumber.io/manage-volsync="true"). Verdict for every
            # PVC remains skipped-not-opted-in, skipped-exempt, or
            # already-matches; planned_ops stays empty, executor never
            # fires. Karakeep canary is the next gate after this dry
            # run is verified — see docs/pvc-plumber-v4-cutover.md §10.
            # Enforce/strict are still rejected at startup (Phase 8).
            - name: PVC_PLUMBER_MODE
              value: "permissive"
            # Enable the operator code path (manager + reconciler).
            # Without this, the binary stays in legacy HTTP-only mode.
            - name: OPERATOR_MODE
              value: "true"
            # Tighten log level for the audit rollout; v4 emits a lot of
            # "would-write" entries that are useful for observability but
            # noisy at DEBUG.
            - name: LOG_LEVEL
              value: "info"
            # Backend env vars are INERT under any v4-routed mode.
            # Patch 6.7-wire's needsBackend(mode) returns false for
            # audit and permissive, so cmd/operator/main.go skips
            # buildBackend and the legacy HTTP server entirely. These
            # values stay in the manifest only to ease a future rollback
            # to a hypothetical v3 chart-era binary; remove once that
            # rollback path is no longer a real option.
            - name: BACKEND_TYPE
              value: "s3"
            - name: KOPIA_S3_ENDPOINT
              value: "192.168.10.133:30292"
            - name: KOPIA_S3_BUCKET
              value: "volsync-kopia"
            - name: KOPIA_S3_DISABLE_TLS
              value: "true"
            # v4 builder/executor defaults — consumed by the v4
            # reconciler when it renders RS/RD specs (Patch 6.5+
            # builder.Inputs.Default*). Required when
            # PVC_PLUMBER_MODE=permissive (RequireV4WriteDefaults in
            # cmd/operator/main.go errors at startup if any are unset
            # or if UID/GID/FSGroup are zero); optional in audit mode
            # but pre-staged here so flipping to permissive becomes a
            # one-line env change rather than a multi-field shuffle.
            # Values match the talos cluster's 568:568:568 +
            # longhorn-snapclass + longhorn convention used by every
            # current inline RS/RD pattern in my-apps/**.
            - name: PVC_PLUMBER_DEFAULT_SNAPSHOT_CLASS
              value: "longhorn-snapclass"
            - name: PVC_PLUMBER_DEFAULT_CACHE_CAPACITY
              value: "2Gi"
            - name: PVC_PLUMBER_DEFAULT_STORAGE_CLASS
              value: "longhorn"
            - name: PVC_PLUMBER_DEFAULT_UID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_GID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_FSGROUP
              value: "568"
            # Pod metadata for log correlation.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: probes
              containerPort: 8082
              protocol: TCP
            # rc3+: audit HTTP server bound to cfg.Port (defaults to 8080,
            # PORT env intentionally unset). Serves /audit (parity report
            # JSON), plus inline /healthz and /readyz for symmetry with
            # the legacy port. Kubelet probes intentionally still target
            # `probes` (controller-runtime manager) — this port is for
            # clients that consume the parity report.
            - name: audit-http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # /tmp is needed by Go's default temp directory and by
            # readOnlyRootFilesystem deployments generally. Keep it
            # ephemeral; the operator has no persistent state.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      # Schedule on any node — operator is cheap, no GPU/special hardware.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
