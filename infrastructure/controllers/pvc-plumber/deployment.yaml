---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-checker
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
    spec:
      serviceAccountName: pvc-plumber
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: pvc-plumber
            topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pvc-plumber
        # Forward-reference: v2 operator image (webhook + reconciler). Renovate
        # will track this once the tag exists on ghcr.io. Phase 4 of the
        # migration plan (docs/plans/pvc-plumber-operator-design.md) covers
        # the cutover from the v1 HTTP-only image.
        image: ghcr.io/mitchross/pvc-plumber:2.1.0
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: webhook
          containerPort: 9443
          protocol: TCP
        env:
        - name: BACKEND_TYPE
          value: "kopia-fs"
        - name: KOPIA_REPOSITORY_PATH
          value: "/repository"
        - name: LOG_LEVEL
          value: "info"
        - name: CACHE_TTL
          value: "5m"
        - name: HTTP_TIMEOUT
          value: "7s"
        - name: RE_WARM_INTERVAL
          value: "90s"
        - name: KOPIA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pvc-plumber-kopia
              key: KOPIA_PASSWORD
        - name: KOPIA_CONFIG_PATH
          value: "/tmp/kopia/config/repository.config"
        - name: KOPIA_LOG_DIR
          value: "/tmp/kopia/logs"
        - name: KOPIA_CACHE_DIRECTORY
          value: "/tmp/kopia/cache"
        - name: HOME
          value: "/tmp"
        - name: USER
          value: "plumber"
        # Operator-mode configuration. The v2 binary uses these to enable the
        # controller-runtime manager + admission webhooks alongside the
        # existing /exists HTTP server.
        - name: OPERATOR_MODE
          value: "true"
        - name: NFS_SERVER
          value: "192.168.10.133"
        - name: NFS_PATH
          value: "/mnt/BigTank/k8s/volsync-kopia-nfs"
        # Namespaces the operator must NOT touch when reconciling/mutating.
        # Mirrors the webhook namespaceSelector exclusion list (see
        # webhooks.yaml). Kept in sync to make sure reconciler and admission
        # paths agree on what is "infrastructure".
        - name: SYSTEM_NAMESPACES
          value: "kube-system,volsync-system,kyverno,argocd,longhorn-system,snapshot-controller,cert-manager,external-secrets,1passwordconnect"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: repository
          mountPath: /repository
          readOnly: false
        - name: kopia-tmp
          mountPath: /tmp/kopia
        # controller-runtime default location for webhook serving cert.
        # Populated by cert-manager via the pvc-plumber-webhook-tls secret
        # (see certificate.yaml).
        - name: webhook-tls
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: repository
        nfs:
          server: 192.168.10.133
          path: /mnt/BigTank/k8s/volsync-kopia-nfs
      - name: kopia-tmp
        emptyDir: {}
      - name: webhook-tls
        secret:
          secretName: pvc-plumber-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pvc-plumber
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: webhook
    port: 9443
    targetPort: webhook
    protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
