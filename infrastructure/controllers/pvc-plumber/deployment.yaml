---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-checker
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
    spec:
      serviceAccountName: pvc-plumber
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: pvc-plumber
            topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pvc-plumber
        # v3.0.0 — kopia repo on RustFS S3, JobMutator removed.
        # See pvc-plumber CHANGELOG `[3.0.0]` for the cutover details.
        # Pre-3.0.0 images use the legacy kopia-fs backend with an NFS
        # `/repository` mount; do NOT roll back to those without also
        # restoring the NFS volume + mount + NFS env vars below.
        image: ghcr.io/mitchross/pvc-plumber:3.0.0
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: webhook
          containerPort: 9443
          protocol: TCP
        env:
        - name: BACKEND_TYPE
          value: "kopia-s3"
        - name: KOPIA_S3_ENDPOINT
          # kopia's S3 backend rejects fully-qualified URLs ("Endpoint url
          # cannot have fully qualified paths") — pass bare host:port and
          # let KOPIA_S3_DISABLE_TLS below select HTTP. CNPG Barman uses
          # the http:// scheme on the same endpoint because barman-cloud
          # parses URLs differently; do not unify them.
          value: "192.168.10.133:30293"
        - name: KOPIA_S3_BUCKET
          value: "volsync-kopia"
        - name: KOPIA_S3_DISABLE_TLS
          # In-cluster RustFS over plaintext HTTP (same shape CNPG Barman
          # uses against the same endpoint). Flip to "false" if the cluster
          # ever fronts RustFS with TLS termination.
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        - name: CACHE_TTL
          value: "5m"
        - name: HTTP_TIMEOUT
          value: "7s"
        - name: RE_WARM_INTERVAL
          value: "90s"
        # Kopia repo password + S3 admin keys all come from the same
        # `pvc-plumber-kopia` Secret rendered by ExternalSecret (see
        # externalsecret.yaml). Mover Jobs use the same credential names —
        # the Secret here and the per-PVC `volsync-<pvc>` Secret the
        # reconciler creates carry identical keys.
        - name: KOPIA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pvc-plumber-kopia
              key: KOPIA_PASSWORD
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: pvc-plumber-kopia
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pvc-plumber-kopia
              key: AWS_SECRET_ACCESS_KEY
        - name: KOPIA_CONFIG_PATH
          value: "/tmp/kopia/config/repository.config"
        - name: KOPIA_LOG_DIR
          value: "/tmp/kopia/logs"
        - name: KOPIA_CACHE_DIRECTORY
          value: "/tmp/kopia/cache"
        - name: HOME
          value: "/tmp"
        - name: USER
          value: "plumber"
        # Operator-mode configuration. The v3 binary uses these to enable the
        # controller-runtime manager + admission webhooks alongside the
        # existing /exists HTTP server.
        - name: OPERATOR_MODE
          value: "true"
        # Namespaces the operator must NOT touch when reconciling/mutating.
        # Mirrors the webhook namespaceSelector exclusion list (see
        # webhooks.yaml). Kept in sync to make sure reconciler and admission
        # paths agree on what is "infrastructure".
        - name: SYSTEM_NAMESPACES
          value: "kube-system,volsync-system,kyverno,argocd,longhorn-system,snapshot-controller,cert-manager,external-secrets,1passwordconnect"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: kopia-tmp
          mountPath: /tmp/kopia
        # controller-runtime default location for webhook serving cert.
        # Populated by cert-manager via the pvc-plumber-webhook-tls secret
        # (see certificate.yaml).
        - name: webhook-tls
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: kopia-tmp
        emptyDir: {}
      - name: webhook-tls
        secret:
          secretName: pvc-plumber-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pvc-plumber
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: webhook
    port: 9443
    targetPort: webhook
    protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pvc-plumber
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
