---
# Operator's own kopia/S3 credential bundle.
#
# Pre-v3.0.0 this rendered KOPIA_PASSWORD only — the operator pod read the
# Kopia repo from a filesystem mount and didn't need S3 creds. v3.0.0
# switched the operator to S3 (see deployment.yaml) so the same Secret now
# also carries AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY pulled from the
# same `rustfs` 1Password item.
#
# The three keys here MUST line up with the per-PVC `volsync-<pvc>` Secret
# the reconciler renders for VolSync mover Jobs — same key names, same
# 1Password property mappings — so secret material has a single source of
# truth across operator pod and mover Jobs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pvc-plumber-kopia
  namespace: volsync-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  # 1m, not 1h: bounds the worst-case wait between an ArgoCD apply and ESO
  # observing the new spec. The new ExternalSecret health check in
  # infrastructure/controllers/argocd/values.yaml gates on
  # status.syncedResourceVersion matching metadata.generation — ESO normally
  # writes this within a second of a spec change via the controller-runtime
  # informer, so refreshInterval is mostly irrelevant for the spec-change
  # case. But during ESO controller restarts or backoff loops, refreshInterval
  # is the floor on how long the new generation takes to be observed.
  # Tightening it means the cluster recovers faster after ESO incidents.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: pvc-plumber-kopia
    creationPolicy: Owner
  data:
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: rustfs
        property: kopia_password
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: rustfs
        property: pvc-plumber-access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: rustfs
        property: pvc-plumber-secret-key
