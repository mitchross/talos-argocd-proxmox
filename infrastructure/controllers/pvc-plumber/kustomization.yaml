# pvc-plumber v4 — audit-mode kustomization.
#
# Phase 3 of docs/pvc-plumber-v4-prd.md. Deployed by the Argo Application at
# ../argocd/apps/core-dependencies/pvc-plumber-app.yaml (sync wave 2).
#
# Resources in deliberate order:
#   1. Namespace (must exist first; pod-security restricted)
#   2. ServiceAccount + RBAC (least-privilege read-only)
#   3. Deployment (single replica, audit env, no webhook server)
#   4. Service + ServiceMonitor (controller-runtime metrics)
#   5. PrometheusRule (minimal pod-down alerts)
#
# NOT included:
#   - MutatingWebhookConfiguration  (no admission gate in audit)
#   - ValidatingWebhookConfiguration
#   - cert-manager Certificate or webhook TLS Secret
#   - PodDisruptionBudget (single-replica audit)
#
# These come back in later phases (Phase 8 — webhook deployment), tracked
# in the PRD.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - rbac-adopt.yaml
  - rbac-volsync-writer.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
