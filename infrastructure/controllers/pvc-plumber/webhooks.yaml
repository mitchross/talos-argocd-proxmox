---
# Webhook configurations for pvc-plumber v2 (operator mode).
#
# CRITICAL — Webhook Deadlock Prevention (see infrastructure/controllers/kyverno/CLAUDE.md):
# Infrastructure namespaces MUST be excluded from `namespaceSelector`. If
# pvc-plumber crashes while these webhooks are registered with
# failurePolicy=Fail, every PVC CREATE in the cluster would be rejected,
# preventing storage controllers (longhorn-system, snapshot-controller),
# secrets (external-secrets, 1passwordconnect, cert-manager), and GitOps
# (argocd) from booting — full cluster deadlock.
#
# This is the SAME exclusion list Kyverno uses
# (infrastructure/controllers/kyverno/values.yaml), with `kyverno` itself
# included explicitly because pvc-plumber has no `excludeKyvernoNamespace`
# equivalent.
#
# 2026-04-08 incident: a Kyverno crash with the same webhook-failurePolicy=Fail
# configuration caused full cluster deadlock. Do not deviate from this list.
#
# Blast-radius scoping — the PVC webhooks (mutate-pvc, validate-pvc) carry an
# `objectSelector` matching `backup in (hourly, daily)`. This restores the
# scoping the Kyverno volsync-pvc-backup-restore policy had via its `match`
# selector. Without it, a pvc-plumber outage with failurePolicy=Fail would
# block ALL PVC creation in app namespaces, far wider than the Kyverno setup
# ever was. The operator code already short-circuits unlabeled PVCs to
# Allowed, but matching at the apiserver level means kube-apiserver doesn't
# even consult pvc-plumber for unlabeled PVCs.
# The mutate-job webhook keeps its own selector
# (app.kubernetes.io/created-by=volsync) — leave that alone.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/inject-ca-from: volsync-system/pvc-plumber-webhook-tls
webhooks:
  - name: mutate-pvc.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /mutate-v1-pvc
        port: 9443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["persistentvolumeclaims"]
        operations: ["CREATE"]
    objectSelector:
      matchExpressions:
        - key: backup
          operator: In
          values: ["hourly", "daily"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10

  - name: mutate-job.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /mutate-batch-v1-job
        port: 9443
    rules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        resources: ["jobs"]
        operations: ["CREATE"]
    objectSelector:
      matchLabels:
        app.kubernetes.io/created-by: volsync
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    # Ignore: NFS inject failure means a single backup mover Job runs without
    # its repository volume and fails — backup retries, cluster keeps moving.
    # Not worth deadlocking admission for this.
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/inject-ca-from: volsync-system/pvc-plumber-webhook-tls
webhooks:
  - name: validate-pvc.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /validate-v1-pvc
        port: 9443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["persistentvolumeclaims"]
        operations: ["CREATE"]
    # See blast-radius comment on the MutatingWebhookConfiguration above.
    # Only backup-labeled PVCs are gated by pvc-plumber.
    objectSelector:
      matchExpressions:
        - key: backup
          operator: In
          values: ["hourly", "daily"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
