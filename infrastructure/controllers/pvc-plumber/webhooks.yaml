---
# Webhook configurations for pvc-plumber v2 (operator mode).
#
# CRITICAL — Webhook Deadlock Prevention.
# Infrastructure namespaces MUST be excluded from `namespaceSelector`. If
# pvc-plumber crashes while these webhooks are registered with
# failurePolicy=Fail, every PVC CREATE in the cluster would be rejected,
# preventing storage controllers (longhorn-system, snapshot-controller),
# secrets (external-secrets, 1passwordconnect, cert-manager), and GitOps
# (argocd) from booting — full cluster deadlock.
#
# 2026-04-08 incident: a Kyverno crash with the same webhook-failurePolicy=Fail
# configuration caused full cluster deadlock. The `kyverno` namespace stays
# in this list as a defensive forward-compatibility marker — Kyverno itself
# was removed from this cluster on 2026-05-07, but if it ever returns the
# exclusion is already in place.
#
# This list is also mirrored verbatim into the Deployment's SYSTEM_NAMESPACES
# env var so the reconciler and admission paths agree on what is
# infrastructure. Keep them in sync.
#
# Blast-radius scoping — the PVC webhooks (mutate-pvc, validate-pvc) carry an
# `objectSelector` matching `backup in (hourly, daily)`. This restores the
# scoping the Kyverno volsync-pvc-backup-restore policy had via its `match`
# selector. Without it, a pvc-plumber outage with failurePolicy=Fail would
# block ALL PVC creation in app namespaces, far wider than the Kyverno setup
# ever was. The operator code already short-circuits unlabeled PVCs to
# Allowed, but matching at the apiserver level means kube-apiserver doesn't
# even consult pvc-plumber for unlabeled PVCs.
# The mutate-job webhook keeps its own selector
# (app.kubernetes.io/created-by=volsync) — leave that alone.
#
# The ValidatingWebhookConfiguration carries TWO entries
# (validate-pvc + validate-pvc-exempt) so admission fires for both the
# backup-labeled path and the backup-exempt path. See the comment block
# above validate-pvc-exempt for the full rationale.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/inject-ca-from: volsync-system/pvc-plumber-webhook-tls
webhooks:
  - name: mutate-pvc.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /mutate-v1-pvc
        port: 9443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["persistentvolumeclaims"]
        operations: ["CREATE"]
    objectSelector:
      matchExpressions:
        - key: backup
          operator: In
          values: ["hourly", "daily"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10

  - name: mutate-job.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /mutate-batch-v1-job
        port: 9443
    rules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        resources: ["jobs"]
        operations: ["CREATE"]
    # EMERGENCY DISABLED 2026-05-08 — pvc-plumber/issues/TBD.
    #
    # The JobMutator approach (admission-time inject /repository NFS mount
    # into VolSync mover Jobs) is incompatible with the perfectra1n/volsync
    # fork's `CreateOrUpdateDeleteOnImmutableErr` reconciler. VolSync
    # computes a "desired" Job spec WITHOUT the injected volume, sees the
    # actual Job spec HAS it, tries to update (fails — Jobs immutable),
    # then deletes + recreates. The recreate goes through admission again,
    # gets the volume injected, drift detected, delete+recreate. Tight
    # loop: 68 immutable errors / 30s, 7 RSes simultaneously thrashing,
    # control-plane CPU 58–68%. v2.1.1 cutover (2026-05-08 02:14 UTC)
    # uncovered this — the v2.1.0 image was the v1 binary which never ran
    # webhooks, so the JobMutator was dormant in production until v2.1.1
    # made the webhook server actually start serving.
    #
    # never-match objectSelector below disables the webhook without
    # deleting it, so cluster-wide ArgoCD sync stays clean. Re-enable
    # by removing this objectSelector once pvc-plumber's Job-mutation
    # approach is replaced with `spec.kopia.moverConfig.volumes` on the
    # ReplicationSource (VolSync's own volume mounting, no admission-time
    # mutation, no drift loop).
    objectSelector:
      matchLabels:
        pvc-plumber.io/emergency-disabled: "2026-05-08"
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    # Ignore: NFS inject failure means a single backup mover Job runs without
    # its repository volume and fails — backup retries, cluster keeps moving.
    # Not worth deadlocking admission for this.
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/inject-ca-from: volsync-system/pvc-plumber-webhook-tls
webhooks:
  - name: validate-pvc.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /validate-v1-pvc
        port: 9443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["persistentvolumeclaims"]
        operations: ["CREATE"]
    # See blast-radius comment on the MutatingWebhookConfiguration above.
    # Only backup-labeled PVCs are gated by pvc-plumber.
    objectSelector:
      matchExpressions:
        - key: backup
          operator: In
          values: ["hourly", "daily"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10

  # Second entry — sole reason it exists: Kubernetes LabelSelector
  # matchExpressions AND together; there is no OR. To enforce the
  # `backup-exempt: "true"` contract (introduced in pvc-plumber v2.1) at
  # admission time, we need a selector that fires on PVCs carrying ONLY
  # `backup-exempt=true` and no `backup` label — those PVCs would not match
  # the validate-pvc entry above and the validator would never run, so the
  # required `storage.vanillax.dev/backup-exempt-reason` annotation could
  # not be enforced.
  #
  # Both entries route to the same handler path (/validate-v1-pvc). The
  # operator's pvc_validate.go checks the exempt label first (denies if
  # missing reason) and falls through to the backup-label path otherwise,
  # so a single handler safely serves both selectors. The deadlock-prevention
  # namespaceSelector exclusion is preserved here too — exempt PVCs in
  # infrastructure namespaces are NOT subject to admission gating, just like
  # backup-labeled ones.
  #
  # failurePolicy asymmetry — IMPORTANT.
  # validate-pvc above uses `Fail` (data-safety contract: a backup-labeled
  # PVC that bypasses the validator could initialize empty over a real
  # backup → silent data loss).
  # validate-pvc-exempt uses `Ignore` (audit contract: an exempt PVC that
  # slips through without a reason annotation is a housekeeping miss, not
  # a data-loss risk). Using `Fail` here would silently widen the outage
  # blast radius vs. v2 — operator outage would block exempt PVCs too,
  # not just backup-labeled ones. The operator still enforces the reason
  # contract as defense-in-depth in pvc_validate.go; this webhook is the
  # admission-time enforcement layer for the steady-state path.
  #
  # No parallel split on the mutating webhook: mutate-pvc only injects
  # dataSourceRef on the restore path. An exempt PVC has no mutation to
  # perform, so calling the mutator just to short-circuit to Allowed is
  # wasted apiserver→pvc-plumber traffic. Validate splits, mutate doesn't.
  - name: validate-pvc-exempt.pvc-plumber.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: pvc-plumber
        namespace: volsync-system
        path: /validate-v1-pvc
        port: 9443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["persistentvolumeclaims"]
        operations: ["CREATE"]
    objectSelector:
      matchExpressions:
        - key: backup-exempt
          operator: In
          values: ["true"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - volsync-system
            - kyverno
            - argocd
            - longhorn-system
            - snapshot-controller
            - cert-manager
            - external-secrets
            - 1passwordconnect
    # Audit contract, not data-safety contract — preserves v2 blast radius
    # (only backup-labeled PVCs blocked on operator outage). See comment
    # block above for the full asymmetry rationale.
    failurePolicy: Ignore
    sideEffects: None
    timeoutSeconds: 10
