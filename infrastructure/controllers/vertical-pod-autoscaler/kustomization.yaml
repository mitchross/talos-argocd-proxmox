apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vertical-pod-autoscaler

resources:
  - namespace.yaml

helmCharts:
  - name: vertical-pod-autoscaler
    repo: https://kubernetes.github.io/autoscaler
    # renovate: datasource=helm depName=vertical-pod-autoscaler registryUrl=https://kubernetes.github.io/autoscaler
    version: 0.10.0
    releaseName: vpa
    namespace: vertical-pod-autoscaler
    includeCRDs: true
    valuesFile: values.yaml
