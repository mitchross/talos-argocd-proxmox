# Active VPA install: recommender + updater + admission controller.
#
# In-place resize path: k8s 1.36 has InPlacePodVerticalScaling GA and VPA 1.7
# ships InPlaceOrRecreate GA (the VPA feature gate was removed in 1.7 — do NOT
# pass --feature-gates=InPlaceOrRecreate, it's an unknown flag now). Per-workload
# Co-located vpa.yaml files and infrastructure/controllers/vpa-system-policies/
# opt in with updateMode: InPlaceOrRecreate; the updater resizes pods without
# restart and only falls back to eviction when the kubelet cannot satisfy it.
#
# Webhook cert is cert-manager-managed (chart creates a self-signed Issuer → CA
# → webhook Certificate, cainjector fills the webhook caBundle). certGen is the
# alternative and is a hook-style Job — broken under ArgoCD, keep it off.
#
# All components run 1 replica with PDBs off: a minAvailable:1 PDB on a
# single-replica deployment blocks Talos node drains forever.

admissionController:
  enabled: true
  replicas: 1
  podDisruptionBudget:
    enabled: false
  certGen:
    enabled: false
  certManager:
    enabled: true
    createSelfSignedIssuer:
      enabled: true
  # failurePolicy stays Ignore (chart default): if the admission controller is
  # down, pods still schedule with their git-declared requests instead of
  # deadlocking the whole cluster on one webhook.
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi

updater:
  enabled: true
  replicas: 1
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi

recommender:
  enabled: true
  replicas: 1
  podDisruptionBudget:
    enabled: false
  # Default recommendation floors are 25m/250Mi PER CONTAINER. With ~80 mostly
  # tiny single-replica apps that floor alone manufactured ~10Gi of phantom
  # memory requests and pushed the worker node to 107% requested on 73% real
  # usage — pods went Pending cluster-wide (2026-07-15). Keep these floors low.
  extraArgs:
    - --pod-recommendation-min-memory-mb=64
    - --pod-recommendation-min-cpu-millicores=15
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
