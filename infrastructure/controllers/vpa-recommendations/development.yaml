---
# posthog app tier — RequestsOnly keeps the hand-set memory limits as OOM guards
# (worker 20Gi, web 12Gi); VPA owns the requests. replicas:0 deployments
# (livestream, cymbal, cyclotron-janitor, toolbox) excluded — no samples, strands the VPA.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: posthog-worker
  namespace: posthog
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 16Gi
