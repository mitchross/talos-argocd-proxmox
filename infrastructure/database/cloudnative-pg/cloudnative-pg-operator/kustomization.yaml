apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: cloudnative-pg
      app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-10"
resources:
  - namespace.yaml
  - clusterrole-full-rbac.yaml
  - clusterrolebinding-full-rbac.yaml
  - cnpg-backup-cleanup.yaml

# clusters.postgresql.cnpg.io and poolers.postgresql.cnpg.io render at
# 450KB and 650KB respectively — far over the 256KB k8s annotation
# limit. Even with global ServerSideApply=true on the Application,
# ArgoCD has been falling back to client-side apply for these CRDs and
# failing with "metadata.annotations: Too long". Per-resource
# sync-options annotation forces SSA reliably.
patches:
  - target:
      kind: CustomResourceDefinition
      name: clusters.postgresql.cnpg.io
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: ServerSideApply=true,Replace=true
  - target:
      kind: CustomResourceDefinition
      name: poolers.postgresql.cnpg.io
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: ServerSideApply=true,Replace=true
helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.28.0
    releaseName: cloudnative-pg-operator
    namespace: cloudnative-pg
    includeCRDs: true
    valuesInline:
      config:
        # Enable job cleanup and set retention policies
        data:
          ENABLE_AZURE_PVC_UPDATES: "false"
          INHERITED_ANNOTATIONS: "argocd.argoproj.io/sync-wave"
          INHERITED_LABELS: "app.kubernetes.io/managed-by"
          # Configure job TTL and cleanup
          JOB_TTL_SECONDS_AFTER_FINISHED: "3600" # Clean up completed jobs after 1 hour
          FAILED_JOB_TTL_SECONDS_AFTER_FINISHED: "7200" # Clean up failed jobs after 2 hours 
