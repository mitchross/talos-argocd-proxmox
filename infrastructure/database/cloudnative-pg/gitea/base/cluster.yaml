# Base CNPG Cluster manifest — NO bootstrap stanza.
# Overlays (overlays/initdb, overlays/recovery) supply the bootstrap
# via strategic-merge patch.
#
# backup.barmanObjectStore.serverName = FORWARD write target (new lineage).
# On fresh-nuke recovery, set this to the NEXT lineage so post-restore
# backups don't append to the polluted current-lineage directory on S3.
# Bump this whenever you trigger a new recovery — keep in sync with the
# recovery overlay's externalClusters (which points at the PRIOR lineage).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
  labels:
    app: gitea
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 10Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      # Write target. Clean-slate baseline after 2026-04-19 wipe of
      # s3://postgres-backups/cnpg/gitea/*. Next DR event will bump
      # this to v2 (and recovery overlay will restore FROM v1).
      serverName: gitea-database-v1
      destinationPath: s3://postgres-backups/cnpg/gitea
      endpointURL: http://192.168.10.133:30293
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
