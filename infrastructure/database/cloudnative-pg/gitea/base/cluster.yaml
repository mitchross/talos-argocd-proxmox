# Base CNPG Cluster manifest — NO bootstrap stanza.
# Overlays (overlays/initdb, overlays/recovery) supply the bootstrap
# via strategic-merge patch.
#
# serverName encodes the FORWARD write target (current lineage). On
# fresh-nuke recovery, set this to the NEXT lineage so post-restore
# backups don't append to the polluted current-lineage directory on S3.
# Bump this whenever you trigger a new recovery — keep in sync with the
# recovery overlay's externalClusters (which points at the PRIOR lineage).
#
# Plugin-mode backup config (replaces deprecated spec.backup.barmanObjectStore;
# removed in CNPG 1.30.0). The S3 destination + retention live on a sibling
# ObjectStore CR (base/objectstore.yaml). Migration plan:
# docs/plans/cnpg-plugin-migration.md.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
  labels:
    app: gitea
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      # Designates this Cluster as the active WAL writer for the referenced
      # ObjectStore. Keep at most one Cluster per ObjectStore as
      # isWALArchiver=true.
      isWALArchiver: true
      parameters:
        # Name of the sibling ObjectStore CR (see base/objectstore.yaml).
        barmanObjectName: gitea-objectstore
        # v3 lineage opened 2026-06-02 after the full-cluster nuke. The rebuild
        # brought gitea-database up empty on overlays/initdb while still pointed
        # at v2, so the empty cluster ran on the v2 lineage that holds the GOOD
        # pre-nuke base backups (daily through 2026-06-01T04:00:01). This
        # recovery restores FROM v2 (PITR to just before the 12:46 nuke) and
        # writes forward to a CLEAN v3 so post-restore backups never append to
        # the v2 source. (v1 is empty/superseded.)
        # DO NOT change this value without bumping lineage in lockstep.
        serverName: gitea-database-v3
