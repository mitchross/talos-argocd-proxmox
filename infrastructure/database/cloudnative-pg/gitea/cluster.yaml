apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
  namespace: cloudnative-pg
  labels:
    app: gitea
  annotations:
    # Enables dual-bootstrap (initdb + recovery) for DR. Without this the CNPG
    # validation webhook rejects any manifest with both bootstrap methods set.
    # The reconciler prefers recovery when both are present (verified in lab
    # Test 0.1 — see docs/plans/cnpg-dr-implementation-plan.md). DR state
    # lives in lineage.yaml next to this file.
    cnpg.io/validation: disabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  # Steady-state bootstrap. During DR, scripts/dr/restore-one.sh generates
  # an ephemeral manifest that adds bootstrap.recovery + externalClusters
  # on top of this; the validation annotation lets it through.
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      secret:
        name: gitea-app-secret
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 10Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      # Keep in sync with lineage.yaml .currentServerName
      serverName: gitea-database-v3
      destinationPath: s3://postgres-backups/cnpg/gitea
      endpointURL: http://192.168.10.133:30293
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
