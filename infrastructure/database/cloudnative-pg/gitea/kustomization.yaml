# gitea CNPG database — root kustomization
#
# DR FEATURE FLAG: change the active overlay on this line to switch
# bootstrap mode. Everything else is in Git.
#
#   overlays/initdb   = fresh DB, no data restored
#   overlays/recovery = restore from Barman S3 (see overlay for source + PITR)
#
# In-place DR also requires:
#   kubectl delete cluster gitea-database -n cloudnative-pg
#   kubectl delete pvc -n cloudnative-pg -l cnpg.io/cluster=gitea-database
# ...because CNPG evaluates spec.bootstrap only at Cluster creation and
# leaves PVCs behind on cluster delete.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: gitea-db
      app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  # - overlays/recovery      # DR-only: restore gitea DB FROM v9 → write v10.
                             # Before a planned nuke, bump base serverName and
                             # set this overlay's source, then re-enable.
  - overlays/initdb          # ← ACTIVE (steady state; recovery completed
                             # 2026-06-28). bootstrap.initdb is a no-op on the
                             # existing cluster; writes forward to base v10.
  - externalsecret.yaml
  - scheduled-backup.yaml
