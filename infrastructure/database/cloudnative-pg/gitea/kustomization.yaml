# gitea CNPG database — root kustomization
#
# DR FEATURE FLAG: change the active overlay on this line to switch
# bootstrap mode. Everything else is in Git.
#
#   overlays/initdb   = fresh DB, no data restored
#   overlays/recovery = restore from Barman S3 (see overlay for source + PITR)
#
# In-place DR also requires:
#   kubectl delete cluster gitea-database -n cloudnative-pg
#   kubectl delete pvc -n cloudnative-pg -l cnpg.io/cluster=gitea-database
# ...because CNPG evaluates spec.bootstrap only at Cluster creation and
# leaves PVCs behind on cluster delete.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
commonLabels:
  app.kubernetes.io/name: gitea-db
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  - overlays/recovery        # ← ACTIVE: restore gitea DB FROM v9 (current data,
                             # pre-nuke). Writes forward to v10 (clean, unused
                             # prefix) to pass barman-cloud-check-wal-archive.
  # - overlays/initdb        # fresh empty DB (1 admin, 0 repos). Was active
                             # while v5 was (wrongly) assumed unrestorable.
  - externalsecret.yaml
  - scheduled-backup.yaml
