# CNPG DR lineage tracker for gitea.
# Single source of truth for DR state. The only file that changes during a
# restore operation. Keep cluster.yaml in steady-state initdb mode; scripts
# in scripts/dr/ read this file to render the ephemeral recovery manifest.
#
# See docs/plans/cnpg-dr-implementation-plan.md for full design.

db: gitea
clusterName: gitea-database
namespace: cloudnative-pg

# Current backup write target — all new base backups + WAL archive go here.
# Must match cluster.yaml .spec.backup.barmanObjectStore.serverName.
currentServerName: gitea-database-v3

# Source to restore FROM on next DR. Typically the lineage that was current
# just before the nuke. For a fresh-nuke scenario where post-nuke empty
# backups have polluted the current lineage, pair this with a pre-nuke
# restoreTarget (PITR) to land on good data.
restoreFromServerName: gitea-database-v3

# PITR target: 'latest' (end-of-WAL) or RFC3339 timestamp.
# Initial value here is BEFORE the 2026-04-17 cluster nuke, so CNPG picks
# the last pre-nuke base + replays WALs to that point. After first restore,
# lineage-bump.sh resets this to 'latest' for future DR events.
restoreTarget: "2026-04-16T23:59:59Z"

# 'true' = fresh DB, skip restore, just let initdb run.
# 'false' = restore from Barman.
firstBoot: false

# Populated by lineage-bump.sh on successful restore.
lastRestored: null
