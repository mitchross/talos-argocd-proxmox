apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
spec:
  bootstrap:
    recovery:
      source: gitea-recovery-source
      database: gitea
      owner: gitea
      secret:
        name: gitea-app-secret
      # No recoveryTarget → restore to latest-WAL available on S3.
      # Our pre-nuke PITR target (2026-04-16T23:59:59Z) was unreachable —
      # Barman WAL archiving appears to have stopped archiving before
      # that timestamp for all DBs. Restoring to latest-WAL gets us
      # whatever data was archived, which is still better than nothing.
  externalClusters:
    - name: gitea-recovery-source
      barmanObjectStore:
        # Prior lineage to restore from. Keep this at N-1 when bumping
        # base/cluster.yaml to vN. E.g. first DR: base → v2, this → v1.
        serverName: gitea-database-v1
        destinationPath: s3://postgres-backups/cnpg/gitea
        endpointURL: http://192.168.10.133:30293
        s3Credentials:
          accessKeyId:
            name: cnpg-s3-credentials
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
        wal:
          compression: gzip
