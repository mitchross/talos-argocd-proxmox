apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
spec:
  bootstrap:
    recovery:
      source: gitea-recovery-source
      database: gitea
      owner: gitea
      secret:
        name: gitea-app-secret
      # Restore-to-LATEST (no recoveryTarget): v5 was cleanly superseded by the
      # 2026-06-12 rebuild (which opened v6), so v5's WAL (files 003→010) is all
      # from the v5 cluster — there is no post-nuke garbage to stop short of.
      # The previous 2026-06-01 targetTime was STALE: it predates the v5 base
      # backup (2026-06-12T16:45) and would FATAL "target before backup".
      # Removed 2026-06-21.
  # Plugin-shape externalClusters (replaces the deprecated in-tree
  # barmanObjectStore field on externalClusters[]; removed in CNPG 1.30.0).
  # Reuses the prod ObjectStore CR (base/objectstore.yaml) — the only thing
  # that differs from the prod path is the serverName, which selects the
  # PRIOR lineage subtree on the same RustFS bucket. Migration plan:
  # docs/plans/cnpg-plugin-migration.md.
  externalClusters:
    - name: gitea-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          # Reuse the prod ObjectStore (same bucket, same creds, same
          # endpoint). Only serverName changes between live writes and
          # recovery reads.
          barmanObjectName: gitea-objectstore
          # Recover FROM v3 — VERIFIED 2026-06-21 by comparing pg_control system
          # ids: v3's latest base (20260610T040001) and its begin_wal share
          # system id 7647132232567279645 = CONSISTENT (a stable cluster ran
          # June 3-10, 8 daily backups). v5 was REJECTED: polluted WAL (base sys
          # ...755 vs archived WAL sys ...732 from the 2026-06-12 rebuild churn)
          # -> "could not locate required checkpoint record" FATAL. NOTE the
          # backups ARE readable — the "multipart unreadable" RustFS caution is
          # stale for gitea's small single-part objects. base writes forward to v7.
          serverName: gitea-database-v3
