apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
spec:
  bootstrap:
    recovery:
      source: gitea-recovery-source
      # PITR: restore to just before the 2026-04-17 cluster nuke.
      # Remove recoveryTarget entirely to restore to latest-WAL.
      recoveryTarget:
        targetTime: "2026-04-16T23:59:59Z"
  externalClusters:
    - name: gitea-recovery-source
      barmanObjectStore:
        # Prior lineage — where the pre-nuke data lives on S3.
        serverName: gitea-database-v3
        destinationPath: s3://postgres-backups/cnpg/gitea
        endpointURL: http://192.168.10.133:30293
        s3Credentials:
          accessKeyId:
            name: cnpg-s3-credentials
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
        wal:
          compression: gzip
