apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
spec:
  bootstrap:
    recovery:
      source: gitea-recovery-source
      database: gitea
      owner: gitea
      secret:
        name: gitea-app-secret
      # PITR to 2026-06-19 12:00 UTC. v6 holds the REAL gitea (sys ...755) that
      # ran June 12-19 with data loaded — its backups jumped 29MB->38MB on June
      # 12 evening when the repos were adopted, and stayed 38-39MB through June
      # 19 (last clean base backup 20260619T040001). This session's nuke later
      # started a fresh initdb on the SAME v6 serverName (the 20260621 backup,
      # different system id) which polluted the WAL tail — so replay MUST stop
      # before that. 06-19T12:00 is ~8h after the last good base backup, safely
      # within the ...755 run. (v3 and v5 were both 29MB = pre-data/empty.)
      recoveryTarget:
        targetTime: "2026-06-19T12:00:00Z"
  # Plugin-shape externalClusters (replaces the deprecated in-tree
  # barmanObjectStore field on externalClusters[]; removed in CNPG 1.30.0).
  # Reuses the prod ObjectStore CR (base/objectstore.yaml) — the only thing
  # that differs from the prod path is the serverName, which selects the
  # PRIOR lineage subtree on the same RustFS bucket. Migration plan:
  # docs/plans/cnpg-plugin-migration.md.
  externalClusters:
    - name: gitea-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          # Reuse the prod ObjectStore (same bucket, same creds, same
          # endpoint). Only serverName changes between live writes and
          # recovery reads.
          barmanObjectName: gitea-objectstore
          # Recover FROM v6 — the lineage with the REAL gitea DATA. v6 base
          # backups June 12(19:22)-19 are 38-39MB (sys ...755) vs the 29MB empty
          # pre-data lineages (v3=June3-10, v5=June12 morning). VERIFIED 2026-06-21:
          # v6 backup 20260619T040001 base + its begin_wal (0000000100000006-
          # 000000E4) both = sys 7650550815038537755 -> consistent, RESTORABLE.
          # The recoveryTarget above (06-19T12:00) stops replay before this
          # session's fresh initdb polluted the v6 tail (20260621 backup, diff
          # system). base/cluster.yaml writes forward to v7. (v3 restore gave 0
          # repos because it predates the data load; v5 WAL was cross-system.)
          serverName: gitea-database-v6
