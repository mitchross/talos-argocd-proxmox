apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: gitea-daily-backup
  namespace: cloudnative-pg
spec:
  # CNPG schedule is 6-field cron — first field is SECONDS, not minute.
  # See immich/scheduled-backup.yaml for the gotcha. Daily at 04:00:00
  # (staggered after temporal at 03:00).
  schedule: "0 0 4 * * *"
  backupOwnerReference: self
  cluster:
    name: gitea-database
  immediate: true
