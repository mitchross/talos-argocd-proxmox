apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-app-secret
  namespace: cloudnative-pg
  annotations:
    # The Cluster's initdb bootstrap references this Secret. Argo's custom
    # ExternalSecret health check holds this wave until the provider syncs it.
    argocd.argoproj.io/sync-wave: "-7"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: immich-app-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: postgres-secrets
        property: immich_db_username
    - secretKey: password
      remoteRef:
        key: postgres-secrets
        property: immich_db_password
