apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: khoj-database
spec:
  bootstrap:
    recovery:
      source: khoj-recovery-source
      database: khoj
      owner: khoj_admin
      secret:
        name: khoj-app-secret
      # No recoveryTarget → restore to latest-WAL available on S3.
      # See gitea/overlays/recovery/bootstrap-patch.yaml for rationale.
  externalClusters:
    - name: khoj-recovery-source
      barmanObjectStore:
        # Prior lineage to restore from. Bump to N-1 at DR time.
        serverName: khoj-database-v1
        destinationPath: s3://postgres-backups/cnpg/khoj
        endpointURL: http://192.168.10.133:30293
        s3Credentials:
          accessKeyId:
            name: cnpg-s3-credentials
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
        wal:
          compression: gzip
