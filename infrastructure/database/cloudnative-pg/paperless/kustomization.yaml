# paperless CNPG database — root kustomization
#
# DR FEATURE FLAG — edit the active overlay to switch bootstrap mode.
# See gitea/kustomization.yaml for the full DR runbook comment.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: paperless-db
      app.kubernetes.io/managed-by: argocd
resources:
  # - overlays/recovery      # DR-only: restore from Barman v5 → write v6. Re-enable before a nuke.
  - overlays/initdb          # ← ACTIVE (steady state; recovered 2026-06-28). No-op on existing cluster; writes v6.
  - externalsecret.yaml
  - scheduled-backup.yaml
