# paperless CNPG database — root kustomization
#
# DR FEATURE FLAG — edit the active overlay to switch bootstrap mode.
# See gitea/kustomization.yaml for the full DR runbook comment.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
commonLabels:
  app.kubernetes.io/name: paperless-db
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  - overlays/recovery        # ← ACTIVE: restore from Barman v5 → write v6 (nuke recovery)
  # - overlays/initdb        # fresh DB / normal operation
  - externalsecret.yaml
  - scheduled-backup.yaml
