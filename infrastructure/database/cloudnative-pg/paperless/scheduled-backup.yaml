apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: paperless-daily-backup
  namespace: cloudnative-pg
spec:
  # CNPG schedule is 6-field cron — first field is SECONDS, not minute.
  # See immich/scheduled-backup.yaml for the gotcha. Daily at 05:00:00
  # (staggered last in the 02–05 sequence).
  schedule: "0 0 5 * * *"
  backupOwnerReference: self
  cluster:
    name: paperless-database
  immediate: true
  # Plugin-mode backup. Method: plugin tells CNPG to delegate to the
  # barman-cloud plugin, which uploads to the ObjectStore named in the
  # Cluster's spec.plugins[0].parameters.barmanObjectName.
  # Migration: docs/plans/cnpg-plugin-migration.md.
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
