apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: postgres-global-secrets
      app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-8"
resources:
  - externalsecret.yaml
