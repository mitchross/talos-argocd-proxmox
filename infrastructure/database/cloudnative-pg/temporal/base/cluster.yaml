# Base CNPG Cluster manifest — NO bootstrap stanza. See gitea/base/cluster.yaml
# for serverName bump rationale.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-database
  labels:
    app: temporal
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      # Write target. v2 lineage opened 2026-05-03 after the WAL-PVC-full
      # deadlock incident. The original v1 prefix on RustFS contains
      # 4252 WALs + 292 base backups from 2026-04-19 to 2026-05-01 21:13;
      # when the cluster was recreated on 2026-05-01 21:54 (bootstrap=initdb,
      # same serverName=v1), barman-cloud-check-wal-archive refused to
      # write into the non-empty prefix ("Expected empty archive"), which
      # cascaded into the WAL-volume-full crash loop. Bumping to v2 lets
      # archiving start fresh against an empty prefix. The old v1 prefix
      # is now an abandoned lineage; expiry rule lives in
      # infrastructure/storage/rustfs-lifecycle/postgres-backups-lifecycle-cm.yaml.
      serverName: temporal-database-v2
      destinationPath: s3://postgres-backups/cnpg/temporal
      endpointURL: http://192.168.10.133:30293
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
