apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-database
  namespace: cloudnative-pg
  labels:
    app: temporal
  annotations:
    # Enables dual-bootstrap (initdb + recovery) for DR. See gitea/cluster.yaml.
    cnpg.io/validation: disabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      secret:
        name: temporal-app-secret
      postInitApplicationSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal;
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      # Keep in sync with lineage.yaml .currentServerName
      serverName: temporal-database-v2
      destinationPath: s3://postgres-backups/cnpg/temporal
      endpointURL: http://192.168.10.133:30293
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
