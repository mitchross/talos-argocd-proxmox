# temporal CNPG database — root kustomization
#
# DR FEATURE FLAG — edit the active overlay to switch bootstrap mode.
# See gitea/kustomization.yaml for the full DR runbook comment.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
commonLabels:
  app.kubernetes.io/name: temporal-db
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  - overlays/recovery       # ← ACTIVE: restore from Barman v2, write to v3 (DR drill 2026-05-08)
 # - overlays/initdb        # swap to this for fresh DB (no recovery)
  - externalsecret.yaml
  - scheduled-backup.yaml
