apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: temporal-daily-backup
  namespace: cloudnative-pg
spec:
  # CNPG schedule is 6-field cron — first field is SECONDS, not minute.
  # See immich/scheduled-backup.yaml for the gotcha. Daily at 03:00:00.
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: temporal-database
  immediate: true
