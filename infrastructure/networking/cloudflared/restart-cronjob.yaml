apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared-restarter
  namespace: cloudflared
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudflared-restarter
  namespace: cloudflared
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["cloudflared"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudflared-restarter
  namespace: cloudflared
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudflared-restarter
subjects:
  - kind: ServiceAccount
    name: cloudflared-restarter
    namespace: cloudflared
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudflared-restart
  namespace: cloudflared
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: cloudflared-restarter
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              # bitnami moved their free images to the bitnamilegacy namespace
              # on Docker Hub in Aug 2025; `bitnami/kubectl:1.33.1` no longer
              # resolves. bitnamilegacy/kubectl:1.33.1 is the same bits.
              image: bitnamilegacy/kubectl:1.33.1
              command:
                - kubectl
                - -n
                - cloudflared
                - rollout
                - restart
                - deployment/cloudflared
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
