apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: kube-system
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          envFrom:
            # Supplies REGISTRY_STORAGE_S3_ACCESSKEY / _SECRETKEY for the s3 driver.
            - secretRef:
                name: registry-s3-credentials
          volumeMounts:
            # S3-backed config.yml (storage.s3 -> RustFS). PVC no longer mounted.
            - name: registry-config
              mountPath: /etc/distribution/config.yml
              subPath: config.yml
      volumes:
        - name: registry-config
          configMap:
            name: registry-config
