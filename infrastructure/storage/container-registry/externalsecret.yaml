# RustFS S3 creds for the standalone container registry (storage.s3).
# Reuses the same RustFS workload key CNPG/VolSync/PostHog already use.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-s3-credentials
  namespace: kube-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: registry-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: REGISTRY_STORAGE_S3_ACCESSKEY
      remoteRef:
        key: rustfs
        property: rustfs-workload-access-key
    - secretKey: REGISTRY_STORAGE_S3_SECRETKEY
      remoteRef:
        key: rustfs
        property: rustfs-workload-secret-key
