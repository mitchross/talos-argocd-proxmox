apiVersion: v1
kind: Namespace
metadata:
  name: democratic-csi
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    # node DaemonSet runs hostNetwork + hostIPC + privileged for iSCSI/NFS host
    # mounts — same PSA posture as csi-driver-nfs/smb and longhorn.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
