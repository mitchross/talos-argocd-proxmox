# democratic-csi — TrueNAS iSCSI release (truenas-iscsi)
# Adds a DYNAMIC RWO block StorageClass `truenas-iscsi` backed by zvols on
# TrueNAS (192.168.10.133) over the 10G link. ADDITIVE: Longhorn remains the
# cluster default; nothing here changes existing PVCs or storage classes.
# Talos nodes ship the siderolabs/iscsi-tools extension, so the host initiator
# works out of the box (see omni/cluster-template/cluster-template.yaml).

csiDriver:
  # Globally unique on the cluster; matches the StorageClass provisioner.
  name: org.democratic-csi.iscsi

node:
  driver:
    # Talos is minimal and has no /etc/localtime to bind-mount; null disables it.
    localtimeHostPath: null

driver:
  # Connection + ZFS/iSCSI target config is rendered by ESO into this Secret
  # (externalsecret-iscsi.yaml) with ONLY the apiKey pulled from 1Password.
  existingConfigSecret: truenas-iscsi-config
  config:
    # Still required alongside existingConfigSecret — must match the secret.
    driver: freenas-api-iscsi

storageClasses:
  - name: truenas-iscsi
    defaultClass: false           # Longhorn stays the default RWO class
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4

volumeSnapshotClasses:
  - name: truenas-iscsi-snapshot
    deletionPolicy: Delete
