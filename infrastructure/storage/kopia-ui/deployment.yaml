---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia-ui
  namespace: kopia-ui
  labels:
    app.kubernetes.io/name: kopia-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kopia-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kopia-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      # Repointed 2026-06-27 from the retired VolSync NFS repo to the kopiur S3
      # repo (s3://kopiur on RustFS). The init container runs `kopia repository
      # connect s3` at startup so the S3 creds are injected at RUNTIME (from the
      # kopia-ui-secret ExternalSecret) and never committed to git. The main
      # container then serves the web UI against the connected /config repo.
      initContainers:
        - name: connect
          image: ghcr.io/home-operations/kopia:0.23.1
          command: ["kopia"]
          args:
            - repository
            - connect
            - s3
            - --bucket=kopiur
            - --endpoint=192.168.10.133:30292
            - --region=us-east-1
            - --disable-tls
            # kopia 0.23 REQUIRES --access-key/--secret-access-key (no env fallback);
            # $(VAR) expands from the envFrom secret at runtime → no creds in git.
            - --access-key=$(AWS_ACCESS_KEY_ID)
            - --secret-access-key=$(AWS_SECRET_ACCESS_KEY)
            - --override-hostname=kopia-ui
            - --override-username=kopia-ui
            - --no-check-for-updates
            - --config-file=/config/repository.config
          # KOPIA_PASSWORD (repo password, read from env) + AWS_ACCESS_KEY_ID +
          # AWS_SECRET_ACCESS_KEY (passed as flags above) — all from kopia-ui-secret.
          envFrom:
            - secretRef:
                name: kopia-ui-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: kopia-config
              mountPath: /config
      containers:
        - name: kopia
          image: ghcr.io/home-operations/kopia:0.23.1
          args:
            - --without-password
          env:
            - name: KOPIA_WEB_ENABLED
              value: "true"
            - name: KOPIA_WEB_PORT
              value: "80"
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kopia-ui-secret
                  key: KOPIA_PASSWORD
            - name: TZ
              value: "America/New_York"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: kopia-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      volumes:
        # Shared between the connect init container (writes repository.config +
        # cache) and the main UI container. emptyDir — the kopia repo lives on
        # RustFS S3, this only holds the local config + metadata cache.
        - name: kopia-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kopia-ui
  namespace: kopia-ui
  labels:
    app.kubernetes.io/name: kopia-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kopia-ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
