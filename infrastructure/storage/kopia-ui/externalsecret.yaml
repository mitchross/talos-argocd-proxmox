---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-ui-secrets
  namespace: kopia-ui
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: kopia-ui-secret
    creationPolicy: Owner
  data:
    # Same RustFS workload key + kopia password as the kopiur ClusterRepository,
    # so kopia-ui can connect to the kopiur S3 repo (s3://kopiur) for browsing.
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: rustfs
        property: kopia_password
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: rustfs
        property: rustfs-workload-access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: rustfs
        property: rustfs-workload-secret-key
