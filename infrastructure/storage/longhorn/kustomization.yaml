apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn-system
resources:
  - namespace.yaml
  #- httproute.yaml
  - volumesnapshotclass.yaml
  - node-failure-settings.yaml
  # V2 (SPDK) is served by the chart-created `longhorn` StorageClass via
  # persistence.dataEngine: v2 in values.yaml — no separate longhorn-v2 class.
helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.12.0
    releaseName: longhorn
    namespace: longhorn-system
    valuesFile: values.yaml
    includeCRDs: true

