# Database tier. Longhorn volumes pinned (via `diskSelector: db`) to the `ssd-db`
# disk, which is backed by 2x HPE MK000480GWCEV enterprise SATA SSDs with
# power-loss protection, in an mdadm RAID1, exposed to Proxmox as a **thick** LVM
# VG (`ssd-ent`).
#
# WHY: the default `longhorn` class lands on consumer EDILOCA EN605 NVMe, which is
# DRAM-less with no PLP. Measured 4K QD1 fsync=1 — one database commit:
#
#   default longhorn (EDILOCA, LVM-thin) :   259 IOPS @ 1.25 ms  (p99 2.5 ms)
#   this class (enterprise SATA, RAID1)  : 3,069 IOPS @ 0.32 ms  (p99 0.92 ms)
#
# ~12x the commit rate and a 2.7x better tail. Every Postgres/MySQL commit, every
# WAL flush and every Kafka append is an fsync, so this is the metric that decides
# how a database feels.
#
# GOTCHA — the underlying Proxmox VG is **thick** LVM on purpose, NOT lvmthin.
# LVM-thin commits pool metadata on every fsync and that transaction serializes
# everything: measured 170 IOPS @ 4.8ms on these same drives, i.e. WORSE than the
# consumer NVMe it replaces. Pre-allocating the volume did not help. If anyone
# recreates `ssd-ent` as an lvmthin pool, this class silently becomes a downgrade.
#
# NOT for read-heavy or big-sequential-write volumes. The EDILOCA NVMe genuinely
# out-reads these SATA drives (161k vs 68k IOPS; 2310 vs ~500 MB/s), and sequential
# write on this host's X399 chipset SATA is only ~65-92 MB/s. Keep ClickHouse,
# Prometheus TSDB and Loki (big sequential merges) on the default class.
#
# dataLocality strict-local: the replica must live on the node that runs the pod —
# no cross-node hop on the commit path. Fine here: single worker node.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-db
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  # Pins volumes to Longhorn disks tagged `db` — see the
  # node.longhorn.io/default-disks-config annotation in the Omni cluster template.
  diskSelector: "db"
  dataLocality: "strict-local"
