# Longhorn V2 (SPDK) data engine StorageClass — the cluster DEFAULT.
#
# This cluster is V2-only (rebuilt fresh; no V1 volumes to migrate). V1's default
# is dropped via `persistence.defaultClass: false` in values.yaml, and this class
# carries the is-default-class annotation instead.
#
# It provisions nothing until the V2 engine is enabled (values.yaml `v2DataEngine`)
# AND each node has a registered block-type disk (the /dev/sdb raw disk from the
# machine classes — register by /dev/disk/by-id/). On a fresh bootstrap, register
# the disks right after Longhorn is healthy and before the heavy app waves, or
# default-class PVCs sit Pending until the disks appear (no data loss — they bind
# once registered). See docs/domains/storage/longhorn-v2-migration.md.
# ⚠️ Do NOT sync this onto the live V1 cluster — only the rebuilt cluster.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-v2
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    longhorn.io/data-engine: v2
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
# Immediate (not WaitForFirstConsumer) mirrors the V1 longhorn class behavior.
volumeBindingMode: Immediate
parameters:
  # V2 data engine selector — this is what routes the volume to SPDK.
  dataEngine: "v2"
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fsType: "ext4"
  # strict-local is NOT supported on V2 in 1.12.0; best-effort is.
  dataLocality: "best-effort"
