# It's recommended to manage all Longhorn settings via this file
# to maintain a declarative GitOps workflow.
# Settings applied manually via the UI will not be reflected here and can be
# overwritten during a Helm upgrade.
#
# ⚠️⚠️ REBUILD-ONLY CONFIG — DO NOT SYNC ONTO THE LIVE V1 CLUSTER ⚠️⚠️
# This file encodes the V2-only (SPDK) target state: V2 engine on, V1 engine
# off, and the default `longhorn` StorageClass routed to dataEngine v2. On the
# live V1 cluster these would (a) churn forever (engine settings can't apply
# while volumes are attached) and (b) send every new default-class PVC to a V2
# engine with no disks (Pending cluster-wide). Merge/sync only as the rebuilt
# cluster bootstraps. See docs/domains/storage/longhorn-v2-migration.md.
defaultSettings:
  # NOTE: Longhorn 1.10 consolidates settings for V1/V2 data engines. Use either
  # a single scalar or a JSON string with per-engine values like {"v1":"...","v2":"..."} when needed.
  defaultDataPath: "/var/lib/longhorn"
  storageMinimalAvailablePercentage: "10"
  # 200% was the previous floor (replicaCount=2 doubles every PVC against the
  # scheduling limit). 2026-04-27 the cluster crossed 200% allocation on
  # `talos-prod-cluster-workers-smgrbs` (1077 Gi reserved vs 1046 Gi cap →
  # node went Unschedulable). Actual cluster fill is only 228 Gi / 4184 Gi
  # physical (~5%) — every big PVC (immich/library 300G@5.8G used, posthog
  # clickhouse 100G@23G, project-nomad nomad-storage 120G@2.4G) reserves
  # full PVC size × replica count. Bumping the over-provisioning cap to 300%
  # gives ~1568 Gi reservation budget per node, restoring Schedulable.
  # Rebalance/PVC-shrink/migrate-to-NFS are the long-term levers; this is
  # the band-aid that unsticks scheduling immediately.
  storageOverProvisioningPercentage: "300"
  allowRecurringJobWhileVolumeDetached: "true"
  replicaAutoBalance: "best-effort"
  # Ensure new consolidated settings that can be per-engine stay simple scalars for V1-only clusters
  # These avoid parse errors like strconv.ParseBool/Int seen in manager logs when JSON strings are provided.
  # Note: Use plain values, not JSON format - JSON causes "mismatched data engines" errors
  fastReplicaRebuildEnabled: "true"
  engineReplicaTimeout: "8"
  # Percentage of allocatable CPU reserved per instance-manager pod (NOT cores).
  # Chart default is {"v1":"12","v2":"12"}; plain "8" applies to both engines.
  # Reduced from 12 to 8 for homelab - still provides good performance with less CPU reservation.
  # NOTE (V2): the V2 instance managers busy-poll the cores pinned by
  # `v2-data-engine-cpu-mask`. Raised 0x3 (2 cores) -> 0xf (4 cores) on
  # 2026-06-11 after the first V2 nuke-restore: 25 parallel restores wedged
  # both SPDK targets in attach/detach teardown loops ("NVMe path still
  # exists after delete"), and 2 reactor cores could not drain the churn.
  # See the Setting CR in node-failure-settings.yaml (the authoritative
  # copy — defaultSettings only seeds first install) and the V2 mass-restore
  # wedge entry in docs/cluster-dr-nuke-restore-runbook.md.
  # "13" ≈ 4.2 cores requested on the 32-core workers (covers the 4 pinned
  # cores); on the 16-core GPU worker it is ~2.1 cores — a KNOWN under-request
  # vs the 4 busy-polled cores there, accepted to avoid over-reserving the
  # AI node. If V2 latency degrades on the GPU node under AI load, consider
  # shrinking the mask instead.
  # Avoid per-engine JSON strings — they trip "mismatched data engines" errors.
  guaranteedInstanceManagerCPU: "13"
  # NOTE 2026-06-09: a previous `guaranteedInstanceManagerMemory: "1Gi"` was
  # removed here — Longhorn has NO instance-manager memory-guarantee setting
  # (only the CPU one above exists in the chart/setting schema), so the key was
  # a silent no-op: it rendered into the longhorn-default-setting ConfigMap but
  # longhorn-manager ignored it, and instance-manager pods never received the
  # intended memory requests. The 2026-05-04 scheduler-math concern it tried to
  # address (IM/share-manager pods with zero memory requests) is therefore still
  # open and must be solved another way (node sizing / IM pod overhead), not via
  # a Longhorn setting.
  # Performance: prefer local disk for reads when replica is on same node
  defaultDataLocality: "best-effort"
  # Cleanup: limit snapshot accumulation per volume
  snapshotMaxCount: "10"
  autoCleanupSystemGeneratedSnapshot: "true"
  # Allow Longhorn to auto-upgrade volume engines after manager upgrades
  concurrentAutomaticEngineUpgradePerNodeLimit: "3"
  # Allow detached volumes to rebuild replicas (fixes VolSync clone volumes
  # stuck in VolumeCloneCopyCompleteAwaitingHealthy with replica count > 1)
  offlineReplicaRebuilding: "true"
  # V2 (SPDK) data engine — this cluster is V2-ONLY (rebuilt fresh; there are no
  # V1 volumes to migrate). Safe to enable from bootstrap because a fresh cluster
  # has no attached volumes blocking the setting. Requires the Talos prereqs
  # (vm.nr_hugepages=1024 → 2 GiB, nvme_tcp + vfio_pci) already in the cluster
  # template. Block-disk registration is DECLARATIVE: the cluster template's
  # longhorn-v2-default-disk patch stamps node.longhorn.io/create-default-disk
  # + default-disks-config on storage nodes, and longhorn-manager registers the
  # /dev/sdb raw disk (stable by-id scsi-0QEMU_QEMU_HARDDISK_drive-scsi1)
  # itself — no manual Node CR edits.
  # Values MUST be quoted strings — bare YAML bools/ints have caused
  # strconv.Parse* failures in longhorn-manager before (see notes above).
  v2DataEngine: "true"
  # V1 engine OFF: nothing may route to V1 — its only capacity would be the
  # small OS disk. With V1 disabled, a misrouted dataEngine:v1 PVC fails loudly
  # at provision time instead of silently binding to the OS disk.
  v1DataEngine: "false"
  # Do NOT auto-create the default filesystem disk at /var/lib/longhorn on every
  # node — that puts a Longhorn disk on the small OS partition. Only nodes
  # carrying node.longhorn.io/create-default-disk=config (stamped by the
  # cluster template on workers + gpu-workers) get a disk, and it is the
  # /dev/sdb block device described by their default-disks-config annotation.
  createDefaultDiskLabeledNodes: "true"
  # Reserve NOTHING on default-created disks. The annotation says
  # storageReserved: 0, but longhorn-manager treats 0 as "recompute from this
  # percentage setting" (CreateDisksFromAnnotation in types.go), and the chart
  # default is 30 — which would silently reserve ~211G of each 704G V2 disk.
  # 0 is correct here because every Longhorn disk in this cluster is a
  # dedicated raw block device with nothing else on it (the 30% default
  # exists to protect shared OS-disk setups).
  storageReservedPercentageForDefaultDisk: "0"
# -- Disables the pre-upgrade check job. This is recommended for GitOps tools
# like ArgoCD to prevent sync failures.
preUpgradeChecker:
  jobEnabled: false
persistence:
  # -- V2-only cluster: the chart-created `longhorn` StorageClass IS the V2
  # class and stays the cluster default. The class KEEPS the name `longhorn`
  # deliberately — 40+ PVCs across my-apps/monitoring/infrastructure, the
  # inline VolSync ReplicationSource/Destination configs, the pvc-plumber
  # backup contract, and the CLAUDE.md / add-backup guidance all reference
  # `storageClassName: longhorn` explicitly. Re-pointing the NAME at V2 moves
  # all of them at once; renaming to `longhorn-v2` would have moved none of
  # them (a default-class flip only affects PVCs that omit storageClassName).
  defaultClass: true
  # -- Routes the `longhorn` class to the V2 (SPDK) engine. NOTE: the chart
  # only renders the dataEngine parameter when disableRevisionCounter is
  # truthy — it defaults to "true"; do not override it to false/empty or this
  # silently reverts the class to V1.
  dataEngine: v2
  # -- Default number of replicas for volumes.
  # Set to 2 for node-failure resilience. With replica 1, a single node going
  # down makes all its volumes unavailable and causes stale attachment cascades.
  # With replica 2, Longhorn serves from the surviving replica on another node.
  # Trade-off: doubles storage usage (~932GB -> ~1.86TB of ~2TB capacity).
  # VolSync + Kopia still handles off-cluster backup to NFS.
  defaultClassReplicaCount: 2
  # -- Default filesystem type.
  defaultFsType: ext4
  defaultDataLocality: best-effort
  # -- Reclaim policy for the default storage class.
  reclaimPolicy: Delete
# -- Disable the default ingress creation, as you are managing it with a
# separate HTTPRoute resource.
ingress:
  enabled: false