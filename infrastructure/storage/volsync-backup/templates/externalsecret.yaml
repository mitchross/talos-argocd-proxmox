# Per-PVC Kopia repository secret. Schema mirrors pvc-plumber's per-PVC
# `volsync-<pvc>` Secret. The VolSync Kopia mover resolves repo connection
# from the Secret named in spec.kopia.repository.
#
# VALIDATE-AGAINST-LIVE (test-plan.md T1): before trusting this chart, dump a
# pvc-plumber-generated secret + ExternalSecret from the running cluster:
#   kubectl get externalsecret volsync-<pvc> -n <ns> -o yaml
#   kubectl get secret        volsync-<pvc> -n <ns> -o yaml
# and reconcile key names (esp. whether the perfectra1n Kopia mover expects
# KOPIA_REPOSITORY vs discrete KOPIA_S3_* keys). Keys below are the
# best-reconstruction from the operator's own externalsecret.yaml + the live
# ReplicationSource spec; they are the #1 thing to confirm empirically.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "vb.repoName" . }}
  namespace: {{ include "vb.namespace" . }}
  labels:
    {{- include "vb.commonLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.storeName }}
  target:
    name: {{ include "vb.repoName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        KOPIA_PASSWORD: "{{ `{{ .password }}` }}"
        AWS_ACCESS_KEY_ID: "{{ `{{ .accessKey }}` }}"
        AWS_SECRET_ACCESS_KEY: "{{ `{{ .secretKey }}` }}"
        KOPIA_REPOSITORY: "s3://{{ .Values.s3.bucket }}/{{ include "vb.repoName" . }}"
        KOPIA_S3_ENDPOINT: "{{ .Values.s3.endpoint }}"
        KOPIA_S3_BUCKET: "{{ .Values.s3.bucket }}"
        KOPIA_S3_DISABLE_TLS: "{{ .Values.s3.disableTLS }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.itemKey }}
        property: {{ .Values.externalSecret.properties.password }}
    - secretKey: accessKey
      remoteRef:
        key: {{ .Values.externalSecret.itemKey }}
        property: {{ .Values.externalSecret.properties.accessKey }}
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.externalSecret.itemKey }}
        property: {{ .Values.externalSecret.properties.secretKey }}
