# VolSync Helm chart values
# Using perfectra1n fork for Kopia mover support
# https://github.com/perfectra1n/volsync
#
# CHART/IMAGE VERSION MISMATCH (intentional):
#   - kustomization.yaml pins chart 0.18.5 → templates + CRDs come from 0.18.x
#   - this file pins controller + mover images to v0.17.11 → upstream
#     perfectra1n image tag for the latest tested Kopia mover binary
#
# The 0.18.x chart is template-compatible with the 0.17.11 controller for
# everything we use (ReplicationSource/Destination spec, mover Job
# templates, NFS injection, Kopia config). The mismatch exists because
# perfectra1n cuts chart releases on a different cadence than image
# releases, and the 0.18.x chart hadn't been retagged with a v0.18.x image
# at the time we last bumped.
#
# When upgrading: try aligning chart and image to the same upstream tag
# first. If the chart only releases ahead of the image (or vice versa),
# verify the spec fields used by `volsync-pvc-backup-restore.yaml` and
# `volsync-nfs-inject.yaml` haven't changed, then update both pins
# together. Last verified working end-to-end (backup + restore drill):
# 2026-04-30 (drill #4).

# Use perfectra1n image that includes Kopia mover
image: &image
  repository: ghcr.io/perfectra1n/volsync
  tag: v0.17.11

# Set all mover images to same version
kopia: *image
rclone: *image
restic: *image
rsync: *image
rsync-tls: *image
syncthing: *image

# Metrics configuration
metrics:
  disableAuth: true

# Resource configuration for the controller
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Enable CRDs installation
manageCRDs: true

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
