apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../talos
patches:
- target:
    version: v1
    kind: Deployment
    name: llama-cpp-server
    group: apps
    namespace: llama-cpp
  patch: "- op: remove\n  path: /spec/template/spec/securityContext/fsGroup"
- target:
    version: v1
    kind: HTTPRoute
    name: llama-cpp-route
    group: gateway.networking.k8s.io
    namespace: llama-cpp
  patch: "- op: replace\n  path: /spec/parentRefs/0/name\n  value: openshift-gateway\n- op: replace\n  path: /spec/parentRefs/0/namespace\n\
    \  value: openshift-ingress\n- op: replace\n  path: /spec/hostnames/0\n  value: llama.apps.sno-ai-lab.vanillax.xyz"
