apiVersion: v1
kind: Service
metadata:
  name: swarmui-service
  namespace: swarmui
spec:
  selector:
    app: swarmui
  ports:
  - name: http
    port: 7801
    targetPort: 7801
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: swarmui-nodeport
  namespace: swarmui
spec:
  selector:
    app: swarmui
  ports:
  - name: http
    port: 7801
    targetPort: 7801
    nodePort: 30780
    protocol: TCP
  type: NodePort
