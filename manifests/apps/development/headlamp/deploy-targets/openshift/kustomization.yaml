apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../talos
patches:
- target:
    version: v1
    kind: Deployment
    name: headlamp
    group: apps
    namespace: kube-system
  patch: "- op: remove\n  path: /spec/template/spec/containers/0/securityContext/runAsUser\n- op: remove\n  path: /spec/template/spec/containers/0/securityContext/runAsGroup"
- target:
    version: v1
    kind: HTTPRoute
    name: headlamp
    group: gateway.networking.k8s.io
    namespace: kube-system
  patch: "- op: replace\n  path: /spec/parentRefs/0/name\n  value: openshift-gateway\n- op: replace\n  path: /spec/parentRefs/0/namespace\n\
    \  value: openshift-ingress\n- op: replace\n  path: /spec/hostnames/0\n  value: headlamp.apps.sno-ai-lab.vanillax.xyz"
