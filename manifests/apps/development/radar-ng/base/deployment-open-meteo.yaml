# Self-hosted Open-Meteo API. Backed by model data synced into the PVC by
# the open-meteo-sync-gfs and open-meteo-sync-hrrr CronJobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-meteo
  namespace: radar-ng
  labels:
    app: open-meteo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-meteo
  template:
    metadata:
      labels:
        app: open-meteo
    spec:
      # Upstream open-meteo image already runs as UID 999 ("openmeteo").
      # Don't override runAsUser — let the image's USER directive apply
      # so file paths the binary writes (PVC at /app/data) match the UID
      # the cronjobs sync as. fsGroup matches so writes from the deploy
      # interleave cleanly with cronjob-written files.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-meteo
          image: ghcr.io/open-meteo/open-meteo:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args: ["serve", "--bind", "0.0.0.0:8080"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: openmeteo-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: openmeteo-data
          persistentVolumeClaim:
            claimName: openmeteo-data
