apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../talos
patches:
- target:
    version: v1
    kind: Deployment
    name: temporal-frontend
    group: apps
  patch: "- op: remove\n  path: /spec/template/spec/securityContext/runAsUser\n- op: remove\n  path: /spec/template/spec/securityContext/fsGroup"
- target:
    version: v1
    kind: Deployment
    name: temporal-history
    group: apps
  patch: "- op: remove\n  path: /spec/template/spec/securityContext/runAsUser\n- op: remove\n  path: /spec/template/spec/securityContext/fsGroup"
- target:
    version: v1
    kind: Deployment
    name: temporal-matching
    group: apps
  patch: "- op: remove\n  path: /spec/template/spec/securityContext/runAsUser\n- op: remove\n  path: /spec/template/spec/securityContext/fsGroup"
- target:
    version: v1
    kind: Deployment
    name: temporal-worker
    group: apps
  patch: "- op: remove\n  path: /spec/template/spec/securityContext/runAsUser\n- op: remove\n  path: /spec/template/spec/securityContext/fsGroup"
- target:
    version: v1
    kind: HTTPRoute
    name: temporal-web
    group: gateway.networking.k8s.io
    namespace: temporal
  patch: "- op: replace\n  path: /spec/parentRefs/0/name\n  value: openshift-gateway\n- op: replace\n  path: /spec/parentRefs/0/namespace\n\
    \  value: openshift-ingress\n- op: replace\n  path: /spec/hostnames/0\n  value: temporal.apps.sno-ai-lab.vanillax.xyz"
