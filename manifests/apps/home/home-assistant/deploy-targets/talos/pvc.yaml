apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: home-automation
    app.kubernetes.io/part-of: smart-home
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=hourly (preserves the 46 * * * * cadence); ns home-assistant carries
    # managed-namespace=true. Mover 568 (already, no UID change). Migrated via
    # Option-R reset (dangling config-backup dsr → config-dst; recreated from
    # quiesced snapshot). Old PV pvc-52fd99ba retained.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/config-dst. No-op while the PVC
  # is already Bound. RS/RD are operator-managed by pvc-plumber v4.0.1 (DRY
  # handoff, 2026-05-31): the operator creates/repairs ReplicationSource/config
  # + ReplicationDestination/config-dst as managed-by=pvc-plumber.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: config-dst

# NOTE: inline ReplicationSource/config + ReplicationDestination/config-dst were
# REMOVED on 2026-05-31 (pvc-plumber v4.0.1 DRY handoff). pvc-plumber now owns
# the RS/RD lifecycle for config (tier=hourly, mover 568). Do not re-add here.
