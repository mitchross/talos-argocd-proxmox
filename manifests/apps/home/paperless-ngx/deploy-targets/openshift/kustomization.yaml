apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../talos
patches:
- target:
    version: v1
    kind: PersistentVolumeClaim
    name: data
    namespace: paperless-ngx
  patch: "- op: replace\n  path: /spec/storageClassName\n  value: lvms-vg1"
- target:
    version: v1
    kind: PersistentVolumeClaim
    name: media
    namespace: paperless-ngx
  patch: "- op: replace\n  path: /spec/storageClassName\n  value: lvms-vg1"
- target:
    version: v1
    kind: PersistentVolumeClaim
    name: paperless-consume-pvc
    namespace: paperless-ngx
  patch: "- op: replace\n  path: /spec/storageClassName\n  value: lvms-vg1"
- target:
    version: v1
    kind: PersistentVolumeClaim
    name: paperless-export-pvc
    namespace: paperless-ngx
  patch: "- op: replace\n  path: /spec/storageClassName\n  value: lvms-vg1"
- target:
    version: v1
    kind: HTTPRoute
    name: paperless-ngx
    group: gateway.networking.k8s.io
    namespace: paperless-ngx
  patch: "- op: replace\n  path: /spec/parentRefs/0/name\n  value: openshift-gateway\n- op: replace\n  path: /spec/parentRefs/0/namespace\n\
    \  value: openshift-ingress\n- op: replace\n  path: /spec/hostnames/0\n  value: paperless.apps.sno-ai-lab.vanillax.xyz"
