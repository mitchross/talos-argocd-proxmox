apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nomad-storage
  namespace: project-nomad
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: project-nomad
    type: storage
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-30): operator-managed at
    # tier=daily; ns project-nomad carries managed-namespace=true. Mover 568.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 120Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/nomad-storage-dst. No-op
  # while the PVC is already Bound. RS/RD are operator-managed by
  # pvc-plumber v4.0.1 (DRY handoff, 2026-05-30): the operator creates and
  # repairs ReplicationSource/nomad-storage + ReplicationDestination/
  # nomad-storage-dst as managed-by=pvc-plumber via its RS/RD watch.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: nomad-storage-dst
