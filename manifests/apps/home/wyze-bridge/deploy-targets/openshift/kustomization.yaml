apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../talos
patches:
- target:
    version: v1
    kind: HTTPRoute
    name: wyze-bridge
    group: gateway.networking.k8s.io
    namespace: wyze-bridge
  patch: "- op: replace\n  path: /spec/parentRefs/0/name\n  value: openshift-gateway\n- op: replace\n  path: /spec/parentRefs/0/namespace\n\
    \  value: openshift-ingress\n- op: replace\n  path: /spec/hostnames/0\n  value: wyze-bridge.apps.sno-ai-lab.vanillax.xyz"
