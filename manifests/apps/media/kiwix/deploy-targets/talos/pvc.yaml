apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiwix-data
  namespace: kiwix
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SMB-backed offline-Wikipedia archive; non-snapshottable, rebuildable from kiwix.org ZIM downloads"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: kiwix-smb
  resources:
    requests:
      storage: 100Gi
