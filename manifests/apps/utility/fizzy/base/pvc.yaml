apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: fizzy
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app.kubernetes.io/name: fizzy
    app.kubernetes.io/component: kanban
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-30): v4 write fuse opts this
    # PVC into operator management at tier=daily. Namespace fizzy carries
    # pvc-plumber.io/managed-namespace=true; with cluster-wide volsync-writer
    # RBAC + the namespace gate, the operator creates/repairs RS/data +
    # RD/data-dst as managed-by=pvc-plumber. Mover already 568 (no change).
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vanillax-local-rwo
  resources:
    requests:
      storage: 10Gi
  # Static dataSourceRef → ReplicationDestination/data-dst. On PVC
  # re-creation (DR / namespace recreate), VolSync's volume populator reads
  # the latest snapshot from the shared kopia repo and binds this PVC with
  # restored data. No-op while the PVC is already Bound. The RS/RD are
  # operator-managed by pvc-plumber v4.0.1 (DRY handoff, 2026-05-30): this
  # PVC carries the v4 write fuse, so the operator creates and repairs
  # ReplicationSource/data + ReplicationDestination/data-dst (and recreates
  # either within seconds if deleted) via its RS/RD watch.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-dst
