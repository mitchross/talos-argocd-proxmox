apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-master-0
  namespace: redis-instance
  labels:
    app: redis
    component: master
    backup-exempt: "true"
  annotations:
    # Kept defensively so any future immutable-field SSA dry-run on this bound,
    # chart-referenced PVC can't wedge the app's comparison.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    # backup-exempt (2026-06-01): this Redis is paperless-ngx's Celery broker
    # (PAPERLESS_REDIS) plus a redis-commander UI — a cache/broker, NOT a system
    # of record. Paperless's durable data lives in its data/media PVCs
    # (pvc-plumber-backed) and its CNPG Postgres (Barman → S3). Redis persistence
    # is disposable here; do NOT pvc-plumber migrate. Not a migration target.
    storage.vanillax.dev/backup-exempt-reason: "Redis persistence is disposable/cache-like in this homelab (paperless Celery broker + redis-commander UI; system-of-record is paperless data/media PVCs + CNPG Postgres); do not pvc-plumber migrate."
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn

# NOTE: the PVC `dataSourceRef`, the inline `ReplicationSource/redis-master-0`,
# the `ReplicationDestination/redis-master-0-dst`, and the vestigial
# `longhorn.io/recurring-job-*` "critical tier" annotations were REMOVED
# 2026-06-01 — redis is now backup-exempt (disposable). No VolSync RS/RD; the PVC
# recreates EMPTY by design. Argo prunes the old (argocd-managed) RS/RD on sync.
# This is NOT a pvc-plumber migration; do not add pvc-plumber.io/* labels.
