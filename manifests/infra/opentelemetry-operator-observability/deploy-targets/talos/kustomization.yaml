# OTel operator observability overlay — optional, post-monitoring.
# Deployed by clusters/talos/argocd/custom-entrypoints/opentelemetry-operator-observability-app.yaml
# at a wave AFTER kube-prometheus-stack so the monitoring.coreos.com CRDs exist.
# Bootstrap-critical OTel operator lives in manifests/infra/opentelemetry-operator
# and renders ZERO monitoring CRs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opentelemetry
resources:
  - servicemonitor.yaml
