site_name: talos-argocd-proxmox
site_description: GitOps Kubernetes homelab on Talos OS, ArgoCD, Cilium, Longhorn, with self-managing applications
site_url: https://mitchross.github.io/talos-argocd-proxmox/
repo_url: https://github.com/mitchross/talos-argocd-proxmox
repo_name: mitchross/talos-argocd-proxmox
edit_uri: edit/main/docs/

docs_dir: docs

# Broken intra-doc anchors are warnings (build runs with --strict in CI,
# so a warning = failed deploy = caught before it ships).
validation:
  links:
    anchors: warn

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - assets/kopiur-playground.css
  - assets/nav-tweaks.css

extra_javascript:
  - assets/kopiur-playground.js

# 8 top-level sections. Long topics nest one level so no section feels crowded.
nav:
  - Overview & architecture:
      - Home — the big picture: index.md
      - The easy guide (explain it to anyone): easy-guide.md
  - GitOps & ArgoCD:
      - ArgoCD architecture: domains/argocd/argocd.md
      - Root entrypoints & sync waves: domains/argocd/entrypoints.md
  - Storage:
      - Storage architecture (source of truth): storage-architecture.md
      - Storage model (RWO/RWX & sizing): domains/storage/storage-model-rwo-rwx-and-sizing.md
      - TrueNAS special-vdev stall runbook: truenas-special-vdev-stall-runbook.md
      - Future idea — tiered storage: domains/storage/architecture-future.md
  - Backups & disaster recovery (kopiur):
      - Interactive course — surviving a cluster wipe: learn/course.md
      - Interactive kopiur playground: kopiur-playground.md
      - kopiur backup architecture (the guide): domains/storage/kopiur-backup-architecture.md
      - kopiur mover permissions (#1 gotcha): domains/storage/kopiur-mover-permissions.md
      - Backup repository setup: backup-repository-setup.md
      - Kopia maintenance: domains/storage/kopia-maintenance-plan.md
      - Disaster recovery runbook: disaster-recovery.md
      - Decision records:
          - kopiur evaluation: domains/storage/kopiur-evaluation.md
          - kopiur trial: kopiur-trial.md
  - Databases (CloudNativePG):
      - Backup/restore/start — beginner guide: domains/cnpg/backup-restore-start-guide.md
      - CNPG explained: domains/cnpg/explained.md
      - CNPG disaster recovery: domains/cnpg/disaster-recovery.md
  - Networking:
      - Topology: domains/networking/topology.md
      - Cilium policies: domains/networking/policy.md
      - Technitium vanillax.me migration: domains/networking/technitium-vanillax-me-migration.md
  - AI / GPU:
      - Model catalog: domains/ai-gpu/model-catalog.md
      - GPU scale-swap runbook: domains/ai-gpu/gpu-scale-swap.md
      - 3090 LLM optimization: domains/ai-gpu/3090-llm-optimization.md
      - Pi agent — local dev guide: domains/ai-gpu/pi-agent-local-dev.md
  - Reference & ops:
      - RustFS credential runbook: domains/rustfs/credential-runbook.md
      - Observability — radar-ng cookbook: domains/observability/radar-ng.md
      - Multicluster — PRD: domains/multicluster/prd.md
      - Multicluster — handoff notes: domains/multicluster/handoff-notes.md
      - Technitium ExternalDNS — design (historical): superpowers/specs/2026-06-13-technitium-external-dns-design.md
      - Technitium ExternalDNS — plan (historical): superpowers/plans/2026-06-13-technitium-external-dns.md
