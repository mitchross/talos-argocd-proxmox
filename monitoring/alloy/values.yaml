alloy:
  configMap:
    content: |-
      // ============================================================
      // OTEL Receivers - accept traces, metrics, logs via OTLP
      // ============================================================
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces  = [otelcol.processor.batch.default.input]
          metrics = [otelcol.processor.batch.default.input]
          logs    = [otelcol.processor.batch.default.input]
        }
      }

      // ============================================================
      // Batch processor - buffer before export for efficiency
      // ============================================================
      otelcol.processor.batch "default" {
        timeout = "10s"
        send_batch_size = 8192
        send_batch_max_size = 16384
        output {
          traces  = [otelcol.exporter.otlphttp.honeycomb.input, otelcol.exporter.otlp.tempo.input]
          metrics = [otelcol.exporter.otlphttp.honeycomb.input, otelcol.exporter.prometheus.local.input]
          logs    = [otelcol.exporter.otlphttp.honeycomb.input, otelcol.exporter.loki.local.input]
        }
      }

      // ============================================================
      // Honeycomb exporter - sends traces, metrics, logs via OTLP
      // ============================================================
      otelcol.exporter.otlphttp "honeycomb" {
        client {
          endpoint = "https://api.honeycomb.io"
          headers  = {
            "x-honeycomb-team" = sys.env("HONEYCOMB_API_KEY"),
          }
        }
        sending_queue {
          enabled       = true
          num_consumers = 10
          queue_size    = 10000
        }
      }

      // ============================================================
      // Tempo exporter - sends traces via OTLP gRPC
      // ============================================================
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

      // ============================================================
      // Prometheus exporter - converts OTLP metrics to remote write
      // ============================================================
      otelcol.exporter.prometheus "local" {
        forward_to = [prometheus.remote_write.local.receiver]
      }

      prometheus.remote_write "local" {
        endpoint {
          url = "http://kube-prometheus-stack-prometheus.prometheus-stack.svc.cluster.local:9090/api/v1/write"
        }
      }

      // ============================================================
      // Loki exporter - converts OTLP logs to Loki format
      // ============================================================
      otelcol.exporter.loki "local" {
        forward_to = [loki.write.local.receiver]
      }

      loki.write "local" {
        endpoint {
          url       = "http://loki-gateway.loki-stack.svc.cluster.local/loki/api/v1/push"
          tenant_id = "1"
        }
      }

      // ============================================================
      // Kubernetes pod log collection
      // ============================================================
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Only keep running pods
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Unknown"
          action        = "drop"
        }

        // Set namespace label
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        // Set pod label
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        // Set container label
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        // Set app label from k8s labels
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        // Fallback app label
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "(.+)"
          target_label  = "app"
        }

        // Set node label
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        // Set job label to namespace/app
        rule {
          source_labels = ["namespace", "app"]
          separator     = "/"
          target_label  = "job"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        // Detect and parse JSON logs
        stage.json {
          expressions = {
            level   = "level",
            msg     = "msg",
            ts      = "ts",
          }
        }

        // Drop the parsing error if log is not JSON (most won't be)
        stage.drop {
          expression = ""
          source     = "__error__"
          value      = "JSONParseError"
        }

        forward_to = [loki.write.local.receiver, otelcol.receiver.loki.honeycomb.receiver]
      }

      // Convert scraped logs to OTLP for Honeycomb (via batch processor)
      otelcol.receiver.loki "honeycomb" {
        output {
          logs = [otelcol.processor.batch.default.input]
        }
      }

      // ============================================================
      // Kubernetes events (optional but useful)
      // ============================================================
      loki.source.kubernetes_events "cluster_events" {
        job_name   = "kubernetes-events"
        log_format = "logfmt"
        forward_to = [loki.write.local.receiver, otelcol.receiver.loki.honeycomb.receiver]
      }

  extraEnv:
  - name: HONEYCOMB_API_KEY
    valueFrom:
      secretKeyRef:
        name: honeycomb-api-key
        key: api-key

# DaemonSet to collect logs from every node
controller:
  type: daemonset

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  tolerations:
  - operator: Exists

# Expose OTLP ports so apps can send traces/metrics
service:
  enabled: true
  type: ClusterIP

alloyPorts:
- name: otlp-grpc
  port: 4317
  targetPort: 4317
  protocol: TCP
- name: otlp-http
  port: 4318
  targetPort: 4318
  protocol: TCP

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
