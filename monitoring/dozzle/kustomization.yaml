apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dozzle
resources:
  - namespace.yaml
  - rbac.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
configMapGenerator:
  - name: dozzle-config
    envs:
      - dozzle.env
  - name: dozzle-default-profile
    files:
      - profile.json
