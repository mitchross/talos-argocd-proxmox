apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dozzle-data
  namespace: dozzle
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Dozzle stores only UI/cloud/notification config in /data; Kubernetes logs are streamed live and not persisted here"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
