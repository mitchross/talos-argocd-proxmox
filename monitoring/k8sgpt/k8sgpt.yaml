apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt
  namespace: k8sgpt
spec:
  ai:
    enabled: true
    # K8sGPT has short timeouts and wants fast, deterministic output.
    # Qwen 3.6 nothink: same weights as the agentic chat model but skips
    # <think> tokens so analyses return inside K8sGPT's timeout window.
    model: "qwen3.6-27b"
    backend: localai
    baseUrl: http://vllm-service.vllm.svc.cluster.local:8080/v1
    anonymized: false
    language: english
    maxTokens: "16384"
    # Required even for the local vLLM backend: the k8sgpt CLI refuses to start
    # without a registered API key, even though vLLM does not validate it here.
    # See secret.yaml for context. Without this the pod CrashLoops with:
    #   "AI provider openai not specified in configuration. Please run k8sgpt auth"
    secret:
      name: k8sgpt-llama-cpp-key
      key: api-key
  # Without this the operator re-runs a full analysis every ~30-40s, hammering
  # vLLM continuously. 6h is plenty for a homelab; drop lower only if you want
  # fresher Result CRs. autoRemediation stays off (default) — diagnose only.
  analysis:
    interval: 6h
  filters:
    - Pod
    - Service
    - Deployment
    - StatefulSet
    - ReplicaSet
    - Job
    - PersistentVolumeClaim
    - Node
    - CronJob
  noCache: false
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  version: "v0.4.36@sha256:a8fa8b456132ec4cfb55d73ae73ea8d6544a4cfc99814f11e93b3f62175c6973"
