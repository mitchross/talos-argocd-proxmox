apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt
  namespace: k8sgpt
spec:
  ai:
    enabled: true
    # K8sGPT has short timeouts and wants fast, deterministic output.
    # Qwen 3.6 nothink: same weights as the agentic chat model but skips
    # <think> tokens so analyses return inside K8sGPT's timeout window.
    model: "qwen3.6-27b"
    backend: localai
    baseUrl: http://vllm-service.vllm.svc.cluster.local:8080/v1
    anonymized: false
    language: english
    maxTokens: "16384"
    # Required even for localai/llama-cpp: the k8sgpt CLI refuses to start
    # without a registered API key, even though llama-cpp does not validate it.
    # See secret.yaml for context. Without this the pod CrashLoops with:
    #   "AI provider openai not specified in configuration. Please run k8sgpt auth"
    secret:
      name: k8sgpt-llama-cpp-key
      key: api-key
  filters:
    - Pod
    - Service
    - Deployment
    - StatefulSet
    - ReplicaSet
    - Job
    - PersistentVolumeClaim
    - Node
    - CronJob
  noCache: false
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  version: "v0.4.34@sha256:7bfabdfa48ceb3cb8c6be54bcea6b956206fe02a16035ef2dbc25186e59250ec"
