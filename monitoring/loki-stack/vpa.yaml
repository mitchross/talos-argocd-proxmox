# VPA policy is owned with this application so Argo prunes it with the target.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-write
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: loki-write
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 4Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-read
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loki-read
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 4Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-backend
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: loki-backend
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: backend
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 4Gi
      - containerName: loki-sc-rules
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-gateway
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loki-gateway
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: nginx
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "1"
          memory: 1Gi
      - containerName: exporter
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-chunks-cache
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: loki-chunks-cache
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: memcached
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "1"
          memory: 2Gi
      - containerName: exporter
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: loki-results-cache
  namespace: loki-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: loki-results-cache
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: memcached
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "1"
          memory: 2Gi
      - containerName: exporter
        mode: Off
