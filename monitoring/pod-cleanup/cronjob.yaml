apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-cleanup
  namespace: pod-cleanup
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: pod-cleanup
          restartPolicy: Never
          containers:
          - name: cleanup
            image: bitnami/kubectl:latest@sha256:175d3e94e675f4d078c60fe097087a2d77dbc9f76d49d4185c83ca79489c2a46
            command:
            - /bin/sh
            - -c
            - |
              echo "Cleaning up Failed pods..."
              kubectl delete pods --field-selector=status.phase=Failed -A --ignore-not-found
              echo "Cleaning up Succeeded pods older than 1h..."
              kubectl delete pods --field-selector=status.phase=Succeeded -A --ignore-not-found
              echo "Done."
