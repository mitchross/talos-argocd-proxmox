apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-cleanup
  namespace: pod-cleanup
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: pod-cleanup
          restartPolicy: Never
          containers:
          - name: cleanup
            image: bitnami/kubectl:latest@sha256:fc4a5171e6c9a379a9dd86d43f851a6247c31ad3b5919e93f13e916820040b0b
            command:
            - /bin/sh
            - -c
            - |
              echo "Cleaning up Failed pods..."
              kubectl delete pods --field-selector=status.phase=Failed -A --ignore-not-found
              echo "Cleaning up Succeeded pods older than 1h..."
              kubectl delete pods --field-selector=status.phase=Succeeded -A --ignore-not-found
              echo "Done."
