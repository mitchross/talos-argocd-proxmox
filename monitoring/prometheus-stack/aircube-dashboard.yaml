# Grafana dashboard for the StuckAtPrototype AirCube Zigbee air-quality monitor
# (paired to Home Assistant via ZHA, exported through HA's /api/prometheus
# endpoint scraped by the home-assistant-metrics ServiceMonitor).
#
# Metric names follow HA's prometheus integration convention:
#   - temperature device_class -> homeassistant_sensor_temperature_celsius (ALWAYS °C; we convert to °F)
#   - humidity device_class    -> homeassistant_sensor_humidity_percent
#   - eCO2 (no device_class)   -> homeassistant_sensor_unit_ppm
#   - tVOC (volatile_organic_compounds_parts device_class)
#                              -> homeassistant_sensor_volatile_organic_compounds_parts_ppb
# (metric names verified live against /api/prometheus on 2026-06-29)
# Sensors are selected by the exact `entity` label (stable across HA restarts).
# Requires the matching `sensor.stuckatprototype_aircube_*` include glob in the
# HA prometheus filter (my-apps/home/home-assistant/configuration.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: aircube-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  aircube-air-quality.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "tags": ["home-assistant", "air-quality", "zigbee", "aircube"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timezone": "browser",
      "title": "Air Quality — AirCube",
      "uid": "aircube-air-quality",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Current",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 2,
          "title": "eCO₂",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "ppm",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 800 },
                  { "color": "orange", "value": 1200 },
                  { "color": "red", "value": 2000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_unit_ppm{entity=\"sensor.stuckatprototype_aircube_equivalent_co2\"}",
              "legendFormat": "eCO₂",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 3,
          "title": "tVOC",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "conppb",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 250 },
                  { "color": "orange", "value": 500 },
                  { "color": "red", "value": 1000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_volatile_organic_compounds_parts_ppb{entity=\"sensor.stuckatprototype_aircube_volatile_organic_compounds_parts\"}",
              "legendFormat": "tVOC",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 4,
          "title": "Temperature",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "fahrenheit",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 65 },
                  { "color": "orange", "value": 78 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_temperature_celsius{entity=\"sensor.stuckatprototype_aircube_temperature\"} * 9 / 5 + 32",
              "legendFormat": "Temperature",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 5,
          "title": "Humidity",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "orange", "value": null },
                  { "color": "green", "value": 30 },
                  { "color": "green", "value": 60 },
                  { "color": "orange", "value": 65 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_humidity_percent{entity=\"sensor.stuckatprototype_aircube_humidity\"}",
              "legendFormat": "Humidity",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 6,
          "title": "History",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 7,
          "title": "eCO₂ over time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "ppm",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1200 },
                  { "color": "red", "value": 2000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["last", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_unit_ppm{entity=\"sensor.stuckatprototype_aircube_equivalent_co2\"}",
              "legendFormat": "eCO₂",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 8,
          "title": "tVOC over time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "conppb",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["last", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_volatile_organic_compounds_parts_ppb{entity=\"sensor.stuckatprototype_aircube_volatile_organic_compounds_parts\"}",
              "legendFormat": "tVOC",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "id": 9,
          "title": "Temperature & Humidity over time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Temperature (°F)" },
                "properties": [{ "id": "unit", "value": "fahrenheit" }]
              },
              {
                "matcher": { "id": "byName", "options": "Humidity (%)" },
                "properties": [
                  { "id": "unit", "value": "percent" },
                  { "id": "custom.axisPlacement", "value": "right" }
                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["last", "min", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_temperature_celsius{entity=\"sensor.stuckatprototype_aircube_temperature\"} * 9 / 5 + 32",
              "legendFormat": "Temperature (°F)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "homeassistant_sensor_humidity_percent{entity=\"sensor.stuckatprototype_aircube_humidity\"}",
              "legendFormat": "Humidity (%)",
              "refId": "B"
            }
          ]
        }
      ]
    }
