# ServiceMonitor for Home Assistant (Tapo power monitoring)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: home-assistant-metrics
  namespace: prometheus-stack
  labels:
    app.kubernetes.io/name: home-assistant
    release: kube-prometheus-stack
    prometheus: kube-prometheus-stack-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  namespaceSelector:
    matchNames:
      - home-assistant
  endpoints:
    - port: http
      interval: 60s
      path: /api/prometheus
---
# ArgoCD metrics are handled by the argo-cd Helm chart's built-in ServiceMonitors
# (enabled via per-component metrics.serviceMonitor.enabled in ArgoCD values.yaml)
---
# ServiceMonitor for kopiur (backup controller). Scrapes
# kopiur-controller-metrics:8081 (kopiur_snapshot_*/kopiur_policy_* backup
# health metrics) — consumed by kopiur-alerts.yaml.
# (The old nvidia-device-plugin ServiceMonitor that lived here matched
# nothing: wrong namespace, and the gpu-operator exposes no device-plugin
# metrics Service on this cluster. Removed 2026-07-06.)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kopiur-controller-metrics
  namespace: prometheus-stack
  labels:
    app.kubernetes.io/name: kopiur
    release: kube-prometheus-stack
    prometheus: kube-prometheus-stack-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kopiur
      app.kubernetes.io/component: controller
  namespaceSelector:
    matchNames:
      - kopiur-system
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
---
# ServiceMonitor for DCGM Exporter (GPU Metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter-metrics
  namespace: prometheus-stack
  labels:
    app.kubernetes.io/name: dcgm-exporter
    app.kubernetes.io/component: gpu-metrics
    release: kube-prometheus-stack
    prometheus: kube-prometheus-stack-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  namespaceSelector:
    matchNames:
      - prometheus-stack
  endpoints:
    - port: http-metrics
      interval: 15s
      path: /metrics
      scrapeTimeout: 10s
---
# ServiceMonitor for Longhorn (if available)
apiVersion: monitoring.coreos.com/v1
