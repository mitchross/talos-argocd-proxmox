          "type": "piechart",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) (homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|truenas_server)_current_consumption\"}), \"plug\", \"$1\", \"entity\", \"sensor\\\\.(.+)_current_consumption\"), \"plug\", \"threadripper-gpus\", \"plug\", \"gpu_psu\")",
              "legendFormat": "{{plug}}",
              "instant": true,
              "refId": "A"
