apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-power-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
# NOTE on the max by (entity) + instant queries below:
# Home Assistant's Prometheus target label (instance/pod) changes on every HA
# pod restart, so Prometheus keeps the OLD pod's series (frozen at their last
# value) for the full retention window. Without dedup, "last value over range"
# panels sum the live series AND every stale one (e.g. a plug appears 2-3x and
# the pie total balloons). `max by (entity)` collapses duplicates to one series
# per entity; `instant: true` on the current-value panels evaluates at now, so
# frozen (stale) series with no recent sample drop out entirely.
#
# Three plugs: gpu_psu, nas_psu, truenas_server. The gpu_psu entity_id is kept
# (preserves history) but the device is now "threadripper-gpus" — the nested
# label_replace(..., "plug", "threadripper-gpus", "plug", "gpu_psu") remaps just
# that legend. (Proxmox was removed — that plug was relocated.)
data:
  homelab-power.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "At a glance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 400 },
                  { "color": "orange", "value": 700 },
                  { "color": "red", "value": 1000 }
                ]
              },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Total Power Now",
          "type": "stat",
          "targets": [
            {
              "expr": "max by (entity) (homeassistant_sensor_power_w{entity=\"sensor.homelab_total_power\"})",
              "legendFormat": "Total",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.23 },
                  { "color": "red", "value": 0.28 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 4
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Current Rate ($/kWh)",
          "type": "stat",
          "targets": [
            {
              "expr": "max by (entity) (homeassistant_sensor_unit_usd_per_kwh{entity=\"sensor.current_electricity_rate\"})",
              "legendFormat": "Rate",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.50 },
                  { "color": "orange", "value": 1.00 },
                  { "color": "red", "value": 2.00 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Cost Today",
          "type": "stat",
          "targets": [
            {
              "expr": "max by (entity) (homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_daily\"})",
              "legendFormat": "USD",
              "instant": true,
