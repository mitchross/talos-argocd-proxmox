              },
              "unit": "currencyUSD",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Cost This Month",
          "type": "stat",
          "targets": [
            {
              "expr": "max by (entity) (homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_monthly\"})",
              "legendFormat": "USD",
