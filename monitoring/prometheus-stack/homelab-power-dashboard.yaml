apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-power-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  homelab-power.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "At a glance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 400 },
                  { "color": "orange", "value": 700 },
                  { "color": "red", "value": 1000 }
                ]
              },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Total Power Now",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=\"sensor.homelab_total_power\"}",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.23 },
                  { "color": "red", "value": 0.28 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 4
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Current Rate ($/kWh)",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd_per_kwh{entity=\"sensor.current_electricity_rate\"}",
              "legendFormat": "Rate",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.50 },
                  { "color": "orange", "value": 1.00 },
                  { "color": "red", "value": 2.00 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Cost Today",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_daily\"}",
              "legendFormat": "USD",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 15 },
                  { "color": "orange", "value": 30 },
                  { "color": "red", "value": 50 }
                ]
              },
              "unit": "currencyUSD",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Cost This Month",
          "type": "stat",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_monthly\"}",
              "legendFormat": "USD",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 6,
          "title": "Share of homelab draw",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 7,
          "options": {
            "pieType": "donut",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": ["value", "percent"]
            },
            "tooltip": { "mode": "multi" }
          },
          "title": "Power Share — Per Plug",
          "type": "piechart",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent",
              "decimals": 1,
              "min": 0,
              "max": 100,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 8,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Percent of Homelab Total",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_current_consumption\"} / scalar(homeassistant_sensor_power_w{entity=\"sensor.homelab_total_power\"}) * 100",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 9,
          "title": "Per-plug power",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "watt",
              "decimals": 1,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 17 },
          "id": 10,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Live Draw — Per Plug",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 25,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "normal" }
              }
            }
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 25 },
          "id": 11,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["mean", "max", "lastNotNull"]
            }
          },
          "title": "Stacked Power — Homelab",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_current_consumption\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 34 },
          "id": 12,
          "title": "Cost",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "currencyUSD",
              "decimals": 2,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 35 },
          "id": 13,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Cost Today — Per Plug",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_cost_daily\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "currencyUSD",
              "decimals": 2,
              "custom": { "displayMode": "gradient" }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 35 },
          "id": 14,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Cost This Month — Per Plug",
          "type": "bargauge",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_cost_monthly\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 43 },
          "id": 15,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["lastNotNull"]
            }
          },
          "title": "Cost Accrual Today (resets at midnight)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_unit_usd{entity=\"sensor.homelab_cost_daily\"}",
              "legendFormat": "Homelab Total",
              "refId": "A"
            },
            {
              "expr": "homeassistant_sensor_unit_usd{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_cost_daily\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 51 },
          "id": 16,
          "options": {
            "mode": "markdown",
            "content": "**Weekly / monthly / yearly cost & energy history lives in Home Assistant** (Settings → Energy, and the *Homelab Power* dashboard). Prometheus retains only ~15 days, so this Grafana board is real-time + recent detail; long-term trends are kept forever in HA Long-Term Statistics."
          },
          "title": "",
          "type": "text"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 54 },
          "id": 17,
          "title": "Electrical",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "volt",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 55 },
          "id": 18,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Voltage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_voltage_v{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_voltage\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "amp",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 55 },
          "id": 19,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Current",
          "type": "timeseries",
          "targets": [
            {
              "expr": "homeassistant_sensor_current_a{entity=~\"sensor\\\\.(gpu_psu|nas_psu|proxmox_server|truenas_server)_current\"}",
              "legendFormat": "{{friendly_name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["homelab", "power", "cost", "tapo", "home-assistant"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Homelab Power & Cost",
      "uid": "homelab-power-cost",
      "version": 2
    }
