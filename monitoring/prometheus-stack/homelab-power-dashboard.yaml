          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 8,
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "title": "Percent of Homelab Total",
          "type": "bargauge",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) (homeassistant_sensor_power_w{entity=~\"sensor\\\\.(gpu_psu|nas_psu|truenas_server)_current_consumption\"}), \"plug\", \"$1\", \"entity\", \"sensor\\\\.(.+)_current_consumption\"), \"plug\", \"threadripper-gpus\", \"plug\", \"gpu_psu\") / scalar(max(homeassistant_sensor_power_w{entity=\"sensor.homelab_total_power\"})) * 100",
              "legendFormat": "{{plug}}",
              "instant": true,
              "refId": "A"
