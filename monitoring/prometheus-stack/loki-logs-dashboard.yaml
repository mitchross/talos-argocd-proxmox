apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-logs-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  loki-logs-app.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Log Lines",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 50,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Log Volume",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
              "expr": "sum by (k8s_container_name) (count_over_time({service_name=\"$app\"} |= \"$search\" [$__auto]))",
              "legendFormat": "{{k8s_container_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 6 },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "title": "Logs",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
              "expr": "{service_name=\"$app\"} |= \"$search\"",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "tags": ["loki", "logs"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
            "definition": "label_values(service_name)",
            "hide": 0,
            "includeAll": false,
            "label": "App",
            "multi": false,
            "name": "app",
            "options": [],
            "query": "label_values(service_name)",
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          },
          {
            "current": { "selected": false, "text": "", "value": "" },
            "hide": 0,
            "label": "String Match",
            "name": "search",
            "options": [
              { "selected": true, "text": "", "value": "" }
            ],
            "query": "",
            "type": "textbox"
          },
          {
            "current": {},
            "hide": 2,
            "includeAll": false,
            "label": "Loki",
            "multi": false,
            "name": "DS_LOKI",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Logs / App (OTEL)",
      "uid": "loki-logs-otel",
      "version": 1
    }
