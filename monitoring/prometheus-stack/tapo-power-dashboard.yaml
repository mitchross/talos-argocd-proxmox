apiVersion: v1
kind: ConfigMap
metadata:
  name: tapo-power-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  tapo-power-monitoring.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "title": "Current Power",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 100
                  },
                  {
                    "color": "orange",
                    "value": 500
                  },
                  {
                    "color": "red",
                    "value": 1000
                  }
                ]
              },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 1
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Live Power Draw",
          "type": "stat",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_power_w|homeassistant_sensor_current_consumption_w\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 3,
          "title": "Power Over Time",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": {
                  "mode": "none"
                }
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "id": 4,
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          },
          "title": "Power Consumption Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_power_w|homeassistant_sensor_current_consumption_w\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 20
          },
          "id": 5,
          "title": "Energy Usage",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "orange",
                    "value": 5
                  }
                ]
              },
              "unit": "kwatth",
              "decimals": 2
            }
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 21
          },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Energy Today",
          "type": "stat",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_energy_kwh|homeassistant_sensor_today_energy_kwh\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 27
          },
          "id": 7,
          "title": "Voltage & Current",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "volt",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 28
          },
          "id": 8,
          "options": {
            "tooltip": {
              "mode": "multi"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "title": "Voltage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_voltage_v\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "amp",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false
              }
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 28
          },
          "id": 9,
          "options": {
            "tooltip": {
              "mode": "multi"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "title": "Current",
          "type": "timeseries",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_current_a\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 36
          },
          "id": 10,
          "title": "Total Power (All Plugs)",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 25,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": {
                  "mode": "normal"
                }
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 37
          },
          "id": 11,
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          },
          "title": "Stacked Power (All Plugs)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "{__name__=~\"homeassistant_sensor_power_w|homeassistant_sensor_current_consumption_w\", entity!=\"\"}",
              "legendFormat": "{{friendly_name}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "tapo",
        "power",
        "energy",
        "smart-plug",
        "home-assistant"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Tapo Power Monitor",
      "uid": "tapo-power-monitor",
      "version": 1
    }
