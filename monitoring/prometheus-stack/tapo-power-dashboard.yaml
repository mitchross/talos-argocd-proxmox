apiVersion: v1
kind: ConfigMap
metadata:
  name: tapo-power-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
# Every query is deduped with `max by (entity)` and the stat panels use
# `instant: true`. Home Assistant's Prometheus target label changes on each HA
# pod restart, so Prometheus keeps the old pod's series (frozen at their last
# value) for the retention window; without dedup a plug appears 2-3x. Legends
# use label_replace(entity) instead of friendly_name because the friendly_name
# can change across pod generations (a device rename), which would defeat
# grouping. The gpu_psu entity_id is kept (preserves history) but the device is
# now "threadripper-gpus" — the second label_replace remaps just that prefix.
# (Proxmox was removed — that plug was relocated.)
data:
  tapo-power-monitoring.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Current Power",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "orange", "value": 500 },
                  { "color": "red", "value": 1000 }
                ]
              },
              "unit": "watt",
              "decimals": 1
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Live Power Draw",
          "type": "stat",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=~\"homeassistant_sensor_power_w|homeassistant_sensor_current_consumption_w\", entity!=\"\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 3,
          "title": "Power Over Time",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              }
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 10 },
          "id": 4,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["mean", "max", "lastNotNull"]
            }
          },
          "title": "Power Consumption Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=~\"homeassistant_sensor_power_w|homeassistant_sensor_current_consumption_w\", entity!=\"\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 20 },
          "id": 5,
          "title": "Energy Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 5 }
                ]
              },
              "unit": "kwatth",
              "decimals": 2
            }
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 21 },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "wideLayout": true
          },
          "title": "Energy Today",
          "type": "stat",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=~\"homeassistant_sensor_energy_kwh|homeassistant_sensor_today_energy_kwh\", entity!=\"\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 7,
          "title": "Voltage & Current",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "volt",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "id": 8,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Voltage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=~\"homeassistant_sensor_voltage_v\", entity!=\"\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "amp",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "spanNulls": false }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "id": 9,
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "title": "Current",
          "type": "timeseries",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=~\"homeassistant_sensor_current_a\", entity!=\"\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 36 },
          "id": 10,
          "title": "Total Power (All Plugs)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "custom": {
                "fillOpacity": 25,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "normal" }
              }
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 37 },
          "id": 11,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["mean", "max", "lastNotNull"]
            }
          },
          "title": "Stacked Power (All Plugs)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "label_replace(label_replace(max by (entity) ({__name__=\"homeassistant_sensor_power_w\", entity=~\"sensor\\\\.(gpu_psu|nas_psu|truenas_server)_current_consumption\"}), \"name\", \"$1\", \"entity\", \"sensor\\\\.(.*)\"), \"name\", \"threadripper-gpus$1\", \"name\", \"gpu_psu(.*)\")",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["tapo", "power", "energy", "smart-plug", "home-assistant"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Tapo Power Monitor",
      "uid": "tapo-power-monitor",
      "version": 3
    }
