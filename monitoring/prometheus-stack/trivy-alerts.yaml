# Trivy vulnerability alerting — pairs with monitoring/trivy-operator (phase-1
# vuln + exposed-secret scanning). Metrics come from the trivy-operator
# ServiceMonitor; the gauge is trivy_image_vulnerabilities{severity,namespace,
# image_repository,image_tag,...} = current count per workload image.
#
# Design note: alerting on any critical would be an instant storm. Instead we
# alert only when a SINGLE active image has accumulated a large critical count
# — the signal that an image is badly out of date and worth a tag bump / base
# rebuild. Trivy retains reports for old Deployment ReplicaSets, so the query
# joins ReplicaSet reports to kube-state-metrics and excludes scaled-to-zero
# revisions. Aggregated with max by(image) so shared images don't multi-fire.
#
# Deliberately NOT alerting on trivy_image_exposedsecrets yet: the only current
# hits are upstream test fixtures inside Ruby gems (false positives). Add a
# .trivyignore for those first, then an exposed-secret alert becomes meaningful.
#
# Exposure-scoped alerting (only internet-facing apps) was considered but the
# metric carries no exposure label; a hand-maintained namespace allowlist is
# brittle homelab busywork, so we key on severity volume instead.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trivy-alerts
  namespace: prometheus-stack
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    prometheus: kube-prometheus-stack-prometheus
    role: alert-rules
spec:
  groups:
    - name: trivy.vulnerabilities
      rules:
        - alert: TrivyImageHighCriticalCount
          # Tunable threshold. >15 surfaces the handful of badly outdated
          # active images without flagging every image. Non-ReplicaSet reports
          # pass through; ReplicaSet reports must have at least one live replica.
          expr: >-
            max by (namespace, image_repository, image_tag) (
              trivy_image_vulnerabilities{
                severity="Critical",
                resource_kind!="ReplicaSet"
              }
              or
              (
                trivy_image_vulnerabilities{
                  severity="Critical",
                  resource_kind="ReplicaSet"
                }
                and on(namespace, resource_name)
                label_replace(
                  kube_replicaset_status_replicas > 0,
                  "resource_name",
                  "$1",
                  "replicaset",
                  "(.+)"
                )
              )
            ) > 15
          for: 30m
          labels:
            severity: warning
            component: trivy-operator
            category: security
          annotations:
            summary: "{{ $labels.image_repository }}:{{ $labels.image_tag }} has {{ $value }} critical CVEs"
            description: >-
              Image {{ $labels.image_repository }}:{{ $labels.image_tag }} in
              namespace {{ $labels.namespace }} has {{ $value }} fixable CRITICAL
              vulnerabilities (ignoreUnfixed is on, so all are actionable). Bump
              the image tag or rebuild it on a newer base image, then re-scan.
