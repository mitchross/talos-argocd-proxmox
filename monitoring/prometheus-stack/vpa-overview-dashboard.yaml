apiVersion: v1
kind: ConfigMap
metadata:
  name: vpa-overview-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  vpa-resource-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Shows which containers are over-provisioned (wasting resources), under-provisioned (risk of OOM/throttling), or right-sized.",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false,
                "filterable": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Memory Status" },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "mode": "basic",
                      "type": "color-background"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "Over-provisioned": { "color": "blue", "index": 0 } }, "type": "value" },
                      { "options": { "Under-provisioned": { "color": "red", "index": 1 } }, "type": "value" },
                      { "options": { "Right-sized": { "color": "green", "index": 2 } }, "type": "value" }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "CPU Status" },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "mode": "basic",
                      "type": "color-background"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "Over-provisioned": { "color": "blue", "index": 0 } }, "type": "value" },
                      { "options": { "Under-provisioned": { "color": "red", "index": 1 } }, "type": "value" },
                      { "options": { "Right-sized": { "color": "green", "index": 2 } }, "type": "value" }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Memory Savings" },
                "properties": [
                  { "id": "unit", "value": "bytes" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "orange", "value": 0 },
                        { "color": "green", "value": 104857600 }
                      ]
                    }
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "mode": "basic",
                      "type": "color-text"
                    }
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "CPU Savings" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "decimals", "value": 3 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "orange", "value": 0 },
                        { "color": "green", "value": 0.1 }
                      ]
                    }
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "mode": "basic",
                      "type": "color-text"
                    }
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Current Memory" },
                "properties": [ { "id": "unit", "value": "bytes" } ]
              },
              {
                "matcher": { "id": "byName", "options": "VPA Memory Target" },
                "properties": [ { "id": "unit", "value": "bytes" } ]
              },
              {
                "matcher": { "id": "byName", "options": "Current CPU" },
                "properties": [ { "id": "unit", "value": "short" }, { "id": "decimals", "value": 3 } ]
              },
              {
                "matcher": { "id": "byName", "options": "VPA CPU Target" },
                "properties": [ { "id": "unit", "value": "short" }, { "id": "decimals", "value": 3 } ]
              }
            ]
          },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "sortBy": [
              { "desc": true, "displayName": "Memory Savings" }
            ],
            "footer": { "enablePagination": true }
          },
          "title": "VPA Resource Sizing Overview",
          "type": "table",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "label_replace(\n  kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"}\n  * on(namespace, pod) group_left()\n  (kube_pod_status_phase{phase=\"Running\"} == 1),\n  \"workload\", \"$1\", \"pod\", \"(.+)-[a-z0-9]+-[a-z0-9]+$\"\n)",
              "format": "table",
              "instant": true,
              "refId": "mem_requests"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"memory\", unit=\"byte\"}",
              "format": "table",
              "instant": true,
              "refId": "mem_target"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"}  * on(namespace, pod) group_left()  (kube_pod_status_phase{phase=\"Running\"} == 1)",
              "format": "table",
              "instant": true,
              "refId": "cpu_requests"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"cpu\", unit=\"core\"}",
              "format": "table",
              "instant": true,
              "refId": "cpu_target"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "verticalpodautoscaler_status_recommendation_containerrecommendations_lowerbound{resource=\"memory\", unit=\"byte\"}",
              "format": "table",
              "instant": true,
              "refId": "mem_lower"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "verticalpodautoscaler_status_recommendation_containerrecommendations_upperbound{resource=\"memory\", unit=\"byte\"}",
              "format": "table",
              "instant": true,
              "refId": "mem_upper"
            }
          ],
          "transformations": [
            {
              "id": "joinByField",
              "options": { "byField": "container", "mode": "outer" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "__name__": true,
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "Time 5": true,
                  "Time 6": true,
                  "job": true,
                  "job 1": true,
                  "job 2": true,
                  "job 3": true,
                  "job 4": true,
                  "job 5": true,
                  "job 6": true,
                  "instance": true,
                  "instance 1": true,
                  "instance 2": true,
                  "instance 3": true,
                  "instance 4": true,
                  "instance 5": true,
                  "instance 6": true,
                  "resource": true,
                  "resource 1": true,
                  "resource 2": true,
                  "resource 3": true,
                  "resource 4": true,
                  "resource 5": true,
                  "resource 6": true,
                  "unit": true,
                  "unit 1": true,
                  "unit 2": true,
                  "unit 3": true,
                  "unit 4": true,
                  "unit 5": true,
                  "unit 6": true,
                  "uid": true,
                  "uid 1": true,
                  "uid 2": true,
                  "uid 3": true,
                  "uid 4": true,
                  "uid 5": true,
                  "uid 6": true,
                  "endpoint": true,
                  "endpoint 1": true,
                  "endpoint 2": true,
                  "endpoint 3": true,
                  "endpoint 4": true,
                  "endpoint 5": true,
                  "endpoint 6": true,
                  "service": true,
                  "service 1": true,
                  "service 2": true,
                  "service 3": true,
                  "service 4": true,
                  "service 5": true,
                  "service 6": true,
                  "pod": true,
                  "pod 1": true,
                  "pod 2": true,
                  "node": true,
                  "node 1": true,
                  "verticalpodautoscaler": true,
                  "verticalpodautoscaler 1": true,
                  "verticalpodautoscaler 2": true,
                  "verticalpodautoscaler 3": true,
                  "verticalpodautoscaler 4": true,
                  "workload": true
                },
                "indexByName": {},
                "renameByName": {
                  "namespace": "Namespace",
                  "namespace 1": "Namespace",
                  "container": "Container",
                  "Value #mem_requests": "Current Memory",
                  "Value #mem_target": "VPA Memory Target",
                  "Value #cpu_requests": "Current CPU",
                  "Value #cpu_target": "VPA CPU Target",
                  "Value #mem_lower": "Memory Lower Bound",
                  "Value #mem_upper": "Memory Upper Bound"
                }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Memory Savings",
                "mode": "binary",
                "binary": {
                  "left": "Current Memory",
                  "operator": "-",
                  "right": "VPA Memory Target"
                },
                "reduce": { "reducer": "sum" }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "CPU Savings",
                "mode": "binary",
                "binary": {
                  "left": "Current CPU",
                  "operator": "-",
                  "right": "VPA CPU Target"
                },
                "reduce": { "reducer": "sum" }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Memory Status",
                "mode": "binary",
                "binary": {
                  "left": "Memory Savings",
                  "operator": "+",
                  "right": "Memory Savings"
                },
                "reduce": { "reducer": "sum" }
              }
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers where current memory requests significantly exceed VPA recommendations — you're paying for resources you don't need.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Over-provisioned Memory (wasted)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10,\n  kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"}\n  * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n  - on(namespace, container) group_left()\n  verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"memory\", unit=\"byte\"}\n  > 104857600\n)",
              "legendFormat": "{{namespace}}/{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers where VPA recommends more memory than currently allocated — at risk of OOM kills.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null }
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Under-provisioned Memory (OOM risk)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10,\n  verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"memory\", unit=\"byte\"}\n  - on(namespace, container) group_left()\n  kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"}\n  * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n  > 52428800\n)",
              "legendFormat": "{{namespace}}/{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers where current CPU requests significantly exceed VPA recommendations.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "short",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Over-provisioned CPU (wasted cores)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10,\n  kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"}\n  * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n  - on(namespace, container) group_left()\n  verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"cpu\", unit=\"core\"}\n  > 0.05\n)",
              "legendFormat": "{{namespace}}/{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers where VPA recommends more CPU than currently allocated — at risk of throttling.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null }
                ]
              },
              "unit": "short",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Under-provisioned CPU (throttling risk)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10,\n  verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"cpu\", unit=\"core\"}\n  - on(namespace, container) group_left()\n  kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"}\n  * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n  > 0.05\n)",
              "legendFormat": "{{namespace}}/{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 32 },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Total Memory You Could Reclaim",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(\n  clamp_min(\n    kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"}\n    * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n    - on(namespace, container) group_left()\n    verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"memory\", unit=\"byte\"},\n    0\n  )\n)",
              "legendFormat": "Reclaimable",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 32 },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Total CPU Cores You Could Reclaim",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(\n  clamp_min(\n    kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"}\n    * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n    - on(namespace, container) group_left()\n    verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"cpu\", unit=\"core\"},\n    0\n  )\n)",
              "legendFormat": "Reclaimable",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "orange", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 32 },
          "id": 8,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Containers Missing VPA",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(\n  kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"}\n  * on(namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1)\n  unless on(namespace, container)\n  verticalpodautoscaler_status_recommendation_containerrecommendations_target{resource=\"memory\", unit=\"byte\"}\n)",
              "legendFormat": "Missing",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "tags": ["vpa", "kubernetes", "resources", "cost"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "VPA Resource Sizing Overview",
      "uid": "vpa-resource-overview",
      "version": 1
    }
