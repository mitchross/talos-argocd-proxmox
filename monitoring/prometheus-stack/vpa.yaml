# VPA policy is owned with this application so Argo prunes it with the target.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: prometheus
  namespace: prometheus-stack
spec:
  # Target the operator's top-level CR, not its generated StatefulSet. This
  # keeps the VPA attached across operator-controlled pod revisions.
  targetRef:
    apiVersion: monitoring.coreos.com/v1
    kind: Prometheus
    name: kube-prometheus-stack-prometheus
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: prometheus
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 8Gi
      - containerName: config-reloader
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: alertmanager
  namespace: prometheus-stack
spec:
  # Target the operator's top-level CR for the same ownership reason as
  # Prometheus above.
  targetRef:
    apiVersion: monitoring.coreos.com/v1
    kind: Alertmanager
    name: kube-prometheus-stack-alertmanager
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: alertmanager
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "1"
          memory: 1Gi
      - containerName: config-reloader
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: grafana
  namespace: prometheus-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kube-prometheus-stack-grafana
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: grafana
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 2Gi
      - containerName: grafana-sc-dashboard
        mode: Off
      - containerName: grafana-sc-datasources
        mode: Off
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: kube-state-metrics
  namespace: prometheus-stack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kube-prometheus-stack-kube-state-metrics
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "1"
          memory: 1Gi
