apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# INTENTIONAL OUTLIER: tempo deploys into `monitoring` (every other
# monitoring/* app gets its own namespace). Moving it means PVC churn and
# Grafana datasource-URL updates for zero functional gain — leave it unless
# tempo is ever rebuilt from scratch.
namespace: monitoring
resources:
- vpa.yaml
- ns.yaml
- externalsecret.yaml
helmCharts:
- name: tempo
  repo: https://grafana.github.io/helm-charts
  version: 1.24.4 # Latest
  releaseName: tempo
  valuesFile: values.yaml
