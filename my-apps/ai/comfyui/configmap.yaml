apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-manager-config
  namespace: comfyui
data:
  config.ini: |
    [default]
    preview_method = auto
    git_exe =
    use_uv = True
    channel_url = https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main
    share_option = all
    bypass_ssl = False
    file_logging = False
    component_policy = workflow
    update_policy = stable-comfyui
    windows_selector_event_loop_policy = False
    model_download_by_agent = False
    downgrade_blacklist =
    security_level = normal
    always_lazy_install = False
    network_mode = public
    db_mode = cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-pre-start
  namespace: comfyui
data:
  pre-start.sh: |
    #!/bin/bash
    set -eu

    # ── Git Config ─────────────────────────────────────────────
    git config --global core.fileMode false || true

    # ── Custom Node Management ─────────────────────────────────
    # Clone or update a custom node from a git repo
    install_node() {
      local repo="$1"
      local name
      name="$(basename "$repo" .git)"
      local dest="/root/ComfyUI/custom_nodes/$name"

      if [ -d "$dest/.git" ]; then
        echo "[INFO] Updating $name..."
        cd "$dest" && git pull --ff-only || true
      elif [ -d "$dest" ]; then
        echo "[INFO] $name already installed (non-git), skipping"
      elif [ -d "/root/ComfyUI/custom_nodes" ]; then
        echo "[INFO] Installing $name..."
        git clone "$repo" "$dest"
      fi
    }

    echo "[INFO] Managing custom nodes..."
    install_node "https://github.com/FranckyB/ComfyUI-Prompt-Manager.git"
    install_node "https://github.com/kijai/ComfyUI-WanVideoWrapper.git"
    install_node "https://github.com/PanicTitan/ComfyUI-Gallery.git"
    install_node "https://github.com/fidecastro/comfyui-llamacpp-client.git"

    # ── Python Dependencies ────────────────────────────────────
    echo "[INFO] Installing Python dependencies..."
    uv pip install --system --upgrade transformers
    uv pip install --system "bitsandbytes>=0.46.1"
    uv pip install --system colorama huggingface_hub   # Prompt-Manager
    uv pip install --system watchdog piexif aiohttp     # Gallery
    uv pip install --system pywavelets                  # RES4LYF

    # ── System Setup ───────────────────────────────────────────
    mkdir -p /usr/share/fonts/truetype

    # ── Bridge Nodes (from ConfigMap) ─────────────────────────
    echo "[INFO] Installing bridge nodes..."
    cp /opt/custom-nodes/image_to_llamacpp_base64.py \
       /root/ComfyUI/custom_nodes/image_to_llamacpp_base64.py

    # ── Example Workflows ──────────────────────────────────────
    DEST="/root/ComfyUI/user/default/workflows"
    mkdir -p "$DEST"
    SRC="/root/ComfyUI/custom_nodes/ComfyUI-WanVideoWrapper/example_workflows"
    if [ -d "$SRC" ]; then
      cp -f "$SRC"/*.json "$DEST/" 2>/dev/null && \
        echo "[INFO] Copied Wan 2.2 example workflows" || true
    fi

    echo "[INFO] Pre-start setup complete."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-custom-nodes
  namespace: comfyui
data:
  image_to_llamacpp_base64.py: |
    """Bridge node: converts ComfyUI IMAGE tensor to base64 JSON for LlamaCppClient."""

    import base64
    import io
    import json

    import numpy as np
    from PIL import Image


    class ImageToLlamaCppBase64:
        @classmethod
        def INPUT_TYPES(cls):
            return {
                "required": {
                    "image": ("IMAGE",),
                },
                "optional": {
                    "prompt": (
                        "STRING",
                        {
                            "default": "Describe this image in rich detail for use as an image generation prompt. "
                            "Focus on subject, composition, lighting, colors, style, and mood. "
                            "Output only the prompt text, no preamble.",
                            "multiline": True,
                        },
                    ),
                },
            }

        RETURN_TYPES = ("STRING", "STRING")
        RETURN_NAMES = ("image_data", "user_message")
        FUNCTION = "convert"
        CATEGORY = "AI/LlamaCpp"

        def convert(
            self,
            image,
            prompt="Describe this image in rich detail for use as an image generation prompt. "
            "Focus on subject, composition, lighting, colors, style, and mood. "
            "Output only the prompt text, no preamble.",
        ):
            # IMAGE tensor shape: [batch, height, width, channels] float32 0-1
            img_array = (image[0].cpu().numpy() * 255).astype(np.uint8)
            pil_image = Image.fromarray(img_array)

            buffer = io.BytesIO()
            pil_image.save(buffer, format="PNG")
            b64_str = base64.b64encode(buffer.getvalue()).decode("utf-8")

            image_data = json.dumps([{"data": f"data:image/png;base64,{b64_str}", "id": 1}])
            user_message = f"[img-1] {prompt}"

            return (image_data, user_message)


    NODE_CLASS_MAPPINGS = {
        "ImageToLlamaCppBase64": ImageToLlamaCppBase64,
    }

    NODE_DISPLAY_NAME_MAPPINGS = {
        "ImageToLlamaCppBase64": "Image to LlamaCpp Base64",
    }
