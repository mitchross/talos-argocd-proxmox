apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-manager-config
  namespace: comfyui
data:
  config.ini: |
    [default]
    preview_method = auto
    git_exe =
    use_uv = True
    channel_url = https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main
    share_option = all
    bypass_ssl = False
    file_logging = False
    component_policy = workflow
    update_policy = stable-comfyui
    windows_selector_event_loop_policy = False
    model_download_by_agent = False
    downgrade_blacklist =
    security_level = normal
    always_lazy_install = False
    network_mode = public
    db_mode = cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-pre-start
  namespace: comfyui
data:
  pre-start.sh: |
    #!/bin/bash
    set -eu

    # ── Git Config ─────────────────────────────────────────────
    git config --global core.fileMode false || true

    # ── Custom Node Management ─────────────────────────────────
    # Clone or update a custom node from a git repo
    install_node() {
      local repo="$1"
      local name
      name="$(basename "$repo" .git)"
      local dest="/root/ComfyUI/custom_nodes/$name"

      if [ -d "$dest/.git" ]; then
        echo "[INFO] Updating $name..."
        cd "$dest" && git pull --ff-only || true
      elif [ -d "$dest" ]; then
        echo "[INFO] $name already installed (non-git), skipping"
      elif [ -d "/root/ComfyUI/custom_nodes" ]; then
        echo "[INFO] Installing $name..."
        git clone "$repo" "$dest"
      fi
    }

    echo "[INFO] Managing custom nodes..."
    install_node "https://github.com/FranckyB/ComfyUI-Prompt-Manager.git"
    install_node "https://github.com/kijai/ComfyUI-WanVideoWrapper.git"
    install_node "https://github.com/PanicTitan/ComfyUI-Gallery.git"
    install_node "https://github.com/fidecastro/comfyui-llamacpp-client.git"

    # ── Python Dependencies ────────────────────────────────────
    echo "[INFO] Installing Python dependencies..."
    uv pip install --system --upgrade transformers
    uv pip install --system "bitsandbytes>=0.46.1"
    uv pip install --system colorama huggingface_hub   # Prompt-Manager
    uv pip install --system watchdog piexif aiohttp     # Gallery
    uv pip install --system pywavelets                  # RES4LYF

    # ── System Setup ───────────────────────────────────────────
    mkdir -p /usr/share/fonts/truetype

    # ── Example Workflows ──────────────────────────────────────
    DEST="/root/ComfyUI/user/default/workflows"
    mkdir -p "$DEST"
    SRC="/root/ComfyUI/custom_nodes/ComfyUI-WanVideoWrapper/example_workflows"
    if [ -d "$SRC" ]; then
      cp -f "$SRC"/*.json "$DEST/" 2>/dev/null && \
        echo "[INFO] Copied Wan 2.2 example workflows" || true
    fi

    echo "[INFO] Pre-start setup complete."
