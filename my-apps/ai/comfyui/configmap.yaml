apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-manager-config
  namespace: comfyui
data:
  config.ini: |
    [default]
    preview_method = auto
    git_exe =
    use_uv = True
    channel_url = https://raw.githubusercontent.com/ltdrdata/ComfyUI-Manager/main
    share_option = all
    bypass_ssl = False
    file_logging = False
    component_policy = workflow
    update_policy = stable-comfyui
    windows_selector_event_loop_policy = False
    model_download_by_agent = False
    downgrade_blacklist =
    security_level = normal
    always_lazy_install = False
    network_mode = cache
    db_mode = cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-pre-start
  namespace: comfyui
data:
  pre-start.sh: |
    #!/bin/bash
    set -eu

    # ── Git Config ─────────────────────────────────────────────
    git config --global core.fileMode false || true

    # ── Custom Node Management ─────────────────────────────────
    # Clone only if missing. Updates are done via ComfyUI Manager UI.
    install_node() {
      local repo="$1"
      local name
      name="$(basename "$repo" .git)"
      local dest="/root/ComfyUI/custom_nodes/$name"

      if [ -d "$dest" ]; then
        echo "[SKIP] $name already installed"
      elif [ -d "/root/ComfyUI/custom_nodes" ]; then
        echo "[INFO] Installing $name..."
        git clone --depth 1 "$repo" "$dest"
      fi
    }

    echo "[INFO] Managing custom nodes..."
    install_node "https://github.com/FranckyB/ComfyUI-Prompt-Manager.git"
    install_node "https://github.com/kijai/ComfyUI-WanVideoWrapper.git"
    install_node "https://github.com/PanicTitan/ComfyUI-Gallery.git"
    install_node "https://github.com/fidecastro/comfyui-llamacpp-client.git"

    # ── Python Dependencies ────────────────────────────────────
    # uv resolves quickly and skips already-installed; --link-mode copy avoids NFS hardlink warnings
    echo "[INFO] Installing Python dependencies..."
    UV_LINK_MODE=copy uv pip install --system \
      transformers "bitsandbytes>=0.46.1" \
      colorama huggingface_hub \
      watchdog piexif aiohttp \
      pywavelets

    # ── System Setup ───────────────────────────────────────────
    mkdir -p /usr/share/fonts/truetype

    # ── Bridge Nodes (from ConfigMap) ─────────────────────────
    echo "[INFO] Installing bridge nodes..."
    cp /opt/custom-nodes/image_to_llamacpp_base64.py \
       /root/ComfyUI/custom_nodes/image_to_llamacpp_base64.py

    # ── Example Workflows ──────────────────────────────────────
    DEST="/root/ComfyUI/user/default/workflows"
    mkdir -p "$DEST"
    SRC="/root/ComfyUI/custom_nodes/ComfyUI-WanVideoWrapper/example_workflows"
    if [ -d "$SRC" ]; then
      cp -f "$SRC"/*.json "$DEST/" 2>/dev/null && \
        echo "[INFO] Copied Wan 2.2 example workflows" || true
    fi

    echo "[INFO] Pre-start setup complete."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comfyui-custom-nodes
  namespace: comfyui
data:
  image_to_llamacpp_base64.py: |
    """Bridge nodes for LlamaCpp vision integration in ComfyUI."""

    import base64
    import io
    import json
    import re
    import urllib.request
    import urllib.error

    import numpy as np
    from PIL import Image

    _DEFAULT_SERVER = "http://llama-cpp-service.llama-cpp.svc.cluster.local:8080"
    _DEFAULT_MODEL = "general - qwen3.5"


    def _image_to_base64(image_tensor):
        """Convert ComfyUI IMAGE tensor [B,H,W,C] to base64 PNG string."""
        img_array = (image_tensor[0].cpu().numpy() * 255).astype(np.uint8)
        pil_image = Image.fromarray(img_array)
        buffer = io.BytesIO()
        pil_image.save(buffer, format="PNG")
        return base64.b64encode(buffer.getvalue()).decode("utf-8")


    def _chat_completion(server_url, model, messages, temperature, max_tokens):
        """Call llama.cpp /v1/chat/completions and return the text response."""
        payload = {
            "model": model,
            "messages": messages,
            "temperature": temperature,
            "max_tokens": max_tokens,
            "stream": False,
        }

        url = f"{server_url.rstrip('/')}/v1/chat/completions"
        req = urllib.request.Request(
            url,
            data=json.dumps(payload).encode("utf-8"),
            headers={"Content-Type": "application/json"},
            method="POST",
        )

        try:
            with urllib.request.urlopen(req, timeout=120) as resp:
                result = json.loads(resp.read().decode("utf-8"))
        except urllib.error.HTTPError as e:
            body = e.read().decode("utf-8", errors="replace")
            return f"[ERROR {e.code}] {body[:500]}"
        except Exception as e:
            return f"[ERROR] {e}"

        choice = result.get("choices", [{}])[0]
        message = choice.get("message", {})
        text = message.get("content", "").strip()
        if not text:
            text = message.get("reasoning_content", "").strip()
        if not text:
            text = json.dumps(result)
        return _strip_thinking(text)


    def _strip_thinking(text):
        """Remove any thinking/reasoning blocks that leak into model output."""
        text = re.sub(r"<think>.*?</think>", "", text, flags=re.DOTALL).strip()
        match = re.search(r"<PROMPT>(.*?)</PROMPT>", text, flags=re.DOTALL)
        if match:
            return match.group(1).strip()
        return text


    class ImageToLlamaCppBase64:
        """Converts ComfyUI IMAGE tensor to base64 JSON for LlamaCppClient node."""

        @classmethod
        def INPUT_TYPES(cls):
            return {
                "required": {
                    "image": ("IMAGE",),
                },
                "optional": {
                    "prompt": (
                        "STRING",
                        {
                            "default": "Describe this image in rich detail for use as an image generation prompt. "
                            "Focus on subject, composition, lighting, colors, style, and mood. "
                            "Output only the prompt text, no preamble.",
                            "multiline": True,
                        },
                    ),
                },
            }

        RETURN_TYPES = ("STRING", "STRING")
        RETURN_NAMES = ("image_data", "user_message")
        FUNCTION = "convert"
        CATEGORY = "AI/LlamaCpp"

        def convert(
            self,
            image,
            prompt="Describe this image in rich detail for use as an image generation prompt. "
            "Focus on subject, composition, lighting, colors, style, and mood. "
            "Output only the prompt text, no preamble.",
        ):
            b64_str = _image_to_base64(image)
            image_data = json.dumps([{"data": f"data:image/png;base64,{b64_str}", "id": 1}])
            user_message = f"[img-1] {prompt}"
            return (image_data, user_message)


    class LlamaCppVisionCaption:
        """Sends an image to a llama.cpp vision model and returns the caption text."""

        @classmethod
        def INPUT_TYPES(cls):
            return {
                "required": {
                    "image": ("IMAGE",),
                },
                "optional": {
                    "prompt": (
                        "STRING",
                        {
                            "default": "Describe this image in rich detail for use as an image generation prompt. "
                            "Focus on subject, composition, lighting, colors, style, and mood. "
                            "Output only the prompt text, no preamble.",
                            "multiline": True,
                        },
                    ),
                    "system_message": (
                        "STRING",
                        {
                            "default": "You are an expert image description assistant. Produce a detailed, vivid "
                            "text-to-image prompt that would recreate the given image. Include subject, setting, "
                            "lighting, colors, composition, artistic style, and mood. Output ONLY the prompt text.",
                            "multiline": True,
                        },
                    ),
                    "server_url": ("STRING", {"default": _DEFAULT_SERVER}),
                    "model": ("STRING", {"default": _DEFAULT_MODEL}),
                    "temperature": ("FLOAT", {"default": 0.6, "min": 0.0, "max": 2.0, "step": 0.1}),
                    "max_tokens": ("INT", {"default": 1024, "min": 64, "max": 4096, "step": 64}),
                },
            }

        RETURN_TYPES = ("STRING",)
        RETURN_NAMES = ("caption",)
        FUNCTION = "caption"
        CATEGORY = "AI/LlamaCpp"

        def caption(
            self,
            image,
            prompt="Describe this image in rich detail for use as an image generation prompt. "
            "Focus on subject, composition, lighting, colors, style, and mood. "
            "Output only the prompt text, no preamble.",
            system_message="You are an expert image description assistant. Produce a detailed, vivid "
            "text-to-image prompt that would recreate the given image. Include subject, setting, "
            "lighting, colors, composition, artistic style, and mood. Output ONLY the prompt text.",
            server_url=_DEFAULT_SERVER,
            model=_DEFAULT_MODEL,
            temperature=0.6,
            max_tokens=1024,
        ):
            b64_str = _image_to_base64(image)
            user_content = [
                {"type": "text", "text": f"/no_think {prompt}"},
                {"type": "image_url", "image_url": {"url": f"data:image/png;base64,{b64_str}"}},
            ]
            messages = [
                {"role": "system", "content": system_message},
                {"role": "user", "content": user_content},
            ]
            return (_chat_completion(server_url, model, messages, temperature, max_tokens),)


    class LlamaCppTextModify:
        """Takes a text prompt and modification instructions, returns the modified prompt.

        Use this to edit AI-generated captions before image generation:
        VisionCaption -> TextModify -> CLIPTextEncode
        """

        @classmethod
        def INPUT_TYPES(cls):
            return {
                "required": {
                    "original_text": ("STRING", {"forceInput": True}),
                    "instructions": (
                        "STRING",
                        {
                            "default": "Make it cyberpunk style with neon lighting",
                            "multiline": True,
                        },
                    ),
                },
                "optional": {
                    "server_url": ("STRING", {"default": _DEFAULT_SERVER}),
                    "model": ("STRING", {"default": _DEFAULT_MODEL}),
                    "temperature": ("FLOAT", {"default": 0.6, "min": 0.0, "max": 2.0, "step": 0.1}),
                    "max_tokens": ("INT", {"default": 1024, "min": 64, "max": 4096, "step": 64}),
                },
            }

        RETURN_TYPES = ("STRING",)
        RETURN_NAMES = ("modified_text",)
        FUNCTION = "modify"
        CATEGORY = "AI/LlamaCpp"

        def modify(
            self,
            original_text,
            instructions="Make it cyberpunk style with neon lighting",
            server_url=_DEFAULT_SERVER,
            model=_DEFAULT_MODEL,
            temperature=0.6,
            max_tokens=1024,
        ):
            messages = [
                {
                    "role": "system",
                    "content": "You modify image prompts. Wrap your output in <PROMPT> tags. "
                    "Example: <PROMPT>a cat sitting on a roof at sunset</PROMPT>",
                },
                {
                    "role": "user",
                    "content": f"/no_think Original: {original_text}\n\nChanges: {instructions}",
                },
            ]
            return (_chat_completion(server_url, model, messages, temperature, max_tokens),)


    NODE_CLASS_MAPPINGS = {
        "ImageToLlamaCppBase64": ImageToLlamaCppBase64,
        "LlamaCppVisionCaption": LlamaCppVisionCaption,
        "LlamaCppTextModify": LlamaCppTextModify,
    }

    NODE_DISPLAY_NAME_MAPPINGS = {
        "ImageToLlamaCppBase64": "Image to LlamaCpp Base64",
        "LlamaCppVisionCaption": "LlamaCpp Vision Caption",
        "LlamaCppTextModify": "LlamaCpp Text Modify",
    }
