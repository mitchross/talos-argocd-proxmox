apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: comfyui-secrets
  namespace: comfyui
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: comfyui-secrets
    creationPolicy: Owner
  data:
  - secretKey: HF_TOKEN
    remoteRef:
      key: comfyui-huggingface
      property: token
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  # CivitAI API token for general/SFW model + LoRA downloads (civitai.com).
  # Used by pod-shell scripts + future download-models-job extensions.
  # Store in 1Password item "comfyui-civitai" under field "sfw_token".
  - secretKey: CIVITAI_TOKEN
    remoteRef:
      key: comfyui-civitai
      property: sfw_token
  # CivitAI API token for an NSFW-enabled account (civitai.com with nsfw=true).
  # Used to pull NSFW LoRAs/models that SFW-filtered accounts can't see.
  # Store in 1Password item "comfyui-civitai" under field "nsfw_token".
  - secretKey: CIVITAI_NSFW_TOKEN
    remoteRef:
      key: comfyui-civitai
      property: nsfw_token
