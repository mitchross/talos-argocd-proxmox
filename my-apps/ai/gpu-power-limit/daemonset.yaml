apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-power-limit
  namespace: gpu-power-limit
  labels:
    app: gpu-power-limit
spec:
  selector:
    matchLabels:
      app: gpu-power-limit
  template:
    metadata:
      labels:
        app: gpu-power-limit
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: power-limit
          # Plain glibc base — nvidia-smi + driver libs are injected by the
          # nvidia container runtime (runtimeClassName above) at start.
          image: ubuntu:26.04
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -u
              echo "gpu-power-limit: capping all GPUs at ${POWER_LIMIT_WATTS}W (reapply every ${REAPPLY_SECONDS}s)"
              while true; do
                # Persistence mode keeps the driver (and the power limit) loaded
                # between CUDA processes; the limit itself survives until a
                # driver reload, which the reapply loop covers.
                nvidia-smi -pm 1 >/dev/null 2>&1 || echo "WARN: could not enable persistence mode"
                if nvidia-smi -pl "${POWER_LIMIT_WATTS}" >/dev/null; then
                  nvidia-smi --query-gpu=index,name,power.limit,power.draw --format=csv,noheader
                else
                  echo "WARN: failed to set power limit, retrying in ${REAPPLY_SECONDS}s"
                fi
                sleep "${REAPPLY_SECONDS}"
              done
          env:
            # EXCEPTION to the "never set NVIDIA_VISIBLE_DEVICES" rule in
            # my-apps/ai/CLAUDE.md: that rule protects GPU *workloads* from
            # bypassing the device plugin's whole-card CDI allocation. This is
            # a node-admin pod that must see BOTH cards WITHOUT consuming a
            # nvidia.com/gpu allocation (requesting one would evict/block the
            # mutually-exclusive LLM/image workloads). Envvar injection is the
            # standard pattern for admin DaemonSets (same as dcgm-exporter).
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            # 290W = the measured decode-efficiency knee for air-cooled 3090s
            # (club-3090 docs/HARDWARE.md): -22% power for -7% TPS vs 370W
            # stock. The old "230W sweet spot" lore costs ~16% efficiency vs
            # 290W. Drop to 250 to favor prefill-heavy workloads (Perplexica
            # RAG-style giant prompts; -5% chat TPS). Raise back to 330 only
            # if the cards ever go under water.
            - name: POWER_LIMIT_WATTS
              value: "290"
            - name: REAPPLY_SECONDS
              value: "300"
          securityContext:
            # nvidia-smi -pm / -pl are device admin operations; unprivileged
            # containers get "Insufficient Permissions" from NVML.
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 128Mi
