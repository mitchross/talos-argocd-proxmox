apiVersion: v1
kind: Namespace
metadata:
  name: gpu-power-limit
  labels:
    # The power-limit DaemonSet needs a privileged container to call
    # `nvidia-smi -pm/-pl` (device admin ops). No PVCs, no secrets here.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
