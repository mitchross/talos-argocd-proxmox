# INTERNAL route (local network only, via gateway-internal) — mirrors vllm.
# Only your own machines need to reach this; no reason to expose it externally.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm-route
  namespace: litellm
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-internal-technitium
    namespace: gateway
  hostnames:
  - "litellm.vanillax.me"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    timeouts:
      request: 30m            # long generations
      backendRequest: 30m
    backendRefs:
    - group: ""
      kind: Service
      name: litellm-service
      port: 4000
      weight: 1
