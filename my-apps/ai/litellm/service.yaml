apiVersion: v1
kind: Service
metadata:
  name: litellm-service
  namespace: litellm
  labels:
    app: litellm
spec:
  selector:
    app: litellm
  ports:
    - name: http              # CRITICAL — HTTPRoute matches by port name; fails silently without it
      protocol: TCP
      port: 4000
      targetPort: http
  type: ClusterIP
