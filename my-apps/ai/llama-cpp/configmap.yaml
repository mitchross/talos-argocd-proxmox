apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-config
  namespace: llama-cpp
data:
  presets.ini: |
    # ==========================================================
    # GENERAL + VISION + CODE - Qwen3.5-35B-A3B [MULTIMODAL]
    # Single GPU (1x RTX 3090) — second GPU freed for ComfyUI
    # ==========================================================
    [general - qwen3.5]
    # 35B total / 3B active (MoE) - Gated DeltaNet + Gated Attention
    # Natively multimodal (vision + language), 256K context native
    # Q4_K_XL (20.6GB) + mmproj (858MB) fits in 1x 24GB RTX 3090
    # Qwen official "precise" thinking params: temp=0.6, top_p=0.95, top_k=20, presence_penalty=0.0
    # General thinking params use presence_penalty=1.5 but causes thinking loops on simple questions
    model = /models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
    mmproj = /models/mmproj-F16.gguf
    alias = qwen3.5, qwen 3.5
    ctx-size = 131072
    n-gpu-layers = 99
    temp = 0.6
    top-p = 0.95
    top-k = 20
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": true}
    jinja = 1

    # ==========================================================
    # NO-THINK PRESET - Same model with thinking disabled
    # For tools like K8sGPT that have short timeouts
    # ==========================================================
    [nothink - qwen3.5]
    model = /models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
    mmproj = /models/mmproj-F16.gguf
    alias = nothink-qwen
    ctx-size = 131072
    n-gpu-layers = 99
    temp = 0.6
    top-p = 0.95
    top-k = 20
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": false}
    jinja = 1

    # ==========================================================
    # GEMMA 4 26B-A4B [MULTIMODAL] - THINK
    # 26B total / 3.8B active (MoE, 128 experts, 8+1 active)
    # Q4_K_XL (~17GB) + mmproj (~850MB) — ~6GB VRAM headroom
    # 256K native context, vision, thinking mode
    # Google recommended params: temp=1.0, top_p=0.95, top_k=64
    # ==========================================================
    [gemma4 - gemma4-26b]
    model = /models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
    mmproj = /models/mmproj-gemma4-BF16.gguf
    alias = gemma4, gemma 4, gemma4-think, general, vision, image, multimodal, coder, code
    ctx-size = 131072
    n-gpu-layers = 99
    temp = 1.0
    top-p = 0.95
    top-k = 64
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": true}
    jinja = 1

    # ==========================================================
    # GEMMA 4 NO-THINK - Same model, thinking disabled
    # Same GGUF as think variant — switching is instant (no reload)
    # ==========================================================
    [gemma4-nothink - gemma4-26b-nothink]
    model = /models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
    mmproj = /models/mmproj-gemma4-BF16.gguf
    alias = gemma4-nothink, gemma4-fast, nothink
    ctx-size = 131072
    n-gpu-layers = 99
    temp = 1.0
    top-p = 0.95
    top-k = 64
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": false}
    jinja = 1

    # ==========================================================
    # UNCENSORED (THINK) - HauhauCS Aggressive variant
    # Same Qwen3.5-35B-A3B base, uncensored fine-tune
    # Q4_K_M (21.2GB) is 600MB larger than Q4_K_XL — ctx-size reduced
    # to 32K to keep model fully on GPU
    # ==========================================================
    [uncensored - qwen3.5-uncensored]
    model = /models/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
    mmproj = /models/mmproj-Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf
    alias = uncensored, nsfw, hauhau, aggressive, obliterated, think-uncensored
    ctx-size = 32768
    n-gpu-layers = 99
    temp = 0.6
    top-p = 0.95
    top-k = 20
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": true}
    jinja = 1

    # ==========================================================
    # UNCENSORED (NO-THINK) - Fast uncensored responses
    # Same GGUF as think variant — switching is instant (no reload)
    # ==========================================================
    [nothink-uncensored - qwen3.5-uncensored-nothink]
    model = /models/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
    mmproj = /models/mmproj-Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf
    alias = nothink-uncensored, nothink-nsfw, fast-uncensored, nothink-obliterated
    ctx-size = 32768
    n-gpu-layers = 99
    temp = 0.6
    top-p = 0.95
    top-k = 20
    min-p = 0.0
    presence-penalty = 0.0
    chat-template-kwargs = {"enable_thinking": false}
    jinja = 1
