apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  strategy:
    type: Recreate
  # Option-R reset batch (2026-05-30): scaled to 0 to quiesce storage before
  # PVC delete/recreate. Restored to 1 in the bring-up phase.
  replicas: 0
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
      - key: "gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: open-webui
        # renovate: datasource=docker depName=ghcr.io/open-webui/open-webui
        image: ghcr.io/open-webui/open-webui:cuda@sha256:19d3ec8e516e49bea271e5b939c2ff9aefc2e7bd5b3deea248084a7e76d6eb37
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 500m
            memory: 1000Mi
            ephemeral-storage: "30Gi"
          limits:
            memory: 8000Mi
            ephemeral-storage: "40Gi"
        envFrom:
        - configMapRef:
            name: open-webui-configmap
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        # Health probes disabled - backend model loading can take several minutes
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: storage
