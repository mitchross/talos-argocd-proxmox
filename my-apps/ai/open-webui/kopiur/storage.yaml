---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# open-webui storage backup STUB — uniform fields (repository, copyMethod,
# populator) injected by ../../common/kopiur-backup. The mover securityContext
# is per-PVC and stays in THIS stub (docs/domains/storage/kopiur-mover-permissions.md).
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: storage
  namespace: open-webui
spec:
  sources:
    - pvc:
        name: storage
  identity:
    username: storage
    hostname: open-webui
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 568
      runAsGroup: 568
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 568
      supplementalGroups:
        - 568
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: storage-daily
  namespace: open-webui
spec:
  policyRef:
    name: storage
  schedule:
    cron: "5 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: storage-restore
  namespace: open-webui
spec:
  source:
    fromPolicy:
      name: storage
      offset: 0
  mover:
    securityContext:
      runAsUser: 568
      runAsGroup: 568
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 568
      supplementalGroups:
        - 568
