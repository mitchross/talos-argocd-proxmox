apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpo-multi
  namespace: open-webui
  labels:
    app: mcpo-multi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpo-multi
  template:
    metadata:
      labels:
        app: mcpo-multi
    spec:
      # Pure-HTTP tool proxy (no GPU). PREFER a non-GPU node so the 3090s stay
      # exclusive to vLLM, but soft so it still schedules on the GPU node when
      # it's the only worker. NFD adds pci-0300_10de.present only to GPU nodes.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: feature.node.kubernetes.io/pci-0300_10de.present
                    operator: DoesNotExist
      containers:
      - name: mcpo-multi
        image: ghcr.io/open-webui/mcpo:main@sha256:1e82c9555c19e50b80745705f32b47a2647589f35279527b5118ecd3a71bd467
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: PORT
          value: "8001"
        - name: HOST
          value: "0.0.0.0"
        args:
        - "--port"
        - "8001"
        - "--api-key"
        - "mcp-multi-key"
        - "--config"
        - "/app/config/config.json"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            memory: 1Gi
        volumeMounts:
        - name: mcp-config
          mountPath: /app/config
        - name: temp-storage
          mountPath: /tmp
        readinessProbe:
          httpGet:
            path: /docs
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /docs
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: mcp-config
        configMap:
          name: mcp-config
      - name: temp-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mcpo-multi
  namespace: open-webui
  labels:
    app: mcpo-multi
spec:
  selector:
    app: mcpo-multi
  ports:
  - name: http
    port: 8001
    targetPort: 8001
  type: ClusterIP
