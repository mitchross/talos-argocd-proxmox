---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage
  namespace: open-webui
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: ai-interface
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-30): operator-managed at
    # tier=daily; ns open-webui carries managed-namespace=true. Mover 568.
    # Migrated via Option-R reset (empty→storage-dst dsr; recreated from
    # quiesced snapshot). Old PV pvc-be2c62e1 retained.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/storage-dst. No-op while the
  # PVC is already Bound. RS/RD are operator-managed by pvc-plumber v4.0.1
  # (DRY handoff, 2026-05-30): the operator creates and repairs
  # ReplicationSource/storage + ReplicationDestination/storage-dst as
  # managed-by=pvc-plumber via its RS/RD watch.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: storage-dst

# NOTE: inline ReplicationSource/storage + ReplicationDestination/storage-dst
# were REMOVED on 2026-05-30 (pvc-plumber v4.0.1 DRY handoff). pvc-plumber now
# owns the RS/RD lifecycle for storage. Do not re-add inline RS/RD here.
