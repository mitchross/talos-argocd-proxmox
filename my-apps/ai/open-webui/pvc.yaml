---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage
  namespace: open-webui
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: ai-interface
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/storage-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: storage-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: storage
  namespace: open-webui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: storage
spec:
  sourcePVC: storage
  trigger:
    schedule: "28 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: storage
    hostname: open-webui
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: storage-dst
  namespace: open-webui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: storage
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: storage
    hostname: open-webui
    sourceIdentity:
      sourceName: storage
      sourceNamespace: open-webui
      sourcePVCName: storage
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
