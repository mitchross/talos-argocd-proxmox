apiVersion: apps/v1
kind: Deployment
metadata:
  name: perplexica
  namespace: perplexica
  labels:
    app: perplexica
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: perplexica
  template:
    metadata:
      labels:
        app: perplexica
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/default"
    spec:
      # Seed /data/config.json on every start from the ConfigMap. If the
      # file is missing (fresh PVC) we write the seed verbatim. If it
      # exists we merge just `modelProviders` in-place so user UI
      # preferences (theme, personalization) aren't stomped on each
      # deploy — model-provider list is authoritative from git, everything
      # else stays user-controlled.
      initContainers:
        - name: seed-config
          # Alpine with inline `apk add jq` because the upstream jq image
          # (ghcr.io/jqlang/jq) is distroless and has no shell — we need
          # /bin/sh for the merge logic below.
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache jq >/dev/null
              SEED=/seed/config.json
              DEST=/data/config.json
              mkdir -p /data
              if [ ! -s "$DEST" ]; then
                echo "[seed] fresh PVC, writing config.json verbatim"
                cp "$SEED" "$DEST"
              else
                echo "[seed] merging modelProviders + search from seed into existing config.json"
                jq --slurpfile seed "$SEED" \
                   '.modelProviders = $seed[0].modelProviders
                    | .search = $seed[0].search' \
                   "$DEST" > "$DEST.tmp"
                mv "$DEST.tmp" "$DEST"
              fi
              echo "[seed] done. providers now:"
              jq -r '.modelProviders[] | "  - \(.name) (\(.type)) — \(.chatModels | length) models"' "$DEST"
          volumeMounts:
            - name: seed
              mountPath: /seed
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            # apk needs a writable root FS to unpack jq into /usr/bin.
            # Still no privilege escalation, all caps dropped.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      containers:
        - name: perplexica
          image: itzcrazykns1337/perplexica:slim-v1.12.0@sha256:6b0ab14429c6d120357877cce5894c55c35e7e016c2b55066a1559ac5682de8e
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: SEARXNG_API_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: OPENAI_BASE_URL
              value: "http://llama-cpp-service.llama-cpp.svc.cluster.local:8080/v1"
            - name: OPENAI_API_KEY
              value: "sk-no-key-required"
          volumeMounts:
            - name: data
              mountPath: /home/perplexica/data
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: perplexica-data
        - name: seed
          configMap:
            name: perplexica-config-seed
            items:
              - key: config.json
                path: config.json
