apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: perplexica-data
  namespace: perplexica
  labels:
    restore-policy: "strict"
  annotations:
    # With controller.diff.server.side=true, ArgoCD's SSA dry-run tries to
    # null that immutable field and the API server rejects it, producing a
    # ComparisonError that wedges the whole app's sync (observed stuck since
    # 2026-05-03, 2000+ retries). The global _PersistentVolumeClaim
    # ignoreDifferences rule can't help because the SSA dry-run runs BEFORE
    # ignore masking. Forcing client-side diff for this one PVC sidesteps
    # the dry-run; the global ignoreDifferences then masks the dataSource
    # drift normally. See docs/volsync-storage-recovery.md.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/perplexica-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: perplexica-data-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: perplexica-data
  namespace: perplexica
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: perplexica-data
spec:
  sourcePVC: perplexica-data
  trigger:
    # Option-R reset batch (2026-05-30): one-shot quiesced backup; restored to
    # schedule "49 2 * * *" in bring-up.
    manual: backup-2026-05-30-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: perplexica-data
    hostname: perplexica
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: perplexica-data-dst
  namespace: perplexica
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: perplexica-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: perplexica-data
    hostname: perplexica
    sourceIdentity:
      sourceName: perplexica-data
      sourceNamespace: perplexica
      sourcePVCName: perplexica-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
