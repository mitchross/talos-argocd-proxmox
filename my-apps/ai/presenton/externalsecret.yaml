apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: presenton-auth
  namespace: presenton
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: presenton-auth
    creationPolicy: Owner
  data:
  - secretKey: AUTH_USERNAME
    remoteRef:
      key: presenton
      property: username
  - secretKey: AUTH_PASSWORD
    remoteRef:
      key: presenton
      property: password