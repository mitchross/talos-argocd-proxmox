apiVersion: v1
kind: Namespace
metadata:
  name: presenton
  labels:
    # kopiur-managed: ClusterExternalSecret cred fanout + ClusterRepository
    # tenancy (allowedNamespaces selector).
    kopiur.home-operations.com/repo: cluster-kopia
    # Presenton container runs as root; app_data is root-owned.
    # Mover needs privilegedMode to read root-owned data.
  annotations:
    kopiur.home-operations.com/privileged-movers: "true"