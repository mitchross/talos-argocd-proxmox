apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: swarmui

resources:
- namespace.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- httproute.yaml
# No kopiur backup — swarmui is unused; all its PVCs are backup-exempt.

labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app: swarmui
