apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: swarmui

resources:
- namespace.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- httproute.yaml
- kopiur/swarmui-data.yaml
- kopiur/swarmui-output.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator, privileged
# mover) for the per-PVC stubs in kopiur/.
components:
  - ../../common/kopiur-backup

commonLabels:
  app: swarmui
