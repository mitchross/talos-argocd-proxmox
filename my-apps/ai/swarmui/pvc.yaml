# SwarmUI persistent storage.
#
# Layout rationale:
#   - swarmui-data       : Settings.fds, Backends.fds, sessions, users, install
#                          state. Small + precious -> Longhorn + daily backup.
#   - swarmui-dlbackend  : SwarmUI auto-installs its own ComfyUI + Python/torch
#                          venv here on first run. Large + fully reinstallable
#                          -> Longhorn, NO backup label.
#   - swarmui-output     : Generated images (user content) -> Longhorn + backup.
#   - swarmui-models     : Reuses the EXISTING ComfyUI NFS share so no models
#                          need re-downloading. SwarmUI replaces the standalone
#                          comfyui app (scaled to replicas:0), so RWX RW mount
#                          is safe — no concurrent writer.
#
# All Longhorn PVCs are RWO -> Deployment MUST use strategy.type: Recreate.
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmui-data
  namespace: swarmui
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/swarmui-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: swarmui-data-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmui-dlbackend
  namespace: swarmui
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SwarmUI auto-installs ComfyUI + Python/torch venv here on first run; fully rebuildable from upstream, intentionally not backed up"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 40Gi
  storageClassName: longhorn
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmui-output
  namespace: swarmui
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/swarmui-output-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: swarmui-output-dst
---
---
# Static PV pointing at the SAME TrueNAS share ComfyUI used (/mnt/ai-pool/comfyui).
# Models live under <share>/ComfyUI/models — set SwarmUI's ModelRoot to
# /comfyui-models/ComfyUI/models with SDModelFolder: checkpoints during the
# one-time install wizard (see README).
# Must use CSI driver (not legacy nfs:) for mountOptions like nconnect to work.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: swarmui-comfyui-models-nfs-pv
spec:
  capacity:
    storage: 250Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-comfyui-10g
  mountOptions:
    - nfsvers=4.1
    - nolock
    - tcp
    - noatime
    - rsize=1048576
    - wsize=1048576
    - nconnect=16
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: swarmui-comfyui-models-nfs-pv
    volumeAttributes:
      server: "192.168.10.133"
      share: "/mnt/ai-pool/comfyui"
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmui-comfyui-models
  namespace: swarmui
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Shared NFS-backed ComfyUI model cache (same NAS share as comfyui app); non-snapshottable, rebuildable"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 250Gi
  storageClassName: nfs-comfyui-10g
  volumeName: swarmui-comfyui-models-nfs-pv

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: swarmui-data
  namespace: swarmui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: swarmui-data
spec:
  sourcePVC: swarmui-data
  trigger:
    # Option-R reset batch (2026-05-30): one-shot quiesced backup; restored to
    # schedule "31 2 * * *" in bring-up.
    manual: backup-2026-05-30-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: swarmui-data
    hostname: swarmui
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: swarmui-data-dst
  namespace: swarmui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: swarmui-data
spec:
  trigger:
    manual: restore-2026-05-30-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: swarmui-data
    hostname: swarmui
    sourceIdentity:
      sourceName: swarmui-data
      sourceNamespace: swarmui
      sourcePVCName: swarmui-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 5Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: swarmui-output
  namespace: swarmui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: swarmui-output
spec:
  sourcePVC: swarmui-output
  trigger:
    # Option-R reset batch (2026-05-30): one-shot quiesced backup; restored to
    # schedule "46 2 * * *" in bring-up.
    manual: backup-2026-05-30-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: swarmui-output
    hostname: swarmui
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: swarmui-output-dst
  namespace: swarmui
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: swarmui-output
spec:
  trigger:
    manual: restore-2026-05-30-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: swarmui-output
    hostname: swarmui
    sourceIdentity:
      sourceName: swarmui-output
      sourceNamespace: swarmui
      sourcePVCName: swarmui-output
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 50Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
