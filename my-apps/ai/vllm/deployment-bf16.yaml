# Higher-quality tier — Qwen3.6-27B-AWQ-BF16-INT4 (25GB mixed BF16+INT4).
# replicas: 0. To use it: scale this to 1 and deployment.yaml (int4) to 0, commit.
# Shares app: vllm-server, so vllm-service follows it. Identical engine config to
# deployment.yaml — see that file for the GDN / TP=2 / max-num-seqs rationale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36-27b-bf16
  namespace: vllm
  labels:
    app: vllm-server
    vllm-model: bf16
spec:
  strategy:
    type: Recreate
  replicas: 0
  selector:
    matchLabels:
      app: vllm-server
      vllm-model: bf16
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: vllm-server
        vllm-model: bf16
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 120
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: vllm
          # renovate: datasource=docker depName=vllm/vllm-openai
          image: vllm/vllm-openai:v0.22.0
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "/models/Qwen3.6-27B-AWQ-BF16-INT4"
            - "--served-model-name"
            - "qwen3.6-27b-bf16"
            - "default"
            - "--tensor-parallel-size"
            - "2"
            - "--gpu-memory-utilization"
            - "0.90"
            - "--max-model-len"
            - "65536"
            - "--max-num-seqs"
            - "2"                                       # GDN recurrent-state cap (see deployment.yaml)
            - "--limit-mm-per-prompt"
            - '{"image":4}'
            - "--distributed-executor-backend"
            - "mp"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - { name: NVIDIA_DRIVER_CAPABILITIES, value: "compute,utility" }
            - { name: HF_HUB_OFFLINE, value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: VLLM_WORKER_MULTIPROC_METHOD, value: "spawn" }
            - { name: NCCL_P2P_DISABLE, value: "1" }
            - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 120
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            failureThreshold: 6
          resources:
            requests: { cpu: "8", memory: 48Gi, nvidia.com/gpu: "2", ephemeral-storage: "5Gi" }
            limits: { cpu: "32", memory: 64Gi, nvidia.com/gpu: "2", ephemeral-storage: "20Gi" }
          volumeMounts:
            - { name: models-storage, mountPath: /models, readOnly: true }
            - { name: dshm, mountPath: /dev/shm }
      volumes:
        - name: models-storage
          persistentVolumeClaim: { claimName: vllm-models-pvc }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 16Gi }
