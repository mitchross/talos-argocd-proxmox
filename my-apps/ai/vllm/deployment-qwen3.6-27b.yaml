# Qwen3.6-27B — DENSE 27.8B, multimodal, flagship-coding. replicas: 0.
#
# ⚠️ This is a Gated-DeltaNet (GDN) hybrid model — one of club-3090's vLLM
# "cliffs": recurrent state memory scales with CONCURRENCY, so --max-num-seqs is
# pinned LOW (the real mitigation, not just context). Settings tracked from the
# club-3090 STABLE recipe models/qwen3.6-27b/vllm/compose/dual/autoround-int4/
# fp8-mtp.yml (v0.22.0): fp8_e5m2 KV + 262K + max-num-seqs 2 are validated there.
# (The sibling dflash.yml says "FP16 KV only" — that caveat is specific to its
# NIGHTLY DeltaNet-flash drafter path, which we do NOT use here.)
#
# Quant: your cyankiwi AWQ-BF16-INT4 build is compressed-tensors; vLLM
# auto-detects it and runs the Marlin kernel on Ampere, so NO --quantization flag.
# Speculative decoding (mtp/dflash) intentionally omitted to stay stable + simple.
# See deployment-qwen3.6.yaml for the shared-Service / TP=2 / P2P rationale.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36-27b
  namespace: vllm
  labels:
    app: vllm-server
    vllm-model: qwen3.6-27b
spec:
  strategy:
    type: Recreate
  replicas: 0
  selector:
    matchLabels:
      app: vllm-server
      vllm-model: qwen3.6-27b
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: vllm-server
        vllm-model: qwen3.6-27b
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 120
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - { key: "nvidia.com/gpu", operator: "Exists", effect: "NoSchedule" }
        - { key: "gpu", operator: "Equal", value: "true", effect: "NoSchedule" }
      containers:
        - name: vllm
          # renovate: datasource=docker depName=vllm/vllm-openai
          image: vllm/vllm-openai:v0.22.0
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "cyankiwi/Qwen3.6-27B-AWQ-BF16-INT4"      # compressed-tensors AWQ (BF16+INT4) → vLLM auto-detects Marlin
            - "--served-model-name"
            - "default"
            - "qwen3.6-27b"
            - "--tensor-parallel-size"
            - "2"
            - "--max-model-len"
            - "262144"                                   # validated w/ fp8 KV + max-num-seqs 2. If first boot OOMs on GDN state, drop to 185000.
            - "--kv-cache-dtype"
            - "fp8_e5m2"
            - "--max-num-seqs"
            - "2"                                        # GDN recurrent-state cap — the key cliff mitigation. Raising this risks OOM.
            - "--gpu-memory-utilization"
            - "0.90"
            - "--enable-prefix-caching"
            - "--enable-chunked-prefill"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes"
            # vision: this model is multimodal; left at vLLM defaults (the validated
            # recipe sets no --limit-mm-per-prompt). If the build is text-only it
            # simply serves text — no flag to error on.
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - { name: HF_HOME, value: /data }
            - { name: VLLM_WORKER_MULTIPROC_METHOD, value: "spawn" }
            - { name: VLLM_USE_FLASHINFER_SAMPLER, value: "1" }   # 27B recipe tuning
            - { name: NCCL_CUMEM_ENABLE, value: "0" }             # pairs with expandable_segments to avoid NCCL alloc issues
            - { name: NCCL_P2P_DISABLE, value: "1" }
            - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True,max_split_size_mb:512" }
            - { name: VLLM_NO_USAGE_STATS, value: "1" }
            - { name: NVIDIA_DRIVER_CAPABILITIES, value: "compute,utility" }
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef: { name: vllm-secrets, key: HF_TOKEN, optional: true }
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 240
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            failureThreshold: 6
          resources:
            requests: { cpu: "4", memory: 16Gi, nvidia.com/gpu: "2", ephemeral-storage: "10Gi" }
            limits: { cpu: "16", memory: 48Gi, nvidia.com/gpu: "2", ephemeral-storage: "30Gi" }
          volumeMounts:
            - { name: models-cache, mountPath: /data }
            - { name: dshm, mountPath: /dev/shm }
      volumes:
        - name: models-cache
          persistentVolumeClaim: { claimName: vllm-models-pvc }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 10Gi }
