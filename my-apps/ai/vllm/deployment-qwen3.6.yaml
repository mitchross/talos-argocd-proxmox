# ============================================================================
# vLLM "preset bank" — one Deployment per model, ALL share `app: vllm-server`
# so the single vllm-service routes to whichever one is scaled up. Only ONE may
# run at a time (each claims BOTH 3090s at TP=2; the node has exactly 2 cards,
# so a second model Pends until the first scales to 0).
#
# SWITCH MODELS: set the model you want to replicas: 1 and the current one to 0,
# then commit (ArgoCD selfHeal reverts a bare `kubectl scale`). Clients keep
# hitting the same endpoint and send `model: default` regardless of which model
# is loaded (every entry sets `--served-model-name default <name>`).
#
# This file = the DAILY DRIVER (Qwen3.6-35B-A3B), and it tracks the club-3090
# VALIDATED recipe verbatim:
#   models/qwen3.6-35b-a3b/vllm/compose/dual/autoround-int4/fp8.yml
#   ("vLLM STABLE v0.22.0 — validated 2026-05-30", AutoRound INT4 + FP8 KV =>
#    full 262K context WITH vision at TP=2 on 2x RTX 3090).
# The only additions beyond that recipe are cluster requirements:
#   --served-model-name (so apps hit `default`) and OpenAI tool-call parsing.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36
  namespace: vllm
  labels:
    app: vllm-server
    vllm-model: qwen3.6
spec:
  strategy:
    type: Recreate
  replicas: 1                      # DAILY DRIVER — the only entry that runs by default
  selector:
    matchLabels:
      app: vllm-server
      vllm-model: qwen3.6
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: vllm-server
        vllm-model: qwen3.6
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 120
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: vllm
          # renovate: datasource=docker depName=vllm/vllm-openai
          image: vllm/vllm-openai:v0.22.0     # club-3090 pins this exact tag ("immutable — validated 2026-05-30")
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "Intel/Qwen3.6-35B-A3B-int4-AutoRound"   # the validated vLLM build. Fallback if auto_round misbehaves on Ampere: QuantTrio/Qwen3.6-35B-A3B-AWQ + --quantization awq (text-only).
            - "--quantization"
            - "auto_round"
            - "--served-model-name"                    # cluster addition: stable alias every app points at...
            - "default"
            - "qwen3.6"                                 # ...plus the explicit name
            - "--tensor-parallel-size"
            - "2"                                       # pool BOTH 3090s
            - "--max-model-len"
            - "262144"                                  # full 256K — affordable because of fp8 KV below
            - "--kv-cache-dtype"
            - "fp8_e5m2"                                # the lever that makes 256K KV fit at TP=2 on 2x24GB
            - "--gpu-memory-utilization"
            - "0.90"
            - "--limit-mm-per-prompt"
            - '{"image":2,"audio":0}'                   # multimodal: this build has the vision tower
            - "--enable-prefix-caching"
            - "--enable-chunked-prefill"
            - "--enable-auto-tool-choice"               # cluster addition (not in the base recipe)
            - "--tool-call-parser"
            - "hermes"                                  # Qwen3 tool-call format. nothink: clients pass chat_template_kwargs enable_thinking:false.
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - name: HF_HOME
              value: /data                              # cache weights on the NFS PVC (no re-download per boot)
            # --- club-3090 recipe env (TP on PCIe passthrough, no NVLink/P2P) ---
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: NCCL_P2P_DISABLE
              value: "1"                                # no GPU P2P => NCCL over /dev/shm; vLLM auto-disables custom all-reduce
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"         # reduces fragmentation OOM at long context
            - name: VLLM_NO_USAGE_STATS
              value: "1"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # Only needed for gated repos; optional so a missing token never blocks boot.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secrets
                  key: HF_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 240                       # first boot downloads ~20GB + loads across 2 GPUs (~1h budget)
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "2"
              ephemeral-storage: "10Gi"
            limits:
              cpu: "16"
              memory: 48Gi
              nvidia.com/gpu: "2"
              ephemeral-storage: "30Gi"
          volumeMounts:
            - name: models-cache
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: models-cache
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi                             # TP workers talk over /dev/shm; 64MB default => NCCL bus errors
