# ============================================================================
# vLLM "preset bank" — one Deployment per model, ALL share `app: vllm-server`
# so the single vllm-service routes to whichever one is scaled up. Only ONE may
# run at a time (each claims BOTH 3090s at TP=2; the node has exactly 2 cards,
# so a second model Pends until the first scales to 0).
#
# SWITCH MODELS: set the model you want to replicas: 1 and the current one to 0,
# then commit (ArgoCD selfHeal reverts a bare `kubectl scale`). Clients keep
# hitting the same endpoint and send `model: default` regardless of which model
# is loaded (every entry sets `--served-model-name default <name>`).
#
# This file = the DAILY DRIVER (Qwen3.6-35B-A3B). It is the only one at
# replicas: 1. See deployment-{coder,gemma4,gemma4-31b,tool-fast}.yaml for the
# rest (all replicas: 0). Repo IDs are the verified AWQ builds for Ampere.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36
  namespace: vllm
  labels:
    app: vllm-server
    vllm-model: qwen3.6
spec:
  strategy:
    type: Recreate
  replicas: 1                      # DAILY DRIVER — the only entry that runs by default
  selector:
    matchLabels:
      app: vllm-server
      vllm-model: qwen3.6
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: vllm-server
        vllm-model: qwen3.6
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 120
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: vllm
          # renovate: datasource=docker depName=vllm/vllm-openai
          image: vllm/vllm-openai:v0.22.0
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "QuantTrio/Qwen3.6-35B-A3B-AWQ"        # primary multimodal MoE (35B/3B active). AWQ = the Ampere path (FP8 is Hopper/Ada-only).
            - "--served-model-name"
            - "default"                                # stable alias every app points at...
            - "qwen3.6"                                # ...plus the explicit name
            - "--tensor-parallel-size"
            - "2"                                       # pool BOTH 3090s. Qwen3.6 attention heads divide by 2.
            - "--gpu-memory-utilization"
            - "0.90"
            - "--max-model-len"
            - "32768"                                   # native; extend toward 256K via --hf-overrides rope_scaling (YaRN) once verified — KV headroom is large at TP=2.
            - "--enable-prefix-caching"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes"                                  # Qwen3 tool-call format. (nothink: clients pass chat_template_kwargs enable_thinking:false.)
            # No NVLink + Proxmox PCIe passthrough => no GPU P2P. Without these two
            # the TP custom all-reduce hangs at startup; NCCL falls back to /dev/shm.
            - "--disable-custom-all-reduce"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - name: HF_HOME
              value: /data                              # cache weights on the NFS PVC (no re-download per boot)
            - name: NCCL_P2P_DISABLE
              value: "1"                                # see --disable-custom-all-reduce note
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # Only needed for gated repos; optional so a missing token never blocks boot.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secrets
                  key: HF_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 240                       # first boot downloads ~20GB + loads across 2 GPUs (~1h budget)
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "2"
              ephemeral-storage: "10Gi"
            limits:
              cpu: "16"
              memory: 48Gi
              nvidia.com/gpu: "2"
              ephemeral-storage: "30Gi"
          volumeMounts:
            - name: models-cache
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: models-cache
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi                             # TP workers talk over /dev/shm; 64MB default => NCCL bus errors
