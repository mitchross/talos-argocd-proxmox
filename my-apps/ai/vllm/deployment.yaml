apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: vllm
  labels:
    app: vllm-server
spec:
  # Single pod pinned to the GPU node; it claims BOTH 3090s (TP=2). Recreate so
  # the old pod fully releases the GPUs before a new one is scheduled (a second
  # 2-GPU pod could never schedule alongside the first — the node only has 2).
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 120
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: vllm-server
          # OpenAI-compatible vLLM server.
          # renovate: datasource=docker depName=vllm/vllm-openai
          image: vllm/vllm-openai:v0.22.0
          imagePullPolicy: IfNotPresent
          # The image entrypoint is the OpenAI API server; we only pass flags.
          args:
            - "--model"
            - "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"   # SWAP HERE to change models. AWQ/GPTQ/FP8 only (vLLM does not use GGUF efficiently). ~19GB weights.
            - "--served-model-name"
            - "qwen2.5-coder-32b"                      # primary client-facing name...
            - "default"                                # ...plus a stable "default" alias
            - "--tensor-parallel-size"
            - "2"                                       # Pool BOTH 3090s (48GB). The model's attention heads must be divisible by 2 (Qwen2.5 ok).
            - "--gpu-memory-utilization"
            - "0.90"
            - "--max-model-len"
            - "32768"                                   # Qwen2.5 native ctx. Extend toward ~131072 with --hf-overrides rope_scaling (YaRN) once verified; plenty of KV headroom at TP=2.
            - "--max-num-seqs"
            - "16"
            - "--enable-prefix-caching"                 # big win for multi-turn / RAG reuse
            # 2x3090 has NO NVLink and the cards are PCIe-passthrough into this
            # Talos VM, so GPU peer-to-peer is unavailable. vLLM's custom
            # all-reduce kernel requires P2P and will hang without it — disable
            # it and let NCCL fall back to host shared memory (/dev/shm below).
            # Pairs with NCCL_P2P_DISABLE=1 in env.
            - "--disable-custom-all-reduce"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            # Cache HF downloads onto the NFS-backed PVC so models survive
            # restarts and aren't re-downloaded every boot.
            - name: HF_HOME
              value: /data
            # See --disable-custom-all-reduce note above. Forces NCCL off the
            # (unavailable) PCIe P2P path and through host shared memory.
            - name: NCCL_P2P_DISABLE
              value: "1"
            # GPU selection is handled by the device plugin + CDI. With
            # nvidia.com/gpu: 2 the plugin injects BOTH physical cards as
            # cuda:0 and cuda:1. Do NOT set NVIDIA_VISIBLE_DEVICES /
            # CUDA_VISIBLE_DEVICES — they override the plugin's injection.
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # Optional: only needed for gated HF repos. Mounted optional so a
            # missing token never blocks startup (default model is public).
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secrets
                  key: HF_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            # First boot downloads ~19GB and loads across 2 GPUs — allow ~1h.
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "2"
              ephemeral-storage: "10Gi"
            limits:
              cpu: "16"
              memory: 48Gi          # includes the in-memory /dev/shm below
              nvidia.com/gpu: "2"
              ephemeral-storage: "30Gi"
          volumeMounts:
            - name: models-cache
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: models-cache
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        # vLLM tensor-parallel workers communicate over /dev/shm; the container
        # default (64MB) is far too small and causes NCCL/IPC bus errors.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
