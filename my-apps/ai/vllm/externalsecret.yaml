apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vllm-secrets
  namespace: vllm
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: vllm-secrets
    creationPolicy: Owner
  data:
  # Reuses the existing 1Password item that ComfyUI already pulls from, so no
  # new vault setup is needed. Only required for gated HuggingFace repos — the
  # default Qwen AWQ model is public and the deployment mounts this token as
  # optional, so vLLM still starts if the field is ever missing.
  - secretKey: HF_TOKEN
    remoteRef:
      key: comfyui-huggingface
      property: token
