apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vllm

resources:
  - namespace.yaml
  - externalsecret.yaml
  - pvc.yaml
  - service.yaml
  - httproute.yaml
  # vLLM "preset bank": one Deployment per model, all share `app: vllm-server`
  # so vllm-service follows whichever is scaled up. Only qwen3.6 runs by default.
  - deployment-qwen3.6.yaml     # DAILY DRIVER (replicas: 1)
  - deployment-coder.yaml       # replicas: 0
  - deployment-gemma4.yaml      # replicas: 0
  - deployment-gemma4-31b.yaml  # replicas: 0
  - deployment-tool-fast.yaml   # replicas: 0
