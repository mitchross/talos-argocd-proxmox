apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vllm

# List EVERY file here — unlisted YAML is never deployed (Kustomize only renders what's listed).
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - servicemonitor.yaml
