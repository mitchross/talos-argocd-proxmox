# Static, READ-ONLY NFS PV for the two pre-staged AWQ model dirs.
# Mirrors the immich static-RO pattern (infrastructure/storage/csi-driver-nfs/
# storage-class.yaml): storageClassName "" + ReadOnlyMany + `ro` mount option +
# CSI driver (NOT legacy nfs:, so nconnect/rsize/wsize actually apply).
#
# The share already contains the models — do NOT use the NFS CSI *dynamic*
# provisioner (it creates per-PVC subdirs and won't see existing files).
#   /mnt/ai-pool/vllm/Qwen3.6-27B-AWQ-INT4        (20GB, primary)
#   /mnt/ai-pool/vllm/Qwen3.6-27B-AWQ-BF16-INT4   (25GB, higher quality)
# Pod mounts the share root at /models, read-only. No credentials needed
# (AUTH_SYS, other-readable, public weights).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-vllm-models
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - nolock
    - tcp
    - noatime
    - rsize=1048576
    - wsize=1048576
    - nconnect=16
    - ro
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: nfs-vllm-models
    volumeAttributes:
      server: "192.168.10.133"
      share: "/mnt/ai-pool/vllm"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: vllm
  labels:
    backup-exempt: "true"
  annotations:
    # Fully-qualified key — bare `backup-exempt-reason` is silently ignored and
    # the PVC is denied on CREATE (CI guard `backup-exempt-contract`).
    storage.vanillax.dev/backup-exempt-reason: "NFS-backed vLLM model store (AWQ safetensors); read-only, non-snapshottable, rebuildable via hf download"
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: ""
  volumeName: nfs-vllm-models
