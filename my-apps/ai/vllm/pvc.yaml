# Static NFS PV for the vLLM HuggingFace model cache (AWQ safetensors).
# Same pattern + tuned 10G mount options as llama-cpp (my-apps/ai/llama-cpp/pvc.yaml):
# CSI driver (NOT legacy nfs:) so nconnect/rsize/wsize actually apply.
# Longhorn is intentionally avoided on the GPU node (its replicas/manager are
# kept off that node — see my-apps/ai/CLAUDE.md), so model storage uses NFS,
# exactly like llama-cpp and comfyui.
#
# ONE-TIME NAS PREP: create + export the dataset/dir `/mnt/ai-pool/vllm` on the
# TrueNAS box (192.168.10.133), same as the existing /mnt/ai-pool/{llama-cpp,comfyui}
# shares. The PV below mounts that path; vLLM writes its HF cache into it.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-models-nfs-pv
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - nolock
    - tcp
    - noatime
    - rsize=1048576
    - wsize=1048576
    - nconnect=16
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: vllm-models-nfs-pv
    volumeAttributes:
      server: "192.168.10.133"
      share: "/mnt/ai-pool/vllm"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models-pvc
  namespace: vllm
  labels:
    backup-exempt: "true"
  annotations:
    # Fully-qualified key — the bare `backup-exempt-reason` is silently ignored
    # and the PVC is denied on CREATE (CI guard `backup-exempt-contract`).
    storage.vanillax.dev/backup-exempt-reason: "NFS-backed vLLM model cache (AWQ safetensors); non-snapshottable, rebuildable via huggingface download"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: ""
  volumeName: vllm-models-nfs-pv
