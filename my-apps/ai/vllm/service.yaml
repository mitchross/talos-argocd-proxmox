apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: vllm
spec:
  # Selects every bank Deployment (all share app: vllm-server). Only one is
  # scaled up at a time, so endpoints resolve to the single active model pod.
  selector:
    app: vllm-server
  ports:
    - name: http          # named port REQUIRED for HTTPRoute
      protocol: TCP
      port: 8000
      targetPort: http
  type: ClusterIP
