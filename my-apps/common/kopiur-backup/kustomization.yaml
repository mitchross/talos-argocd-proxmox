apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Reusable kopiur backup layer implemented as a pure Kustomize Component.
#
# Include from an app kustomization with:
#   components:
#     - ../../common/kopiur-backup
# then add a per-PVC stub (SnapshotPolicy + SnapshotSchedule + Restore). The
# stub carries the per-PVC VARYING bits — name, sources.pvc.name, identity,
# schedule.cron, AND the mover securityContext (run the mover as the DATA owner
# uid:gid + supplementalGroups[gid]). Plus `dataSourceRef -> <pvc>-restore` on
# the app's PVC.
#
# WHY the mover UID is per-PVC, not injected here: under baseline Pod Security
# the mover can't use capabilities (no CAP_DAC_READ_SEARCH), and kopiur's
# privilegedMode does NOT add caps — so a root mover cannot read non-root /
# mode-600/700 data. The mover MUST run as the data's owner (proven 2026-06-26:
# n8n 1000, gitea 700-dir 1000, mysql 999:568). Ownership also varies within a
# namespace (project-nomad: 1000 / 999:568 / 568), so it can't be uniform here.
# This component injects only the truly-uniform, non-mover fields by kind.
#
# Prereqs (once per namespace): label `kopiur.home-operations.com/repo:
# cluster-kopia` (ESO cred fanout + repo tenancy via the ClusterRepository
# allowedNamespaces selector). The privileged-movers namespace annotation is
# only needed for stubs whose mover runs as root (uid 0).
patches:
  # --- SnapshotPolicy: uniform backup config (mover lives in the stub) ------
  # copyMethod is upstream's default since kopiur 0.5.0, but KEEP injecting it
  # explicitly: upstream warns a server-defaulted field has no SSA field owner,
  # so GitOps re-applies of manifests that omit it can silently flip on CRD
  # upgrades. Explicit value = owned field = no re-defaulting hazard.
  - target:
      kind: SnapshotPolicy
      group: kopiur.home-operations.com
    patch: |
      - op: add
        path: /spec/copyMethod
        value: Snapshot
      - op: add
        path: /spec/volumeSnapshotClassName
        value: longhorn-snapclass
      - op: add
        path: /spec/repository
        value:
          kind: ClusterRepository
          name: cluster-kopia
      # deletion.onPolicyDelete added in kopiur 0.8.0 (#272). Default is Retain
      # (kopia repo snapshots SURVIVE a policy deletion — only Snapshot CRs are
      # GC'd), which is exactly the GitOps-prune safety we need: an ArgoCD prune
      # of a SnapshotPolicy (refactor, app decommission, bad sync) must NEVER
      # destroy backup history. We PIN it for the same reason we pin copyMethod:
      # a server-defaulted field has no SSA owner, so a future default flip
      # (Retain→Delete) could silently arm cascade-deletion on the next re-apply.
      # The wrong value here is catastrophic (permanent loss of every snapshot a
      # pruned policy owned), so it is pinned everywhere. Deliberate cascade
      # cleanup of a decommissioned app is a MANUAL op (set Delete in the stub +
      # the mass-deletion breaker), never the GitOps default.
      - op: add
        path: /spec/deletion
        value:
          onPolicyDelete: Retain
  # --- SnapshotSchedule: uniform scheduling --------------------------------
  - target:
      kind: SnapshotSchedule
      group: kopiur.home-operations.com
    patch: |
      - op: add
        path: /spec/schedule/concurrencyPolicy
        value: Forbid
      - op: add
        path: /spec/schedule/runOnCreate
        value: false
  # --- Restore: uniform passive-populator config (mover lives in the stub) --
  - target:
      kind: Restore
      group: kopiur.home-operations.com
    patch: |
      - op: add
        path: /spec/repository
        value:
          kind: ClusterRepository
          name: cluster-kopia
      - op: add
        path: /spec/target
        value:
          populator: {}
      - op: add
        path: /spec/policy
        value:
          onMissingSnapshot: Continue
