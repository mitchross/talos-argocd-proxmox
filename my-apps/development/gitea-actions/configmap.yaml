# act_runner config. Mounted at /etc/act_runner/config.yaml in the runner
# container. CONFIG_FILE env var points act_runner at this path.
#
# The container.options field is the escape hatch for `--gpus all` — by
# default act adds it when starting job containers, which fails on a
# dockerd with no nvidia runtime. Empty `--gpus=` overrides it (last
# value wins in docker's flag parsing).
apiVersion: v1
kind: ConfigMap
metadata:
  name: act-runner-config
  namespace: gitea-actions
data:
  config.yaml: |
    log:
      level: info

    runner:
      file: /data/.runner
      # 1 job at a time. Higher capacity actually slowed cold runs:
      # concurrent `docker pull` of the same base image hit containerd's
      # content-store lock and serialized anyway, while quadrupling
      # peak RAM. Layer-cache hits from the dind PVC mean serial jobs
      # are fast enough that parallelism doesn't pay.
      capacity: 1
      timeout: 1h
      shutdown_timeout: 5m
      insecure: false
      fetch_interval: 2s

    cache:
      enabled: true

    container:
      # Override act_runner's auto-added `--gpus=all` (which fails on a
      # dockerd with no nvidia runtime). Docker uses last-value-wins for
      # repeated flags, so `--gpus=0` after `--gpus=all` resolves to "no
      # GPUs" — same effect as not passing it. Empty string ("") is NOT
      # valid: docker bails with `invalid argument "" for "--gpus": EOF`.
      options: "--gpus=0"
      # buildx + DinD need privileged step containers.
      privileged: true
      valid_volumes:
        - "**"
      force_pull: false

    host:
      workdir_parent: /data/cache
