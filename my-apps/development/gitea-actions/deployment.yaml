# Gitea Actions runner — two-container pattern.
#
# `runner` runs act_runner (no docker baked in) and talks to a sidecar
# `dind` over a shared unix socket in /var/run. This sidesteps the bugs
# in the gitea/act_runner:*-dind image family:
#   • s6 readiness race that left act_runner blocked on s6-svwait
#   • dockerd-entrypoint.sh auto-passing --gpus=all to job containers
#   • dind's bundled server cert having incompatible TLS key usage
#
# The dind container is privileged (required for any DinD); the runner
# container is unprivileged. Workflow files stay byte-identical to a
# .github/workflows/ file — `runs-on: ubuntu-latest` still works.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: gitea-actions
  labels:
    app: act-runner
spec:
  replicas: 1
  strategy:
    type: Recreate          # only one runner identity, never two at once
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      containers:
        - name: runner
          image: gitea/act_runner:0.4.1
          env:
            # Talk to the dind sidecar via the shared /var/run socket.
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: GITEA_INSTANCE_URL
              value: https://gitea.vanillax.me
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: act-runner-token
                  key: token
            - name: GITEA_RUNNER_NAME
              value: cluster-runner-1
            - name: GITEA_RUNNER_LABELS
              value: ubuntu-latest:docker://catthehacker/ubuntu:act-latest
            - name: CONFIG_FILE
              value: /etc/act_runner/config.yaml
          volumeMounts:
            - { name: var-run, mountPath: /var/run }
            - { name: data,    mountPath: /data }
            - { name: config,  mountPath: /etc/act_runner }
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # Plain Docker-in-Docker. Privileged is required (the gitea-actions
        # namespace is PSA-exempt). TLS disabled because the socket is
        # only reachable from sibling containers in the same pod — no
        # network exposure. Layer cache lives in /var/lib/docker on
        # emptyDir; persistent caching is via the registry buildcache tag
        # the workflows already use.
        - name: dind
          image: docker:27-dind
          args:
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - { name: var-run,        mountPath: /var/run }
            - { name: docker-storage, mountPath: /var/lib/docker }
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 6Gi
          # Dockerd ready when `docker info` over the shared socket succeeds.
          startupProbe:
            exec:
              command: [docker, info]
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command: [docker, info]
            periodSeconds: 30

      volumes:
        - { name: var-run,        emptyDir: {} }
        - { name: data,           emptyDir: {} }
        - { name: docker-storage, emptyDir: {} }
        - name: config
          configMap:
            name: act-runner-config
