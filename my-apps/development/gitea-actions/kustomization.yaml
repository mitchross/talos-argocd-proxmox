apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea-actions
resources:
  - namespace.yaml
  - externalsecret.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml

# act-runner-token is sourced from 1Password item `gitea`, field
# `act_runner_token` (single consolidated gitea item). Gitea mints the token via
# `gitea actions generate-runner-token`; it persists across nukes in the restored
# gitea DB, so the stored value stays valid.
