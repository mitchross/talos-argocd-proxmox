# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# gitea-postgres-data backup STUB — uniform fields (repository, copyMethod,
# populator) injected by ../../common/kopiur-backup. The mover securityContext
# is per-PVC and stays in THIS stub (docs/domains/storage/kopiur-mover-permissions.md).
# HOURLY tier: database — caps data loss at ~1h. The CSI snapshot is
# crash-consistent; Postgres WAL-recovers from it like a power loss.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: gitea-postgres-data
  namespace: gitea
spec:
  sources:
    - pvc:
        name: gitea-postgres-data
  identity:
    username: gitea-postgres-data
    hostname: gitea
  retention:
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  mover:
    securityContext:
      runAsUser: 999 # postgres uid:gid in the official image
      runAsGroup: 999
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 999
      supplementalGroups:
        - 999
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: gitea-postgres-data-hourly
  namespace: gitea
spec:
  policyRef:
    name: gitea-postgres-data
  schedule:
    # :13 hourly — distinct minute vs ALL schedules including the 3 AM daily
    # tier (hourly :MM collides with daily 03:MM).
    cron: "13 * * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: gitea-postgres-data-restore
  namespace: gitea
spec:
  source:
    fromPolicy:
      name: gitea-postgres-data
      offset: 0
  mover:
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 999
      supplementalGroups:
        - 999
