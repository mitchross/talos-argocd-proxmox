---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# gitea-shared-storage backup STUB (chart-generated PVC; fuse/dataSourceRef are
# injected via the kustomization PVC patch). Uniform fields (repository,
# copyMethod, privileged mover, populator) come from ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: gitea-shared-storage
  namespace: gitea
spec:
  sources:
    - pvc:
        name: gitea-shared-storage
  identity:
    username: gitea-shared-storage
    hostname: gitea
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: gitea-shared-storage-daily
  namespace: gitea
spec:
  policyRef:
    name: gitea-shared-storage
  schedule:
    cron: "47 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: gitea-shared-storage-restore
  namespace: gitea
spec:
  source:
    fromPolicy:
      name: gitea-shared-storage
      offset: 0
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
