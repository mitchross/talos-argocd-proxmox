apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
- namespace.yaml
- httproute.yaml
- externalsecret.yaml
- kopiur/gitea-shared-storage.yaml
# In-app Postgres (plain postgres + kopiur, replacing the CNPG gitea-database
# cluster — cutover runbook: docs/domains/cnpg/plain-postgres-migration.md)
- postgres/deployment.yaml
- postgres/service.yaml
- postgres/pvc.yaml
- kopiur/gitea-postgres-data.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub in kopiur/.
components:
- ../../common/kopiur-backup

helmCharts:
- name: gitea
  repo: https://dl.gitea.com/charts/
  version: 12.7.0
  releaseName: gitea
  namespace: gitea
  valuesFile: values.yaml

patches:
- path: fix-permissions-patch.yaml
  target:
    kind: Deployment
    name: gitea
- target:
    kind: PersistentVolumeClaim
    name: gitea-shared-storage
  patch: |
    # kopiur backup of the chart-generated PVC: backup CRs live in
    # kopiur/gitea-shared-storage.yaml; uniform fields from the
    # ../../common/kopiur-backup component (mover securityContext in the stub). dataSourceRef -> the kopiur
    # Restore so a recreate restores-before-bind.
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1compare-options
      value: ServerSideDiff=false
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1sync-options
      value: ServerSideApply=false
    - op: add
      path: /spec/dataSourceRef
      value:
        apiGroup: kopiur.home-operations.com
        kind: Restore
        name: gitea-shared-storage-restore
