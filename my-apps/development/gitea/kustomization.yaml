apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
- namespace.yaml
- httproute.yaml
- externalsecret.yaml
helmCharts:
- name: gitea
  repo: https://dl.gitea.com/charts/
  version: 12.6.0
  releaseName: gitea
  namespace: gitea
  valuesFile: values.yaml

patches:
- path: fix-permissions-patch.yaml
  target:
    kind: Deployment
    name: gitea
- target:
    kind: PersistentVolumeClaim
    name: gitea-shared-storage
  patch: |
    - op: add
      path: /metadata/labels/restore-policy
      value: strict
    - op: add
      path: /metadata/labels/pvc-plumber.io~1enabled
      value: "true"
    - op: add
      path: /metadata/labels/pvc-plumber.io~1manage-volsync
      value: "true"
    - op: add
      path: /metadata/labels/pvc-plumber.io~1tier
      value: daily
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1compare-options
      value: ServerSideDiff=false
    # Static dataSourceRef → ReplicationDestination/gitea-shared-storage-dst.
    # RS/RD are operator-managed by pvc-plumber.
    - op: add
      path: /spec/dataSourceRef
      value:
        apiGroup: volsync.backube
        kind: ReplicationDestination
        name: gitea-shared-storage-dst
