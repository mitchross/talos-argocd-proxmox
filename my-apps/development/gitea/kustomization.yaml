apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
- namespace.yaml
- httproute.yaml
- externalsecret.yaml
helmCharts:
- name: gitea
  repo: https://dl.gitea.com/charts/
  version: 12.5.3
  releaseName: gitea
  namespace: gitea
  valuesFile: values.yaml

patches:
- path: fix-permissions-patch.yaml
  target:
    kind: Deployment
    name: gitea
- target:
    kind: PersistentVolumeClaim
    name: gitea-shared-storage
  patch: |
    - op: add
      path: /metadata/labels/restore-policy
      value: strict
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1compare-options
      value: ServerSideDiff=false
    # TEMPORARY (Option-R, 2026-05-31): dsr aligned to the live immutable value
    # gitea-shared-storage-backup (a dangling/nonexistent RD the PVC was created
    # with) so Argo's sync SSA dry-run has no immutable change and the app stays
    # syncable. RESTORED to gitea-shared-storage-dst in Phase 6, before the PVC
    # delete/recreate. The RD in values.yaml extraDeploy stays named -dst.
    - op: add
      path: /spec/dataSourceRef
      value:
        apiGroup: volsync.backube
        kind: ReplicationDestination
        name: gitea-shared-storage-backup
