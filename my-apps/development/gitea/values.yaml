replicaCount: 1

persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn
  # Placeholder label so the chart renders a non-empty metadata.labels
  # map. kustomization.yaml's JSONPatch then adds `restore-policy: strict`
  # and the static `dataSourceRef` under this map; an empty `labels:`
  # collapses to null and the add-op fails with "doc is missing path
  # /metadata/labels/...". Do not remove without rewriting the patch.
  labels:
    app.kubernetes.io/managed-by: argocd

service:
  http:
    type: ClusterIP
  ssh:
    type: ClusterIP

strategy:
  type: Recreate

image:
  rootless: true

podSecurityContext:
  fsGroup: 1000

# Permissions fixed by Kustomize init container patch (fix-permissions-patch.yaml)
# running as root. The chart's own init container runs as the default user.

gitea:
  config:
    server:
      ROOT_URL: https://gitea.vanillax.me/
      DOMAIN: gitea.vanillax.me
      SSH_DOMAIN: gitea.vanillax.me
    database:
      DB_TYPE: postgres
      HOST: gitea-database-rw.cloudnative-pg.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      SCHEMA: public
  additionalConfigFromEnvs:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-secret
          key: password

# Disable bundled databases - using external CNPG
postgresql-ha:
  enabled: false

postgresql:
  enabled: false

# Use single valkey instead of cluster
valkey-cluster:
  enabled: false

valkey:
  enabled: true
  architecture: standalone
  primary:
    # Cache-only workload: emptyDir is the right home. The previous StatefulSet
    # PVC made every cache restart drag along Longhorn block storage and a
    # backup-restore policy decision (backup or backup-exempt?), neither of
    # which adds value for ephemeral session/queue/cache data. Pod restarts
    # cost users a re-login, in-flight queue jobs replay on next reconciliation
    # — both fine for a homelab gitea.
    persistence:
      enabled: false

# Backups are kopiur now (2026-06-26): the chart-generated PVC's dataSourceRef
# and its SnapshotPolicy/SnapshotSchedule/Restore live in the kustomization PVC
# patch + kopiur/gitea-shared-storage.yaml (uniform fields from the
# ../../common/kopiur-backup component). Do not add inline RS/RD or extraDeploy
# backup objects here.
