persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn
  labels:
    backup: "daily"

service:
  http:
    type: ClusterIP
  ssh:
    type: ClusterIP

strategy:
  type: Recreate

image:
  rootless: true

podSecurityContext:
  fsGroup: 1000

# The init container runs chmod on /data/git/.ssh. Restored PVCs from backup
# may have root-owned files. DAC_OVERRIDE bypasses ownership checks for chmod.
containerSecurityContext:
  capabilities:
    add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE

gitea:
  config:
    database:
      DB_TYPE: postgres
      HOST: gitea-database-rw.cloudnative-pg.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      SCHEMA: public
  additionalConfigFromEnvs:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-secret
          key: password

# Disable bundled databases - using external CNPG
postgresql-ha:
  enabled: false

postgresql:
  enabled: false

# Use single valkey instead of cluster
valkey-cluster:
  enabled: false

valkey:
  enabled: true
  architecture: standalone
  primary:
    persistence:
      size: 5Gi
      storageClass: longhorn
