persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn
  labels:
    backup: "daily"

service:
  http:
    type: ClusterIP
  ssh:
    type: ClusterIP

strategy:
  type: Recreate

image:
  rootless: true

podSecurityContext:
  fsGroup: 1000

# Permissions fixed by Kustomize init container patch (fix-permissions-patch.yaml)
# running as root. The chart's own init container runs as the default user.

gitea:
  config:
    database:
      DB_TYPE: postgres
      HOST: gitea-database-rw.cloudnative-pg.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      SCHEMA: public
  additionalConfigFromEnvs:
    - name: GITEA__database__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-db-secret
          key: password

# Disable bundled databases - using external CNPG
postgresql-ha:
  enabled: false

postgresql:
  enabled: false

# Use single valkey instead of cluster
valkey-cluster:
  enabled: false

valkey:
  enabled: true
  architecture: standalone
  primary:
    # Cache-only workload: emptyDir is the right home. The previous StatefulSet
    # PVC made every cache restart drag along Longhorn block storage and a
    # backup-restore policy decision (backup or backup-exempt?), neither of
    # which adds value for ephemeral session/queue/cache data. Pod restarts
    # cost users a re-login, in-flight queue jobs replay on next reconciliation
    # — both fine for a homelab gitea.
    persistence:
      enabled: false

extraDeploy:
  - apiVersion: volsync.backube/v1alpha1
    kind: ReplicationSource
    metadata:
      name: gitea-shared-storage
      namespace: gitea
      labels:
        app.kubernetes.io/managed-by: argocd
        volsync.backup/pvc: gitea-shared-storage
    spec:
      sourcePVC: gitea-shared-storage
      trigger:
        schedule: "14 2 * * *"
      kopia:
        repository: volsync-kopia-repository
        username: gitea-shared-storage
        hostname: gitea
        compression: zstd-fastest
        parallelism: 2
        retain:
          hourly: 24
          daily: 7
          weekly: 4
          monthly: 2
        copyMethod: Snapshot
        storageClassName: longhorn
        volumeSnapshotClassName: longhorn-snapclass
        cacheCapacity: 2Gi
        moverSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
  - apiVersion: volsync.backube/v1alpha1
    kind: ReplicationDestination
    metadata:
      name: gitea-shared-storage-dst
      namespace: gitea
      labels:
        app.kubernetes.io/managed-by: argocd
        volsync.backup/pvc: gitea-shared-storage
    spec:
      trigger:
        manual: restore-once
      kopia:
        repository: volsync-kopia-repository
        username: gitea-shared-storage
        hostname: gitea
        sourceIdentity:
          sourceName: gitea-shared-storage
          sourceNamespace: gitea
          sourcePVCName: gitea-shared-storage
        copyMethod: Snapshot
        storageClassName: longhorn
        volumeSnapshotClassName: longhorn-snapclass
        cacheCapacity: 2Gi
        accessModes:
          - ReadWriteOnce
        capacity: 10Gi
        moverSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
