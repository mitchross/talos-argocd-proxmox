apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-demo-seed
  namespace: kafka
  annotations:
    # Run only after Kafka (wave 0) and dev-events (wave 1) are Healthy.
    # BeforeHookCreation makes this immutable Job safe on later Git changes.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  activeDeadlineSeconds: 180
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/component: demo-seed
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed-and-verify
          # Match the broker's Kafka CLI version. Digest pin keeps the demo
          # reproducible while the readable tag documents operator/Kafka ABI.
          image: quay.io/strimzi/kafka:1.1.0-kafka-4.3.0@sha256:b6848a53c01eec98b37866450a1227c3a41707785ec65b37063d2733a105bf36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /demo/seed-and-verify.sh
          env:
            - name: KAFKA_HEAP_OPTS
              value: -Xms64m -Xmx192m
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: demo
              mountPath: /demo
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: demo
          configMap:
            name: kafka-demo
