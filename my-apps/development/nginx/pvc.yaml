apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage
  namespace: nginx
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: development
    backup: "daily"
    restore-policy: "strict"
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Static dataSourceRef → ReplicationDestination/storage-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-storage and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: storage-dst
