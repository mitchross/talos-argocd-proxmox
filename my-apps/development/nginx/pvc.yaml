apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage
  namespace: nginx-example
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: development
    restore-policy: "strict"
    # v4 canary #1 (Phase 6 — see docs/pvc-plumber-v4-cutover.md):
    # nginx-example/storage is the safest first ownership cutover —
    # the PVC is orphaned (no Deployment volume references it; backup
    # pipeline runs against an unused volume), the inline mover already
    # used 568:568:568 matching the operator default, and the app is
    # in the development category. The two-gate write fuse below
    # (enabled + manage-volsync) is what authorizes pvc-plumber to
    # take ownership of the RS/RD chain after Argo prunes the inline
    # documents below this PVC.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/tier: "daily"
    pvc-plumber.io/manage-volsync: "true"
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Static dataSourceRef → ReplicationDestination/storage-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. The RD itself is now operator-
  # managed — pvc-plumber will (re)create nginx-example/storage-dst
  # with managed-by=pvc-plumber once Argo prunes the inline RD that
  # used to live in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: storage-dst
