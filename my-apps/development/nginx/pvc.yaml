apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage
  namespace: nginx-example
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: development
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/storage.yaml; uniform fields come from
  # the ../../common/kopiur-backup component; the
  # root mover (runAsUser: 0 — nginx data is root-owned) is set in the stub
  # and gated by the namespace privileged-movers annotation.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: storage-restore
