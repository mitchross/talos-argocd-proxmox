apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-env
  namespace: posthog
data:
  # General
  DEPLOYMENT: "hobby"
  SKIP_ASYNC_MIGRATIONS_SETUP: "1"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  OTEL_SDK_DISABLED: "true"
  DISABLE_SECURE_SSL_REDIRECT: "false"
  IS_BEHIND_PROXY: "true"
  TRUSTED_PROXIES: "192.168.10.50,192.168.10.51"
  ALLOWED_HOSTS: "posthog.vanillax.me,ingest-posthog.vanillax.me"
  SITE_URL: "https://posthog.vanillax.me"
  CSRF_TRUSTED_ORIGINS: "https://posthog.vanillax.me,https://ingest-posthog.vanillax.me,https://libreddit.vanillax.me"

  # PostgreSQL (in posthog namespace)
  PGHOST: "db"
  PGPORT: "5432"
  PGDATABASE: "posthog"
  PGUSER: "posthog"

  # ClickHouse (in posthog namespace)
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_DATABASE: "posthog"
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  CLICKHOUSE_MIGRATIONS_CLUSTER: "posthog_migrations"
  CLICKHOUSE_API_USER: "api"
  CLICKHOUSE_API_PASSWORD: "apipass"
  CLICKHOUSE_APP_USER: "app"
  CLICKHOUSE_APP_PASSWORD: "apppass"

  # Kafka/Redpanda (in posthog namespace)
  KAFKA_HOSTS: "kafka:9092"

  # Redis (in posthog namespace)
  REDIS_URL: "redis://redis7:6379/"

  # Object Storage (RustFS S3 on TrueNAS)
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: "http://192.168.10.133:30293"
  OBJECT_STORAGE_BUCKET: "posthog"
  OBJECT_STORAGE_PUBLIC_ENDPOINT: "https://posthog.vanillax.me"
  SESSION_RECORDING_V2_S3_ENDPOINT: "http://192.168.10.133:30293"
  SESSION_RECORDING_V2_S3_BUCKET: "posthog"
  SESSION_RECORDING_V2_S3_REGION: "us-east-1"
  SESSION_RECORDING_V2_S3_FORCE_PATH_STYLE: "true"

  # CDP
  CDP_API_URL: "http://plugins:6738"
  RECORDING_API_URL: "http://plugins:6738"

  # Feature flags
  FLAGS_REDIS_ENABLED: "false"

  # API limits
  API_QUERIES_PER_TEAM: '{"1": 100}'
