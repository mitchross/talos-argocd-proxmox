apiVersion: apps/v1
kind: Deployment
metadata:
  name: capture
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: capture
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: capture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: capture
    spec:
      containers:
        - name: capture
          image: ghcr.io/posthog/posthog/capture:master@sha256:c47226b3a3b648d543fc407053abb0c0873cc142fdb15849e7c7f65064035b3b
          env:
            - name: ADDRESS
              value: "0.0.0.0:3000"
            - name: KAFKA_TOPIC
              value: "events_plugin_ingestion"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: CAPTURE_MODE
              value: "events"
            - name: RUST_LOG
              value: "info,rdkafka=warn"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: capture
  namespace: posthog
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: capture
---
