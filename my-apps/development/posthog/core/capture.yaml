apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-flags
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: feature-flags
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0  # Disabled: requires GeoIP MMDB file; Python web server handles flags for hobby
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: feature-flags
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: feature-flags
    spec:
      containers:
        - name: feature-flags
          image: ghcr.io/posthog/posthog/feature-flags:master@sha256:fa8d2dbec57fb24fe3bc673172177835b932ccfbb241b0edfb46b7cdb5601b3d
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: MAXMIND_DB_PATH
              value: "/share/GeoLite2-City.mmdb"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ADDRESS
              value: "0.0.0.0:3001"
            - name: RUST_LOG
              value: "info"
            - name: COOKIELESS_REDIS_HOST
              value: "redis7"
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 3001
              name: http
          livenessProbe:
            httpGet:
              path: /_readiness
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: feature-flags
  namespace: posthog
spec:
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: feature-flags
