apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-migrations-init
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: clickhouse-init
        image: clickhouse/clickhouse-server:26.6.1.1193@sha256:1d1f6508eba2dccce2cee9913907c5f7766327debc57a6b1991f2c9e3176c163
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for ClickHouse..."
          TIMEOUT=120
          ELAPSED=0
          until clickhouse-client --host=clickhouse --port=9000 --query="SELECT 1" &> /dev/null; do
            echo "ClickHouse not ready yet (elapsed: ${ELAPSED}s)..."
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Timeout waiting for ClickHouse after ${TIMEOUT}s"
                exit 1
            fi
          done
          echo "ClickHouse is ready."

          echo "Initializing ClickHouse migration tables..."

          # Create the base migration tracking table (Replicated)
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.infi_clickhouse_orm_migrations (
            module_name String,
            package_name String,
            applied Date
          ) ENGINE = ReplicatedMergeTree(
            '/posthog/tables/infi_clickhouse_orm_migrations',
            'replica_{replica}'
          )
          ORDER BY (module_name, package_name)
          SETTINGS index_granularity = 8192;
          "

          # Create the distributed view for cross-shard queries
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.infi_clickhouse_orm_migrations_distributed AS posthog.infi_clickhouse_orm_migrations
          ENGINE = Distributed(
            'posthog_migrations',
            'posthog',
            'infi_clickhouse_orm_migrations'
          );
          "

          echo "ClickHouse migration tables initialized successfully"

          # Create `sharded_events` as a real local table mirroring `events` columns.
          # ---------------------------------------------------------------
          # PostHog's `posthog.events` is a Distributed engine that fans out
          # to a local `sharded_events` table on each shard. Single-node
          # self-hosted CH was bootstrapped without `sharded_events` ever
          # being created — INSERTs from `events_json_mv` → `writable_events`
          # (Distributed) → no shard target → silently dropped. Migrations
          # 0026-0030 only used `IF EXISTS` ALTERs so an earlier stub got
          # them through, but migration 0031 (`event_properties_zstd`) does
          # `ALTER TABLE sharded_events MODIFY COLUMN properties` which fails
          # with `NOT_FOUND_COLUMN_IN_BLOCK` against a single-column stub.
          #
          # Proper fix: recreate sharded_events as a local ReplicatedReplacingMergeTree
          # whose column list is cloned (`AS posthog.events`) from the existing
          # Distributed view. This matches PostHog upstream's
          # `posthog/clickhouse/sharded_events.py` schema (PARTITION BY
          # toYYYYMM(timestamp), ORDER BY (team_id, toDate(timestamp), event,
          # cityHash64(distinct_id), cityHash64(uuid)), _timestamp as the
          # ReplacingMergeTree version column). Now `ALTER ... MODIFY COLUMN`
          # has a real target and ingest from kafka_events_json → events_json_mv
          # → writable_events (Distributed) → sharded_events actually persists.
          echo "Creating sharded_events local table mirroring events columns..."
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.sharded_events ON CLUSTER 'posthog'
          AS posthog.events
          ENGINE = ReplicatedReplacingMergeTree(
            '/clickhouse/tables/{shard}/posthog.sharded_events',
            '{replica}',
            _timestamp
          )
          PARTITION BY toYYYYMM(timestamp)
          ORDER BY (team_id, toDate(timestamp), event, cityHash64(distinct_id), cityHash64(uuid))
          SAMPLE BY cityHash64(distinct_id)
          SETTINGS index_granularity = 8192;
          " || echo "  sharded_events likely already exists with prior schema — skipping"
          echo "  sharded_events ready"

          # Force-create lazy system log tables that PostHog migrations depend on
          echo "Ensuring system log tables exist..."
          clickhouse-client --host=clickhouse --port=9000 --query "SYSTEM FLUSH LOGS" || true
          for table in crash_log part_log trace_log; do
            clickhouse-client --host=clickhouse --port=9000 --query "SELECT 1 FROM system.${table} LIMIT 0" 2>/dev/null && \
              echo "  system.${table} exists" || \
              echo "  system.${table} not yet created (ok - not needed until first event)"
          done

          # Verify tables exist
          clickhouse-client --host=clickhouse --port=9000 --query "
          SHOW TABLES IN posthog WHERE name LIKE '%infi_clickhouse_orm_migrations%'
          "
