apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-migrations-init
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: clickhouse-init
        image: clickhouse/clickhouse-server:25.12.8.9
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for ClickHouse..."
          TIMEOUT=120
          ELAPSED=0
          until clickhouse-client --host=clickhouse --port=9000 --query="SELECT 1" &> /dev/null; do
            echo "ClickHouse not ready yet (elapsed: ${ELAPSED}s)..."
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Timeout waiting for ClickHouse after ${TIMEOUT}s"
                exit 1
            fi
          done
          echo "ClickHouse is ready."

          echo "Initializing ClickHouse migration tables..."

          # Create the base migration tracking table (Replicated)
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.infi_clickhouse_orm_migrations (
            module_name String,
            package_name String,
            applied Date
          ) ENGINE = ReplicatedMergeTree(
            '/posthog/tables/infi_clickhouse_orm_migrations',
            'replica_{replica}'
          )
          ORDER BY (module_name, package_name)
          SETTINGS index_granularity = 8192;
          "

          # Create the distributed view for cross-shard queries
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.infi_clickhouse_orm_migrations_distributed AS posthog.infi_clickhouse_orm_migrations
          ENGINE = Distributed(
            'posthog_migrations',
            'posthog',
            'infi_clickhouse_orm_migrations'
          );
          "

          echo "ClickHouse migration tables initialized successfully"

          # Stub `sharded_events` so migration 0026 can target it (single-node CH gotcha).
          # ---------------------------------------------------------------
          # PostHog's `posthog.events` is a Distributed engine that fans out
          # to a local `sharded_events` table on each shard. Single-node
          # self-hosted CH was bootstrapped without `sharded_events` ever
          # being created (config drift — see TODO below). That makes
          # migration `0026_fix_materialized_window_and_session_ids.py` fail
          # with `Code: 60. DB::Exception: Could not find table:
          # sharded_events. (UNKNOWN_TABLE)` and the posthog-migrate Job
          # spins in BackoffLimitExceeded forever, blocking ArgoCD sync.
          #
          # 0026's actual SQL is `ALTER TABLE sharded_events ON CLUSTER ...
          # DROP/RENAME COLUMN IF EXISTS mat_$session_id / mat_$window_id`.
          # The `IF EXISTS` guards make a stub MergeTree with a single
          # placeholder column a safe target — both ALTERs no-op cleanly,
          # the migration row is written to infi_clickhouse_orm_migrations,
          # and the Job exits 0. The stub never receives writes (the
          # Distributed `events` table was already routing to a
          # nonexistent target before this), so existing behavior is
          # preserved.
          #
          # TODO(out-of-scope): The Distributed `posthog.events` table has
          # been pointing at a missing `sharded_events` for the lifetime
          # of this single-node deployment. INSERTs from `events_json_mv`
          # into `events` → Distributed → no-shard-target → silently
          # dropped. The proper fix is to either (a) recreate `events` as
          # a single-node ReplicatedMergeTree (PostHog's
          # CLICKHOUSE_REPLICATION=false code path), or (b) materialize a
          # real `sharded_events` schema mirroring all 80+ columns of the
          # current Distributed view and update the routing. Tracked
          # separately — DO NOT bundle with this loop-stop fix.
          echo "Creating stub sharded_events for single-node migration compat..."
          clickhouse-client --host=clickhouse --port=9000 --query "
          CREATE TABLE IF NOT EXISTS posthog.sharded_events ON CLUSTER 'posthog' (
            uuid UUID
          ) ENGINE = MergeTree() ORDER BY uuid
          SETTINGS index_granularity = 8192;
          "
          echo "  sharded_events stub ready"

          # Force-create lazy system log tables that PostHog migrations depend on
          echo "Ensuring system log tables exist..."
          clickhouse-client --host=clickhouse --port=9000 --query "SYSTEM FLUSH LOGS" || true
          for table in crash_log part_log trace_log; do
            clickhouse-client --host=clickhouse --port=9000 --query "SELECT 1 FROM system.${table} LIMIT 0" 2>/dev/null && \
              echo "  system.${table} exists" || \
              echo "  system.${table} not yet created (ok - not needed until first event)"
          done

          # Verify tables exist
          clickhouse-client --host=clickhouse --port=9000 --query "
          SHOW TABLES IN posthog WHERE name LIKE '%infi_clickhouse_orm_migrations%'
          "
