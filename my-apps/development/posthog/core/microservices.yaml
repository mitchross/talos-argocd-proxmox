---
# Livestream - real-time event streaming (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livestream
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: livestream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: livestream
    spec:
      containers:
        - name: livestream
          image: ghcr.io/posthog/posthog/livestream:master@sha256:28c40d3a7444d3ddbe64c5fbe3beba99937154cf1c3f960cfbf714892db827eb
          env:
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ADDRESS
              value: "0.0.0.0:8080"
            - name: CONFIG_FILE_PATH
              value: ""
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: livestream
  namespace: posthog
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
---
# Property Defs - Rust property definitions service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-defs-rs
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: property-defs-rs
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: property-defs-rs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: property-defs-rs
    spec:
      containers:
        - name: property-defs-rs
          image: ghcr.io/posthog/posthog/property-defs-rs:master@sha256:54bb7b6d6b23708378be19be69697e5c26cd10ac9e0ae5b04b3126dca51fe3a8
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
---
# Cyclotron Janitor - background job cleanup (disabled: cyclotron_jobs table doesn't exist)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyclotron-janitor
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cyclotron-janitor
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cyclotron-janitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cyclotron-janitor
    spec:
      containers:
        - name: cyclotron-janitor
          image: ghcr.io/posthog/posthog/cyclotron-janitor:master@sha256:1083a96a53391eb548c28fd215485aafbadd8462a0a851847ef08d0e98de4ec7
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "clickhouse_app_metrics2"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
# Cymbal - exception symbolication processor (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymbal
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cymbal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cymbal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cymbal
    spec:
      containers:
        - name: cymbal
          image: ghcr.io/posthog/posthog/cymbal:master@sha256:0ab21db5392735f2c5873c1b253c3f8f5a5dd53d80e2e2cd751a3608719eb716
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ISSUE_BUCKETS_REDIS_URL
              value: "redis://redis7:6379/"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_CONSUMER_GROUP
              value: "cymbal"
            - name: KAFKA_CONSUMER_TOPIC
              value: "exceptions_ingestion"
            - name: OBJECT_STORAGE_BUCKET
              value: "posthog"
            - name: OBJECT_STORAGE_ENDPOINT
              value: "http://192.168.10.133:30292"
            - name: OBJECT_STORAGE_FORCE_PATH_STYLE
              value: "true"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: BIND_PORT
              value: "3302"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
