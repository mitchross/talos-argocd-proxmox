---
# Livestream - real-time event streaming (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livestream
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: livestream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: livestream
    spec:
      containers:
        - name: livestream
          image: ghcr.io/posthog/posthog/livestream:master@sha256:3707cf5ae7ce91a2f14ccdd2c81b042e8276308cdc77f8e0bce6c4e4c42c3630
          env:
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ADDRESS
              value: "0.0.0.0:8080"
            - name: CONFIG_FILE_PATH
              value: ""
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: livestream
  namespace: posthog
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
---
# Property Defs - Rust property definitions service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-defs-rs
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: property-defs-rs
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: property-defs-rs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: property-defs-rs
    spec:
      containers:
        - name: property-defs-rs
          image: ghcr.io/posthog/posthog/property-defs-rs:master@sha256:5e7b74ae03567dc37de5f65c7e9aa87a6c2851c0b802040f364e5c5712ef704c
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
---
# Cyclotron Janitor - background job cleanup (disabled: cyclotron_jobs table doesn't exist)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyclotron-janitor
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cyclotron-janitor
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cyclotron-janitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cyclotron-janitor
    spec:
      containers:
        - name: cyclotron-janitor
          image: ghcr.io/posthog/posthog/cyclotron-janitor:master@sha256:039f6419fcef7322c23d477f7b0c848ec012caa5b93b3a254827e1d87380292c
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "clickhouse_app_metrics2"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
# Cymbal - exception symbolication processor (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymbal
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cymbal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cymbal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cymbal
    spec:
      containers:
        - name: cymbal
          image: ghcr.io/posthog/posthog/cymbal:master@sha256:4af51db510dea8d25384870bd10d828a020bff4761dfeb5d38b0ec9b72ec6aae
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ISSUE_BUCKETS_REDIS_URL
              value: "redis://redis7:6379/"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_CONSUMER_GROUP
              value: "cymbal"
            - name: KAFKA_CONSUMER_TOPIC
              value: "exceptions_ingestion"
            - name: OBJECT_STORAGE_BUCKET
              value: "posthog"
            - name: OBJECT_STORAGE_ENDPOINT
              value: "http://192.168.10.133:30293"
            - name: OBJECT_STORAGE_FORCE_PATH_STYLE
              value: "true"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: BIND_PORT
              value: "3302"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
