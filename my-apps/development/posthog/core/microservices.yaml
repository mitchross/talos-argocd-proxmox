---
# Livestream - real-time event streaming (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livestream
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: livestream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: livestream
    spec:
      containers:
        - name: livestream
          image: ghcr.io/posthog/posthog/livestream:master@sha256:6536f12b65dbf11c0df8449a6d9c2b8a9f7a2af72f8958b92a769c0679bd6af1
          env:
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ADDRESS
              value: "0.0.0.0:8080"
            - name: CONFIG_FILE_PATH
              value: ""
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: livestream
  namespace: posthog
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: livestream
---
# Property Defs - Rust property definitions service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-defs-rs
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: property-defs-rs
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: property-defs-rs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: property-defs-rs
    spec:
      containers:
        - name: property-defs-rs
          image: ghcr.io/posthog/posthog/property-defs-rs:master@sha256:049b51742644402dea463e7edca3581b4df5d2c2558cf670dd6b52f5f8a50341
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
---
# Cyclotron Janitor - background job cleanup (disabled: cyclotron_jobs table doesn't exist)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyclotron-janitor
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cyclotron-janitor
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cyclotron-janitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cyclotron-janitor
    spec:
      containers:
        - name: cyclotron-janitor
          image: ghcr.io/posthog/posthog/cyclotron-janitor:master@sha256:462237e67e0889753ff78e730b74f573c2a488e33bfdb6ae8e8721dd9de1e9b1
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "clickhouse_app_metrics2"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
# Cymbal - exception symbolication processor (disabled: requires GeoIP MMDB file)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymbal
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: cymbal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: cymbal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: cymbal
    spec:
      containers:
        - name: cymbal
          image: ghcr.io/posthog/posthog/cymbal:master@sha256:324a108e08b75c1c985bee1c234be7817fb9cfb7074e9a7a3c7bd7b84d540a21
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ISSUE_BUCKETS_REDIS_URL
              value: "redis://redis7:6379/"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: KAFKA_CONSUMER_GROUP
              value: "cymbal"
            - name: KAFKA_CONSUMER_TOPIC
              value: "exceptions_ingestion"
            - name: OBJECT_STORAGE_BUCKET
              value: "posthog"
            - name: OBJECT_STORAGE_ENDPOINT
              value: "http://192.168.10.133:30292"
            - name: OBJECT_STORAGE_FORCE_PATH_STYLE
              value: "true"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: BIND_PORT
              value: "3302"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
