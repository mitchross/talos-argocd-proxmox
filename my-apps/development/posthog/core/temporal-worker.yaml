# Temporal Django Worker - handles batch exports, data warehouse syncs,
# and other Temporal workflow-based operations.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-django-worker
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: temporal-django-worker
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: temporal-django-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: temporal-django-worker
    spec:
      nodeSelector:
        feature.node.kubernetes.io/cpu-cpuid.AVX2: "true"
      containers:
        - name: temporal-django-worker
          image: posthog/posthog:latest@sha256:39b123d3123328d0ccf32280d2762bd41e2af270f8a037f177d2e565d53ad777
          command:
            - ./bin/temporal-django-worker
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-secret
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: encryption-salt-keys
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: TEMPORAL_HOST
              value: "temporal-frontend.temporal.svc.cluster.local"
            - name: TEMPORAL_PORT
              value: "7233"
            - name: TEMPORAL_NAMESPACE
              value: "default"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
