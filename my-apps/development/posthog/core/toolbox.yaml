# Toolbox - debug pod for running manage.py commands
# Scale to 1 replica when needed: kubectl scale deploy toolbox -n posthog --replicas=1
# Then exec in: kubectl exec -it deploy/toolbox -n posthog -- bash
# Example: python manage.py shell, python manage.py migrate --check
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolbox
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: toolbox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: toolbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: toolbox
    spec:
      nodeSelector:
        feature.node.kubernetes.io/cpu-cpuid.AVX2: "true"
      containers:
        - name: toolbox
          # Keep this aligned with the posthog-migrate hook in jobs.yaml.
          image: posthog/posthog:latest@sha256:18cd79f19ce8972869b845d2a708139d27ec59b6e3f8b9a5cfbd22e8521ccdf3
          command:
            - /bin/sh
            - -c
            - "sleep infinity"
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-secret
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: encryption-salt-keys
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 2Gi
