apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: web
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 55
      nodeSelector:
        feature.node.kubernetes.io/cpu-cpuid.AVX2: "true"
      containers:
      - name: web
        image: posthog/posthog:latest@sha256:9b518de9d2e7337848742240657368209b261a6b33074e3491c03b6dff7da5d3
        command:
        - /bin/sh
        - -c
        - ./bin/docker-server
        envFrom:
        - configMapRef:
            name: posthog-env
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: posthog-secret
        - name: ENCRYPTION_SALT_KEYS
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: encryption-salt-keys
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: posthog-db-password
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: posthog-db-url
        - name: OBJECT_STORAGE_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: rustfs-access-key
        - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: rustfs-secret-key
        - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: rustfs-access-key
        - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: rustfs-secret-key
        - name: LIVESTREAM_HOST
          value: "https://posthog.vanillax.me/livestream"
        - name: NGINX_UNIT_APP_PROCESSES
          value: "2"
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 20"]
        startupProbe:
          httpGet:
            path: /_readyz
            port: 8000
            httpHeaders:
            - name: Host
              value: posthog.vanillax.me
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 45
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /_livez
            port: 8000
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_readyz?role=web
            port: 8000
            httpHeaders:
            - name: Host
              value: posthog.vanillax.me
          periodSeconds: 10
          timeoutSeconds: 30
          failureThreshold: 3
        resources:
          requests:
            cpu: 1200m
            memory: 4Gi
          limits:
            memory: 12Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: posthog
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: web
