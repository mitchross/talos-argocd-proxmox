apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: worker
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: worker
    spec:
      nodeSelector:
        feature.node.kubernetes.io/cpu-cpuid.AVX2: "true"
      containers:
        - name: worker
          # Keep this aligned with the posthog-migrate hook in jobs.yaml.
          image: posthog/posthog:latest@sha256:f607c58b19de904789fc23d38bba43dd6225697b1687f1515fc940302dce4bdc
          command:
            - ./bin/docker-worker-celery
            - --with-scheduler
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            # Celery defaults --concurrency to CPU count (~32 on this node) with no
            # child recycling — leaked memory accumulated to ~15Gi RSS. Cap the pool
            # and recycle children by task count / RSS (KiB).
            - name: WEB_CONCURRENCY
              value: "4"
            - name: CELERY_MAX_TASKS_PER_CHILD
              value: "300"
            - name: CELERY_MAX_MEMORY_PER_CHILD
              value: "1048576"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-secret
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: encryption-salt-keys
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            # Upstream worker_env parity (posthog/persons_db.py); falls back to
            # the standard DB config if unset.
            - name: PERSONS_DB_WRITER_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_DB_READER_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
          resources:
            requests:
              cpu: 250m
              memory: 4Gi
            limits:
              memory: 20Gi
