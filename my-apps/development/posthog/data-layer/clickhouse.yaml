apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data-clickhouse-0
  namespace: posthog
  labels:
    app: posthog-clickhouse
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
    backup-exempt: "true"
  annotations:
    # 100Gi ClickHouse data PVC is intentionally backup-exempt.
    # Data is regenerable from PostHog ingest, and the long Kopia upload
    # window (~30+ min @ S3) consistently collided with RustFS IAM flap
    # events on 2026-05-19/20, making the backup unreliable in practice.
    # PostHog Postgres + Redis ARE backed up; ClickHouse is rebuilt by
    # re-running clickhouse-init + replaying ingest if needed.
    storage.vanillax.dev/backup-exempt-reason: "regenerable from PostHog ingest; 100Gi too large for current Kopia/RustFS S3 path"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn-flash
  resources:
    requests:
      # Shrunk 100Gi -> 40Gi for the single-node 2950X rebuild (2026-06-19).
      # Backup-exempt + rebuilt from ingest on nuke, so it starts empty; 40Gi is
      # ample for homelab ClickHouse retention and reclaims Longhorn budget on the
      # worker storage. Raise retention/size later if analytics volume grows.
      storage: 40Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: clickhouse
    spec:
      hostname: clickhouse
      subdomain: clickhouse-headless
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:25.12.8.9
        imagePullPolicy: IfNotPresent
        env:
        - name: CLICKHOUSE_SKIP_USER_SETUP
          value: "1"
        - name: KAFKA_HOSTS
          value: "kafka:9092"
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: tcp
        - containerPort: 9181
          name: keeper
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          # Capacity baseline 2026-05-04 showed ClickHouse pod observed
          # 1.0 GiB / 0.36 cores. 8 GiB request was ~8x over-allocated.
          # Lowered to 4 GiB; mark cache + merges can still spike, but
          # the 16 GiB limit absorbs the burst.
          requests:
            cpu: 500m
            memory: 4Gi
          limits:
            memory: 16Gi
        volumeMounts:
        - name: clickhouse-data
          mountPath: /var/lib/clickhouse
        - name: config
          mountPath: /etc/clickhouse-server/config.xml
          subPath: config.xml
        - name: config
          mountPath: /etc/clickhouse-server/users.xml
          subPath: users.xml
        - name: config
          mountPath: /etc/clickhouse-server/user_defined_function.xml
          subPath: user_defined_function.xml
        - name: config-d-default
          mountPath: /etc/clickhouse-server/config.d/default.xml
          subPath: default.xml
        - name: config-d-keeper
          mountPath: /etc/clickhouse-server/config.d/keeper.xml
          subPath: keeper.xml
        - name: init
          mountPath: /docker-entrypoint-initdb.d/init-posthog.sh
          subPath: init-posthog.sh
      volumes:
      - name: clickhouse-data
        persistentVolumeClaim:
          claimName: clickhouse-data-clickhouse-0
      - name: config
        configMap:
          name: clickhouse-config
      - name: config-d-default
        configMap:
          name: clickhouse-config-d
          items:
          - key: default.xml
            path: default.xml
      - name: config-d-keeper
        configMap:
          name: clickhouse-config-d
          items:
          - key: keeper.xml
            path: keeper.xml
      - name: init
        configMap:
          name: clickhouse-init
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: posthog
spec:
  ports:
  - port: 8123
    targetPort: 8123
    name: http
  - port: 9000
    targetPort: 9000
    name: tcp
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  namespace: posthog
spec:
  clusterIP: None
  ports:
  - port: 9000
    targetPort: 9000
    name: tcp
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
