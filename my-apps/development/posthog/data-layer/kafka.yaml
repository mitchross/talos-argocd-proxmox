apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    vpa.kubernetes.io/min-memory: "2Gi"
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: kafka
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          rpk redpanda config set redpanda.auto_create_topics_enabled true &&
          rpk redpanda config set redpanda.empty_seed_starts_cluster true &&
          exec rpk redpanda start \
            --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 \
            --advertise-kafka-addr internal://kafka:9092,external://localhost:19092 \
            --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082 \
            --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082 \
            --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081 \
            --rpc-addr 0.0.0.0:33145 \
            --advertise-rpc-addr kafka:33145 \
            --smp 1 \
            --memory 512M \
            --reserve-memory 200M \
            --overprovisioned \
            --unsafe-bypass-fsync
        env:
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "true"
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 8081
          name: schema
        - containerPort: 8082
          name: proxy
        - containerPort: 9644
          name: admin
        livenessProbe:
          httpGet:
            path: /v1/status/ready
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 3Gi
        volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
  - metadata:
      name: redpanda-data
      labels:
        app: posthog-kafka
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: posthog
spec:
  clusterIP: None
  ports:
  - port: 9092
    name: kafka
  - port: 8081
    name: schema
  - port: 8082
    name: proxy
  - port: 33145
    name: rpc
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
