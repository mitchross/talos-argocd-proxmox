apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redpanda-data-kafka-0
  namespace: posthog
  labels:
    app: posthog-kafka
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
    restore-policy: "strict"
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    # TEMPORARY (2026-05-01): wiping posthog data + starting fresh.
    # Remove once posthog is back up on fresh data.
    volsync.backup/skip-restore: "true"
    volsync.backup/skip-restore-reason: "posthog corruption wipe 2026-05-01 — remove once data verified"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
  # Static dataSourceRef → ReplicationDestination/redpanda-data-kafka-0-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: redpanda-data-kafka-0-dst
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: kafka
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          rpk redpanda config set redpanda.auto_create_topics_enabled true &&
          rpk redpanda config set redpanda.empty_seed_starts_cluster true &&
          exec rpk redpanda start \
            --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 \
            --advertise-kafka-addr internal://kafka:9092,external://localhost:19092 \
            --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082 \
            --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082 \
            --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081 \
            --rpc-addr 0.0.0.0:33145 \
            --advertise-rpc-addr kafka:33145 \
            --smp 1 \
            --memory 1G \
            --reserve-memory 200M \
            --overprovisioned \
            --unsafe-bypass-fsync
        env:
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "true"
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 8081
          name: schema
        - containerPort: 8082
          name: proxy
        - containerPort: 9644
          name: admin
        livenessProbe:
          httpGet:
            path: /v1/status/ready
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
      volumes:
      - name: redpanda-data
        persistentVolumeClaim:
          claimName: redpanda-data-kafka-0
---
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: posthog
spec:
  clusterIP: None
  ports:
  - port: 9092
    name: kafka
  - port: 8081
    name: schema
  - port: 8082
    name: proxy
  - port: 33145
    name: rpc
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: redpanda-data-kafka-0
  namespace: posthog
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: redpanda-data-kafka-0
spec:
  sourcePVC: redpanda-data-kafka-0
  trigger:
    schedule: "42 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: redpanda-data-kafka-0
    hostname: posthog
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: redpanda-data-kafka-0-dst
  namespace: posthog
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: redpanda-data-kafka-0
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: redpanda-data-kafka-0
    hostname: posthog
    sourceIdentity:
      sourceName: redpanda-data-kafka-0
      sourceNamespace: posthog
      sourcePVCName: redpanda-data-kafka-0
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
