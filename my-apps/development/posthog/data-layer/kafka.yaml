apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redpanda-data-kafka-0
  namespace: posthog
  labels:
    app: posthog-kafka
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
    # PostHog data is disposable/rebuildable in this homelab — backup-exempt.
    # Not in the pvc-plumber migration queue; no VolSync RS/RD (removed below).
    backup-exempt: "true"
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    storage.vanillax.dev/backup-exempt-reason: "PostHog data is disposable/rebuildable in this homelab; do not VolSync/pvc-plumber migrate. Redpanda runs --unsafe-bypass-fsync with ~1h retention + auto_create_topics — log is ephemeral/rebuildable."
    # Retained skip-restore (now a no-op since RS/RD are removed): never restore.
    volsync.backup/skip-restore: "true"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      # Shrunk 20Gi -> 8Gi for the single-node rebuild (2026-06-19). Redpanda
      # runs --unsafe-bypass-fsync with ~1h retention — the log is ephemeral, so
      # 8Gi is plenty. Backup-exempt; starts empty on nuke.
      storage: 8Gi
  # PostHog data is disposable/rebuildable (backup-exempt above) — intentionally
  # NO dataSourceRef and NO VolSync ReplicationSource/ReplicationDestination.
  # Inline RS/redpanda-data-kafka-0 + RD/redpanda-data-kafka-0-dst were REMOVED
  # 2026-05-31 to stop backups. dataSourceRef omitted to match the live PVC
  # (empty); the Redpanda log is ephemeral by design. Do not re-add RS/RD.
---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: kafka
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          rpk redpanda config set redpanda.auto_create_topics_enabled true &&
          rpk redpanda config set redpanda.empty_seed_starts_cluster true &&
          exec rpk redpanda start \
            --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 \
            --advertise-kafka-addr internal://kafka:9092,external://localhost:19092 \
            --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082 \
            --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082 \
            --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081 \
            --rpc-addr 0.0.0.0:33145 \
            --advertise-rpc-addr kafka:33145 \
            --smp 1 \
            --memory 1G \
            --reserve-memory 200M \
            --overprovisioned \
            --unsafe-bypass-fsync
        env:
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "true"
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 8081
          name: schema
        - containerPort: 8082
          name: proxy
        - containerPort: 9644
          name: admin
        livenessProbe:
          httpGet:
            path: /v1/status/ready
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
      volumes:
      - name: redpanda-data
        persistentVolumeClaim:
          claimName: redpanda-data-kafka-0
---
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: posthog
spec:
  clusterIP: None
  ports:
  - port: 9092
    name: kafka
  - port: 8081
    name: schema
  - port: 8082
    name: proxy
  - port: 33145
    name: rpc
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka

# NOTE: inline ReplicationSource/redpanda-data-kafka-0 +
# ReplicationDestination/redpanda-data-kafka-0-dst were REMOVED 2026-05-31.
# PostHog data is disposable/rebuildable (PVC is backup-exempt) — no VolSync
# backups. Do not re-add RS/RD here.
