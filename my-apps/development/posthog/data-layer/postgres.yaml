apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: db
    spec:
      containers:
      - name: db
        image: postgres:15.12-alpine@sha256:ef9d1517df69c4d27dbb9ddcec14f431a2442628603f4e9daa429b92ae6c3cd1
        # PostHog's hourly monitoring task queries pg_stat_statements; preload the
        # library so the migrate job's CREATE EXTENSION works (stops hourly log errors).
        args:
        - -c
        - shared_preload_libraries=pg_stat_statements
        env:
        - name: POSTGRES_USER
          value: posthog
        - name: POSTGRES_DB
          value: posthog
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: posthog-db-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U posthog
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 30
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U posthog
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
---
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: posthog
spec:
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: db
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: posthog
  labels:
    app: posthog-db
  annotations:
    # immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff;
    # the AppSet ignoreDifferences handles the live compare.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn-flash
  resources:
    requests:
      # PostHog's Postgres holds identity metadata (small); 8Gi is ample.
      storage: 8Gi
  # Restore-before-bind: on rebuild this PVC hydrates from the latest kopiur
  # snapshot — API keys, users, dashboards, flag/cohort definitions survive.
  # ClickHouse/Kafka/Redis stay backup-exempt; event history rebuilds empty.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: postgres-data-restore
