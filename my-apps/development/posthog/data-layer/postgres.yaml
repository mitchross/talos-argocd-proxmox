apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: db
    spec:
      containers:
      - name: db
        image: postgres:15.12-alpine
        env:
        - name: POSTGRES_USER
          value: posthog
        - name: POSTGRES_DB
          value: posthog
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: posthog-db-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U posthog
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 30
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U posthog
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: posthog
spec:
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: posthog
  labels:
    app: posthog-db
    backup: "daily"
    restore-policy: "strict"
  annotations:
    # TEMPORARY (2026-05-01): wiping posthog data + starting fresh.
    # Remove once posthog is back up on fresh data.
    volsync.backup/skip-restore: "true"
    volsync.backup/skip-restore-reason: "posthog corruption wipe 2026-05-01 — remove once data verified"
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
  # Static dataSourceRef → ReplicationDestination/postgres-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-postgres-data and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: postgres-data-dst
