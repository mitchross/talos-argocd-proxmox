apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis7
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: redis7
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: redis7
    spec:
      containers:
      - name: redis7
        image: valkey/valkey:9.1-alpine@sha256:ee91f7a174ac4d6a6b0685b3a60e321f0a9dbbb691f9b0e285be2ba1d1be8328
        command: [ "redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "512mb" ]
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 768Mi
        volumeMounts:
        - name: redis7-data
          mountPath: /data
      volumes:
      - name: redis7-data
        persistentVolumeClaim:
          claimName: redis7-data
---
---
apiVersion: v1
kind: Service
metadata:
  name: redis7
  namespace: posthog
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis7-data
  namespace: posthog
  labels:
    app: posthog-redis
    # PostHog data is disposable/rebuildable in this homelab — backup-exempt (no kopiur).
    backup-exempt: "true"
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    storage.vanillax.dev/backup-exempt-reason: "PostHog data is disposable/rebuildable in this homelab; do not back up. Valkey cache (allkeys-lru, no RDB/AOF) — nothing to preserve."
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn-flash
  resources:
    requests:
      # Shrunk 10Gi -> 4Gi for the single-node rebuild (2026-06-19). Valkey cache
      # (allkeys-lru, no RDB/AOF) — nothing persisted, 4Gi is plenty. Backup-exempt.
      storage: 4Gi
  # PostHog data is disposable/rebuildable (backup-exempt above) — intentionally
  # NO dataSourceRef and NO VolSync ReplicationSource/ReplicationDestination.
  # Inline RS/redis7-data + RD/redis7-data-dst were REMOVED 2026-05-31 to stop
  # backups. dataSourceRef omitted to match the live PVC (empty); Valkey is a
  # pure LRU cache (no persistence) so there is nothing to restore. Do not
  # re-add RS/RD.
