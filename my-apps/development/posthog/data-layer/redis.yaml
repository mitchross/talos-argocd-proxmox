apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis7
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: redis7
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: redis7
    spec:
      containers:
      - name: redis7
        image: valkey/valkey:8.0-alpine
        command: [ "redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "512mb" ]
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 768Mi
        volumeMounts:
        - name: redis7-data
          mountPath: /data
      volumes:
      - name: redis7-data
        persistentVolumeClaim:
          claimName: redis7-data
---
---
apiVersion: v1
kind: Service
metadata:
  name: redis7
  namespace: posthog
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis7-data
  namespace: posthog
  labels:
    app: posthog-redis
    restore-policy: "strict"
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    # TEMPORARY (2026-05-01): wiping posthog data + starting fresh.
    # Remove once posthog is back up on fresh data.
    volsync.backup/skip-restore: "true"
    volsync.backup/skip-restore-reason: "posthog corruption wipe 2026-05-01 — remove once data verified"
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
  # Static dataSourceRef → ReplicationDestination/redis7-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: redis7-data-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: redis7-data
  namespace: posthog
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: redis7-data
spec:
  sourcePVC: redis7-data
  trigger:
    schedule: "57 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: redis7-data
    hostname: posthog
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: redis7-data-dst
  namespace: posthog
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: redis7-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: redis7-data
    hostname: posthog
    sourceIdentity:
      sourceName: redis7-data
      sourceNamespace: posthog
      sourcePVCName: redis7-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
