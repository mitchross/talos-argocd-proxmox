apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: posthog
  namespace: posthog
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - "posthog.vanillax.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 8000
