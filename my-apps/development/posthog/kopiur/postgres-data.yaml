# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# postgres-data backup STUB — uniform fields (repository, copyMethod, populator)
# injected by ../../common/kopiur-backup. Postgres holds the identity layer
# (project/personal API keys, users, dashboards, flag+cohort definitions) that
# must survive cluster rebuild; ClickHouse/Kafka/Redis stay exempt (event
# history rebuilds empty). DAILY tier: dashboards/flags edits risk <=24h;
# API keys effectively never change. CSI snapshot is crash-consistent;
# Postgres WAL-recovers from it like a power loss.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: postgres-data
  namespace: posthog
spec:
  sources:
    - pvc:
        name: postgres-data
  identity:
    username: postgres-data
    hostname: posthog
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 70 # postgres:15-alpine data owner is 70:0
      runAsGroup: 0
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 0
      supplementalGroups:
        - 0
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: postgres-data-daily
  namespace: posthog
spec:
  policyRef:
    name: postgres-data
  schedule:
    # :51 — distinct minute vs ALL schedules including hourly tiers
    # (hourly :MM collides with daily 03:MM).
    cron: "51 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: postgres-data-restore
  namespace: posthog
spec:
  source:
    fromPolicy:
      name: postgres-data
      offset: 0
  mover:
    securityContext:
      runAsUser: 70
      runAsGroup: 0
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 0
      supplementalGroups:
        - 0
