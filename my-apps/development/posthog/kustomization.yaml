apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: posthog

resources:
  - namespace.yaml
  - externalsecret.yaml
  - httproute.yaml
  - configmap-env.yaml
  # Data layer (all in posthog namespace)
  - data-layer/postgres.yaml
  - data-layer/redis.yaml
  - data-layer/kafka.yaml
  - config
  - data-layer/clickhouse.yaml
  # Core application
  - core/web.yaml
  - core/workers.yaml
  - core/plugins.yaml
  - core/capture.yaml
  - core/microservices.yaml
