# Open-Meteo model sync CronJobs. Each one pulls recent model runs from the
# Open-Meteo AWS open-data bucket into /app/data, where the open-meteo serve
# Deployment reads from.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: open-meteo-sync-gfs
  namespace: radar-ng
  labels:
    app: open-meteo-sync-gfs
spec:
  # GFS 0.25° runs 4x/day. Sync at HH:30 to catch the freshest run.
  schedule: "30 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Same securityContext as the open-meteo Deployment so cron-written
          # files end up GID 999 — readable + writable by the serve pod.
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              image: ghcr.io/open-meteo/open-meteo:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              args:
                - sync
                - ncep_gfs025
                - temperature_2m,dew_point_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code,precipitation,precipitation_probability,surface_pressure,uv_index
                - --past-days
                - "2"
              volumeMounts:
                - { name: openmeteo-data, mountPath: /app/data }
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits:   { cpu: 2000m, memory: 4Gi }
          volumes:
            - { name: openmeteo-data, persistentVolumeClaim: { claimName: openmeteo-data } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: open-meteo-sync-hrrr
  namespace: radar-ng
  labels:
    app: open-meteo-sync-hrrr
spec:
  # HRRR CONUS runs hourly.
  schedule: "45 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Same securityContext as the open-meteo Deployment so cron-written
          # files end up GID 999 — readable + writable by the serve pod.
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              image: ghcr.io/open-meteo/open-meteo:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              args:
                - sync
                - ncep_hrrr_conus
                - temperature_2m,dew_point_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code,precipitation,precipitation_probability,surface_pressure
                - --past-days
                - "1"
              volumeMounts:
                - { name: openmeteo-data, mountPath: /app/data }
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits:   { cpu: 2000m, memory: 4Gi }
          volumes:
            - { name: openmeteo-data, persistentVolumeClaim: { claimName: openmeteo-data } }
