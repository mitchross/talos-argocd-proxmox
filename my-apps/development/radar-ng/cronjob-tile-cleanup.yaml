# Tile cache cleanup — runs cleanup.sh every 30 minutes. The script is
# delivered to the pod via a ConfigMap mount (kustomize generator in
# kustomization.yaml — keeps us from baking a custom image for one
# shell script). Editing tile-cleanup.sh changes the configmap hash
# and triggers a fresh CronJob template on the next sync.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tile-cleanup
  namespace: radar-ng
  labels:
    app: tile-cleanup
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Match the ingest pods' UID so cleanup.sh can rm tiles owned
          # by GID 1000 (set via ingest pods' fsGroup).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cleanup
              image: alpine:3.19
              command: ["/bin/sh", "/scripts/cleanup.sh"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              env:
                - { name: TILE_DIR,   value: /data/tiles }
                - { name: TTL_HOURS,  value: "6" }
              volumeMounts:
                - { name: tiles,   mountPath: /data/tiles }
                - { name: scripts, mountPath: /scripts }
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits:   { cpu: 200m, memory: 128Mi }
          volumes:
            - { name: tiles,   persistentVolumeClaim: { claimName: tiles } }
            - { name: scripts, configMap: { name: tile-cleanup-script, defaultMode: 0755 } }
