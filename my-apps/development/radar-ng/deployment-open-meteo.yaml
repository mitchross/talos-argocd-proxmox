# Self-hosted Open-Meteo API. Backed by model data synced into the PVC by
# the open-meteo-sync-gfs and open-meteo-sync-hrrr CronJobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-meteo
  namespace: radar-ng
  labels:
    app: open-meteo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-meteo
  template:
    metadata:
      labels:
        app: open-meteo
    spec:
      # Upstream open-meteo image already runs as UID 999 ("openmeteo").
      # Don't override runAsUser — let the image's USER directive apply
      # so file paths the binary writes (PVC at /app/data) match the UID
      # the cronjobs sync as. fsGroup matches so writes from the deploy
      # interleave cleanly with cronjob-written files.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-meteo
          # 1.5.3 ships without libparquet-glib.so.2400 (same break as the
          # sync-worker's old 1.5.3 base) — pin tag@digest of a verified
          # build; a bare tag re-pulls broken rebuilds via pullPolicy Always.
          image: ghcr.io/open-meteo/open-meteo:1.5.5@sha256:99978696b7def9d4851d2b9e85ea7a8ba08bd824f6fa6779edd733a164434694
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args: ["serve", "--bind", "0.0.0.0:8080"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: openmeteo-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
        # Sync worker co-located as a sidecar (was a standalone Temporal
        # WorkerDeployment). It must share the openmeteo-data RWO Longhorn
        # volume with the serve container, and RWO = single node. The
        # Temporal WorkerController STRIPS podAffinity from its pod template,
        # so a standalone worker could not be pinned to the serve pod's node —
        # making it a sidecar guarantees co-location. Runs non-versioned
        # (no TEMPORAL_DEPLOYMENT_NAME/BUILD_ID env → versioning off).
        - name: sync-worker
          # v1.1.2 was built on the 1.5.3 base, which ships without
          # libparquet-glib.so.2400 → HRRR sync activity crashed rc=127 and
          # OpenMeteoSyncWorkflow failed. v1.1.3 (radar-ng 144dcb9) pins the
          # base to 1.5.2, matching the serve container.
          image: ghcr.io/mitchross/radar-ng-open-meteo-worker:v1.1.6
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TEMPORAL_TASK_QUEUE
              value: radar-ng-open-meteo
            - name: OPENMETEO_BIN
              value: /app/openmeteo-api
            - name: OPENMETEO_DATA_DIR
              value: /app/data
          volumeMounts:
            - name: openmeteo-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: openmeteo-data
          persistentVolumeClaim:
            claimName: openmeteo-data
