# The API currently mounts three RWO publication volumes. Keep it single-pod
# until immutable tiles move to object storage; claiming 8 replicas here made
# the autoscaler promise a multi-node topology Kubernetes could not attach.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tile-server
  namespace: radar-ng
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tile-server
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
