# Autoscale tile-server on CPU. Min=3 keeps HA and leaves one spare pod
# during radar-worker catch-up; max=8 caps cost.
# Average per-pod CPU is normally <50m, so 70% of 250m request gives plenty
# of headroom before scale-out triggers, while still reacting to bursts
# (cold MapLibre style fetches, manifest polling spikes).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tile-server
  namespace: radar-ng
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tile-server
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
