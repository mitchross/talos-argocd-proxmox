# Run-once-per-change Job that populates the `pmtiles` PVC with a Protomaps
# basemap extract (CONUS bbox) for the radar-ng weather-radar background map.
# The basemap Deployment's init container blocks pod start until
# /data/basemap.pmtiles exists, so this Job and the Deployment can deploy
# together — order doesn't matter, the Deployment just waits.
#
# Self-healing source (DO NOT reintroduce a pinned date):
#   build.protomaps.com serves date-stamped planet builds with ~6-day
#   retention and no `latest` alias. A hardcoded YYYYMMDD rots in ~6 days
#   and the rot is invisible until the Job re-extracts — then it 404s at
#   the worst possible time. The custom image
#   (my-apps/development/radar-ng/basemap-bootstrap-image/) resolves the
#   newest build that actually exists at run time, so nothing here ever
#   needs a date bump. Build/push via
#   TAG=vX.Y.Z scripts/build-push-custom-apps.sh basemap-bootstrap.
#
# Refresh strategy (Sync hook + PVC marker):
#   - This Job is an ArgoCD Sync hook with BeforeHookCreation, so Argo
#     deletes + recreates it on EVERY radar-ng sync. To keep that cheap,
#     resolve-and-extract.sh writes a marker next to the output on the PVC
#     keyed by BBOX+REFRESH and exits in seconds when the marker already
#     matches. Only a BBOX change or REFRESH bump runs the ~35-min CONUS
#     extract.
#   - To pull a fresher planet without a bbox change: bump REFRESH in the
#     container env, wait for the next sync, then
#     `kubectl -n radar-ng rollout restart deploy basemap`.
#   - Why a hook and not a plain resource: hook resources are not part of
#     the app's desired state, so the my-apps AppSet's selfHeal cannot
#     recreate the Job. We got burned: as a plain resource, the
#     ttlSecondsAfterFinished GC deleted the whole Job OBJECT (not just the
#     pod — the old comment here believed otherwise) and selfHeal recreated
#     it, so this "run-once" Job silently re-downloaded the CONUS extract
#     from build.protomaps.com every day (2026-06-23 → 2026-07-17).
#
# Why a Job and not a Temporal workflow:
#   - One-time bootstrap (re-run only on bbox change or explicit refresh).
#   - Job is the K8s-native pattern for "run this script once on the cluster."
#
# BBOX = CONUS (lower 48 + a tile of Canada/Mexico padding).
# Widen to e.g. -180,15,-50,75 for full North America (PVC may need to grow).
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    # Hook resources sit outside the app's desired state, so selfHeal can't
    # recreate the Job after TTL GC (the daily-loop burn in the header).
    # BeforeHookCreation also satisfies the repo-wide Job rule: immutable
    # Jobs fail sync on spec change without hooks.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  name: basemap-bootstrap
  namespace: radar-ng
  labels:
    app: basemap
    bbox: "conus"
spec:
  # GCs the completed Job OBJECT (pod included) a day after finish. Under
  # hook semantics this is pure hygiene; as a plain resource it was the
  # selfHeal re-run trigger (see header).
  ttlSecondsAfterFinished: 86400
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: basemap
        job: basemap-bootstrap
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000  # so the non-root container can write to the PVC
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: extract
          # Self-healing wrapper: resolves the newest available Protomaps
          # build at run time and runs `pmtiles extract`. Source/Dockerfile:
          # my-apps/development/radar-ng/basemap-bootstrap-image/
          # New version: TAG=vX.Y.Z scripts/build-push-custom-apps.sh
          # basemap-bootstrap, then bump the tag here (repo rule: no :latest —
          # the pinned tag makes the manifest and image move atomically; if the
          # push is forgotten the hook fails ImagePullBackOff instead of
          # silently running the old script).
          image: ghcr.io/mitchross/basemap-bootstrap:v1.0.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            # extract bbox: minLon,minLat,maxLon,maxLat (CONUS)
            - name: BBOX
              value: "-125,24,-66,50"
            # Marker key alongside BBOX. Bump to force a re-extract (pull a
            # fresher planet) without changing the bbox.
            - name: REFRESH
              value: "1"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: pmtiles
              mountPath: /data
      volumes:
        - name: pmtiles
          persistentVolumeClaim:
            claimName: pmtiles
