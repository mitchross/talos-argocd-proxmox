apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvcs.yaml
  - services.yaml
  - httproute.yaml
  - deployment-tile-server.yaml
  - hpa-tile-server.yaml
  - pdb-tile-server.yaml
  - deployment-basemap.yaml
  # One-shot Job: extracts a CONUS bbox from the latest Protomaps daily
  # build and writes /data/basemap.pmtiles on the pmtiles PVC. The
  # basemap Deployment's init container blocks pod start until the file
  # exists, so order doesn't matter.
  - job-basemap-bootstrap.yaml
  - deployment-open-meteo.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
  # Temporal worker pool. The main worker handles all radar-ng-owned
  # activities. The open-meteo sync worker (FROM ghcr.io/open-meteo/open-meteo)
  # is NO LONGER a standalone WorkerDeployment — it runs as a sidecar in the
  # open-meteo serve pod (see deployment-open-meteo.yaml) so it can share the
  # openmeteo-data RWO Longhorn volume on one node. The standalone
  # WorkerDeployment couldn't co-locate because the Temporal WorkerController
  # strips podAffinity from its pod template. Schedules are seeded one-time
  # via `python -m temporal.schedules.seed` after rollout.
  - configmap-temporal-config.yaml
  - temporal-connection.yaml
  - temporal-worker-deployment.yaml

namespace: radar-ng
