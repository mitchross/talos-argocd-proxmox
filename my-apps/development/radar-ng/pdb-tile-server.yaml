# Allow one tile-server pod to be evicted at a time during voluntary
# disruptions. With minReplicas=1 on a single-node cluster, the previous
# `minAvailable: 1` made `kubectl drain` (kured / Talos upgrades) impossible
# to satisfy — the k8s docs call this out explicitly for single-instance
# apps. maxUnavailable keeps the PDB honest at any replica count.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tile-server
  namespace: radar-ng
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: tile-server
