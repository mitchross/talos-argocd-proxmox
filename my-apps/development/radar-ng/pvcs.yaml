# Shared RWX PVCs for the radar-ng backend, on the truenas-csi NFS class.
#
# Access-mode rationale:
#   - tiles/grids/state are written by multiple pods (ingestors, nowcast) and
#     read by tile-server, so RWX.
#   - openmeteo-data is written by the serve Deployment and its sync CronJobs,
#     which can run concurrently with serve, so RWX.
#
# Moved off Longhorn RWX (which spins up an NFS share-manager pod per volume)
# to the centralized truenas-csi `truenas-nfs` class — real NFS RWX, no
# share-manager pods, TrueNAS-side snapshots. These volumes hold backup-exempt
# rebuildable data, so the storageClassName change (immutable on a bound PVC)
# is applied by deleting + recreating the PVCs; the data regenerates.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tiles
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "PNG/MVT tiles generated from grids/; rebuildable by re-running tile generation"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grids
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "MRMS NetCDF grids; re-fetchable from upstream MRMS within retention window"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: state
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Transient ingestion state (last-seen timestamps, partial frames); regenerates on next pull"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openmeteo-data
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Open-Meteo numerical weather data cache; re-fetchable from open-meteo.com API"
spec:
  # RWO on Longhorn (NOT NFS) — deliberate exception to the truenas-nfs default
  # above. Open-Meteo's .om writer uses a POSIX file op (O_TMPFILE/fallocate-
  # class) that NFS-on-ZFS rejects with errno 95 EOPNOTSUPP, so every sync write
  # failed and the cached data froze -> all-null forecast (app showed 0°).
  # Verified 2026-06-17: truenas-nfs RWX *and* Longhorn RWX (NFS-ganesha) both
  # fail identically; only Longhorn RWO (direct ext4 block) writes .om files
  # cleanly. RWO = single-node attach, so the open-meteo serve Deployment and
  # the open-meteo-worker must co-locate — enforced by podAffinity on the worker
  # (-> app=open-meteo). Data is rebuildable, so the immutable storageClass/
  # accessMode change is applied by delete+recreate of this PVC.
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pmtiles
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Protomaps basemap extract; rebuildable by re-running basemap-bootstrap Job from a build.protomaps.com daily build"
spec:
  # RWX (was RWO). The RWO assumption "Bootstrap Job + Deployment run
  # one-at-a-time" was false in practice: the basemap Deployment runs 24/7
  # holding the RWO volume, so basemap-bootstrap could NEVER attach while
  # basemap was up -> permanent Multi-Attach error, Job stuck 10h+.
  # go-pmtiles is distroless (no shell) so an idempotent single
  # initContainer isn't possible without a custom image; RWX lets the
  # one-shot, stable-named bootstrap Job and the reader Deployment coexist
  # (Job writes once then Completes; basemap mmap-reads). Now served by
  # truenas-csi NFS RWX (no Longhorn share-manager pod) — TrueNAS exports the
  # dataset directly.
  accessModes: [ReadWriteMany]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 50Gi
