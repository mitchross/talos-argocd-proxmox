# radar-ng backend PVCs.
#
# tiles/grids/state moved off `truenas-nfs` (BigTank = spinning HDD, RWX) onto
# `longhorn-flash` (enterprise SATA SSD, RWO) on 2026-07-15. This is a SMALL-BLOCK
# RANDOM-IO workload — the tile renderer reads MRMS grids and writes thousands of
# small PNG/MVT tiles — and on HDD-backed NFS it thrashed: measured 102 IOPS @
# 310ms on BigTank. On local SSD that is thousands of IOPS at sub-ms latency, and
# putting it on the separate `flash` spindle keeps that thrashing OFF the shared
# NVMe disk the databases live on. (Large SEQUENTIAL media — jellyfin, frigate —
# stays on HDD-NFS; HDD is fine for streaming. Small-block RANDOM is the thing HDD
# is terrible at, and that is radar-ng.)
#
# RWX -> RWO: these were RWX only to allow multiple writer pods. Kubernetes RWO is
# "once per NODE" (not per pod), so on this single-node cluster all radar-ng pods
# (workers + tile-server + temporal-worker) share one RWO volume fine — the exact
# pattern openmeteo-data below already proves in production. RWO ext4 is also
# faster than any NFS/share-manager path and sidesteps the errno-95 O_TMPFILE class
# of NFS bugs (see openmeteo-data).
#   MULTI-NODE CAVEAT: RWO-shared-by-many-pods only holds while they co-locate on
#   one node. Before adding worker nodes, pin radar-ng workers + tile-server +
#   temporal-worker together with podAffinity (as open-meteo already does), or move
#   these back to a real RWX class.
#
# All three hold backup-exempt REBUILDABLE data, so the immutable storageClass/
# accessMode change is applied by delete+recreate of the PVCs; tiles regenerate.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tiles
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "PNG/MVT tiles generated from grids/; rebuildable by re-running tile generation"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-flash
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grids
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "MRMS NetCDF grids; re-fetchable from upstream MRMS within retention window"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-flash
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: state
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Transient ingestion state (last-seen timestamps, partial frames); regenerates on next pull"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-flash
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openmeteo-data
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Open-Meteo numerical weather data cache; re-fetchable from open-meteo.com API"
spec:
  # RWO on Longhorn (NOT NFS) — deliberate exception to the truenas-nfs default
  # above. Open-Meteo's .om writer uses a POSIX file op (O_TMPFILE/fallocate-
  # class) that NFS-on-ZFS rejects with errno 95 EOPNOTSUPP, so every sync write
  # failed and the cached data froze -> all-null forecast (app showed 0°).
  # Verified 2026-06-17: truenas-nfs RWX *and* Longhorn RWX (NFS-ganesha) both
  # fail identically; only Longhorn RWO (direct ext4 block) writes .om files
  # cleanly. RWO = single-node attach, so the open-meteo serve Deployment and
  # the open-meteo-worker must co-locate — enforced by podAffinity on the worker
  # (-> app=open-meteo). Data is rebuildable, so the immutable storageClass/
  # accessMode change is applied by delete+recreate of this PVC.
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pmtiles
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Protomaps basemap extract; rebuildable by re-running basemap-bootstrap Job from a build.protomaps.com daily build"
spec:
  # RWX (was RWO). The RWO assumption "Bootstrap Job + Deployment run
  # one-at-a-time" was false in practice: the basemap Deployment runs 24/7
  # holding the RWO volume, so basemap-bootstrap could NEVER attach while
  # basemap was up -> permanent Multi-Attach error, Job stuck 10h+.
  # go-pmtiles is distroless (no shell) so an idempotent single
  # initContainer isn't possible without a custom image; RWX lets the
  # one-shot, stable-named bootstrap Job and the reader Deployment coexist
  # (Job writes once then Completes; basemap mmap-reads). Now served by
  # truenas-csi NFS RWX (no Longhorn share-manager pod) — TrueNAS exports the
  # dataset directly.
  accessModes: [ReadWriteMany]
  storageClassName: truenas-nfs
  resources:
    requests:
      storage: 50Gi
