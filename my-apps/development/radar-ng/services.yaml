# Three ClusterIP services:
#   tile-server  (8080) — exposed publicly via HTTPRoute
#   basemap      (8081) — reached by tile-server Caddy only
#   open-meteo   (8080) — reached by tile-server FastAPI only
---
apiVersion: v1
kind: Service
metadata:
  name: tile-server
  namespace: radar-ng
spec:
  selector:
    app: tile-server
  ports:
    - { port: 8080, targetPort: 8080, name: http }
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: basemap
  namespace: radar-ng
spec:
  selector:
    app: basemap
  ports:
    - { port: 8081, targetPort: 8081, name: http }
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: open-meteo
  namespace: radar-ng
spec:
  selector:
    app: open-meteo
  ports:
    - { port: 8080, targetPort: 8080, name: http }
  type: ClusterIP
