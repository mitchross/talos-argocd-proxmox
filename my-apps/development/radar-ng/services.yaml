# Two ClusterIP services:
#   tile-server  (8080) — exposed publicly via HTTPRoute
#   open-meteo   (8080) — reached by tile-server FastAPI only
# (The `basemap` service was retired — basemap now comes from the shared
# VersaTiles server, see kustomization.yaml. The tile-server image's Caddy
# still has a dead /basemap/* proxy baked in; harmless, external clients
# don't hit it.)
---
apiVersion: v1
kind: Service
metadata:
  name: tile-server
  namespace: radar-ng
  labels:
    app: tile-server
spec:
  selector:
    app: tile-server
  ports:
    - { port: 8080, targetPort: 8080, name: http }
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: open-meteo
  namespace: radar-ng
spec:
  selector:
    app: open-meteo
  ports:
    - { port: 8080, targetPort: 8080, name: http }
  type: ClusterIP
