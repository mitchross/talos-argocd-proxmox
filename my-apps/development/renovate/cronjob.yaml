apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
spec:
  # Poll frequently so Dependency Dashboard checkbox edits behave close to the
  # hosted GitHub App. concurrencyPolicy=Forbid prevents overlapping scans.
  schedule: "*/5 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 12021
            runAsGroup: 0
            fsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.160.5
              imagePullPolicy: IfNotPresent
              env:
                # Debug logging temporarily to diagnose why customManager
                # `registry.vanillax.me/*` only extracts 1 of 6 expected
                # matches (gitea-actions/deployment.yaml is picked up;
                # radar-ng + news-reader-temporal-worker manifests are not).
                # Regex tested-clean locally with Python re — Renovate
                # extracts only act_runner-nogpu. Revert to `info` once
                # the misextraction is understood + fixed.
                - name: LOG_LEVEL
                  value: debug
                - name: RENOVATE_CONFIG_FILE
                  value: /config/config.json
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: RENOVATE_TOKEN
                # JSON array of host rules — currently just Docker Hub auth
                # so Renovate's docker datasource lookups don't share the
                # 100/6h anonymous quota with the rest of the cluster.
                # Populated from 1Password item `renovate-dockerhub` →
                # field `host_rules`. See externalsecret.yaml.
                - name: RENOVATE_HOST_RULES
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: RENOVATE_HOST_RULES
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: workdir
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: workdir
              emptyDir:
                sizeLimit: 8Gi
          # Don't take cycles from GPU inference nodes
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: gpu-worker
                        operator: DoesNotExist
