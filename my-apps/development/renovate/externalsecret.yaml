apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-secrets
  namespace: renovate
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: renovate-secrets
    creationPolicy: Owner
  data:
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: renovate
        property: github_token
        # Match webhook-injected defaults so the my-apps AppSet's
        # ignoreDifferences (which lists conversionStrategy/decodingStrategy/
        # metadataPolicy but not nullBytePolicy) doesn't flag this OutOfSync.
        nullBytePolicy: Ignore
    # Docker Hub PAT — anonymous limit is 100 manifest requests / 6h / IP,
    # shared cluster-wide with kubelet pulls. With ~30 docker.io packages
    # in this repo, Renovate runs intermittently abort with `external-host-error`
    # (429 TOOMANYREQUESTS) and the dashboard shows "Package lookup failures".
    # Free Docker Hub PAT raises the limit to 200/6h, enough for one run.
    #
    # 1Password item required: `renovate-dockerhub` with field `host_rules`
    # holding the JSON: [{"matchHost":"index.docker.io","username":"<dh-user>","password":"<dh-pat>"}]
    - secretKey: RENOVATE_HOST_RULES
      remoteRef:
        key: renovate-dockerhub
        property: host_rules
        nullBytePolicy: Ignore
