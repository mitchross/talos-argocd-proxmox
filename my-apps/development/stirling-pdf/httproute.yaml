apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  parentRefs:
    - kind: Gateway
      name: gateway-internal
      namespace: gateway
  hostnames:
    - stirling-pdf.vanillax.me
  rules:
    - backendRefs:
        - name: stirling-pdf
          port: 8080
