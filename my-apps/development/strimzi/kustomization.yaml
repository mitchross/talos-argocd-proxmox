apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kafka
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: strimzi
      app.kubernetes.io/managed-by: argocd
resources:
  - namespace.yaml
helmCharts:
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts/
    version: 1.1.0
    releaseName: strimzi
    namespace: kafka
    valuesFile: values.yaml
    includeCRDs: true
