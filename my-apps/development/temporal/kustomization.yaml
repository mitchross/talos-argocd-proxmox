apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: temporal
resources:
  - namespace.yaml
  - httproute.yaml
  - externalsecret.yaml
  - namespace-init-job.yaml

# Shell script for the namespace-seed Job lives as its own file under
# scripts/ so it's grep-able, lint-able, and not crammed into a YAML
# multiline. Kustomize turns it into a ConfigMap at render time.
configMapGenerator:
  - name: temporal-seed-scripts
    files:
      - scripts/seed-namespaces.sh
    options:
      # Stable name — the Job mounts this by name. `disableNameSuffixHash`
      # means no auto-generated hash, so a one-off script tweak doesn't
      # force a Job rename (we restart via BeforeHookCreation anyway).
      disableNameSuffixHash: true

helmCharts:
  - name: temporal
    repo: https://go.temporal.io/helm-charts
    version: 1.2.0
    releaseName: temporal
    namespace: temporal
    includeCRDs: true
    valuesFile: values.yaml

patches:
  # Helm-rendered ConfigMaps (notably `temporal-shims`, mounted by the
  # schema Job) must be applied BEFORE the wave -1 schema Job hook below.
  # Left at the default wave 0 they land AFTER the hook, so the schema pod
  # hangs forever on `MountVolume.SetUp failed ... configmap "temporal-shims"
  # not found` and the whole sync deadlocks "waiting for completion of hook".
  # -2 matches `temporal-db-secret` (the schema Job's other dependency),
  # which the ExternalSecret already pins to -2.
  - target:
      kind: ConfigMap
      labelSelector: helm.sh/chart
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "-2"

  # Scoped to Helm-rendered Jobs only (they carry `helm.sh/chart`).
  # Without this scope, the patch stomps annotations on our own
  # `temporal-namespace-seed` Job and turns its PostSync hook into Sync.
  # The schema job must run in an earlier Sync wave than the server
  # Deployments, otherwise a Temporal image bump can roll pods before SQL
  # schema migrations have completed.
  - target:
      kind: Job
      labelSelector: helm.sh/chart
    patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: Sync
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "-1"
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook-delete-policy
        value: BeforeHookCreation
