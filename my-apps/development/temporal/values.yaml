server:
  enabled: true
  image:
    repository: temporalio/server
    tag: 1.30.3
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    logLevel: "info"
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 1
      datastores:
        default:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal
            connectAddr: "temporal-database-rw.cloudnative-pg.svc.cluster.local:5432"
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
        visibility:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal_visibility
            connectAddr: "temporal-database-rw.cloudnative-pg.svc.cluster.local:5432"
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  history:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  matching:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  worker:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

schema:
  useHelmHooks: false
  backoffLimit: 20
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

admintools:
  enabled: true
  image:
    repository: temporalio/admin-tools
    tag: 1.30.3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

web:
  enabled: true
  replicaCount: 1
  image:
    repository: temporalio/ui
    tag: 2.48.1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

