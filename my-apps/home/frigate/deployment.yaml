apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      # Pin to the Dell 1050 Ti worker: NVDEC handles all camera decode there.
      # This card is opt-in only (see my-apps/ai/CLAUDE.md) — big AI workloads
      # pin to rtx-3090 and must never land here.
      nodeSelector:
        node.vanillax.dev/gpu-class: gtx-1050-ti
      runtimeClassName: nvidia
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:0.17.2
        imagePullPolicy: IfNotPresent
        env:
        - name: TZ
          value: "America/New_York"
        # "video" is required for NVDEC — the default injected capability set
        # (compute,utility) leaves ffmpeg hwaccel without the decoder libs.
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,video,utility"
        - name: FRIGATE_MQTT_USER
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: FRIGATE_MQTT_USER
        - name: FRIGATE_MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: FRIGATE_MQTT_PASSWORD
        - name: FRIGATE_NEST_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: NEST_CLIENT_ID
        - name: FRIGATE_NEST_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: NEST_CLIENT_SECRET
        - name: FRIGATE_NEST_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: NEST_PROJECT_ID
        - name: FRIGATE_NEST_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name: frigate-secrets
              key: NEST_REFRESH_TOKEN
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
            nvidia.com/gpu: "1"
          limits:
            memory: 12Gi
            nvidia.com/gpu: "1"
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
        livenessProbe:
          httpGet:
            path: /api/version
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/version
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config-dir
          mountPath: /config
        - name: frigate-config-volume
          mountPath: /config/config.yml
          subPath: config.yml
        - name: media
          mountPath: /media
        - name: cache
          mountPath: /dev/shm
        # - name: usb
        #   mountPath: /dev/bus/usb
      volumes:
      - name: config-dir
        persistentVolumeClaim:
          claimName: frigate-config
      - name: frigate-config-volume
        configMap:
          name: frigate-configmap
          defaultMode: 0644
      - name: media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: cache
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      # - name: usb
      #   hostPath:
      #     path: /dev/bus/usb
      #     type: Directory