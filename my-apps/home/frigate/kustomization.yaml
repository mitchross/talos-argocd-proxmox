apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - namespace.yaml
  - pvc.yaml
  - mqtt/mqtt.yaml
  - service.yaml
  - servicemonitor.yaml
  - httproute.yaml
  - externalsecret.yaml
  - kopiur/frigate-config.yaml
namespace: frigate

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

# Hash-suffixed ConfigMaps so any data change forces a Deployment rollout
# (Kustomize rewrites the volume reference to the new hashed name). Was
# previously `generatorOptions: disableNameSuffixHash: true` — that meant
# editing config.yml or mosquitto.conf would NOT restart the consumer.
configMapGenerator:
  - name: frigate-configmap
    files:
      - config.yml
  - name: mosquitto-configmap
    files:
      - mqtt/mosquitto.conf
