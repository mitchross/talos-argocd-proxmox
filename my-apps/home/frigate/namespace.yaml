apiVersion: v1
kind: Namespace
metadata:
  name: frigate
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    volsync.backube/privileged-movers: 'true'
    # pvc-plumber v4.0.1 namespace write gate: opts this namespace in to
    # operator-managed VolSync writes (frigate-config only; frigate-media is
    # backup-exempt). Required alongside the PVC fuse labels.
    pvc-plumber.io/managed-namespace: "true"
