apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
  namespace: frigate
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: frigate
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/frigate-config-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: frigate-config-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-media
  namespace: frigate
  labels:
    app: frigate
    type: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: frigate-smb

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: frigate-config
  namespace: frigate
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: frigate-config
spec:
  sourcePVC: frigate-config
  trigger:
    schedule: "3 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: frigate-config
    hostname: frigate
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: frigate-config-dst
  namespace: frigate
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: frigate-config
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: frigate-config
    hostname: frigate
    sourceIdentity:
      sourceName: frigate-config
      sourceNamespace: frigate
      sourcePVCName: frigate-config
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
