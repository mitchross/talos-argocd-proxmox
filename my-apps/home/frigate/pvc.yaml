apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
  namespace: frigate
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: frigate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/frigate-config.yaml; uniform fields come from
  # the ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: frigate-config-restore
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-media
  namespace: frigate
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SMB-backed Frigate recordings (NAS); non-snapshottable, retention managed by Frigate config and NAS"
  labels:
    app: frigate
    type: storage
    backup-exempt: "true"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: frigate-smb
