# Per-entity overrides for Tapo homelab plugs.
#
# - Friendly names flow into the `friendly_name` Prometheus label so Grafana
#   legends read "GPU PSU" instead of "gpu_psu_smart_plug_current_consumption".
# - `hidden: true` on the switch entity removes the on/off control from the
#   default Lovelace view. The automation in automations.yaml ("Homelab plug
#   power-off lockout") is the actual enforcement — even if the switch is
#   toggled via API or the Tapo app it gets restored within seconds.

# ---------- GPU external PSU ----------
sensor.gpu_psu_smart_plug_current_consumption:
  friendly_name: GPU PSU Power
sensor.gpu_psu_smart_plug_today_energy:
  friendly_name: GPU PSU Energy Today
sensor.gpu_psu_smart_plug_voltage:
  friendly_name: GPU PSU Voltage
sensor.gpu_psu_smart_plug_current:
  friendly_name: GPU PSU Current
switch.gpu_psu_smart_plug:
  friendly_name: GPU PSU (read-only)
  hidden: true

# ---------- NAS external HDD PSU ----------
sensor.nas_psu_smart_plug_current_consumption:
