---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# home-assistant config backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: config
  namespace: home-assistant
spec:
  sources:
    - pvc:
        name: config
  identity:
    username: config
    hostname: home-assistant
  retention:
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  mover:
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: config-hourly
  namespace: home-assistant
spec:
  policyRef:
    name: config
  schedule:
    cron: "15 * * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: config-restore
  namespace: home-assistant
spec:
  source:
    fromPolicy:
      name: config
      offset: 0
  mover:
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
