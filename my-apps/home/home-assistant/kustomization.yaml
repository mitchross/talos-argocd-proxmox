apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-assistant

# Metadata for better organization
metadata:
  name: home-assistant
  annotations:
    config.kubernetes.io/local-config: "true"

# Resource ordering for proper deployment
resources:
- namespace.yaml
- pvc.yaml
- service.yaml
- deployment.yaml
- httproute.yaml
- kopiur/config.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator, privileged
# mover) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  environment: production

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: config
  files:
  - configuration.yaml
  - automations.yaml
  - scripts.yaml
  - scenes.yaml
  - customize.yaml
  - lovelace-homelab-power.yaml
  # AirCube ZHA quirk — copied to /config/custom_zha_quirks/aircube.py by the
  # copy-config initContainer (see deployment.yaml). Loaded via zha.custom_quirks_path.
  - aircube.py
  options:
    # Better ConfigMap handling
    disableNameSuffixHash: true
