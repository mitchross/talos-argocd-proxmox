apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-assistant

# Metadata for better organization
metadata:
  name: home-assistant
  annotations:
    config.kubernetes.io/local-config: "true"

# Resource ordering for proper deployment
resources:
- namespace.yaml
- pvc.yaml
- service.yaml
- deployment.yaml
- httproute.yaml
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  environment: production

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: config
  files:
  - configuration.yaml
  - automations.yaml
  - scripts.yaml
  - scenes.yaml
  options:
    # Better ConfigMap handling
    disableNameSuffixHash: true

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: home-assistant-config-backup
  namespace: home-assistant
  valuesInline:
    pvc: config
    namespace: home-assistant
    frequency: hourly
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 10Gi
      storageClassName: longhorn
