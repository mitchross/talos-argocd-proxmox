apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
  labels:
    # Since we removed hostNetwork, we can use baseline security
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    volsync.backube/privileged-movers: "true"
    # pvc-plumber v4.0.1 namespace write-gate (2026-05-31): opts home-assistant in
    # so the operator may create/repair RS/RD for the fused config PVC.
    pvc-plumber.io/managed-namespace: "true"
