apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: home-automation
    app.kubernetes.io/part-of: smart-home
    backup: "hourly"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/config-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: config-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: config
  namespace: home-assistant
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config
spec:
  sourcePVC: config
  trigger:
    schedule: "46 * * * *"
  kopia:
    repository: volsync-kopia-repository
    username: config
    hostname: home-assistant
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: config-dst
  namespace: home-assistant
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: config
    hostname: home-assistant
    sourceIdentity:
      sourceName: config
      sourceNamespace: home-assistant
      sourcePVCName: config
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
