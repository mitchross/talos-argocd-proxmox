apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: home-automation
    app.kubernetes.io/part-of: smart-home
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # TEMPORARY (Option-R, 2026-05-31): aligned to the live immutable value
  # config-backup (a dangling/nonexistent RD name the PVC was created with) so
  # Argo's sync SSA dry-run has no immutable-field change to make and the app
  # stays syncable. RESTORED to config-dst in Phase 6, immediately before the
  # PVC delete/recreate (the recreated PVC must get config-dst so the populator
  # restores). The RD below stays named config-dst (the real restore target).
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: config-backup

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: config
  namespace: home-assistant
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config
spec:
  sourcePVC: config
  trigger:
    # Option-R repair RESUMED 2026-05-31: one-shot quiesced backup while scaled
    # to 0, before PVC delete/recreate. Restored to schedule "46 * * * *" in bring-up.
    manual: backup-2026-05-31-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: config
    hostname: home-assistant
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: config-dst
  namespace: home-assistant
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config
spec:
  trigger:
    # Option-R repair (2026-05-31): bumped from restore-once to refresh the RD
    # latestImage (standing image was stale 2026-05-21) before the config-PVC
    # dsr repair. Re-bumped to -quiesced after the quiesced backup.
    manual: restore-2026-05-31-quiesced
  kopia:
    repository: volsync-kopia-repository
    username: config
    hostname: home-assistant
    sourceIdentity:
      sourceName: config
      sourceNamespace: home-assistant
      sourcePVCName: config
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
