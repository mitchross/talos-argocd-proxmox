apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: n8n
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: workflow-automation
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
  # Static dataSourceRef → ReplicationDestination/data-dst.
  # RS/RD are operator-managed by pvc-plumber.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-dst
