image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent
  tag: "latest"

main:
  # Option-R repair (2026-05-31): scaled to 0 to quiesce the data PVC (SQLite
  # at-rest) before the quiesced backup + PVC delete/recreate. Restored to 1
  # in the bring-up phase.
  replicaCount: 0

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    type: existing
    existingClaim: data

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv:
    N8N_HOST:
      value: n8n.vanillax.me
    N8N_PORT:
      value: "5678"
    N8N_PROTOCOL:
      value: https
    EXECUTIONS_MODE:
      value: regular
    EXECUTIONS_TIMEOUT:
      value: "3600"
    EXECUTIONS_TIMEOUT_MAX:
      value: "7200"
    N8N_METRICS:
      value: "true"
    N8N_DIAGNOSTICS_ENABLED:
      value: "false"
    WEBHOOK_URL:
      value: https://n8n.vanillax.me/
    GENERIC_TIMEZONE:
      value: America/New_York
    TZ:
      value: America/New_York

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - n8n
        topologyKey: kubernetes.io/hostname

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
