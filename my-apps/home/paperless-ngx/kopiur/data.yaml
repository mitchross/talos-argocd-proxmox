---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# paperless-ngx data backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: data
  namespace: paperless-ngx
spec:
  sources:
    - pvc:
        name: data
  identity:
    username: data
    hostname: paperless-ngx
  retention:
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: data-hourly
  namespace: paperless-ngx
spec:
  policyRef:
    name: data
  schedule:
    cron: "19 * * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: data-restore
  namespace: paperless-ngx
spec:
  source:
    fromPolicy:
      name: data
      offset: 0
