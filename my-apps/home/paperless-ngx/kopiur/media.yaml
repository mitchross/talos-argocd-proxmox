---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# paperless-ngx media backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: media
  namespace: paperless-ngx
spec:
  sources:
    - pvc:
        name: media
  identity:
    username: media
    hostname: paperless-ngx
  retention:
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: media-hourly
  namespace: paperless-ngx
spec:
  policyRef:
    name: media
  schedule:
    cron: "21 * * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: media-restore
  namespace: paperless-ngx
spec:
  source:
    fromPolicy:
      name: media
      offset: 0
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
