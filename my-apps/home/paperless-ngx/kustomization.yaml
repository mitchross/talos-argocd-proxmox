apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: paperless-ngx
commonLabels:
  app.kubernetes.io/name: paperless-ngx
  app.kubernetes.io/managed-by: argocd
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - externalsecret.yaml
  - tika-gotenberg.yaml
  - kopiur/data.yaml
  - kopiur/media.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator, privileged
# mover) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: paperless-config
    envs:
      - paperless-config.env
