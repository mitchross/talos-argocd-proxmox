apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: paperless-ngx
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: paperless-ngx
      app.kubernetes.io/managed-by: argocd
resources:
  - vpa.yaml
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - externalsecret.yaml
  - tika-gotenberg.yaml
  - kopiur/data.yaml
  - kopiur/media.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: paperless-config
    envs:
      - paperless-config.env
