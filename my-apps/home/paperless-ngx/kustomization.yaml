apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: paperless-ngx
commonLabels:
  app.kubernetes.io/name: paperless-ngx
  app.kubernetes.io/managed-by: argocd
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - externalsecret.yaml
  - tika-gotenberg.yaml

configMapGenerator:
  - name: paperless-config
    envs:
      - paperless-config.env

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: paperless-ngx-data-backup
  namespace: paperless-ngx
  valuesInline:
    pvc: data
    namespace: paperless-ngx
    frequency: hourly
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 10Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: paperless-ngx-media-backup
  namespace: paperless-ngx
  valuesInline:
    pvc: media
    namespace: paperless-ngx
    frequency: hourly
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
