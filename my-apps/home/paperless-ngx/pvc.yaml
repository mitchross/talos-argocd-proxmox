apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: data
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: media
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: media-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
