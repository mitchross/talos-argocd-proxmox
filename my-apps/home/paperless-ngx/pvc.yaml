apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: paperless-ngx
    type: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/data.yaml; uniform fields come from the
  # ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: data-restore
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: paperless-ngx
    type: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/media.yaml; uniform fields come from the
  # ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: media-restore
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn

# NOTE: backups migrated from pvc-plumber/VolSync to kopiur (Kustomize component
# ../../common/kopiur-backup). Backup/restore CRs live in kopiur/data.yaml and
# kopiur/media.yaml; data + media restore-on-recreate via dataSourceRef →
# kopiur Restore. (export/consume PVCs above stay backup-exempt.)
