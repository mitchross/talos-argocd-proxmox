apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: data
    backup: "hourly"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-data and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-dst

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: media
    backup: "hourly"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/media-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-media and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: media-dst

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
