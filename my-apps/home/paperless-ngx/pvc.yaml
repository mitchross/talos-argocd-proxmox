apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: data
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # the PVC is recreated EMPTY (data is disposable in this homelab — user
  # accepted nuke). pvc-plumber takes over RS/RD at handoff; no restore on
  # recreate by design.
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: media
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # media is recreated EMPTY (scanned originals nuked per user instruction).
  # pvc-plumber takes over RS/RD at handoff; no restore on recreate by design.
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: data
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: data
spec:
  sourcePVC: data
  trigger:
    schedule: "59 * * * *"
  kopia:
    repository: volsync-kopia-repository
    username: data
    hostname: paperless-ngx
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: data-dst
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: data
    hostname: paperless-ngx
    sourceIdentity:
      sourceName: data
      sourceNamespace: paperless-ngx
      sourcePVCName: data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: media
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: media
spec:
  sourcePVC: media
  trigger:
    schedule: "13 * * * *"
  kopia:
    repository: volsync-kopia-repository
    username: media
    hostname: paperless-ngx
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: media-dst
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: media
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: media
    hostname: paperless-ngx
    sourceIdentity:
      sourceName: media
      sourceNamespace: paperless-ngx
      sourcePVCName: media
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
