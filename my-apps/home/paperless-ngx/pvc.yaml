apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: data
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=hourly; ns gated managed-namespace=true. Mover 568. Disposable reset
    # — recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # the PVC is recreated EMPTY (data is disposable in this homelab — user
  # accepted nuke). pvc-plumber takes over RS/RD at handoff; no restore on
  # recreate by design.
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: media
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=hourly; ns gated managed-namespace=true. Mover 568. Disposable reset
    # — recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # media is recreated EMPTY (scanned originals nuked per user instruction).
  # pvc-plumber takes over RS/RD at handoff; no restore on recreate by design.
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn

# NOTE: inline ReplicationSource/ReplicationDestination for data (data-dst) and
# media (media-dst) were REMOVED 2026-05-31 (pvc-plumber v4.0.1 DRY handoff).
# pvc-plumber now owns the RS/RD lifecycle for both (tier=hourly, mover 568).
# Do not re-add inline RS/RD here. (export/consume PVCs above stay backup-exempt.)
