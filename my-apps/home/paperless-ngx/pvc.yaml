metadata:
  name: media
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: media
spec:
  sourcePVC: media
  trigger:
    schedule: "13 * * * *"
  kopia:
    repository: volsync-kopia-repository
    username: media
    hostname: paperless-ngx
    compression: zstd-fastest
    parallelism: 2
    retain:
