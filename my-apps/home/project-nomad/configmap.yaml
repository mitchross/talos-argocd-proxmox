apiVersion: v1
kind: ConfigMap
metadata:
  name: project-nomad-config
  namespace: project-nomad
data:
  # --- Core Application ---
  PORT: "8080"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  SESSION_DRIVER: "cookie"
  URL: "https://nomad.vanillax.me"

  # --- Database (MySQL) ---
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_USER: "root"
  DB_DATABASE: "nomad"
  DB_SSL: "false"

  # --- Cache & Queue (Redis) ---
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # --- Storage ---
  NOMAD_STORAGE_PATH: "/app/storage"

  # --- LLM Provider (llama-cpp / OpenAI-compatible) ---
  LLM_PROVIDER: "openai"
  LLM_HOST: "http://llama-cpp-service.llama-cpp.svc.cluster.local:8080/v1"
  LLM_API_KEY: "unused"
  # Benchmark model — must match a model ID from /v1/models
  # Qwen 3.6 think = best reasoning quality for Q&A benchmarking.
  AI_BENCHMARK_MODEL: "qwen3.6 - qwen3.6-35b-a3b"

  # --- Embeddings / RAG ---
  # Dedicated embedding service (HuggingFace TEI with nomic-embed-text-v1.5)
  EMBEDDING_HOST: "http://embeddings.project-nomad.svc.cluster.local:8080/v1"
  EMBEDDING_MODEL: "nomic-ai/nomic-embed-text-v1.5"
  EMBEDDING_DIMENSIONS: "768"
  EMBEDDING_SEARCH_DOC_PREFIX: "search_document: "
  EMBEDDING_SEARCH_QUERY_PREFIX: "search_query: "

  # --- Qdrant (Vector DB for RAG) ---
  QDRANT_HOST: "http://qdrant.project-nomad.svc.cluster.local:6333"

  # --- Companion Services (browser-facing URLs via HTTPRoutes) ---
  KIWIX_URL: "https://kiwix.vanillax.me"
  CYBERCHEF_URL: "https://cyberchef.vanillax.me"
  FLATNOTES_URL: "https://flatnotes.vanillax.me"
  # Kolibri disabled — upstream image broken (Python 2.7)
  # KOLIBRI_URL: "https://kolibri.vanillax.me"
  # ProtoMaps — internal only (maps served by nomad app, no HTTPRoute needed)
  PROTOMAPS_URL: "http://protomaps.project-nomad.svc.cluster.local:8080"
