apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberchef
  namespace: project-nomad
  labels:
    app: project-nomad-cyberchef
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad-cyberchef
  template:
    metadata:
      labels:
        app: project-nomad-cyberchef
      # No OTEL injection: CyberChef is a static SPA served by nginx — there
      # is no Node.js runtime, so inject-nodejs only added an init container
      # gating pod start on an image pull for zero telemetry.
    spec:
      containers:
        - name: cyberchef
          image: ghcr.io/gchq/cyberchef:11.2.0
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 15m
              memory: 100Mi
            limits:
              cpu: 250m
              memory: 256Mi
