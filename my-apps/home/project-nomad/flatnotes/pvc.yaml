apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flatnotes-data
  namespace: project-nomad
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: project-nomad
    type: flatnotes
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/flatnotes-data-dst.
  # RS/RD are operator-managed by pvc-plumber.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: flatnotes-data-dst
