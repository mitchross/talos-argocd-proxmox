apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: project-nomad
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: project-nomad
    app.kubernetes.io/component: admin
    app.kubernetes.io/part-of: project-nomad
  annotations:
    external-dns.alpha.kubernetes.io/target: "vanillax.me"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-external
      namespace: gateway
      sectionName: https
  hostnames:
    - "nomad.vanillax.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: project-nomad
          port: 8080
          weight: 1
      timeouts:
        request: "120s"
        backendRequest: "60s"
