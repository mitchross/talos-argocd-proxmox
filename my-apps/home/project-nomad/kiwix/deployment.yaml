apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiwix
  namespace: project-nomad
  labels:
    app: project-nomad-kiwix
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad-kiwix
  template:
    metadata:
      labels:
        app: project-nomad-kiwix
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: project-nomad
              topologyKey: kubernetes.io/hostname
      containers:
        - name: kiwix
          image: ghcr.io/kiwix/kiwix-serve:3.8.1
          command: ["sh", "-c"]
          args:
            - |
              ZIM_FILES=$(find /data -name '*.zim' 2>/dev/null)
              if [ -z "$ZIM_FILES" ]; then
                echo "No ZIM files found in /data, sleeping..."
                sleep infinity
              else
                exec kiwix-serve --address=0.0.0.0 --port=8080 /data/*.zim
              fi
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: nomad-storage
              mountPath: /data
              subPath: zim
      volumes:
        - name: nomad-storage
          persistentVolumeClaim:
            claimName: nomad-storage
