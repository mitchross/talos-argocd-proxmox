apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiwix
  namespace: project-nomad
  labels:
    app: project-nomad-kiwix
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad-kiwix
  template:
    metadata:
      labels:
        app: project-nomad-kiwix
    spec:
      containers:
        - name: kiwix
          image: ghcr.io/kiwix/kiwix-serve:3.8.1
          args:
            - "--address=0.0.0.0"
            - "--port=8080"
            - "--library"
            - "/data/*.zim"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: nomad-storage
              mountPath: /data
              subPath: zim
      volumes:
        - name: nomad-storage
          persistentVolumeClaim:
            claimName: nomad-storage
