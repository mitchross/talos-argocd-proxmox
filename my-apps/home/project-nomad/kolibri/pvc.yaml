apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kolibri-data
  namespace: project-nomad
  labels:
    app: project-nomad
    type: kolibri
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/kolibri-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-kolibri-data and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: kolibri-data-dst
