apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project-nomad

resources:
  - namespace.yaml
  - externalsecret.yaml
  # Core — Nomad app
  - nomad/deployment.yaml
  - nomad/service.yaml
  - nomad/httproute.yaml
  - nomad/pvc.yaml
  # MySQL
  - mysql/deployment.yaml
  - mysql/service.yaml
  - mysql/pvc.yaml
  # Redis
  - redis/deployment.yaml
  - redis/service.yaml
  # Qdrant (vector DB for RAG)
  - qdrant/deployment.yaml
  - qdrant/service.yaml
  - qdrant/pvc.yaml
  # Embeddings (HuggingFace TEI — nomic-embed-text for RAG)
  - embeddings/deployment.yaml
  - embeddings/service.yaml
  - embeddings/pvc.yaml
  # Kiwix (offline Wikipedia)
  - kiwix/deployment.yaml
  - kiwix/service.yaml
  - kiwix/httproute.yaml
  # Kolibri (Khan Academy) — disabled, upstream image (treehouses/kolibri:0.12.8) is broken (Python 2.7)
  # - kolibri/deployment.yaml
  # - kolibri/service.yaml
  # - kolibri/pvc.yaml
  # - kolibri/httproute.yaml
  # ProtoMaps (offline maps)
  - protomaps/deployment.yaml
  - protomaps/service.yaml
  - protomaps/pvc.yaml
  # CyberChef (data tools — stateless)
  - cyberchef/deployment.yaml
  - cyberchef/service.yaml
  - cyberchef/httproute.yaml
  # FlatNotes (note-taking)
  - flatnotes/deployment.yaml
  - flatnotes/service.yaml
  - flatnotes/pvc.yaml
  - flatnotes/httproute.yaml

configMapGenerator:
  - name: project-nomad-config
    envs:
      - project-nomad-config.env

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: project-nomad-flatnotes-data-backup
  namespace: project-nomad
  valuesInline:
    pvc: flatnotes-data
    namespace: project-nomad
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 5Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: project-nomad-kolibri-data-backup
  namespace: project-nomad
  valuesInline:
    pvc: kolibri-data
    namespace: project-nomad
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: project-nomad-mysql-data-backup
  namespace: project-nomad
  valuesInline:
    pvc: mysql-data
    namespace: project-nomad
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: project-nomad-nomad-storage-backup
  namespace: project-nomad
  valuesInline:
    pvc: nomad-storage
    namespace: project-nomad
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 120Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: project-nomad-qdrant-data-backup
  namespace: project-nomad
  valuesInline:
    pvc: qdrant-data
    namespace: project-nomad
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
