---
# MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomad-mysql
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: project-nomad
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nomad-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nomad-mysql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: project-nomad
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: DB_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: nomad
            - name: MYSQL_USER
              value: nomad_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: DB_PASSWORD
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: nomad-mysql-data
---
# MySQL Service
apiVersion: v1
kind: Service
metadata:
  name: nomad-mysql
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: project-nomad
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nomad-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
---
# MySQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nomad-mysql-data
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-mysql
    app.kubernetes.io/part-of: project-nomad
    backup: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
