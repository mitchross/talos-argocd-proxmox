---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# mysql-data backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: mysql-data
  namespace: project-nomad
spec:
  sources:
    - pvc:
        name: mysql-data
  identity:
    username: mysql-data
    hostname: project-nomad
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 999
      runAsGroup: 568
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 568
      supplementalGroups:
        - 568
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: mysql-data-daily
  namespace: project-nomad
spec:
  policyRef:
    name: mysql-data
  schedule:
    # 03:49 — minute 25 collided with karakeep meilisearch's hourly
    # "25 * * * *" at 03:25 (distinct-minute-per-app convention).
    cron: "49 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: mysql-data-restore
  namespace: project-nomad
spec:
  source:
    fromPolicy:
      name: mysql-data
      offset: 0
  mover:
    securityContext:
      runAsUser: 999
      runAsGroup: 568
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 568
      supplementalGroups:
        - 568
