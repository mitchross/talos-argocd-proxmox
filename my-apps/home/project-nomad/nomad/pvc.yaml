apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nomad-storage
  namespace: project-nomad
  labels:
    app: project-nomad
    type: storage
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 120Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/nomad-storage-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: nomad-storage-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: nomad-storage
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: nomad-storage
spec:
  sourcePVC: nomad-storage
  trigger:
    schedule: "16 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: nomad-storage
    hostname: project-nomad
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: nomad-storage-dst
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: nomad-storage
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: nomad-storage
    hostname: project-nomad
    sourceIdentity:
      sourceName: nomad-storage
      sourceNamespace: project-nomad
      sourcePVCName: nomad-storage
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 120Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
