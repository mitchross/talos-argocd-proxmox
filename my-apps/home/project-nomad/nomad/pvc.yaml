apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nomad-storage
  namespace: project-nomad
  labels:
    app: project-nomad
    type: storage
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 120Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/nomad-storage-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-nomad-storage and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: nomad-storage-dst
