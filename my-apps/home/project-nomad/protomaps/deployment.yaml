apiVersion: apps/v1
kind: Deployment
metadata:
  name: protomaps
  namespace: project-nomad
  labels:
    app: project-nomad-protomaps
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad-protomaps
  template:
    metadata:
      labels:
        app: project-nomad-protomaps
      annotations:
        instrumentation.opentelemetry.io/inject-go: "opentelemetry/default"
    spec:
      containers:
        - name: protomaps
          image: ghcr.io/protomaps/go-pmtiles:latest@sha256:057f8e5a6c77e89b46eebd40d62d295a0b69009371542bc0abfe1ecbc7ee6285
          args: ["serve", "/data"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: protomaps-data
              mountPath: /data
      volumes:
        - name: protomaps-data
          persistentVolumeClaim:
            claimName: protomaps-data
