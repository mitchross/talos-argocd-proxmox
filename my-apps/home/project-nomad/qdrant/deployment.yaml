apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: project-nomad
  labels:
    app: project-nomad-qdrant
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad-qdrant
  template:
    metadata:
      labels:
        app: project-nomad-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.17
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          env:
            # NOMAD is offline-first; match upstream's posture (service_seeder
            # in v1.31.0 disables Qdrant's telemetry → telemetry.qdrant.io).
            - name: QDRANT__TELEMETRY_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
