apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: project-nomad
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: project-nomad
    type: qdrant
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/qdrant-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: qdrant-data-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: qdrant-data
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: qdrant-data
spec:
  sourcePVC: qdrant-data
  trigger:
    schedule: "24 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: qdrant-data
    hostname: project-nomad
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: qdrant-data-dst
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: qdrant-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: qdrant-data
    hostname: project-nomad
    sourceIdentity:
      sourceName: qdrant-data
      sourceNamespace: project-nomad
      sourcePVCName: qdrant-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
