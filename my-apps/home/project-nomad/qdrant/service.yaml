apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: project-nomad
  labels:
    app: project-nomad-qdrant
spec:
  selector:
    app: project-nomad-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  type: ClusterIP
