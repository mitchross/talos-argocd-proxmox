---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomad-redis
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: project-nomad
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nomad-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nomad-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: project-nomad
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: nomad-redis-data
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: nomad-redis
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: project-nomad
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nomad-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nomad-redis-data
  namespace: project-nomad
  labels:
    app.kubernetes.io/name: nomad-redis
    app.kubernetes.io/part-of: project-nomad
    backup: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: longhorn
