apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-zomboid
  namespace: project-zomboid
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: project-zomboid
  template:
    metadata:
      labels:
        app: project-zomboid
    spec:
      terminationGracePeriodSeconds: 180
      initContainers:
        - name: copy-config
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /project-zomboid-config/Server
              cp /config/vanillax.ini /project-zomboid-config/Server/vanillax.ini
              cp /config/vanillax_SandboxVars.lua /project-zomboid-config/Server/vanillax_SandboxVars.lua
              echo "Config files copied to /project-zomboid-config/Server/"
          volumeMounts:
            - name: config-data
              mountPath: /project-zomboid-config
            - name: config
              mountPath: /config
      containers:
        - name: project-zomboid
          image: indifferentbroccoli/projectzomboid-server-docker:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: SERVER_NAME
              value: "vanillax"
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zomboid-secrets
                  key: admin-username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zomboid-secrets
                  key: admin-password
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zomboid-secrets
                  key: server-password
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zomboid-secrets
                  key: rcon-password
            - name: SERVER_BRANCH
              value: "unstable"
            - name: DEFAULT_PORT
              value: "16261"
            - name: UDP_PORT
              value: "16262"
            - name: RCON_PORT
              value: "27015"
            - name: MEMORY_XMX_GB
              value: "16"
            - name: MEMORY_XMS_GB
              value: "8"
            - name: UPDATE_ON_START
              value: "true"
            - name: GENERATE_SETTINGS
              value: "false"
            - name: STEAM_VAC
              value: "true"
            - name: MODS
              value: "SkillRecoveryJournal;ChuckleberryFinnAlertSystem;errorMagnifier;lgd_antibodies;RealisticDash;ArmorMakesSense;B42Horticulture;ArcheryNexus;PHLockpicking"
            - name: WORKSHOP_ITEMS
              value: "2503622437;2896041179;3077900375;2392676812;3635591071;3677430162;3650168851;3653092321;3617854007;3687010721"
          ports:
            - name: game
              containerPort: 16261
              protocol: UDP
            - name: game2
              containerPort: 16262
              protocol: UDP
            - name: rcon
              containerPort: 27015
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    /home/steam/server/rcon-cli -c /home/steam/server/rcon.yml "save" || true
                    sleep 5
                    /home/steam/server/rcon-cli -c /home/steam/server/rcon.yml "quit" || true
                    sleep 15
          startupProbe:
            exec:
              command:
                - pgrep
                - -f
                - ProjectZomboid
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /home/steam/server/rcon-cli
                - -c
                - /home/steam/server/rcon.yml
                - "players"
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - ProjectZomboid
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: server-files
              mountPath: /project-zomboid
            - name: config-data
              mountPath: /project-zomboid-config
          resources:
            requests:
              memory: 8Gi
              cpu: "2"
            limits:
              memory: 20Gi
              cpu: "8"
      volumes:
        - name: server-files
          persistentVolumeClaim:
            claimName: zomboid-server-files
        - name: config-data
          persistentVolumeClaim:
            claimName: zomboid-data
        - name: config
          configMap:
            name: zomboid-server-config
