apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: project-zomboid

resources:
  - namespace.yaml
  - pvc.yaml
  - externalsecret.yaml
  - deployment.yaml
  - service.yaml
  - pdb.yaml

configMapGenerator:
  - name: zomboid-server-config
    files:
      - vanillax.ini
      - vanillax_SandboxVars.lua

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: project-zomboid-zomboid-data-backup
  namespace: project-zomboid
  valuesInline:
    pvc: zomboid-data
    namespace: project-zomboid
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
