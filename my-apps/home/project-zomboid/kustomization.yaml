apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: project-zomboid

resources:
  - namespace.yaml
  - pvc.yaml
  - externalsecret.yaml
  - deployment.yaml
  - service.yaml
  - pdb.yaml
  - kopiur/zomboid-data.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: zomboid-server-config
    files:
      - vanillax.ini
      - vanillax_SandboxVars.lua
