apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-data
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/zomboid-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-zomboid-data and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: zomboid-data-dst

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-server-files
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SteamCMD-installed game files; rebuildable via the existing SteamCMD pre-warm path"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
  storageClassName: longhorn
