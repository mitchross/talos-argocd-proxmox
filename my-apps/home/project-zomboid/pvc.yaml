apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-data
  namespace: project-zomboid
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: project-zomboid
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/zomboid-data.yaml; uniform fields + the
  # privileged mover come from the ../../common/kopiur-backup component.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: zomboid-data-restore
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-server-files
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SteamCMD-installed game files; rebuildable via the existing SteamCMD pre-warm path"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
  storageClassName: longhorn

# NOTE: zomboid-data backup is owned by kopiur (SnapshotPolicy/SnapshotSchedule/
# Restore in kopiur/zomboid-data.yaml + the ../../common/kopiur-backup component).
# (zomboid-server-files above remains backup-exempt — no backup CRs by design.)
