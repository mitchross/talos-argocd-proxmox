apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-data
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/zomboid-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: zomboid-data-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-server-files
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SteamCMD-installed game files; rebuildable via the existing SteamCMD pre-warm path"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
  storageClassName: longhorn

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: zomboid-data
  namespace: project-zomboid
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: zomboid-data
spec:
  sourcePVC: zomboid-data
  trigger:
    schedule: "59 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: zomboid-data
    hostname: project-zomboid
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: zomboid-data-dst
  namespace: project-zomboid
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: zomboid-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: zomboid-data
    hostname: project-zomboid
    sourceIdentity:
      sourceName: zomboid-data
      sourceNamespace: project-zomboid
      sourcePVCName: zomboid-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
