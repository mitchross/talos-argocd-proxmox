apiVersion: v1
kind: Service
metadata:
  name: project-zomboid
  namespace: project-zomboid
  annotations:
    # Router port-forwards target this IP. lbipam annotation replaces the
    # deprecated spec.loadBalancerIP field.
    lbipam.cilium.io/ips: "192.168.10.51"
spec:
  type: LoadBalancer
  selector:
    app: project-zomboid
  ports:
    - name: game
      port: 16261
      targetPort: 16261
      protocol: UDP
    - name: game2
      port: 16262
      targetPort: 16262
      protocol: UDP
    - name: rcon
      port: 27015
      targetPort: 27015
      protocol: TCP
