# nginx config for the map-styles static server (mounted as
# /etc/nginx/conf.d/default.conf, replacing the image default). Serves ONLY
# the pre-generated MapLibre style JSONs under /styles/ with permissive CORS —
# these are public, non-credentialed map styles, so `*` is the norm (matches
# how every tile/style server exposes them) and is not a credential risk.
server {
    listen       8080;
    server_name  _;

    # Cheap dedicated probe target so k8s health checks don't spam the log
    # (the style files themselves are the real readiness signal).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /styles/ {
        root         /usr/share/nginx/html;
        default_type application/json;
        add_header   Access-Control-Allow-Origin "*" always;
        add_header   Cache-Control "public, max-age=300" always;
    }
}
