# map-styles — a tiny nginx serving the pre-generated MapLibre style JSONs at
# maps.vanillax.me/styles/{light,dark}.json. Kept SEPARATE from the versatiles
# Deployment on purpose: VersaTiles v4.6's frontend builds styles client-side
# and serves no static style.json, and the serving pod runs readOnlyRootFilesystem
# off a read-only PVC — bolting static files onto it would mean touching the
# live map server's args. An isolated 16Mi nginx is safer and lets styles roll
# independently. The styles + this nginx config come from configMapGenerators in
# kustomization.yaml (hash suffix = the rollout trigger when styles change).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-styles
  namespace: versatiles
  labels:
    app.kubernetes.io/name: map-styles
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: map-styles
  template:
    metadata:
      labels:
        app.kubernetes.io/name: map-styles
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx-unprivileged's built-in non-root nginx user
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.31-alpine@sha256:18d67281256ded39ff65e010ae4f831be18f19356f83c60bc546492c7eb6dd23
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: styles
              mountPath: /usr/share/nginx/html/styles
              readOnly: true
            - name: index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: conf
          configMap:
            name: map-styles-nginx
        - name: styles
          configMap:
            name: map-styles-files
        - name: index
          configMap:
            name: map-styles-index
