apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-data
  namespace: copyparty
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: copyparty
    restore-policy: "strict"
spec:
  accessModes: 
    - ReadWriteOnce
  resources:
    requests: 
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/copyparty-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    # TEMPORARY (Option-R, 2026-05-30): aligned to the live immutable value
    # copyparty-data-backup so Argo computes a clean diff and syncs (SSA=false
    # alone wedged on the immutable field). Restored to copyparty-data-dst in
    # Phase 6, immediately before the PVC delete/recreate. The RD below stays
    # named copyparty-data-dst (the restore target).
    kind: ReplicationDestination
    name: copyparty-data-backup

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: copyparty-data
  namespace: copyparty
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: copyparty-data
spec:
  sourcePVC: copyparty-data
  trigger:
    schedule: "57 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: copyparty-data
    hostname: copyparty
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: copyparty-data-dst
  namespace: copyparty
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: copyparty-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: copyparty-data
    hostname: copyparty
    sourceIdentity:
      sourceName: copyparty-data
      sourceNamespace: copyparty
      sourcePVCName: copyparty-data
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
