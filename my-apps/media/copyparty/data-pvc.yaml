apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-data
  namespace: copyparty
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: copyparty
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests: 
      storage: 20Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/copyparty-data-dst.
  # RS/RD are operator-managed by pvc-plumber.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: copyparty-data-dst
