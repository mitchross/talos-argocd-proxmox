apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: copyparty

generatorOptions:
  disableNameSuffixHash: true

resources:
  - ns.yaml
  - data-pvc.yaml
  - deployment.yaml
  - svc.yaml
  - httproute.yaml
  - kopiur/copyparty-data.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: copyparty-config
    files:
      - copyparty.conf
