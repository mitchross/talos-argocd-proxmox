apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: copyparty

generatorOptions:
  disableNameSuffixHash: true

resources:
  - ns.yaml
  - data-pvc.yaml
  - deployment.yaml
  - svc.yaml
  - httproute.yaml

configMapGenerator:
  - name: copyparty-config
    files:
      - copyparty.conf

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: copyparty-config-backup
  namespace: copyparty
  valuesInline:
    pvc: config
    namespace: copyparty
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 5Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: copyparty-copyparty-data-backup
  namespace: copyparty
  valuesInline:
    pvc: copyparty-data
    namespace: copyparty
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 20Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: copyparty-copyparty-media-backup
  namespace: copyparty
  valuesInline:
    pvc: copyparty-media
    namespace: copyparty
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 10Gi
      storageClassName: longhorn
