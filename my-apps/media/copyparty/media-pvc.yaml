apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-media
  namespace: copyparty
  labels:
    app: copyparty
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/copyparty-media-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: copyparty-media-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: copyparty-media
  namespace: copyparty
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: copyparty-media
spec:
  sourcePVC: copyparty-media
  trigger:
    schedule: "19 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: copyparty-media
    hostname: copyparty
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: copyparty-media-dst
  namespace: copyparty
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: copyparty-media
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: copyparty-media
    hostname: copyparty
    sourceIdentity:
      sourceName: copyparty-media
      sourceNamespace: copyparty
      sourcePVCName: copyparty-media
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
