apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage-dashboard
data:
  settings.yaml: |
    title: VanillaX Dashboard
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      AI:
        style: row
        columns: 4
      Development:
        style: row
        columns: 4
      Home:
        style: row
        columns: 4
      Media:
        style: row
        columns: 4
      Utilities:
        style: row
        columns: 4
      Privacy:
        style: row
        columns: 2
      Infrastructure & Monitoring:
        style: row
        columns: 4
  services.yaml: |
    - AI:
        - ComfyUI:
            icon: comfyui.png
            href: https://comfyui.vanillax.me
            description: AI Image & Video Generation
        - llama-cpp:
            icon: meta.png
            href: https://llama.vanillax.me
            description: Local LLM Inference Server
        - Open WebUI:
            icon: open-webui.png
            href: https://open-webui.vanillax.me
            description: AI Chat Interface
        - Perplexica:
            icon: perplexity-ai.png
            href: https://perplexica.vanillax.me
            description: AI-Powered Search Engine
    - Development:
        - Argo CD:
            icon: argocd.png
            href: https://argocd.vanillax.me
            description: GitOps Continuous Delivery
            widget:
              type: argocd
              url: https://argocd.vanillax.me
              key: argocd
        - Gitea:
            icon: gitea.png
            href: https://gitea.vanillax.me
            description: Git Repository Manager
        - Headlamp:
            icon: headlamp.png
            href: https://headlamp.vanillax.me
            description: Kubernetes Dashboard
        - Mailpit:
            icon: mailpit.png
            href: https://mailpit.vanillax.me
            description: Email Testing Server
        - n8n:
            icon: n8n.png
            href: https://n8n.vanillax.me
            description: Workflow Automation
        - Temporal:
            icon: temporal.png
            href: https://temporal.vanillax.me
            description: Workflow Orchestration
        - PostHog:
            icon: posthog.png
            href: https://posthog.vanillax.me
            description: Product Analytics
        - News Reader:
            icon: mdi-newspaper-variant-outline
            href: https://news.vanillax.me
            description: RSS / News Reader
        - Echo Server:
            icon: mdi-server-outline
            href: https://echo.vanillax.me
            description: HTTP Echo & Debug Server
        - Nginx:
            icon: nginx.png
            href: https://nginx.vanillax.me
            description: Web Server Example
    - Home:
        - Home Assistant:
            icon: home-assistant.png
            href: https://homeassistant.vanillax.me
            description: Smart Home Automation
        - Frigate:
            icon: frigate.png
            href: https://frigate.vanillax.me
            description: NVR & Object Detection
        - Paperless-NGX:
            icon: paperless-ngx.png
            href: https://paperless.vanillax.me
            description: Document Management
        - Wyze Bridge:
            icon: wyze.png
            href: https://wyze-bridge.vanillax.me
            description: Camera Streaming Bridge
        - Project Nomad:
            icon: mdi-bag-personal-outline
            href: https://nomad.vanillax.me
            description: Offline Knowledge Portal
        - CyberChef:
            icon: cyberchef.png
            href: https://cyberchef.vanillax.me
            description: Data Transformation Toolkit
        - FlatNotes:
            icon: mdi-note-text-outline
            href: https://flatnotes.vanillax.me
            description: Plain-Text Notes
        - Kolibri:
            icon: mdi-school-outline
            href: https://kolibri.vanillax.me
            description: Offline Learning Library
    - Media:
        - Immich:
            icon: immich.png
            href: https://photos.vanillax.me
            description: Photo & Video Management
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.vanillax.me
            description: Media Streaming Server
        - Kiwix:
            icon: kiwix.png
            href: https://kiwix.vanillax.me
            description: Offline Encyclopedia
        - Redlib:
            icon: redlib.png
            href: https://redlib.vanillax.me
            description: Private Reddit Frontend
        - CopyParty:
            icon: mdi-folder-upload-outline
            href: https://copyparty.vanillax.me
            description: File Sharing Server
        - Karakeep:
            icon: mdi-bookmark-multiple-outline
            href: https://karakeep.vanillax.me
            description: Bookmark & Read-Later
        - TubeSync:
            icon: mdi-youtube
            href: https://tube.vanillax.me
            description: YouTube Channel Archiver
    - Utilities:
        - IT-Tools:
            icon: it-tools.png
            href: https://it-tools.vanillax.me
            description: IT Utility Tools Collection
        - Pairdrop:
            icon: pairdrop.png
            href: https://pairdrop.vanillax.me
            description: Peer-to-Peer File Transfer
        - ConvertX:
            icon: convertx.png
            href: https://convertx.vanillax.me
            description: File Format Conversion
        - Stirling-PDF:
            icon: stirling-pdf.png
            href: https://stirling.vanillax.me
            description: PDF Manipulation Toolkit
        - Excalidraw:
            icon: excalidraw.png
            href: https://excalidraw.vanillax.me
            description: Virtual Whiteboard
        - Fizzy:
            icon: mdi-flask-outline
            href: https://fizzy.vanillax.me
            description: Fizzy
        - Vert:
            icon: mdi-application-outline
            href: https://vert.vanillax.me
            description: Vert
    - Privacy:
        - SearXNG:
            icon: searxng.png
            href: https://search.vanillax.me
            description: Private Metasearch Engine
    - Infrastructure & Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.vanillax.me
            description: Dashboards & Visualization
        - Prometheus:
            icon: prometheus.png
            href: https://prometheus.vanillax.me
            description: Metrics & Monitoring
        - Loki:
            icon: loki.png
            href: https://loki.vanillax.me
            description: Log Aggregation
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.vanillax.me
            description: Storage Management
        - Kopia:
            icon: kopia.png
            href: https://kopia.vanillax.me
            description: Backup Management
        - Container Registry:
            icon: docker.png
            href: https://registry.vanillax.me
            description: Container Image Registry
        - TrueNAS:
            icon: truenas.png
            href: http://192.168.10.133
            description: Network Attached Storage
        - Proxmox:
            icon: proxmox.png
            href: https://192.168.10.13:8006
            description: Virtualization Platform
        - iLO TrueNAS:
            icon: hp-ilo.png
            href: https://192.168.10.197
            description: TrueNAS IPMI Management
        - iLO Proxmox:
            icon: hp-ilo.png
            href: https://192.168.10.160
            description: Proxmox IPMI Management
