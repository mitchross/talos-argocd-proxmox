apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage-dashboard
commonLabels:
  app.kubernetes.io/name: homepage-dashboard
  app.kubernetes.io/managed-by: argocd
resources:
  - ns.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - kopiur/config.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: homepage-config
    files:
      - settings.yaml
      - services.yaml
