apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage-dashboard
commonLabels:
  app.kubernetes.io/name: homepage-dashboard
  app.kubernetes.io/managed-by: argocd
resources:
  - ns.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

configMapGenerator:
  - name: homepage-config
    files:
      - settings.yaml
      - services.yaml

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: homepage-dashboard-config-backup
  namespace: homepage-dashboard
  valuesInline:
    pvc: config
    namespace: homepage-dashboard
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 5Gi
      storageClassName: longhorn
