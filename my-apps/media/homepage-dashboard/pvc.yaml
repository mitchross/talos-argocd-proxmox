# PV definition removed
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: homepage-dashboard
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: homepage
    type: config
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/config.yaml; uniform fields come from the
  # ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: config-restore
