---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# immich library backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
# NOTE: backs up the `library` PVC ONLY. The immich database uses CNPG
# (Barman/S3) — never under kopiur/VolSync.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: library
  namespace: immich
spec:
  sources:
    - pvc:
        name: library
  identity:
    username: library
    hostname: immich
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: library-daily
  namespace: immich
spec:
  policyRef:
    name: library
  schedule:
    cron: "37 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: library-restore
  namespace: immich
spec:
  source:
    fromPolicy:
      name: library
      offset: 0
