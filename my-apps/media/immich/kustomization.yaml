apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich
labels:
  - pairs:
      app.kubernetes.io/name: immich
      app.kubernetes.io/managed-by: argocd

resources:
  - namespace.yaml
  - externalsecret.yaml
  - nfs-photos-pvc.yaml
  - library-pvc.yaml
  - ml-cache-pvc.yaml
  - httproute.yaml
  - deployment-server.yaml
  - deployment-machine-learning.yaml
  - deployment-valkey.yaml
  - services.yaml
  - kopiur/library.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/. Backs up the `library` PVC ONLY —
# the immich database is CNPG (Barman/S3) and is never under kopiur/VolSync.
components:
  - ../../common/kopiur-backup
