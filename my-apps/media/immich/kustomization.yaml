apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich
labels:
  - pairs:
      app.kubernetes.io/name: immich
      app.kubernetes.io/managed-by: argocd

resources:
  - namespace.yaml
  - externalsecret.yaml
  - nfs-photos-pvc.yaml
  - library-pvc.yaml
  - ml-cache-pvc.yaml
  - httproute.yaml
  - deployment-server.yaml
  - deployment-machine-learning.yaml
  - deployment-valkey.yaml
  - services.yaml

# Chart-managed VolSync backup wiring — replaces pvc-plumber.
# See docs/research/pvc-backup-simplification/ for the migration design.
helmGlobals:
  chartHome: ../../../infrastructure/storage/
helmCharts:
- name: volsync-backup
  releaseName: immich-library-backup
  namespace: immich
  valuesInline:
    pvc: library
    namespace: immich
    frequency: daily
    tier: strict
    pvc_create: false
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 300Gi
      storageClassName: longhorn
