apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=daily; ns gated managed-namespace=true. Mover 568. Disposable reset —
    # recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # library is recreated EMPTY (immich library derivatives nuked per user
  # instruction; originals live on exempt nfs-photos). pvc-plumber takes over
  # RS/RD at handoff; no restore on recreate by design.

# NOTE: inline ReplicationSource/library + ReplicationDestination/library-dst
# were REMOVED 2026-05-31 (pvc-plumber v4.0.1 DRY handoff). pvc-plumber now owns
# the RS/RD lifecycle for library (tier=daily, mover 568). Do not re-add here.
