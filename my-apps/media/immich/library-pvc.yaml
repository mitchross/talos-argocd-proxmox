apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
    restore-policy: "strict"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  storageClassName: longhorn
  # dataSourceRef intentionally OMITTED (final disposable reset 2026-05-31):
  # library is recreated EMPTY (immich library derivatives nuked per user
  # instruction; originals live on exempt nfs-photos). pvc-plumber takes over
  # RS/RD at handoff; no restore on recreate by design.

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: library
  namespace: immich
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: library
spec:
  sourcePVC: library
  trigger:
    schedule: "44 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: library
    hostname: immich
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: library-dst
  namespace: immich
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: library
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: library
    hostname: immich
    sourceIdentity:
      sourceName: library
      sourceNamespace: immich
      sourcePVCName: library
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 300Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
