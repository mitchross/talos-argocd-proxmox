apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=daily; ns gated managed-namespace=true. Mover 568. Disposable reset —
    # recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  storageClassName: longhorn
  # dataSourceRef → ReplicationDestination/library-dst (added 2026-05-31 during the
  # immich-library DR-completion drill). The empty reset originally omitted this;
  # library now holds the current (post-reset) working set that pvc-plumber backs
  # up, so the dsr closes the last optional DR gap — on recreate the VolSync volume
  # populator restores the latest backup. No-op while Bound. (Matches paperless,
  # copyparty, etc.) NOTE: originals remain on exempt NFS nfs-photos; the immich
  # CNPG DB still references pre-reset assets, so this restores the CURRENT library
  # state only — it does NOT fix the prior DB-to-asset mismatch (accepted).
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: library-dst

# NOTE: inline ReplicationSource/library + ReplicationDestination/library-dst
# were REMOVED 2026-05-31 (pvc-plumber v4.0.1 DRY handoff). pvc-plumber now owns
# the RS/RD lifecycle for library (tier=daily, mover 568). Do not re-add here.
