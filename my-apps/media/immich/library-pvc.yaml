apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      # Shrunk 300Gi -> 50Gi for the single-node 2950X rebuild (2026-06-19).
      # The library volume holds only immich's working set (thumbnails/transcodes/
      # new uploads) ~6Gi actual — originals live on the read-only nfs-photos
      # external library. 50Gi keeps generous headroom while reclaiming ~250Gi of
      # Longhorn scheduling budget on the single 512G EDILOCA disk.
      storage: 50Gi
  storageClassName: longhorn
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/library.yaml; uniform fields come from the
  # ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  # NOTE: originals remain on exempt NFS nfs-photos; the immich CNPG DB (Barman/
  # S3, untouched) still references pre-reset assets, so this restores the
  # CURRENT library working set only.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: library-restore
