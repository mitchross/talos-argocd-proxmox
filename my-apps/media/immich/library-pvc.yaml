apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/component: library
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/library-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from kopia repo
  # volsync-library and binds this PVC with restored data. No-op
  # while the PVC is already Bound. Chart-managed wiring lives in
  # the sibling kustomization.yaml helmCharts: section.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: library-dst
