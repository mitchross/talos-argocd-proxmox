apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonLabels:
  app: jellyfin

configMapGenerator:
  - name: jellyfin-env
    namespace: jellyfin
    literals:
      - TZ="America/Detroit"

resources:
  - ns.yaml
  - pvc.yaml
  - svc.yaml
  - jellyfin-media-pvc.yaml
  - deployment.yaml
  - httproute.yaml
  - kopiur/config.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup
