apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  # includeSelectors: true == the old commonLabels behavior (labels stamped on
  # metadata, selectors, AND pod templates). Keep true: selectors are immutable
  # on live Deployments/StatefulSets; flipping to false forces delete/recreate.
  - includeSelectors: true
    pairs:
      app: jellyfin

configMapGenerator:
  - name: jellyfin-env
    namespace: jellyfin
    literals:
      - TZ="America/Detroit"

resources:
  - vpa.yaml
  - ns.yaml
  - pvc.yaml
  - svc.yaml
  - jellyfin-media-pvc.yaml
  - deployment.yaml
  - httproute.yaml
  - kopiur/config.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup
