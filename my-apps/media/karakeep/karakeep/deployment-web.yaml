apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-web
spec:
  # Temporarily 0 (2026-05-29, Option R Step 3): quiesce the sole consumer
  # of data-pvc so the volume detaches and writes stop before the
  # immutable-dataSourceRef repair (delete + restore-recreate). Restored to
  # 1 in Step 6 after the repaired PVC is Bound.
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep-web
  template:
    metadata:
      labels:
        app: karakeep-web
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/default"
    spec:
      securityContext:
        fsGroup: 1001
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:release@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: MEILI_ADDR
              value: http://karakeep-meilisearch.karakeep.svc.cluster.local:7700
            - name: BROWSER_WEB_URL
              value: http://karakeep-chrome.karakeep.svc.cluster.local:9222
            - name: DATA_DIR
              value: /data
              # Add OPENAI_API_KEY to the ConfigMap if necessary
          volumeMounts:
            - mountPath: /data
              name: data
          envFrom:
            - secretRef:
                name: karakeep-secret
            - configMapRef:
                name: karakeep-configuration
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
