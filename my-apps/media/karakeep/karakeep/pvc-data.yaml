apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: karakeep
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    # Gate 2 (2026-05-29): data-pvc's immutable spec.dataSourceRef is
    # data-pvc-backup live vs data-pvc-dst here in Git (historical drift,
    # predates the pvc-plumber migration). The my-apps AppSet forces
    # ServerSideApply=true, so every compare runs an SSA dry-run that the
    # apiserver rejects on the immutable field → app-wide ComparisonError.
    # Disabling SSA for THIS PVC lets Argo compare via client-side + the
    # AppSet ignoreDifferences mask on /spec/dataSourceRef. Not the
    # migration; inline RS/RD below stay Argo-owned until Gate 3.
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: karakeep
    type: data-storage
    # backup: "hourly" removed 2026-05-21 — that label was pvc-plumber's
    # signal. VolSync ReplicationSource/ReplicationDestination resources
    # are defined below in this file.
    restore-policy: "strict"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # Static dataSourceRef → ReplicationDestination/data-pvc-dst. On PVC
  # re-creation (DR / namespace recreate), VolSync's volume populator
  # reads the latest snapshot from the shared kopia repo and binds
  # this PVC with restored data. No-op while the PVC is already Bound.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-pvc-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: data-pvc
  namespace: karakeep
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: data-pvc
spec:
  sourcePVC: data-pvc
  trigger:
    schedule: "32 * * * *"
  kopia:
    repository: volsync-kopia-repository
    username: data-pvc
    hostname: karakeep
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: data-pvc-dst
  namespace: karakeep
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: data-pvc
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: data-pvc
    hostname: karakeep
    sourceIdentity:
      sourceName: data-pvc
      sourceNamespace: karakeep
      sourcePVCName: data-pvc
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
