apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: karakeep
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    # Immutable-dataSourceRef masking: a Bound PVC's live spec.dataSourceRef
    # can lag Git (it only converges on recreate). SSA dry-run compares are
    # rejected by the apiserver on the immutable field → app-wide
    # ComparisonError, so this PVC compares client-side and the my-apps
    # AppSet ignoreDifferences mask hides /spec/dataSourceRef drift.
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: karakeep
    type: data-storage
    restore-policy: "strict"
    # Backup + restore are driven by the kopiur CR bundle in
    # ../kopiur/data-pvc.yaml (SnapshotPolicy + SnapshotSchedule + Restore).
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # kopiur populator: on PVC re-creation, kopiur's Restore/data-pvc-restore
  # holds this PVC in Pending and restores the latest snapshot for identity
  # karakeep/data-pvc before binding. No-op while already Bound.
  #
  # ⚠️ dataSourceRef is IMMUTABLE — it only takes effect on RECREATE (proven
  # by the 2026-06-27 full-namespace DR drill). The masking annotations above
  # + the AppSet ignoreDifferences handle any interim diff.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: data-pvc-restore
