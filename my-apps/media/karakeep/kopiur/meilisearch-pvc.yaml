---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# karakeep meilisearch-pvc backup STUB — uniform fields injected by the
# ../../../common/kopiur-backup component. Same shape as data-pvc.yaml.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: meilisearch-pvc
  namespace: karakeep
spec:
  sources:
    - pvc:
        name: meilisearch-pvc
  identity:
    username: meilisearch-pvc
    hostname: karakeep
  retention:
    keepHourly: 24
    keepDaily: 7
  mover:
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1001
      supplementalGroups:
        - 1001
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: meilisearch-pvc-hourly
  namespace: karakeep
spec:
  policyRef:
    name: meilisearch-pvc
  schedule:
    cron: "25 * * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: meilisearch-pvc-restore
  namespace: karakeep
spec:
  source:
    fromPolicy:
      name: meilisearch-pvc
      offset: 0
  # repository/target/policy ← component · mover SC (uid 1001) ← per-app patch
  mover:
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1001
      supplementalGroups:
        - 1001
