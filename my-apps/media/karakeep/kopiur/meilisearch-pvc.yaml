---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# kopiur backend for karakeep meilisearch-pvc (the search index). Same corrected
# bundle shape as data-pvc.yaml; cross-checked vs eleboucher / onedr0p.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: meilisearch-pvc
  namespace: karakeep
spec:
  copyMethod: Snapshot
  volumeSnapshotClassName: longhorn-snapclass
  # creds via ClusterExternalSecret (no credentialProjection) — see data-pvc.yaml
  repository:
    kind: ClusterRepository
    name: cluster-kopia
  sources:
    - pvc:
        name: meilisearch-pvc
  identity:
    username: meilisearch-pvc
    hostname: karakeep
  retention:
    keepHourly: 24
    keepDaily: 7
  mover: # karakeep meilisearch runs as uid/gid 1001 (verified live 2026-06-26)
    securityContext: # container SC (no fsGroup — that's pod-level)
      runAsUser: 1001
      runAsGroup: 1001
    podSecurityContext:
      fsGroup: 1001 # group-writable source/restore volume (data is :1001)
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: meilisearch-pvc-hourly
  namespace: karakeep
spec:
  policyRef:
    name: meilisearch-pvc
  schedule:
    cron: "25 * * * *"
    concurrencyPolicy: Forbid
    runOnCreate: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: meilisearch-pvc-restore
  namespace: karakeep
spec:
  repository:
    kind: ClusterRepository
    name: cluster-kopia
  source:
    fromPolicy:
      name: meilisearch-pvc
      offset: 0
  target:
    populator: {}
  policy:
    onMissingSnapshot: Continue
  mover: # karakeep meilisearch runs as uid/gid 1001 (verified live 2026-06-26)
    securityContext: # container SC (no fsGroup — that's pod-level)
      runAsUser: 1001
      runAsGroup: 1001
    podSecurityContext:
      fsGroup: 1001 # group-writable source/restore volume (data is :1001)
