apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: karakeep
resources:
- namespace.yaml
# Chrome resources
- chrome/deployment-chrome.yaml
- chrome/service-chrome.yaml
# karakeep resources
- karakeep/deployment-web.yaml
- karakeep/service-web.yaml
- karakeep/externalsecret.yaml
- karakeep/httproute.yaml
- karakeep/pvc-data.yaml
# Meilisearch resources
- meilisearch/deployment-meilisearch.yaml
- meilisearch/service-meilisearch.yaml
- meilisearch/pvc-meilisearch.yaml
# kopiur backend — per-PVC stubs; uniform fields come from the component below
- kopiur/data-pvc.yaml
- kopiur/meilisearch-pvc.yaml

# Injects ALL uniform kopiur fields (repository, copyMethod, populator, and the
# privileged root mover) into the per-PVC stubs above. See my-apps/common/
# kopiur-backup. No per-app mover patch needed — privilegedMode preserves the
# app's original file ownership on restore.
components:
  - ../../common/kopiur-backup

configMapGenerator:
  - name: karakeep-configuration
    envs:
      - karakeep/karakeep-configuration.env
