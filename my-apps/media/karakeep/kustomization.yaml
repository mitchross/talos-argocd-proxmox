apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: karakeep
resources:
- namespace.yaml
# Chrome resources
- chrome/deployment-chrome.yaml
- chrome/service-chrome.yaml
# karakeep resources
- karakeep/deployment-web.yaml
- karakeep/service-web.yaml
- karakeep/externalsecret.yaml
- karakeep/httproute.yaml
- karakeep/pvc-data.yaml
# Backup wiring is now chart-managed (helmCharts: below) — pvc-plumber
# was decommissioned 2026-05-21 and no longer renders per-PVC
# ExternalSecret/RS/RD on the `backup:` label. The chart inflates one
# release per backed-up PVC; pvc.yaml carries a static dataSourceRef →
# <pvc>-dst so the VolSync populator handles restore-on-create.
# Meilisearch resources
- meilisearch/deployment-meilisearch.yaml
- meilisearch/service-meilisearch.yaml
- meilisearch/pvc-meilisearch.yaml

configMapGenerator:
  - name: karakeep-configuration
    envs:
      - karakeep/karakeep-configuration.env

# Chart-managed backup wiring (replaces pvc-plumber's per-PVC reconciler).
# Each entry below renders ExternalSecret + ReplicationSource +
# ReplicationDestination for one PVC. Repo identity volsync-<pvc> is
# preserved so existing kopia backup lineages remain restorable.
# moverSecurityContext intentionally aligned to karakeep app's UID 1001
# (was 568 under pvc-plumber — fsGroup chown was masking the mismatch).
helmGlobals:
  chartHome: ../../../docs/research/pvc-backup-simplification/proposal/
helmCharts:
- name: volsync-backup
  releaseName: karakeep-data-pvc-backup
  namespace: karakeep
  valuesInline:
    pvc: data-pvc
    namespace: karakeep
    frequency: hourly
    tier: best-effort
    pvc_create: false
    kopia:
      moverSecurityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 10Gi
      storageClassName: longhorn
- name: volsync-backup
  releaseName: karakeep-meilisearch-pvc-backup
  namespace: karakeep
  valuesInline:
    pvc: meilisearch-pvc
    namespace: karakeep
    frequency: hourly
    tier: best-effort
    pvc_create: false
    kopia:
      moverSecurityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
    pvc_spec:
      accessModes: ["ReadWriteOnce"]
      storage: 10Gi
      storageClassName: longhorn
