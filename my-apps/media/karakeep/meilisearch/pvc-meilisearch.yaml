apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-pvc
  namespace: karakeep
  labels:
    app: karakeep
    type: meilisearch-storage
    # backup: "hourly" removed 2026-05-21 — chart-managed now.
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: meilisearch-pvc-dst
