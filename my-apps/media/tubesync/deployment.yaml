apiVersion: apps/v1
kind: Deployment
metadata:
  name: tubesync
  namespace: tubesync
  labels:
    app: tubesync
spec:
  # Temporarily 0 (2026-05-30, Option-R repair): quiesce the config-pvc
  # consumer so the volume detaches before the immutable-dataSourceRef
  # repair (delete + restore-recreate). Restored to 1 after the repaired
  # PVC is Bound.
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tubesync
  template:
    metadata:
      labels:
        app: tubesync
    spec:
      containers:
      - name: tubesync
        image: ghcr.io/meeb/tubesync:v0.17.3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4848
        env:
        - name: TZ
          value: America/New_York
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media
          mountPath: /downloads
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 2Gi
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config-pvc
      - name: media
        persistentVolumeClaim:
          claimName: media-pvc
