---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# tubesync config-pvc backup STUB — uniform fields (repository, copyMethod,
# populator) injected by ../../common/kopiur-backup. The mover securityContext
# is per-PVC and stays in THIS stub (docs/domains/storage/kopiur-mover-permissions.md).
# NOTE: backs up config-pvc ONLY; media-pvc is backup-exempt (SMB archive).
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: config-pvc
  namespace: tubesync
spec:
  sources:
    - pvc:
        name: config-pvc
  identity:
    username: config-pvc
    hostname: tubesync
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: config-pvc-daily
  namespace: tubesync
spec:
  policyRef:
    name: config-pvc
  schedule:
    cron: "39 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: config-pvc-restore
  namespace: tubesync
spec:
  source:
    fromPolicy:
      name: config-pvc
      offset: 0
  mover:
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
