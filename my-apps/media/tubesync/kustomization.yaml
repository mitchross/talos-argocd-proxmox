apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vpa.yaml
  - namespace.yaml
  - storage.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - kopiur/config-pvc.yaml

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/. Backs up config-pvc ONLY —
# media-pvc is backup-exempt (SMB archive).
components:
  - ../../common/kopiur-backup
