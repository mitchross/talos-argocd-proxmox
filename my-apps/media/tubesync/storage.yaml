apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config-pvc
  namespace: tubesync
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    backup: "daily"
    restore-policy: "strict"
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
  # Static dataSourceRef → ReplicationDestination/config-pvc-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: config-pvc-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: tubesync
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: tubearchivist-smb
  resources:
    requests:
      storage: 1Ti

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: config-pvc
  namespace: tubesync
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config-pvc
spec:
  sourcePVC: config-pvc
  trigger:
    schedule: "13 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: config-pvc
    hostname: tubesync
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: config-pvc-dst
  namespace: tubesync
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: config-pvc
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: config-pvc
    hostname: tubesync
    sourceIdentity:
      sourceName: config-pvc
      sourceNamespace: tubesync
      sourcePVCName: config-pvc
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 10Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
