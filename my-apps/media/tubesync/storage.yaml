apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config-pvc
  namespace: tubesync
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
  # kopiur restore-before-bind: on recreate this binds Pending until the
  # Restore populator hydrates it from the latest kopia snapshot. No-op while
  # Bound. Backup/restore CRs in kopiur/config-pvc.yaml; uniform fields + the
  # privileged mover come from the ../../common/kopiur-backup component.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: config-pvc-restore
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: tubesync
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SMB-backed YouTube archive (TubeArchivist); non-snapshottable, rebuildable via tubesync re-fetch"
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: tubearchivist-smb
  resources:
    requests:
      storage: 1Ti

# NOTE: config-pvc is backed up by kopiur now (2026-06-26) — dataSourceRef +
# SnapshotPolicy/SnapshotSchedule/Restore in kopiur/config-pvc.yaml (uniform
# fields from the ../../common/kopiur-backup component). media-pvc stays
# backup-exempt (SMB archive). Do not add inline RS/RD here.
