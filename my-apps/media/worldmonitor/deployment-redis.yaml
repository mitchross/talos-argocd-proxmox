apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldmonitor-redis
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: worldmonitor
      app.kubernetes.io/component: redis
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worldmonitor
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: docker.io/redis:7.4.9-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: REDIS_PASSWORD
          command:
            - redis-server
          # redis-server rejects --flag=value syntax ("Bad directive") — each
          # flag and its value must be separate args
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: worldmonitor-redis-data
