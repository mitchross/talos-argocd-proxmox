apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: worldmonitor-secrets
  namespace: worldmonitor
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: worldmonitor-secrets
    creationPolicy: Owner
  data:
    # REQUIRED: Authenticates every non-public request between app and AIS relay.
    # Generate: openssl rand -hex 32
    - secretKey: RELAY_SHARED_SECRET
      remoteRef:
        key: worldmonitor
        property: relay_shared_secret
    # REQUIRED: Redis AUTH password (--requirepass).
    # Generate: openssl rand -hex 32
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: worldmonitor
        property: redis_password
    # REQUIRED: Bearer token for Redis REST proxy (SRH_TOKEN).
    # Generate: openssl rand -hex 32
    - secretKey: REDIS_TOKEN
      remoteRef:
        key: worldmonitor
        property: redis_token
    # Redis connection string for the REST proxy.
    # Format in 1Password: redis://:<PASSWORD>@worldmonitor-redis:6379
    # (same password as redis_password field)
    - secretKey: REDIS_CONNECTION_STRING
      remoteRef:
        key: worldmonitor
        property: redis_connection_string