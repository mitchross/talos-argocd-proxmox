apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: worldmonitor-redis-data
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Redis cache data — reseeded from upstream sources on demand"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
