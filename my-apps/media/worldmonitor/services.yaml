---
apiVersion: v1
kind: Service
metadata:
  name: worldmonitor
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: worldmonitor-ais-relay
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: ais-relay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: ais-relay
  ports:
    - name: http
      port: 3004
      targetPort: 3004
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: worldmonitor-redis
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: worldmonitor-redis-rest
  namespace: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis-rest
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/component: redis-rest
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP