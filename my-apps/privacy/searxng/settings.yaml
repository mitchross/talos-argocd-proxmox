use_default_settings: true

server:
    base_url: 'https://search.vanillax.me'  # Remove trailing slash
    secret_key: "${SEARXNG_SECRET_KEY}"  # Use from secret
    bind_address: "0.0.0.0"
    port: 8080  # Match with deployment port
    public_instance: true
    limiter: true  # Enable limiter
    method: "GET"  # Allow both GET and POST
    http_protocol_version: "1.0"
    default_http_headers:
        X-Content-Type-Options: nosniff
        X-Download-Options: noopen
        X-Robots-Tag: noindex, nofollow
        Referrer-Policy: no-referrer
        Access-Control-Allow-Origin: "*"
        Access-Control-Allow-Methods: "GET, POST, OPTIONS"

valkey:
    url: valkey://redis:6379/0

search:
    safe_search: 0
    formats:
        - html
        - json
        - csv
        - rss
    format_by_default: false
    autocomplete: "duckduckgo"
    default_lang: "en-US"
    ban_time_on_fail: 5
    max_ban_time_on_fail: 120
    suspended_times:
        SearxEngineAccessDenied: 180
        SearxEngineCaptcha: 3600
        SearxEngineTooManyRequests: 180
        cf_SearxEngineCaptcha: 1296000
        cf_SearxEngineAccessDenied: 86400
        recaptcha_SearxEngineCaptcha: 604800

ui:
    static_use_hash: true
    default_theme: simple
    theme_args:
        simple_style: dark

enabled_plugins:
    - 'Hash plugin'
    - 'Self Information'
    - 'Tracker URL remover'
    - Basic Calculator
    - Hostnames plugin
    - Open Access DOI rewrite
    - Self Informations
    - Unit converter plugin

hostnames:
    high_priority:
        - (.*)\/blog\/(.*)
        - (.*\.)?wikipedia.org$
        - (.*\.)?github.com$
        - (.*\.)?reddit.com$
        - (.*\.)?linuxserver.io$
        - (.*\.)?docker.com$
        - (.*\.)?archlinux.org$
        - (.*\.)?stackoverflow.com$
        - (.*\.)?askubuntu.com$
        - (.*\.)?superuser.com$
    replace:
        (www\.)?reddit\.com$: redlib.vanillax.me

engines:
    # Google is disabled: its frontend parser broke in 2026.4.17
    # (google.py:385 IndexError: list index out of range when
    # extracting content_nodes[0]). Upstream fix is PR #5984, still
    # an unmerged POC — bumping the image won't help. Re-enable once
    # that PR lands in a tagged release.
    - name: google
      disabled: true
    - name: duckduckgo
      disabled: false
    # WHICH engines get blocked is egress-IP-dependent and shifts constantly, so
    # we do NOT maintain a static disabled list — SearXNG auto-suspends any engine
    # that 429/403/CAPTCHAs (search.suspended_times) and routes around it. Keep the
    # full reputable set enabled for redundancy. Observed blocks vary by exit IP:
    #   - datacenter egress: brave + qwant blocked; ddg/bing/startpage/mojeek OK
    #   - Proton VPN egress: qwant + mojeek + startpage(1h CAPTCHA) blocked; brave/ddg/bing OK
    # Proton (and most VPN ranges) are blocked HARDER by scrapers — if SearXNG is the
    # only thing hurt by the VPN, split-tunnel its egress off Proton at the firewall,
    # or move the worst offenders to keyed APIs (e.g. brave search API).
    - name: bing
      disabled: false
    - name: brave
      disabled: false
    - name: startpage
      disabled: false
    - name: qwant
      disabled: false
    - name: mojeek
      disabled: false
    - name: wikipedia
      disabled: false
    - name: stackoverflow
      disabled: false
    - name: github
      disabled: false
    # Kiwix engine removed - not available in SearXNG 2025.10.17
    # Re-add when upgrading SearXNG to a version with kiwix engine support

outgoing:
    # Bumped from 3s -> 6s because Vane/Perplexica fires 3 parallel
    # research queries; startpage/mojeek can take 2-4s on a cold
    # connection and were getting suspended as "too slow" under the 3s timeout.
    request_timeout: 6.0
    # max_request_timeout MUST stay below Perplexica's ~10s hardcoded client
    # timeout. At 15s, a single slow engine made SearXNG return AFTER Perplexica
    # already aborted ("SearXNG search timed out") → user got nothing. At 8s,
    # SearXNG always returns within Perplexica's window with partial results.
    max_request_timeout: 8.0
    pool_connections: 100
    pool_maxsize: 20
    enable_http2: true

categories_order:
    - general
    - files
    - images
    - videos
    - news
    - map
    - it
    - science
    - social media

categories:
    general:
        default: true
    files:
        default: false
    images:
        default: false
    videos:
        default: false
    news:
        default: false
    map:
        default: false
    it:
        default: false
    science:
        default: false
    social media:
        default: false

default_preferences:
    language: "en-US"
    locale: "en"
    autocomplete: "duckduckgo"
    image_proxy: true
    method: "GET"
    safesearch: 1
    theme: "simple"