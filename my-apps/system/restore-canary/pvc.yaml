# The canary PVC. Deliberately tiny; holds only the drill sentinel file.
#
# kopiur daily schedule (kopiur/restore-canary-data.yaml): the old
# pvc-plumber manual tier had no cron, so snapshots only existed when the
# drill bumped the trigger. Under kopiur the canary runs a normal DAILY
# SnapshotSchedule so a fresh snapshot always exists for the drill to
# restore from, with no manual trigger plumbing.
#
# DAY-ONE NOTE: a brand-new PVC carrying dataSourceRef binds only once the
# Restore populator has a snapshot to hydrate from. The kopia mover
# completes as a SUCCESSFUL NO-OP when the repo identity has no snapshots,
# so a first restore can bind EMPTY — content is not guaranteed by the ref
# alone. The drill therefore always requires the latest snapshot to ADVANCE
# past the fresh sentinel backup before any delete. Full procedure:
# docs/disaster-recovery.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restore-canary-data
  namespace: restore-canary
  annotations:
    # Immutable dataSourceRef on a Bound PVC — mask the SSA dry-run diff
    # (the AppSet ignoreDifferences handles the live compare).
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app.kubernetes.io/name: restore-canary
    app.kubernetes.io/component: dr-canary
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # kopiur restore-before-bind: on recreate (the drill, DR, namespace
  # recreate) this binds Pending until the Restore populator hydrates it
  # from the latest kopia snapshot. No-op while Bound. Backup/restore CRs in
  # kopiur/restore-canary-data.yaml; uniform fields come from the
  # ../../common/kopiur-backup component; the mover uid:gid lives in the stub.
  dataSourceRef:
    apiGroup: kopiur.home-operations.com
    kind: Restore
    name: restore-canary-data-restore
