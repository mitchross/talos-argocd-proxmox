apiVersion: apps/v1
kind: Deployment
metadata:
  name: fizzy
  namespace: fizzy
  labels:
    app.kubernetes.io/name: fizzy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fizzy
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fizzy
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: fizzy
          image: ghcr.io/basecamp/fizzy:sha-d8ec07d@sha256:5ee67abbc4a096535672fc235250c8c7974416d0f54a5b88612d7e5abdad5d38
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/Detroit
            - name: RAILS_ENV
              value: production
            # Rails 8 puma defaults workers to processor count — 32 threads on
            # the GPU node meant ~32 forked workers ballooning to the 2Gi limit
            # within minutes of boot (OOM crashloop, 345+ restarts).
            - name: WEB_CONCURRENCY
              value: "2"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: fizzy-secrets
                  key: SECRET_KEY_BASE
            - name: SMTP_ADDRESS
              value: mailpit.mailpit.svc.cluster.local
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_DOMAIN
              value: vanillax.me
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: fizzy-storage
              mountPath: /rails/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
      volumes:
        - name: fizzy-storage
          persistentVolumeClaim:
            claimName: data
