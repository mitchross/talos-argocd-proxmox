---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
# fizzy data backup STUB — uniform fields (repository, copyMethod,
# privileged mover, populator) injected by ../../common/kopiur-backup.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: data
  namespace: fizzy
spec:
  sources:
    - pvc:
        name: data
  identity:
    username: data
    hostname: fizzy
  retention:
    keepDaily: 14
    keepWeekly: 6
    keepMonthly: 3
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: data-daily
  namespace: fizzy
spec:
  policyRef:
    name: data
  schedule:
    cron: "41 3 * * *"
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: data-restore
  namespace: fizzy
spec:
  source:
    fromPolicy:
      name: data
      offset: 0
  mover:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
    podSecurityContext:
      fsGroup: 1000
      supplementalGroups:
        - 1000
