apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - vpa.yaml
  - ns.yaml
  - externalsecret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - kopiur/data.yaml

namespace: fizzy

# Uniform kopiur backup fields (repository, copyMethod, populator) for the per-PVC stub(s) in kopiur/.
components:
  - ../../common/kopiur-backup
