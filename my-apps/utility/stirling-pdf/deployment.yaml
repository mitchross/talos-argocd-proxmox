apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
      annotations:
        instrumentation.opentelemetry.io/inject-java: "opentelemetry/default"
    spec:
      containers:
        - name: stirling-pdf
          image: ghcr.io/stirling-tools/stirling-pdf:latest@sha256:976dfa581b6cb1fb91e9b0b90284a92febe8ba6a4519e28f95c4e8e550d6d70d
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DOCKER_ENABLE_SECURITY
              value: "false"
            - name: INSTALL_BOOK_AND_ADVANCED_HTML_OPS
              value: "true"
            # Stirling-PDF's init script builds JAVA_TOOL_OPTIONS from
            # JAVA_BASE_OPTS (computed dynamically) + JAVA_CUSTOM_OPTS (user override).
            # Setting JAVA_TOOL_OPTIONS directly gets overwritten by init-without-ocr.sh.
            # Default MaxMetaspaceSize (128m at 1Gi limit) is insufficient for
            # v2.12.0 with all features — causes CrashLoopBackOff from OOM Metaspace.
            - name: JAVA_CUSTOM_OPTS
              value: "-XX:MaxMetaspaceSize=512m"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
