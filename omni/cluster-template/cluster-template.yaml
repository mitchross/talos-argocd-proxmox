# omnictl cluster template sync -v -f cluster-template-working.yaml
---
kind: Cluster
name: talos-prod-cluster
labels:
  cluster-id: "1"
kubernetes:
  version: v1.36.1
talos:
  # v1.13.0 GA shipped 2026-04-27. We rode v1.13.0-rc.0 from 2026-04-16 to
  # GA — beta.1 had an init segfault loop on CP nodes in Proxmox; rc.0
  # resolved it and we never saw a regression on rc.0 → GA. The Omni
  # --enable-talos-pre-release-versions flag is no longer required for
  # Talos itself now that we're on GA; leave it in place on the Omni
  # server if you still need it for other pre-release components.
  # v1.13.4 (2026-06-09): current stable patch on the 1.13 GA line.
  # Includes the 1.13.3 containerd 2.2.4 and mount-propagation fixes, plus
  # corrected kube-scheduler integer marshaling. Kubernetes stays v1.36.1.
  version: v1.13.4
patches:
- name: disable-default-cni
  inline:
    cluster:
      network:
        cni:
          name: none
      proxy:
        disabled: true
- name: dns-resolver
  inline:
    apiVersion: v1alpha1
    kind: ResolverConfig
    nameservers:
    - address: 192.168.10.1
# Talos 1.13 switched install/upgrade to the LifecycleService API; without an
# explicit install.disk, fresh VMs fail with "system disk not found" in
# maintenanceUpgrade. virtio-scsi-single + scsi0 presents as /dev/sda in all
# three machine classes, so this is safe to apply cluster-wide.
- name: install-disk
  inline:
    machine:
      install:
        disk: /dev/sda
- file: patches/docker-hub-auth.yaml
- name: node-performance
  inline:
    machine:
      sysctls:
        fs.inotify.max_user_watches: "1048576"
        fs.inotify.max_user_instances: "8192"
        fs.file-max: "2097152"
        vm.swappiness: "10"
        vm.max_map_count: "524288"
        net.core.somaxconn: "65535"
        net.core.rmem_max: "67108864"
        net.core.wmem_max: "67108864"
        net.ipv4.tcp_congestion_control: bbr
        net.ipv4.tcp_fastopen: "3"
        net.ipv4.tcp_rmem: 4096 87380 33554432
        net.ipv4.tcp_wmem: 4096 65536 33554432
        net.ipv4.tcp_slow_start_after_idle: "0"
        net.ipv4.tcp_mtu_probing: "1"
        net.ipv4.tcp_tw_reuse: "1"
        net.core.netdev_max_backlog: "16384"
        sunrpc.tcp_slot_table_entries: "128"
        sunrpc.tcp_max_slot_table_entries: "65536"
      udev:
        rules:
        - SUBSYSTEM=="bdi", ACTION=="add", ATTR{read_ahead_kb}="131072"
---
kind: ControlPlane
machineClass:
  name: proxmox-control-plane
  size: 3
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
- siderolabs/nfs-utils # renovate: datasource=docker depName=siderolabs/nfs-utils
- siderolabs/nfsrahead # renovate: datasource=docker depName=siderolabs/nfsrahead
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/*.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
patches:
- name: control-plane-performance
  inline:
    cluster:
      apiServer:
        extraArgs:
          max-requests-inflight: "800"
          max-mutating-requests-inflight: "400"
      etcd:
        extraArgs:
          quota-backend-bytes: "8589934592"
          snapshot-count: "5000"
          auto-compaction-mode: "periodic"
          auto-compaction-retention: "5m"
          # Expose etcd metrics on port 2381 (HTTP, no mTLS) so Prometheus
          # can scrape without certificate juggling. Listener is bound to
          # the host network on CP nodes only — not reachable from worker
          # pods directly, so node-discovery scraping (see
          # monitoring/prometheus-stack/values.yaml additionalScrapeConfigs)
          # is the way in. Path B (mTLS on 2379) requires extracting
          # /system/secrets/etcd/* into a K8s Secret on every cert rotation;
          # not worth it for a single-operator homelab.
          listen-metrics-urls: "http://0.0.0.0:2381"
      controllerManager:
        extraArgs:
          concurrent-deployment-syncs: "10"
          concurrent-replicaset-syncs: "10"
          concurrent-namespace-syncs: "20"
          # Default bind-address is 127.0.0.1; flip to 0.0.0.0 so Prometheus
          # node-discovery can scrape :10257 from inside the cluster.
          bind-address: "0.0.0.0"
      scheduler:
        extraArgs:
          kube-api-qps: "100"
          # Same reason as controllerManager: default 127.0.0.1 hides the
          # /metrics endpoint on :10259.
          bind-address: "0.0.0.0"
---
kind: Workers
name: workers
machineClass:
  name: proxmox-worker
  size: 3
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
- siderolabs/nfs-utils # renovate: datasource=docker depName=siderolabs/nfs-utils
- siderolabs/nfsrahead # renovate: datasource=docker depName=siderolabs/nfsrahead
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/*.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
patches:
- name: kubelet-performance
  inline:
    machine:
      kubelet:
        extraConfig:
          serializeImagePulls: false
- name: longhorn-storage
  inline:
    machine:
      kubelet:
        extraMounts:
        - destination: /var/lib/longhorn
          type: bind
          source: /var/local/longhorn
          options:
          - bind
          - rshared
          - rw
# Longhorn V2 (SPDK) data engine prerequisites — applied to storage workers only
# (control-plane has no Longhorn storage, so it is intentionally excluded).
# 1024 x 2MiB hugepages = 2 GiB, matching Longhorn's dataEngineMemorySize default.
# vfio_pci is SPDK's preferred userspace-IO module; nvme_tcp backs V2 over NVMe/TCP
# (built into the Talos 6.18 kernel — listing it here is harmless and future-proof).
# NOTE: takes effect only after `omnictl cluster template sync` + a rolling reboot
# (or on first boot for a freshly provisioned cluster). The V2 engine itself is
# enabled declaratively in infrastructure/storage/longhorn/values.yaml
# (v2DataEngine: "true") — these kernel prereqs must be live BEFORE Longhorn
# starts on the rebuilt cluster. See docs/domains/storage/longhorn-v2-migration.md.
- name: longhorn-v2-prereqs
  inline:
    machine:
      sysctls:
        vm.nr_hugepages: "1024"
      kernel:
        modules:
        - name: nvme_tcp
        - name: vfio_pci
# Declarative Longhorn V2 block-disk registration (GitOps, no manual step).
# Longhorn's defaultSettings.createDefaultDiskLabeledNodes: "true" makes
# longhorn-manager create disks ONLY on nodes carrying the
# node.longhorn.io/create-default-disk label; "config" mode reads the disk
# spec from the node annotation below. The by-id path is STABLE and IDENTICAL
# on every provider-built VM: QEMU derives the serial from the drive name, so
# scsi1 (the additional_disks raw V2 device from the machine class) is always
# /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1 (verified live
# 2026-06-11 across all rebuilt workers). diskType "block" = V2/SPDK claims
# the raw device. Talos applies nodeLabels/nodeAnnotations hot (no reboot).
- name: longhorn-v2-default-disk
  inline:
    machine:
      nodeLabels:
        node.longhorn.io/create-default-disk: "config"
      nodeAnnotations:
        node.longhorn.io/default-disks-config: '[{"name":"v2-block-0","path":"/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1","allowScheduling":true,"diskType":"block","storageReserved":0}]'
---
kind: Workers
name: gpu-workers
machineClass:
  name: proxmox-gpu-worker
  size: 1
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
# nfs-utils removed — incompatible with NVIDIA drivers on Talos 1.12.x (siderolabs/extensions#1021)
# rpc-statd crash loop corrupts containerd boltdb, taking the entire node down
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/gpu-worker.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
- siderolabs/nonfree-kmod-nvidia-production # renovate: datasource=docker depName=siderolabs/nonfree-kmod-nvidia-production
- siderolabs/nvidia-container-toolkit-production # renovate: datasource=docker depName=siderolabs/nvidia-container-toolkit-production
patches:
- name: gpu-worker-labels
  inline:
    machine:
      nodeLabels:
        gpu-worker: "true"
        nvidia.com/gpu: "true"
# REMOVED 2026-06-11: the gpu-network-dhcp DHCPv4Config pinned to "ens18"
# broke the GPU worker on the V2 rebuild — adding the second disk
# (additional_disks -> extra virtio-scsi controller) shifted PCIe
# enumeration, the NIC stopped being ens18, the pinned config matched
# nothing, and the node booted with NO IP (SideroLink down, unreachable —
# unfixable remotely, required reprovision). Regular workers use Talos's
# default DHCP-on-all-links and survive hardware reshuffles; the kubelet
# nodeIP.validSubnets pin in patches/gpu-worker.yaml handles address
# selection. Do not re-pin DHCP to an interface name.
- file: patches/gpu-worker.yaml
- name: kubelet-performance
  inline:
    machine:
      kubelet:
        extraConfig:
          serializeImagePulls: false
- name: longhorn-storage
  inline:
    machine:
      kubelet:
        extraMounts:
        - destination: /var/lib/longhorn
          type: bind
          source: /var/local/longhorn
          options:
          - bind
          - rshared
          - rw
# Longhorn V2 (SPDK) data engine prerequisites on the GPU worker.
# CAUTION (GPU node): this node runs the NVIDIA production driver and hosts
# llama-cpp + ComfyUI. Two interactions to watch on the first reboot:
#   1. vfio_pci is the same module used for PCI passthrough. Loading it does NOT
#      bind the GPU (nvidia.ko owns it) unless a device is explicitly assigned to
#      vfio, but verify `nvidia-smi` / GPU workloads still come up after reboot.
#   2. 2 GiB hugepages are carved out of node RAM, competing with AI workloads.
# Validate this node LAST in the rolling reboot. See longhorn-v2-migration.md.
- name: longhorn-v2-prereqs
  inline:
    machine:
      sysctls:
        vm.nr_hugepages: "1024"
      kernel:
        modules:
        - name: nvme_tcp
        - name: vfio_pci
# Declarative Longhorn V2 block-disk registration — same mechanism and same
# stable by-id as the workers section (scsi1 from the machine class is always
# drive-scsi1 regardless of disk size: 672G here vs 704G on workers).
- name: longhorn-v2-default-disk
  inline:
    machine:
      nodeLabels:
        node.longhorn.io/create-default-disk: "config"
      nodeAnnotations:
        node.longhorn.io/default-disks-config: '[{"name":"v2-block-0","path":"/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1","allowScheduling":true,"diskType":"block","storageReserved":0}]'
