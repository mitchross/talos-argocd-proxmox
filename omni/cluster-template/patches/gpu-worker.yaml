# Shared GPU worker Talos configuration. The worker set owns its DHCP/static
# address policy; this patch only constrains kubelet address selection and
# loads the NVIDIA modules required by both the RTX 3090 and GTX 1050 Ti VMs.
# Do not pin DHCP to a PCI-derived interface name: passthrough hardware can
# reorder the virtual NIC. nodeIP.validSubnets is stable across that reshuffle.
machine:
  kubelet:
    nodeIP:
      validSubnets:
      - 192.168.10.0/24
  kernel:
    modules:
    - name: nvidia
    - name: nvidia_uvm
    - name: nvidia_drm
    - name: nvidia_modeset
  sysctls:
    net.core.bpf_jit_harden: 1
