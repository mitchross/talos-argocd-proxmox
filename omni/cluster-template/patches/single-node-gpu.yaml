# Single-node GPU Talos config (cluster: talos-singlenode-gpu-prod)
# Host: second Proxmox box at 192.168.10.14 (2950X / 128G), bridge vmbr0,
# Main LAN 192.168.10.x (DHCP). This is the dedicated GPU worker paired with
# the `single-node-control-plane` VM, provisioned by the `single-node-talos-gpu`
# machine class via the `proxmox-threadripper` provider instance.
#
# DHCP is Talos's DEFAULT on all physical links — do NOT pin a DHCPv4Config to
# an interface name. PCIe enumeration shifts when VM hardware changes (GPU
# passthrough / extra disks reorder NICs); a pinned config then leaves the node
# IP-less and unreachable (required a reprovision on the DL360 GPU worker,
# 2026-06-11). nodeIP.validSubnets below selects the address instead.
machine:
  kubelet:
    nodeIP:
      validSubnets:
      - 192.168.10.0/24
  kernel:
    modules:
    - name: nvidia
    - name: nvidia_uvm
    - name: nvidia_drm
    - name: nvidia_modeset
    # SONOFF ZBDongle (Zigbee coordinator, USB-passed to this VM). Talos loads
    # no USB-serial drivers by default, so the dongle never enumerates as a tty
    # without these. cp210x covers the CP2102N bridge on the ZBDongle-E/-P
    # (USB 10c4:ea60) -> /dev/ttyUSB0; ch341 covers CH9102/CH340 variants. Both
    # are loaded as insurance (the canonical Talos+zigbee config does the same).
    # Verify after sync: talosctl -n <node-ip> ls /dev | grep -E 'ttyUSB|ttyACM'
    # NOTE: a udev SYMLINK rule for a stable /dev/zigbee is intentionally omitted
    # — the cluster-level node-performance patch already owns machine.udev.rules
    # and a second rules list here could replace (not append to) it. We mount the
    # ttyUSB0 device node directly instead (single dongle => deterministic).
    - name: cp210x
    - name: ch341
  sysctls:
    net.core.bpf_jit_harden: 1
