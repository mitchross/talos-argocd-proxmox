---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: libvirt-dell-single-node
spec:
  matchlabels: []
  autoprovision:
    providerid: libvirt
    kernelargs: []
    metavalues: []
    providerdata: |
      cores: 4
      memory: 32768
      disk_size: 160
      storage_pool: default
      network_interfaces:
        - driver: virtio
          # Bridged onto the HomeLab VLAN via the host's br0 and the ASUS
          # media bridge; the VM uses a static address from machine config
          # (the media bridge breaks DHCP for secondary MACs).
          network_name: talos-routed
