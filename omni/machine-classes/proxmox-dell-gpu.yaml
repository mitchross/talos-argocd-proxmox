---
# omnictl apply -f omni/machine-classes/proxmox-dell-gpu.yaml
# Dell behind the AX86U media bridge, reprovisioned as Proxmox (192.168.10.16).
# GTX 1050 Ti passed through via Proxmox datacenter resource mapping "gpu-1050ti".
# See docs/domains/networking/wifi-proxmox-talos-worker.md.
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: proxmox-dell-gpu
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox-dell
    # NO static ip= kernel arg here — two hard-won findings (2026-07-19):
    # 1. DHCP works for the ISO/registration phase even behind the AX86U media
    #    bridge (the bridge snoops DHCP and creates the L3 binding it needs).
    # 2. ip= with an empty device field binds to the first non-loopback
    #    interface ALPHABETICALLY — on Talos that is bond0, not eth0 — which
    #    installs a dead default route and blackholes ALL guest-originated
    #    traffic (VM answers ARP but can never send; SideroLink never connects).
    # The machine config's static 192.168.10.119 takes over after install.
    kernelargs: []
    metavalues: []
    providerdata: |
      cores: 4
      sockets: 1
      # GPU passthrough pins guest RAM; keep host headroom.
      memory: 32768
      # local-lvm on the Dell is only ~137GiB total; 100 leaves thin-pool
      # headroom. Frigate recordings land on NFS, not this disk.
      disk_size: 100
      storage_selector: name == "local-lvm"
      network_bridge: vmbr0
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      cpu_type: host
      machine_type: q35
      bios: ovmf
      vga: std
      balloon: false
      pci_devices:
        - mapping: gpu-1050ti
          pcie: true
