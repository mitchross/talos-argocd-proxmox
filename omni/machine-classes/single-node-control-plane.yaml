---
# omnictl apply -f single-node-control-plane.yaml
# Dedicated Threadripper control-plane VM.
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: single-node-control-plane
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox-threadripper
    kernelargs: []
    metavalues: []
    providerdata: |
      cores: 4
      sockets: 1
      memory: 16384
      disk_size: 100
      storage_selector: name == "nvme0-vmstore"
      network_bridge: vmbr0
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      cpu_type: host
      machine_type: q35
      balloon: false
