---
# omnictl apply -f single-node-talos-gpu.yaml
#
# Single-node Talos GPU box on the SECOND Proxmox host (192.168.10.14):
#   AMD Threadripper 2950X (16C/32T) + 128 GiB RAM + GPU passthrough.
# This is a standalone all-in-one node — control plane + workloads on one VM —
# provisioned by a DEDICATED provider instance (providerid: proxmox-threadripper)
# pointed at the 192.168.10.14 host, separate from the DL360 `proxmox` provider.
#
# Proxmox Provider Config Options (Enhanced Build):
#   cores, sockets, memory, disk_size: Basic VM specs
#   storage_selector: CEL expression to select Proxmox storage
#   disk_ssd, disk_discard, disk_iothread, disk_cache, disk_aio: Disk performance
#   cpu_type: CPU type (host for GPU passthrough)
#   machine_type: q35 for native PCIe passthrough
#   numa, hugepages, balloon: GPU/HPC optimizations
#   additional_nics: Extra NICs for storage networks
#
# Note: qemu-guest-agent is auto-installed by the provider
#
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: single-node-talos-gpu
spec:
  matchlabels: []
  autoprovision:
    # Dedicated provider instance bound to the 192.168.10.14 Threadripper host.
    providerid: proxmox-threadripper
    kernelargs: []
    metavalues: []
    providerdata: |
      # 2950X is 16 cores / 32 threads. As an all-in-one node it runs the
      # control plane, every operator, and the GPU workloads, so give it the
      # full thread count as vCPUs. cpu_type: host exposes the native CPU.
      cores: 32
      sockets: 1
      # 128 GiB host RAM. Leave headroom for the Proxmox host itself —
      # 120 GiB to the guest, ~8 GiB reserved for the hypervisor.
      memory: 122880
      # One disk holds Talos system + images + pod ephemeral + Longhorn V1
      # replica files (same single-partition V1 layout as the DL360 nodes — see
      # worker.yaml for the V2-engine post-mortem). Models live on NFS.
      # Sized to fit the 512 GB EDILOCA nvme0n1 with headroom for thin-pool
      # metadata and Proxmox overhead. Bump only if you move to a bigger disk.
      disk_size: 450
      # storage_selector targets the Proxmox storage living on nvme0n1 (the
      # healthy EDILOCA EN605, 9% wearout) — NOT local-lvm, which sits on the
      # worn INTEL boot disk (nvme1n1, 74%).
      #
      # PREREQUISITE on the 192.168.10.14 host: nvme0n1 is currently raw/empty.
      # Create an LVM-Thin pool on it named exactly `nvme0-vmstore`:
      #   Proxmox UI → pve → Disks → LVM-Thin → Create:
      #     Disk = /dev/nvme0n1, Name = nvme0-vmstore
      #   (or CLI:  pvesh / lvcreate — `pvcreate /dev/nvme0n1` then create the
      #    thinpool and `pvesm add lvmthin nvme0-vmstore --vgname ...`)
      # If you name the pool differently, update the selector below to match.
      storage_selector: name == "nvme0-vmstore"
      # NOTE: network_bridge is also host-specific. The 192.168.10.14 box shows
      # `localnetwork (pve)` — confirm the actual bridge name (likely vmbr0) in
      # Proxmox → pve → System → Network before provisioning. A wrong bridge
      # silently gives the VM no network.
      network_bridge: vmbr0
      # Disk performance (SSD/NVMe optimization)
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      # GPU passthrough optimizations
      cpu_type: host
      machine_type: q35
      # numa=true keeps guest memory on the same NUMA node as its vCPUs / the
      # PCIe lanes owning the GPU. The 2950X is a 2-die (NUMA) part, so this
      # matters for GPU passthrough latency.
      numa: true
      # hugepages: 1GB  # Requires host config: echo 256 > /proc/sys/vm/nr_hugepages
      balloon: false
      # GPU passthrough using Proxmox Resource Mappings. Two NVIDIA RTX 3090s
      # (10de:2204) are mapped on the 192.168.10.14 host (Datacenter → Resource
      # Mappings → PCI):
      #   gpu-1 → 0000:43:00 (IOMMU group 35)
      #   gpu-2 → 0000:08:00 (IOMMU group 14)
      # Both are passed through whole-card; the cluster runs GPU workloads as
      # mutually-exclusive whole-card consumers (see CLAUDE.md GPU topology).
      # HOST PREREQUISITE (192.168.10.14, fixed 2026-06-19): the boot SSD (Intel
      # 660P @ 42:00) and GPU gpu1 (43:00) are siblings under PCIe root complex
      # 40. On guest GPU reset the kernel's DPC/AER handler contained the root
      # port and took the boot disk down with it -> instant host hard-hang.
      # Fixed by handing PCIe error handling to firmware via the host kernel
      # cmdline `pcie_ports=compat pcie_aspm=off` (plus vfio-pci binding +
      # `initcall_blacklist=sysfb_init video=efifb:off` for the headless console).
      # See /root/CLAUDE-GPU-PASSTHROUGH-NOTE.md on the host. Validated: both
      # 3090s pass through with the host staying up. Do NOT remove those cmdline
      # args or the host will hard-lock again when this VM boots.
      pci_devices:
        - mapping: gpu-1
          pcie: true
        - mapping: gpu-2
          pcie: true

# GPU Passthrough Setup:
# With enhanced provider, VM is pre-configured for GPU. Just:
# 1. PCI Resource Mappings `gpu-1` + `gpu-2` created on the 192.168.10.14 host
#    (both RTX 3090 / 10de:2204; gpu-1=0000:43:00 IOMMU 35, gpu-2=0000:08:00 IOMMU 14)
# 2. Shut down the VM in Proxmox
# 3. Add GPUs via Proxmox UI: Hardware → Add → PCI Device (All Functions + PCI-Express)
# 4. Start the VM
# 5. GPU extensions are configured in the cluster template patches
