---
# omnictl apply -f single-node-talos-gpu.yaml
# Dedicated Threadripper GPU worker. See omni/docs/threadripper-gpu-cluster.md.
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: single-node-talos-gpu
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox-threadripper
    kernelargs: []
    metavalues: []
    providerdata: |
      cores: 32
      sockets: 1
      # GPU passthrough pins guest RAM; keep host headroom.
      memory: 81920
      disk_size: 450
      storage_selector: name == "nvme0-vmstore"
      network_bridge: vmbr0
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      additional_disks:
        - storage_selector: name == "nvme1-vmstore"
          disk_size: 450
          disk_ssd: true
          disk_discard: true
          disk_iothread: true
          disk_cache: none
          disk_aio: io_uring
      cpu_type: host
      machine_type: q35
      bios: ovmf
      vga: std
      numa: true
      balloon: false
      pci_devices:
        - mapping: gpu-1
          pcie: true
        - mapping: gpu-2
          pcie: true
