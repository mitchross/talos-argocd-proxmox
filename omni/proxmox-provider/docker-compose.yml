services:
  omni-infra-provider-proxmox:
    # Sidero ships this provider as a rolling :latest only — there are no
    # GitHub releases or git tags. The 7-character SHA tags on ghcr (e.g.
    # da2f853, 410ed22) are commit-SHA refs, not semver. We pin by content
    # digest so the running version is reproducible regardless of what the
    # :latest tag points at upstream. Renovate (digest update mode) tracks
    # new digests against this image.
    #
    # To bump manually, look up the current digest with:
    #   docker buildx imagetools inspect \
    #     ghcr.io/siderolabs/omni-infra-provider-proxmox:latest \
    #     | grep -i digest
    # then update the @sha256:... below and `docker compose up -d`.
    #
    # Last bumped: 2026-05-23
    image: ghcr.io/siderolabs/omni-infra-provider-proxmox:latest@sha256:f15ab4601a8c89eac655f09d69d373c3c331b7ac18e667ffc50da02702df0669
    container_name: omni-infra-provider-proxmox
    env_file:
      - .env
    volumes:
      - ./config.yaml:/config.yaml:ro
    command: >
      --config-file /config.yaml
      --omni-api-endpoint ${OMNI_API_ENDPOINT}
      --omni-service-account-key ${OMNI_INFRA_PROVIDER_KEY}
    restart: unless-stopped
    network_mode: host
