services:
  omni-infra-provider-proxmox:
    # Sidero ships this provider as a rolling :latest only — there are no
    # tagged releases on ghcr.io. pull_policy: always ensures we don't sit
    # on a cached image forever; run `docker compose pull` + `up -d` on the
    # provider host to refresh.
    image: ghcr.io/siderolabs/omni-infra-provider-proxmox:latest
    pull_policy: always
    container_name: omni-infra-provider-proxmox
    env_file:
      - .env
    volumes:
      - ./config.yaml:/config.yaml:ro
    command: >
      --config-file /config.yaml
      --omni-api-endpoint ${OMNI_API_ENDPOINT}
      --omni-service-account-key ${OMNI_INFRA_PROVIDER_KEY}
    restart: unless-stopped
    network_mode: host
